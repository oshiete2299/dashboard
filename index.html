      }

      if (cancelled) return;
      setQuickForm({
        nowTime: bridged.nowTime,
        day: bridged.day,
        energy: 3,
        homework: null,
        tiktok: bridged.tiktok,
        recent: metrics.recent,
        completionRate: metrics.completionRate,
        event: "none",
        daysToExam: 60,
        freeNote: "",
        // [PATCH] 2 field mới, chỉ dùng ở lớp UI/wiring — core không có
        // khái niệm goalMode; extraEvents core vốn đã hỗ trợ sẵn qua
        // rawState.extraEvents (AIPlannerBeta's todayExtraEvents dùng y
        // hệt cơ chế này, không phải field mới trong core).
        goalMode: "study",
        extraEvents: [],
      });

      setCheckedTasks({});
      setAppliedAt(null);
      setLastUpdatedAt(null);
      // [PATCH] reset form chọn (slider/nút/chip) khi sang ngày mới, thay
      // cho ô nhập tự do trước đây.
      setFormEnergy(3);
      setFormHomework(null);
      setFormMood("normal");
      setFormNote("");

      // [PATCH v30] MỤC 3 — mỗi khi sang ngày mới, đối chiếu deadlinePlan
      // (nếu có) với dữ liệu HÔM QUA để trừ giờ đã làm + tính phần dư
      // cộng dồn, hoặc tự tắt nếu đã làm xong. Thuần đọc/ghi
      // v25:deadlinePlan — không đụng plannerOutput/Core.
      try {
        const raw = await S.get(DEADLINE_PLAN_KEY);
        const plan = raw && raw !== "null" ? JSON.parse(raw) : null;
        if (plan) {
          const yesterdayIso = isoDateMinusDays(td, 1);
          const yesterdayData = db?.[yesterdayIso] || null;
          // Tìm route items hôm qua từ history (nếu có entry hôm qua) để
          // khớp task deadline theo tên — history do plannerStorage giữ.
          let yesterdayRouteItems = [];
          try {
            const history = await storage.loadHistory();
            const dayEntry = history.days.find(d => d.date === yesterdayIso);
            const lastEntry = dayEntry?.entries?.[dayEntry.entries.length - 1];
            const sched = lastEntry?.plannerOutput?.schedule || [];
            yesterdayRouteItems = sched.map((b, i) => ({ key: "t" + i, name: b.name, dur: b.dur }));
          } catch {}
          const settled = settleDeadlineProgress(plan, td, yesterdayData, yesterdayRouteItems);
          if (settled !== plan) {
            if (settled) { try { await S.set(DEADLINE_PLAN_KEY, JSON.stringify(settled)); } catch {} }
            else { try { await S.set(DEADLINE_PLAN_KEY, "null"); } catch {} } // xong sớm → tự tắt
          }
        }
      } catch (e) {
        console.error("[Morning Widget] settleDeadlineProgress failed:", e);
      }

      setLoading(false);
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [td]);

  const updateQuickForm = (patch) => setQuickForm(f => ({ ...f, ...patch }));

  // [PATCH] MỤC 1 — Form chọn thay cho chat tự do:
  //   a) energy: slider 1-5 (giữ nguyên ý nghĩa như quickForm.energy cũ)
  //   b) homework: 2 nút "Đã xong"/"Chưa xong" (boolean|null)
  //   c) mood: 1 trong 8 MOOD_CHIPS (map ra event + goalMode)
  //   d) note: ô nhập tự do NHỎ, tuỳ chọn — chỉ dùng để trích xuất
  //      extraEvents (giờ họp/hẹn/...) qua parseNaturalLanguage(), KHÔNG
  //      còn dùng để suy ra energy/homework/event/goalMode nữa (những field
  //      đó giờ đến thẳng từ slider/nút/chip, tường minh, không đoán).
  const [formEnergy, setFormEnergy] = useState(3);
  const [formHomework, setFormHomework] = useState(null);
  const [formMood, setFormMood] = useState("normal");
  const [formNote, setFormNote] = useState("");

  // handleRun — same orchestration AIPlannerBeta.handleRun() uses. Not one
  // line of the pipeline itself is reimplemented here — this only calls it.
  // [PATCH] optional formOverride lets the free-text flow run with the
  // freshly-parsed form directly, avoiding a state-update race.
  const handleRun = async (isUpdate, formOverride) => {
    const formToUse = formOverride || quickForm;
    if (!formToUse || running) return;
    setRunning(true);
    setErrorMsg(null);
    try {
      const dayLog = today?.entries || [];
      // [PATCH v30] Đọc deadlinePlan hiện tại (nếu có) mỗi lần chạy — để
      // enrichTasksWithContext có thể chia nhỏ task deadline vào lịch,
      // và ghi lại assignedMinutesToday để hôm sau settleDeadlineProgress
      // đối chiếu được. Không đụng plannerOutput/Core — chỉ truyền thêm
      // dữ liệu vào runAiPlannerPipeline (đã hỗ trợ optional params).
      let deadlinePlan = null;
      try {
        const raw = await S.get(DEADLINE_PLAN_KEY);
        deadlinePlan = raw && raw !== "null" ? JSON.parse(raw) : null;
      } catch {}
      const updatedToday = await runAiPlannerPipeline({
        core, storage, td, form: formToUse, dayLog, db, setts, taskPool, deadlinePlan,
      });
      // [PATCH v30] Nếu deadlinePlan còn hiệu lực, ghi lại số phút vừa
      // được giao cho hôm nay (để hôm sau đối chiếu đã làm đủ chưa).
      if (deadlinePlan) {
        const latest = updatedToday.entries[updatedToday.entries.length - 1];
        const dlTask = (latest?.result?.tasks || []).find(t => (t.name || "").startsWith("Làm sự kiện:"));
        if (dlTask) {
          try {
            await S.set(DEADLINE_PLAN_KEY, JSON.stringify({ ...deadlinePlan, assignedMinutesToday: dlTask.dur || 0 }));
          } catch {}
        }
      }
      setToday(updatedToday);
      setCheckedTasks({});
      setAppliedAt(null);
      setCheckinOpen(false);
      if (isUpdate) setLastUpdatedAt(new Date());
    } catch (e) {
      console.error("[Morning Widget] run failed:", e);
      setErrorMsg("Mình chưa tạo được kế hoạch — thử lại giúp mình nhé.");
    } finally {
      setRunning(false);
    }
  };

  // [PATCH v30] Modal "cần bao nhiêu giờ?" — chỉ hiện khi chip deadline
  // được chọn + ghi chú parse ra được 1 ngày cụ thể MỚI (khác plan đã lưu,
  // để không hỏi lại mỗi lần bấm "Cập nhật" trong cùng 1 sự kiện). Lưu
  // pendingDeadline tạm để modal xác nhận xong mới thực sự S.set + chạy
  // pipeline — tách khỏi handleFormSubmit gốc để không phá luồng cũ khi
  // không có deadline mới.
  const [pendingDeadline, setPendingDeadline] = useState(null); // {label,targetDate,totalDays,isUpdate,nextForm} | null
  const [deadlineHoursInput, setDeadlineHoursInput] = useState("");

  // [PATCH] handleFormSubmit — thay handleFreeTextSubmit. Được gọi CHỈ khi
  // người dùng bấm nút "✨ Tạo kế hoạch" (không tự động chạy khi đổi
  // slider/nút/chip — đúng yêu cầu MỤC 1e). energy/homework/event/goalMode
  // đến thẳng từ form, tường minh — parseNaturalLanguage() giờ chỉ được
  // dùng cho MỘT việc: trích xuất extraEvents (giờ họp/hẹn/...) từ ô ghi
  // chú tuỳ chọn, nếu người dùng có nhập giờ cụ thể trong đó.
  const handleFormSubmit = async (isUpdate) => {
    if (!quickForm || running) return;
    const chip = MOOD_CHIPS.find(m => m.val === formMood) || MOOD_CHIPS[0];
    const noteParsed = formNote.trim() ? parseNaturalLanguage(formNote) : null;
    const nextForm = {
      ...quickForm,
      energy: formEnergy,
      homework: formHomework,
      event: chip.event,
      goalMode: chip.goalMode,
      extraEvents: noteParsed?.extraEvents || [],
      freeNote: formNote.trim(),
    };
    setQuickForm(nextForm);
    // [PATCH] MỤC 6 — nếu chọn chip "⏰ Có deadline" và ghi chú có ngày cụ
    // thể (vd "sự kiện game 20/7"), lưu lộ trình đếm ngược vào
    // v25:deadlinePlan để DeadlineProgressCard hiển thị progress bar.
    if (formMood === "deadline" && formNote.trim()) {
      const parsedDeadline = parseDeadlineFromNote(formNote);
      if (parsedDeadline) {
        // [PATCH v30] Kiểm tra xem đây có phải deadline MỚI (khác plan đã
        // lưu — so theo label+ngày) hay không. Nếu mới → hỏi số giờ cần
        // trước khi chạy pipeline. Nếu trùng plan cũ → chạy thẳng như cũ,
        // không hỏi lại (đã có remainingHours từ trước).
        let existing = null;
        try {
          const raw = await S.get(DEADLINE_PLAN_KEY);
          existing = raw && raw !== "null" ? JSON.parse(raw) : null;
        } catch {}
        const isSamePlan = existing && existing.label === parsedDeadline.label
          && existing.targetDate === parsedDeadline.targetDate.toISOString();
        if (!isSamePlan) {
          const now = new Date();
          const totalDays = Math.max(1, daysBetweenDates(now, parsedDeadline.targetDate));
          setPendingDeadline({
            label: parsedDeadline.label, targetDate: parsedDeadline.targetDate.toISOString(),
            createdAt: now.toISOString(), totalDays, isUpdate, nextForm,
          });
          return; // dừng lại chờ modal xác nhận — KHÔNG chạy pipeline ngay
        }
      }
    }
    await handleRun(isUpdate, nextForm);
  };

  // [PATCH v30] Xác nhận modal "cần bao nhiêu giờ?" — lưu v25:deadlinePlan
  // đầy đủ field mới rồi mới chạy pipeline (để enrichTasksWithContext có
  // deadlinePlan ngay lần chạy đầu tiên).
  const confirmDeadlineHours = async () => {
    if (!pendingDeadline) return;
    const hours = Math.max(0.5, Number(deadlineHoursInput) || 1);
    try {
      await S.set(DEADLINE_PLAN_KEY, JSON.stringify({
        label: pendingDeadline.label, targetDate: pendingDeadline.targetDate,
        createdAt: pendingDeadline.createdAt, totalDays: pendingDeadline.totalDays,
        remainingHours: hours, carryOverMinutes: 0, assignedMinutesToday: 0, settledDate: null,
      }));
    } catch {}
    const { isUpdate, nextForm } = pendingDeadline;
    setPendingDeadline(null);
    setDeadlineHoursInput("");
    await handleRun(isUpdate, nextForm);
  };
  const cancelDeadlineHours = () => {
    // Huỷ modal — vẫn chạy pipeline bình thường, chỉ là không có deadlinePlan
    // mới (tương đương hành vi CŨ trước v30, không chặn người dùng).
    if (!pendingDeadline) return;
    const { isUpdate, nextForm } = pendingDeadline;
    setPendingDeadline(null);
    setDeadlineHoursInput("");
    handleRun(isUpdate, nextForm);
  };

  const entryCount = today?.entries?.length ?? 0;
  const latestEntry = entryCount > 0 ? today.entries[entryCount - 1] : null;
  const plannerOutput = latestEntry?.plannerOutput || null;
  const oneBigWin = plannerOutput?.oneBigWin || null;
  const tasks = plannerOutput?.tasks || [];
  const backupPlan = plannerOutput?.backupPlan || null;
  const confidence = plannerOutput?.confidence || null;

  // ── Friendly opening line, built from real numbers — no fixed template. ──
  const greetingLine = useMemo(() => {
    if (!quickForm) return "";
    const hour = Number((quickForm.nowTime || "08:00").split(":")[0]);
    return hour < 11 ? "Chào Bảo, sáng tốt lành!" : hour < 18 ? "Chào Bảo!" : "Chào Bảo, tối rồi nè!";
  }, [quickForm]);

  // Short (1-2 câu) — not pulled from the Core, built fresh here from raw
  // numbers already on quickForm/metrics, so it's never a long template.
  const insightLine = useMemo(() => {
    if (!quickForm) return null;
    if (quickForm.tiktok >= 90) {
      return `Xem nội dung ngắn ${quickForm.tiktok} phút rồi — mình rút task đầu cho dễ bắt đầu.`;
    }
    if (quickForm.energy <= 2) {
      return `Năng lượng ${quickForm.energy}/5 — hôm nay ưu tiên nghỉ, không học mới.`;
    }
    if (quickForm.recent === "good") {
      return `Mấy ngày gần đây ổn — đang có đà, tận dụng luôn hôm nay.`;
    }
    if (quickForm.recent === "bad") {
      return `Vài ngày gần đây hơi đuối — bắt đầu lại nhẹ nhàng thôi.`;
    }
    return `Mình xem dữ liệu hôm nay rồi — bắt đầu 1 việc nhỏ trước nhé.`;
  }, [quickForm]);

  // ── Progress across the plan's task checklist. ──
  const doneCount = tasks.filter((_, i) => checkedTasks[i]).length;
  const toggleTask = (i) => {
    const wasChecked = !!checkedTasks[i];
    if (!wasChecked) playSound("tick");
    setCheckedTasks(c => ({ ...c, [i]: !wasChecked }));
  };

  // ── Apply plan → Today's existing V24 data model (hybrid approach). ──
  // Both bigGoalsToday and dailyPicks/taskPool keep their exact existing
  // shape, cap, and mechanics (swapsUsed budget, poolDone, achievements
  // like v24_first5 which requires dailyPicks.length>=5) — this only
  // fills them using the same save()/onAddPoolTask() calls BigGoalCard and
  // DailyPicksCard already use. No new storage key, no new schema field.
  const todayGoals = Array.isArray(data?.bigGoalsToday) ? data.bigGoalsToday : [];
  // "Mục tiêu hôm nay" is now capped at 1 (see BigGoalCard) — same cap here.
  const goalsFull = todayGoals.length >= 1;
  const goalAlreadyThere = !!(oneBigWin && todayGoals.some(g => g.text === oneBigWin.label));
  const alreadyApplied = !!appliedAt;

  const applyPlanToToday = () => {
    if (!plannerOutput || alreadyApplied) return;
    const patch = {};

    // 1) One Big Win → bigGoalsToday (max 1/day — same cap BigGoalCard enforces)
    if (oneBigWin && !goalsFull && !goalAlreadyThere) {
      patch.bigGoalsToday = [...todayGoals, { id: "bg_" + Date.now(), text: oneBigWin.label, done: false }];
    }

    // 2) Actionable tasks (dur > 0, not the One Big Win itself, not a bare
    //    "Buffer") → dailyPicks, via the existing 5-slot taskPool mechanic.
    //    - Slots already marked done (poolDone) are left untouched, so
    //      completed work is never overwritten.
    //    - Not-yet-done slots are replaced with AI tasks, oldest first.
    //    - If there are fewer AI tasks than empty slots, the remaining
    //      slots keep their current picks — dailyPicks always stays at
    //      exactly 5 entries, so v24_first5 / v24_small100 still work.
    const actionableTasks = tasks.filter(t => (t.dur || 0) > 0 && t.name !== oneBigWin?.label && !/^buffer/i.test(t.name || ""));
    const currentPicks = Array.isArray(data?.dailyPicks) ? [...data.dailyPicks] : [];
    const poolDone = data?.poolDone || {};

    if (actionableTasks.length && onAddPoolTask) {
      // addPoolTask() updates taskPool via React state asynchronously, so
      // a freshly-created entry won't show up in the `taskPool` prop until
      // next render. Track newly-created ids in this call locally so two
      // AI tasks with the same name (within the same apply) reuse one
      // pool entry instead of creating a duplicate.
      const newlyCreated = {};
      const resolvePoolId = (t) => {
        const existing = (taskPool || []).find(p => p.l === t.name)?.id || newlyCreated[t.name];
        if (existing) return existing;
        const id = onAddPoolTask(t.name, t.dur, t.icon || "✅");
        newlyCreated[t.name] = id;
        return id;
      };

      const replaceableSlots = currentPicks
        .map((id, idx) => ({ id, idx }))
        .filter(({ id }) => !poolDone[id]);

      let ti = 0;
      for (const { idx } of replaceableSlots) {
        if (ti >= actionableTasks.length) break;
        const t = actionableTasks[ti++];
        const poolId = resolvePoolId(t);
        if (t.why && onEditPoolTask) onEditPoolTask(poolId, { why: t.why });
        currentPicks[idx] = poolId;
      }
      // Fill still-empty slots (e.g. dailyPicks had fewer than 5 entries)
      // with any leftover AI tasks, up to the standard 5-slot cap.
      while (currentPicks.length < 5 && ti < actionableTasks.length) {
        const t = actionableTasks[ti++];
        const poolId = resolvePoolId(t);
        if (t.why && onEditPoolTask) onEditPoolTask(poolId, { why: t.why });
        currentPicks.push(poolId);
      }

      // [PATCH] Nếu Core chỉ sinh ra vài task (thường lặp Toán/Lý) mà vẫn
      // còn slot trống trong 5 dailyPicks, trộn thêm 1-2 task từ Kho việc
      // nhỏ (taskPool) cho đa dạng — KHÔNG đụng vào plannerOutput/Core,
      // chỉ bổ sung ở bước "Áp dụng vào hôm nay" này. Ưu tiên task lâu
      // chưa xuất hiện + phù hợp goalMode/năng lượng/TikTok hôm nay.
      // historyByPoolId dùng CÙNG cách tính "lịch sử lần cuối mỗi task
      // xuất hiện" mà cơ chế ensureDailyPicks (V24) vốn đã dùng, quét qua
      // db — không phải field mới trong data model.
      if (currentPicks.length < 5) {
        const historyByPoolId = {};
        const sortedDates = Object.keys(db || {}).sort();
        for (const iso of sortedDates) {
          const d = db[iso];
          (d?.dailyPicks || []).forEach(id => { historyByPoolId[id] = iso; });
        }
        const extras = diversifyTasksWithPool({
          taskPool,
          goalMode: quickForm?.goalMode || "study",
          energy: quickForm?.energy ?? null,
          tiktokMin: quickForm?.tiktok || 0,
          historyByPoolId,
          date: td,
          count: 5 - currentPicks.length,
        }).filter(t => !currentPicks.includes(t.id));
        extras.forEach(t => currentPicks.push(t.id));
      }

      patch.dailyPicks = currentPicks;
      // Applying a fresh AI plan starts a new "swap budget" for the day's
      // new task set, consistent with what a manual re-roll would do.
      patch.swapsUsed = 0;
    }

    if (Object.keys(patch).length) save(td, patch);
    playSound("xp");
    setAppliedAt(new Date());
  };

  const dayLabel = quickForm ? quickForm.day : "";
  const fmtTime = (d) => d ? `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}` : "";

  return (
    <div style={{
      background: theme.surface, borderRadius: 16, padding: 14, marginBottom: 14,
      border: `1px solid ${theme.border}`,
    }}>
      {loading || !quickForm ? (
        <div style={{ fontSize: 12, color: theme.textDim, textAlign: "center", padding: "12px 0" }}>
          Đang tải trợ lý sáng nay…
        </div>
      ) : !latestEntry ? (
        // ── No plan yet today: quick check-in + "Tạo kế hoạch" ──
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: theme.text }}>
              🌅 {greetingLine}
            </div>
            <button
              onClick={() => setCollapsed(c => !c)}
              style={{ background: "none", border: "none", color: theme.textDim, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>
              {collapsed ? "▾" : "▴"}
            </button>
          </div>
          <div style={{ fontSize: 12, color: theme.textDim, marginBottom: collapsed ? 0 : 12 }}>
            {quickForm.nowTime} · {dayLabel}{!collapsed && " — kể mình nghe hôm nay của em thế nào."}
          </div>

          {!collapsed && (
          <>
          {/* [PATCH] MỤC 1 — Form chọn (B) thay cho chat tự do. */}
          <MorningCheckinForm
            theme={theme} accent={accent}
            energy={formEnergy} onEnergyChange={setFormEnergy}
            homework={formHomework} onHomeworkChange={setFormHomework}
            mood={formMood} onMoodChange={setFormMood}
            note={formNote} onNoteChange={setFormNote}
          />

          {errorMsg && (
            <div style={{ color: theme.danger, marginBottom: 8, padding: "8px 10px", borderRadius: 8,
              background: `${theme.danger}15`, fontWeight: 600, fontSize: 12, marginTop: 12 }}>
              ⚠ {errorMsg}
            </div>
          )}

          <button onClick={() => handleFormSubmit(false)} disabled={running}
            style={{ width: "100%", padding: 11, borderRadius: 10, border: "none", fontWeight: 700, fontSize: 14,
              background: running ? theme.textDim : accent, color: "#fff", marginTop: 12,
              cursor: running ? "default" : "pointer" }}>
            {running ? "Đang lên kế hoạch…" : "✨ Tạo kế hoạch"}
          </button>
          <button onClick={() => handleRun(false)} disabled={running}
            style={{ width: "100%", padding: 8, marginTop: 6, borderRadius: 10, border: `1px solid ${theme.border}`,
              fontWeight: 600, fontSize: 12, background: "transparent", color: theme.textDim,
              cursor: running ? "default" : "pointer" }}>
            Bỏ qua, dùng mặc định
          </button>
          </>
          )}
        </div>
      ) : (
        // ── Plan exists: compact friendly card, checklist, progress ──
        <div>
          {/* Header: time · day · energy — compact, emoji-led */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: theme.text }}>
              🌅 Chào Bảo, {quickForm.nowTime} · {dayLabel} · ⚡ {quickForm.energy}/5
            </div>
            <button
              onClick={() => setCollapsed(c => !c)}
              style={{ background: "none", border: "none", color: theme.textDim, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>
              {collapsed ? "▾" : "▴"}
            </button>
          </div>
          {lastUpdatedAt && !collapsed && (
            <div style={{ fontSize: 10, color: theme.textDim, marginBottom: 6 }}>
              🔄 Đã cập nhật lúc {fmtTime(lastUpdatedAt)}
            </div>
          )}

          {/* [PATCH] Sự kiện đặc biệt trích xuất từ câu nhập tự do — hiển
              thị dạng block cố định, KHÔNG cho tick (đúng yêu cầu: đây là
              khoảng bận, không phải task). Cùng dữ liệu quickForm.extraEvents
              đã được đưa vào core qua rawState.extraEvents → fixedEvents,
              nên DailyRouteCard (tab lịch trình) cũng tự động chèn đúng
              chỗ trong schedule mà không cần sửa gì thêm ở đó. */}
          {!collapsed && Array.isArray(quickForm.extraEvents) && quickForm.extraEvents.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              {quickForm.extraEvents.map((ev, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "6px 10px", borderRadius: 8, background: theme.bg, border: `1px dashed ${theme.border}`,
                  marginBottom: 4, fontSize: 12, color: theme.textDim }}>
                  <span>📌 {ev.name}</span>
                  <span>{ev.start}–{ev.end}</span>
                </div>
              ))}
            </div>
          )}

          {insightLine && (
            <div style={{
              fontSize: 12, color: accent, lineHeight: 1.4, fontStyle: "italic",
              marginTop: collapsed ? 4 : 0,
              marginBottom: collapsed ? 0 : 12,
              maxHeight: 34, overflow: "hidden",
              display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical",
            }}>
              💬 {insightLine}
            </div>
          )}

          {!collapsed && <div style={{ height: 1, background: theme.border, margin: "8px 0 10px" }}/>}

          {!collapsed && oneBigWin && (
            <div style={{ background: `${accent}15`, border: `1px solid ${accent}45`, borderRadius: 12,
              padding: 12, marginBottom: 12 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: accent, textTransform: "uppercase",
                letterSpacing: 0.5, marginBottom: 4 }}>
                ⭐ ONE BIG WIN
              </div>
              <div style={{ fontSize: 14, fontWeight: 700, color: theme.text, marginBottom: 4 }}>
                {oneBigWin.label}
              </div>
              <div style={{ fontSize: 11, color: theme.textDim }}>
                ✅ Chỉ cần xong việc này, hôm nay thành công
              </div>
            </div>
          )}

          {!collapsed && (
          <>
          {tasks.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: theme.text }}>📋 Hôm nay cần làm</div>
                <div style={{ fontSize: 11, color: theme.textDim }}>{doneCount}/{tasks.length}</div>
              </div>
              <div style={{ height: 6, borderRadius: 999, background: theme.bg, overflow: "hidden", marginBottom: 10 }}>
                <div style={{ height: "100%", width: `${tasks.length ? (doneCount / tasks.length) * 100 : 0}%`,
                  background: accent, transition: "width 0.3s ease" }}/>
              </div>

              {tasks.map((t, i) => {
                const checked = !!checkedTasks[i];
                const shortWhy = summarizeReason(t.why, 90);
                return (
                  <div key={i} onClick={() => toggleTask(i)}
                    style={{
                      display: "flex", gap: 10, alignItems: "flex-start", cursor: "pointer",
                      padding: "8px 10px", borderRadius: 10, marginBottom: 6,
                      background: theme.bg, opacity: checked ? 0.6 : 1,
                      borderLeft: `3px solid ${aiPlannerPriorityClass(t.priority)}`,
                    }}>
                    <div style={{ marginTop: 1 }}>
                      <MorningTaskCheckbox checked={checked} theme={theme} accent={accent}/>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: theme.text,
                          textDecoration: checked ? "line-through" : "none" }}>
                          {i + 1}. {t.name}
                        </span>
                        <span style={{ fontSize: 11, color: theme.textDim, flexShrink: 0 }}>{t.dur}'</span>
                      </div>
                      {shortWhy && <div style={{ fontSize: 11, color: theme.textDim, marginTop: 3 }}>💡 {shortWhy}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: theme.textDim, marginBottom: 6 }}>
            {confidence && <span>📊 Độ tin cậy: {confidence.score}%</span>}
            {plannerOutput?.reserveTime != null && <span>⏱ Còn {plannerOutput.reserveTime}' rảnh</span>}
          </div>

          {backupPlan && (
            <div style={{ fontSize: 11, color: theme.textDim, marginBottom: 12 }}>
              🛟 Backup: {summarizeReason(backupPlan.label + " — " + (backupPlan.why || ""), 90)}
            </div>
          )}

          {errorMsg && (
            <div style={{ color: theme.danger, marginBottom: 8, padding: "8px 10px", borderRadius: 8,
              background: `${theme.danger}15`, fontWeight: 600, fontSize: 12 }}>
              ⚠ {errorMsg}
            </div>
          )}

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={applyPlanToToday} disabled={alreadyApplied}
              style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", fontWeight: 700, fontSize: 12,
                background: alreadyApplied ? theme.textDim : accent, color: "#fff",
                cursor: alreadyApplied ? "default" : "pointer" }}>
              {alreadyApplied ? "✓ Đã áp dụng" : "✅ Áp dụng vào hôm nay"}
            </button>
            <button onClick={() => setCheckinOpen(o => !o)}
              style={{ flex: 1, padding: 10, borderRadius: 10, border: `1px solid ${theme.border}`, fontSize: 12,
                fontWeight: 700, background: "transparent", color: theme.text, cursor: "pointer" }}>
              📝 Cập nhật
            </button>
          </div>

          {checkinOpen && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${theme.border}` }}>
              {/* [PATCH] Cùng form chọn (B) như lúc tạo kế hoạch lần đầu. */}
              <MorningCheckinForm
                theme={theme} accent={accent}
                energy={formEnergy} onEnergyChange={setFormEnergy}
                homework={formHomework} onHomeworkChange={setFormHomework}
                mood={formMood} onMoodChange={setFormMood}
                note={formNote} onNoteChange={setFormNote}
              />
              <button onClick={() => handleFormSubmit(true)} disabled={running}
                style={{ width: "100%", padding: 10, borderRadius: 10, border: "none", fontWeight: 700, fontSize: 13,
                  background: running ? theme.textDim : accent, color: "#fff", marginTop: 10,
                  cursor: running ? "default" : "pointer" }}>
                {running ? "Đang cập nhật…" : "🔄 Cập nhật & làm lại"}
              </button>
            </div>
          )}

          <button onClick={() => onSwitchTab?.(11)}
            style={{ width: "100%", padding: "9px 12px", marginTop: 8, borderRadius: 8, border: "none",
              background: "transparent", color: theme.textDim, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
            Xem chi tiết & reasoning trace →
          </button>
          </>
          )}
        </div>
      )}

      {/* [PATCH v30] Modal "sự kiện này cần bao nhiêu giờ?" — chỉ hiện khi
          phát hiện 1 deadline MỚI từ ghi chú (chip "⏰ Có deadline" +
          ngày cụ thể). Trả lời xong mới lưu v25:deadlinePlan đầy đủ + chạy
          pipeline, để enrichTasksWithContext chia nhỏ được ngay từ lần
          đầu — đúng MỤC 3 của yêu cầu gốc. */}
      {pendingDeadline && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 200,
          display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: theme.surface, borderRadius: 16, padding: 18, maxWidth: 340, width: "100%",
            border: `1px solid ${theme.border}` }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.text, marginBottom: 6 }}>
              ⏰ {pendingDeadline.label}
            </div>
            <div style={{ fontSize: 12, color: theme.textDim, marginBottom: 12, lineHeight: 1.5 }}>
              Còn {pendingDeadline.totalDays} ngày. Sự kiện này cần bao nhiêu giờ để hoàn thành? Mình sẽ chia đều mỗi ngày cho tới hạn.
            </div>
            <input type="number" min="0.5" step="0.5" placeholder="Vd: 6"
              value={deadlineHoursInput} onChange={e => setDeadlineHoursInput(e.target.value)}
              autoFocus
              style={{ width: "100%", padding: 10, borderRadius: 10, border: `1px solid ${theme.border}`,
                background: theme.bg, color: theme.text, fontSize: 14, marginBottom: 12, boxSizing: "border-box" }}/>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={cancelDeadlineHours}
                style={{ flex: 1, padding: 10, borderRadius: 10, border: `1px solid ${theme.border}`,
                  background: "transparent", color: theme.textDim, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                Bỏ qua
              </button>
              <button onClick={confirmDeadlineHours}
                style={{ flex: 1, padding: 10, borderRadius: 10, border: "none",
                  background: accent, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                Xác nhận
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// 🗺️ SMARTSCHEDULE — LỊCH TRÌNH THÔNG MINH THEO GIỜ (v30, thay DailySchedule)
// [PATCH v30] Đổi tên DailySchedule → SmartSchedule theo yêu cầu v29→v30.
// KHÔNG đụng aiPlannerCore.js — mọi phần "thông minh hơn" nằm ở
// enrichTasksWithContext() (hậu xử lý result.tasks, chạy trong
// runAiPlannerPipeline) và ở CHÍNH component này (checklist cuối ngày +
// phân tích 30 ngày), không phải ở việc tự tính lại giờ/thứ tự — khung
// giờ thật vẫn 100% đến từ plannerOutput.schedule do Core tính.
//
// Giữ nguyên toàn bộ hành vi cũ của DailySchedule (tick = XP thật, "Bỏ
// qua" = ghi skipHistory, "Làm lại" = gọi lại pipeline) — phần MỚI thêm ở
// v30:
//   1. [PATCH v30] regenerate() giờ đọc deadlinePlan + truyền
//      db/setts/taskPool/deadlinePlan vào runAiPlannerPipeline, để
//      enrichTasksWithContext hoạt động khi bấm "Làm lại" từ card này
//      (giống hệt MorningWidget.handleRun).
//   2. [PATCH v30] Checklist cuối ngày (sau 22:30, hoặc luôn hiện nếu đã
//      qua giờ đó theo giờ hệ thống) — 2 câu hỏi có/không (bài tập,
//      sự kiện) lấy trực tiếp từ trạng thái đã tick trong chính lịch này
//      (không hỏi lại thứ đã biết), + 1 ô ghi chú tự do lưu vào
//      d.eveningNote qua save(td,…).
//   3. [PATCH v30] Khối "📊 Phân tích 30 ngày qua" — gọi analyzeLast30Days()
//      (hàm thuần, không đụng Core), hiển thị dưới lịch trình.
// ════════════════════════════════════════════════════════════════════════
function SmartSchedule({ td, data, db, dayExp, setts, save, taskPool, plannerStorage, plannerToday, onPlannerTodayChange }) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const core = useMemo(() => createAIPlannerCore(), []);
  const storage = plannerStorage;
  const today = plannerToday;
  const setToday = onPlannerTodayChange;

  const [regenerating, setRegenerating] = useState(false);
  const [errorMsg, setErrorMsg] = useState(null);
  // [PATCH] XP fly-up cục bộ cho card này — key thay đổi mỗi lần tick để
  // re-trigger animation, giống cơ chế xpGain ở Today nhưng gắn theo item.
  const [xpFly, setXpFly] = useState(null); // { key, amount } | null
  // [PATCH] skip analysis cho từng item, tính 1 lần khi schedule thay đổi
  const [skipAnalysis, setSkipAnalysis] = useState({}); // {[itemKey]: {shouldReduce, shouldIncrease, reason}}
  // [PATCH v30] danh sách skip 30 ngày, tải 1 lần cho phần phân tích cuối card
  const [skipListAll, setSkipListAll] = useState([]);
  // [PATCH v30] ô ghi chú checklist cuối ngày — debounce nhẹ, lưu vào d.eveningNote
  const [eveningNoteVal, setEveningNoteVal] = useDebounceField(
    data?.eveningNote || "", (v) => save(td, { eveningNote: v }), 1200
  );

  const entryCount = today?.entries?.length ?? 0;
  const latestEntry = entryCount > 0 ? today.entries[entryCount - 1] : null;
  const latestEntryId = latestEntry?.id ?? null;

  const plannerOutput = latestEntry?.plannerOutput || null;
  const oneBigWin = plannerOutput?.oneBigWin || null;
  const tasks = plannerOutput?.tasks || [];
  const schedule = plannerOutput?.schedule || [];
  const confidence = plannerOutput?.confidence || null;

  const scheduleDone = data?.scheduleDone || {};
  const scheduleXp = data?.scheduleXp || {};

  // ── Gắn khung giờ thật vào từng task/oneBigWin bằng cách khớp theo tên. ──
  const routeItems = useMemo(() => {
    if (!schedule.length) {
      const items = [];
      if (oneBigWin) items.push({ key: "obw", name: oneBigWin.label, why: oneBigWin.why, doneWhen: oneBigWin.doneWhen, dur: oneBigWin.dur, priority: "high", isBigWin: true });
      tasks.forEach((t, i) => {
        if ((t.dur || 0) <= 0 && !t.doneWhen) return;
        if (t.name === oneBigWin?.label) return;
        items.push({ key: "t" + i, name: t.name, why: t.why, doneWhen: t.doneWhen, dur: t.dur, priority: t.priority });
      });
      return items;
    }
    return schedule.map((b, i) => {
      if (b.type === "fixed") {
        return { key: "fx" + i, name: b.name, start: b.start, end: b.end, isFixed: true };
      }
      if (b.type === "buffer") {
        return { key: "buf" + i, name: "Nghỉ giữa việc", start: b.start, end: b.end, isBuffer: true };
      }
      const srcTask = tasks.find(t => t.name === b.name);
      const isBigWin = b.name === oneBigWin?.label;
      return {
        key: "t" + i, name: b.name, start: b.start, end: b.end, dur: b.dur,
        priority: b.priority, why: srcTask?.why || oneBigWin?.why, doneWhen: srcTask?.doneWhen || oneBigWin?.doneWhen,
        isBigWin,
        // [PATCH v30] đánh dấu item nào là task deadline (chèn bởi
        // enrichTasksWithContext) — dùng để hiển thị "còn X ngày" riêng
        // và để checklist cuối ngày biết "sự kiện game xong chưa?".
        isDeadlineTask: (b.name || "").startsWith("Làm sự kiện:"),
      };
    });
  }, [schedule, oneBigWin, tasks]);

  // [PATCH] task quan trọng (priority:"high") được đẩy lên đầu như bình
  // thường; task bị skip nhiều (shouldReduce) bị CHUYỂN XUỐNG CUỐI danh
  // sách hiển thị — đúng MỤC 3 ("chuyển xuống cuối ngày"). Không đổi giờ
  // thật của item (start/end vẫn nguyên, chỉ đổi thứ tự HIỂN THỊ) vì Core
  // vẫn là nguồn sự thật duy nhất cho khung giờ.
  const displayItems = useMemo(() => {
    const checkable = routeItems.filter(it => !it.isFixed && !it.isBuffer);
    const reduced = checkable.filter(it => skipAnalysis[it.key]?.shouldReduce);
    // giữ nguyên thứ tự thời gian giữa các item "bình thường" + fixed/buffer
    // xen kẽ đúng vị trí gốc; đơn giản hoá: hiện fixed/buffer xen giữa theo
    // thứ tự gốc, các item "normal" theo thứ tự gốc, "reduced" dồn xuống cuối.
    const order = routeItems.filter(it => it.isFixed || it.isBuffer || !skipAnalysis[it.key]?.shouldReduce);
    return [...order, ...reduced];
  }, [routeItems, skipAnalysis]);

  const checkableItems = routeItems.filter(it => !it.isFixed && !it.isBuffer);
  const totalMinutes = checkableItems.reduce((s, it) => s + (it.dur || 0), 0);
  const doneCount = checkableItems.filter(it => scheduleDone[it.key]).length;

  // [PATCH] XP mỗi item = dựa trên thời lượng (dur phút), tối thiểu 5 —
  // deterministic, tính lại giống nhau mỗi lần (không random), giữ đơn
  // giản và minh bạch cho người dùng.
  const xpForItem = (it) => Math.max(5, Math.round((it.dur || 10) * 0.5));

  // [PATCH] MỤC 3+4: tick 1 item = cộng XP thật (lưu qua save(td,…), dùng
  // được ngay bởi dayExpFull) + phát âm thanh + XP fly-up. Bỏ tick lại =
  // trừ XP đã cộng (đối xứng, tránh cộng dồn sai nếu tick nhầm).
  const toggleItem = (it) => {
    const wasDone = !!scheduleDone[it.key];
    const nextDone = { ...scheduleDone, [it.key]: !wasDone };
    const nextXp = { ...scheduleXp };
    if (!wasDone) {
      const amount = xpForItem(it);
      nextXp[it.key] = amount;
      playSound("tick");
      setXpFly({ key: it.key + ":" + Date.now(), amount });
      setTimeout(() => setXpFly(null), 700);
    } else {
      delete nextXp[it.key];
    }
    save(td, { scheduleDone: nextDone, scheduleXp: nextXp });
  };

  // [PATCH] MỤC 3: "Bỏ qua" 1 item thủ công — ghi nhận vào v25:skipHistory
  // với reason:"manual_skip". Không tick nó (không cộng XP), chỉ ghi log
  // để AI học cho những lần sau.
  const skipItem = async (it) => {
    await recordSkip(it.key, it.name, "manual_skip", td);
    const list = await loadSkipHistory();
    setSkipAnalysis(a => ({ ...a, [it.key]: analyzeSkipHistoryFromList(list, it.key, 7) }));
    setSkipListAll(list);
  };

  // [PATCH] MỤC 3: tự động ghi nhận "timeout" cho các item CHƯA tick khi
  // sang ngày mới (tức là bị bỏ qua cả ngày mà không thao tác gì) — chạy
  // 1 lần khi latestEntryId đổi SANG plan mới (kế hoạch cũ đã kết thúc),
  // dựa trên state của lần trước lưu trong ref để không ghi trùng.
  const prevScheduleRef = useRef({ entryId: null, items: [], done: {} });
  useEffect(() => {
    const prev = prevScheduleRef.current;
    if (prev.entryId && prev.entryId !== latestEntryId && prev.items.length) {
      const undone = prev.items.filter(it => !it.isFixed && !it.isBuffer && !prev.done[it.key]);
      undone.forEach(it => { recordSkip(it.key, it.name, "timeout", td).catch(() => {}); });
    }
    prevScheduleRef.current = { entryId: latestEntryId, items: routeItems, done: scheduleDone };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [latestEntryId]);

  // [PATCH] Tải + phân tích skipHistory cho từng item hiện có trong lịch,
  // để hiển thị "💡 Task này đã bị bỏ qua N lần → …" và để quyết định
  // reduce/increase ưu tiên (MỤC 3). Chạy lại mỗi khi danh sách item đổi.
  // [PATCH v30] cũng lưu lại toàn bộ skipList vào skipListAll để phần
  // "📊 Phân tích 30 ngày qua" phía dưới dùng chung, không tải 2 lần.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const list = await loadSkipHistory();
      if (cancelled) return;
      const next = {};
      routeItems.forEach(it => {
        if (it.isFixed || it.isBuffer) return;
        next[it.key] = analyzeSkipHistoryFromList(list, it.key, 7);
      });
      setSkipAnalysis(next);
      setSkipListAll(list);
    })();
    return () => { cancelled = true; };
  }, [routeItems]);

  // ── "Làm lại" — tính lại toàn bộ lịch từ giờ hiện tại. Gọi thẳng cùng
  // pipeline MorningWidget dùng (runAiPlannerPipeline → aiPlannerCore.js),
  // không viết lại logic xếp lịch ở đây. [PATCH v30] giờ cũng đọc
  // deadlinePlan + truyền db/setts/taskPool vào, để enrichTasksWithContext
  // chạy được y hệt lúc "Làm lại" từ MorningWidget. ──
  const regenerate = async () => {
    if (regenerating) return;
    setRegenerating(true);
    setErrorMsg(null);
    try {
      const now = new Date();
      const todayDbData = db?.[td] || {};
      const bridged = bridgeDashboardToRawState({ todayData: todayDbData, td, now });
      let metrics = { recent: "mixed", completionRate: 70 };
      try { metrics = computeBehaviorMetrics({ td, db, dayExp, targetXP: setts?.targetXP || 150 }); } catch {}
      const form = {
        nowTime: bridged.nowTime, day: bridged.day, energy: 3, homework: null,
        tiktok: bridged.tiktok, recent: metrics.recent, completionRate: metrics.completionRate,
        event: "none", daysToExam: 60, freeNote: "",
      };
      let deadlinePlan = null;
      try {
        const raw = await S.get(DEADLINE_PLAN_KEY);
        deadlinePlan = raw && raw !== "null" ? JSON.parse(raw) : null;
      } catch {}
      const dayLog = today?.entries || [];
      const updatedToday = await runAiPlannerPipeline({ core, storage, td, form, dayLog, db, setts, taskPool, deadlinePlan });
      if (deadlinePlan) {
        const latest = updatedToday.entries[updatedToday.entries.length - 1];
        const dlTask = (latest?.result?.tasks || []).find(t => (t.name || "").startsWith("Làm sự kiện:"));
        if (dlTask) {
          try { await S.set(DEADLINE_PLAN_KEY, JSON.stringify({ ...deadlinePlan, assignedMinutesToday: dlTask.dur || 0 })); } catch {}
        }
      }
      setToday(updatedToday);
    } catch (e) {
      console.error("[SmartSchedule] regenerate failed:", e);
      setErrorMsg("Chưa xếp lại được lịch — thử lại giúp mình nhé.");
    } finally {
      setRegenerating(false);
    }
  };

  // [FIX #310] stats30 dời lên TRƯỚC 2 early-return bên dưới. Lý do: hook
  // (useMemo) không được phép gọi có điều kiện — nếu để sau "if (!today)
  // return null" thì khi today/plannerOutput chưa sẵn sàng, useMemo này bị
  // skip hẳn ở lần render đó → số lượng hook thay đổi giữa các lần render →
  // chính là nguyên nhân gây lỗi React #310. stats30 chỉ phụ thuộc
  // db/dayExp/skipListAll (không phụ thuộc today/plannerOutput/routeItems)
  // nên dời lên đây không đổi kết quả tính toán, chỉ đổi thời điểm gọi hook
  // để luôn chạy đều đặn mỗi render, đúng Rules of Hooks.
  const stats30 = useMemo(() => analyzeLast30Days(db || {}, dayExp, skipListAll), [db, dayExp, skipListAll]);

  if (!today) return null; // Today chưa rotateDay xong lúc đầu — tránh nháy layout
  if (!plannerOutput || routeItems.length === 0) return null; // chưa có kế hoạch AI hôm nay → không hiện card rỗng

  // [PATCH] gom các dòng skip-analysis cần hiển thị (chỉ những item có
  // shouldReduce=true, đúng ví dụ mẫu trong yêu cầu MỤC 4g)
  const reduceNotices = displayItems.filter(it => !it.isFixed && !it.isBuffer && skipAnalysis[it.key]?.shouldReduce);

  // [PATCH v30] Checklist cuối ngày — chỉ hiện sau 22:30 giờ hệ thống,
  // dùng chính scheduleDone đã có (không hỏi lại thứ đã biết): tìm task
  // học/bài tập (khớp từ khoá) và task deadline (isDeadlineTask) trong
  // routeItems để suy ra trạng thái, chỉ hỏi thêm 1 ô ghi chú tự do.
  const nowHM = new Date();
  const showEveningChecklist = nowHM.getHours() >= 22 && nowHM.getMinutes() >= 30 || nowHM.getHours() >= 23;
  const homeworkItem = routeItems.find(it => !it.isFixed && !it.isBuffer && /bài tập|toán|lý/i.test(it.name || ""));
  const deadlineItem = routeItems.find(it => it.isDeadlineTask);
  const homeworkDone = homeworkItem ? !!scheduleDone[homeworkItem.key] : null; // null = hôm nay không có task học
  const deadlineDone = deadlineItem ? !!scheduleDone[deadlineItem.key] : null; // null = hôm nay không có deadline

  return (
    <div style={{
      background: theme.surface, borderRadius: 16, padding: 14, marginBottom: 14,
      border: `1px solid ${theme.border}`, position: "relative",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: theme.text }}>🗓️ Lịch trình hôm nay (phân tích từ 30 ngày qua)</span>
        <span style={{ fontSize: 10, color: theme.textDim }}>{doneCount}/{checkableItems.length}</span>
      </div>
      <div style={{ fontSize: 10, color: theme.textDim, marginBottom: 10 }}>
        Tick từng việc kèm giờ cụ thể để nhận XP — bỏ qua sẽ được AI ghi nhận để điều chỉnh lần sau.
      </div>

      <div style={{ height: 6, borderRadius: 999, background: theme.bg, overflow: "hidden", marginBottom: 10 }}>
        <div style={{ height: "100%", width: `${checkableItems.length ? (doneCount / checkableItems.length) * 100 : 0}%`,
          background: accent, transition: "width 0.3s ease" }}/>
      </div>

      {displayItems.map((it) => {
        if (it.isFixed) {
          return (
            <div key={it.key} style={{ display: "flex", gap: 10, alignItems: "center", padding: "6px 10px", marginBottom: 6 }}>
              <span style={{ fontSize: 10, color: theme.textDim, minWidth: 88, flexShrink: 0 }}>{it.start}–{it.end}</span>
              <span style={{ fontSize: 12, color: theme.textDim, fontStyle: "italic" }}>🏫 {it.name} (cố định)</span>
            </div>
          );
        }
        if (it.isBuffer) {
          return (
            <div key={it.key} style={{ display: "flex", gap: 10, alignItems: "center", padding: "3px 10px", marginBottom: 6 }}>
              <span style={{ fontSize: 10, color: theme.textDim, minWidth: 88, flexShrink: 0 }}>{it.start}–{it.end}</span>
              <span style={{ fontSize: 11, color: theme.textDim }}>☕ nghỉ</span>
            </div>
          );
        }
        // [PATCH] MỤC 4h: task đã tick vẫn hiển thị, có dấu ✅ và gạch
        // ngang tên (thay vì mờ đi như DailyRouteCard cũ).
        const checked = !!scheduleDone[it.key];
        const shortWhy = summarizeReason(it.why, 90);
        const wasReduced = !!skipAnalysis[it.key]?.shouldReduce;
        return (
          <div key={it.key}
            style={{
              display: "flex", gap: 10, alignItems: "flex-start",
              padding: "9px 10px", borderRadius: 10, marginBottom: 6, position: "relative",
              background: it.isBigWin ? `${accent}12` : it.isDeadlineTask ? `${theme.warning}12` : theme.bg,
              borderLeft: `3px solid ${aiPlannerPriorityClass(it.priority)}`,
              opacity: wasReduced && !checked ? 0.75 : 1,
            }}>
            <div style={{ marginTop: 1, cursor: "pointer" }} onClick={() => toggleItem(it)}>
              <MorningTaskCheckbox checked={checked} theme={theme} accent={accent}/>
            </div>
            <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }} onClick={() => toggleItem(it)}>
              <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: theme.text,
                  textDecoration: checked ? "line-through" : "none" }}>
                  {checked ? "✅ " : ""}{it.isBigWin ? "⭐ " : it.isDeadlineTask ? "⏰ " : ""}{it.name}
                </span>
                <span style={{ fontSize: 11, color: theme.textDim, flexShrink: 0, whiteSpace: "nowrap" }}>
                  {it.start ? `${it.start}–${it.end}` : (it.dur > 0 ? `${it.dur}'` : "")}
                </span>
              </div>
              {shortWhy && <div style={{ fontSize: 11, color: theme.textDim, marginTop: 3 }}>💡 {shortWhy}</div>}
              {it.doneWhen && <div style={{ fontSize: 10, color: theme.textDim, marginTop: 2 }}>✓ {it.doneWhen}</div>}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                <span style={{ fontSize: 9, color: theme.textDim }}>+{xpForItem(it)} XP</span>
                {!checked && (
                  <button onClick={(e) => { e.stopPropagation(); skipItem(it); }}
                    style={{ background: "none", border: "none", color: theme.textDim, fontSize: 9, cursor: "pointer", textDecoration: "underline" }}>
                    Bỏ qua
                  </button>
                )}
              </div>
            </div>
            {/* [PATCH] MỤC 4d: XP fly-up khi tick item này */}
            {xpFly && xpFly.key.startsWith(it.key + ":") && (
              <span className="gb-xp-fly" style={{ position: "absolute", right: 10, top: 4, color: theme.success }}>
                +{xpFly.amount}
              </span>
            )}
          </div>
        );
      })}

      {/* [PATCH] MỤC 3+4g: hiển thị lý do hạ ưu tiên cho các task bị skip nhiều */}
      {reduceNotices.length > 0 && (
        <div style={{ marginTop: 8, marginBottom: 4 }}>
          {reduceNotices.map(it => (
            <div key={it.key} style={{ fontSize: 10, color: theme.warning, marginBottom: 4, lineHeight: 1.4 }}>
              💡 Task "{it.name}" {skipAnalysis[it.key].reason}
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 10, color: theme.textDim, marginTop: 6 }}>
        <span>⏱ Tổng {totalMinutes}'{confidence ? ` · 🎯 Độ tin cậy ${confidence.score}%` : ""}</span>
        <button onClick={regenerate} disabled={regenerating}
          style={{ padding: "5px 10px", borderRadius: 999, border: `1px solid ${theme.border}`, background: "transparent",
            color: regenerating ? theme.textDim : theme.text, fontSize: 10, fontWeight: 600,
            cursor: regenerating ? "default" : "pointer" }}>
          {regenerating ? "Đang xếp lại…" : "🔄 Làm lại"}
        </button>
      </div>
      {errorMsg && <div style={{ fontSize: 10, color: theme.danger, marginTop: 6 }}>⚠ {errorMsg}</div>}

      {/* [PATCH v30] Checklist cuối ngày — chỉ hiện sau 22:30. Câu 1+2 là
          TRẠNG THÁI ĐÃ BIẾT (đọc từ scheduleDone, không hỏi lại), chỉ có
          ô ghi chú là thật sự cần người dùng nhập. */}
      {showEveningChecklist && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${theme.border}` }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: theme.text, marginBottom: 8 }}>📋 Kiểm tra cuối ngày</div>
          {homeworkItem && (
            <div style={{ fontSize: 11, color: theme.textDim, marginBottom: 4 }}>
              {homeworkDone ? "✅" : "⬜"} Bài tập hôm nay: {homeworkDone ? "đã xong" : "chưa xong"}
            </div>
          )}
          {deadlineItem && (
            <div style={{ fontSize: 11, color: theme.textDim, marginBottom: 4 }}>
              {deadlineDone ? "✅" : "⬜"} Sự kiện "{deadlineItem.name.replace('Làm sự kiện: ','')}": {deadlineDone ? "đã làm đủ hôm nay" : "chưa làm hôm nay"}
            </div>
          )}
          <div style={{ fontSize: 11, color: theme.textDim, margin: "8px 0 4px" }}>Hôm nay bạn có gì muốn ghi chú không?</div>
          <textarea value={eveningNoteVal} onChange={e => setEveningNoteVal(e.target.value)}
            placeholder="Vd: hôm nay hơi mệt, mai làm bù…" rows={2}
            style={{ width: "100%", padding: 8, borderRadius: 8, border: `1px solid ${theme.border}`,
              background: theme.bg, color: theme.text, fontSize: 12, resize: "vertical", boxSizing: "border-box" }}/>
        </div>
      )}

      {/* [PATCH v30] Phân tích 30 ngày qua — số liệu thật từ db, không có
          "giờ vàng" vì hệ thống chưa lưu timestamp lúc tick từng task. */}
      {stats30.daysWithData > 0 && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${theme.border}` }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: theme.text, marginBottom: 6 }}>📊 Phân tích 30 ngày qua</div>
          <div style={{ fontSize: 10, color: theme.textDim, lineHeight: 1.8 }}>
            {stats30.mostDoneTask && <div>✅ Nhiệm vụ làm nhiều nhất: {stats30.mostDoneTask.name} ({stats30.mostDoneTask.count} lần)</div>}
            {stats30.mostSkippedTask && <div>⏭️ Nhiệm vụ bị bỏ qua nhiều nhất: {stats30.mostSkippedTask.name} ({stats30.mostSkippedTask.count} lần)</div>}
            {stats30.bestDay && <div>📅 Ngày hiệu quả nhất: {stats30.bestDay.label} (trung bình {stats30.bestDay.avgXp} XP/ngày)</div>}
            <div>📈 XP trung bình 30 ngày: {stats30.avgXp} XP/ngày ({stats30.daysWithData} ngày có dữ liệu)</div>
            <div>🔥 Streak tốt nhất: {stats30.bestStreak} ngày</div>
          </div>
        </div>
      )}
    </div>
  );
}

// [PATCH] MỤC 4 — "🧠 Lời khuyên nhanh": luôn hiện, đổi theo ngày (deterministic),
// nút "↻ Đổi lời khuyên" chỉ random trong session (không lưu storage).
function QuickAdviceCard({ td }) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [advice, setAdvice] = useState(() => getQuoteOfDay(QUICK_ADVICE_LIST, td));

  const shuffle = () => {
    let next = advice;
    if (QUICK_ADVICE_LIST.length > 1) {
      while (next === advice) {
        next = QUICK_ADVICE_LIST[Math.floor(Math.random() * QUICK_ADVICE_LIST.length)];
      }
    }
    setAdvice(next);
  };

  return (
    <div style={{ background: `${accent}0F`, borderRadius:12, padding:"11px 14px", marginTop:12, boxShadow:"0 6px 20px rgba(0,0,0,0.28)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
        <span style={{ fontSize:11, fontWeight:700, color:accent, textTransform:"uppercase", letterSpacing:1 }}>🧠 Lời khuyên nhanh</span>
        <button onClick={shuffle} style={{ background:"none", border:"none", color:theme.textDim, fontSize:11, cursor:"pointer", fontWeight:600 }}>↻ Đổi lời khuyên</button>
      </div>
      <div style={{ fontSize:12, color:theme.text, lineHeight:1.6, fontStyle:"italic" }}>"{advice}"</div>
    </div>
  );
}

// ── SECTION ────────────────────────────────────────────────────────────────
// Khối gộp nhóm chức năng, có header (icon + tiêu đề) bấm để thu gọn/mở rộng.
// Animation mở/đóng dùng CSS transition thuần (max-height + opacity), không
// đo layout bằng JS (tránh giật/nhảy nội dung khi children thay đổi chiều cao
// động — dùng maxHeight đủ lớn khi mở, giống pattern .gb-expand-enter sẵn có
// trong file). Đồng bộ màu theo theme, không tạo state/logic nghiệp vụ nào.
function Section({ title, icon, children, defaultOpen = true, theme, badge, subtitle }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="gb-card-hover" style={{
      background: theme.surface,
      border: `1px solid ${theme.border}`,
      borderRadius: 16,
      marginBottom: 14,
      overflow: "hidden",
      boxShadow: "0 6px 20px rgba(0,0,0,0.28)",
    }}>
      <button
        onClick={() => setOpen(p => !p)}
        style={{
          width: "100%",
          display: "flex",
          alignItems: "center",
          gap: 10,
          padding: "13px 14px",
          background: "transparent",
          border: "none",
          cursor: "pointer",
          textAlign: "left",
        }}
      >
        <span style={{ fontSize: 17, lineHeight: 1, flexShrink: 0 }}>{icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: theme.text, letterSpacing: 0.2 }}>
            {title}
            {badge != null && (
              <span style={{ marginLeft: 8, fontSize: 10, fontWeight: 700, color: theme.primary }}>{badge}</span>
            )}
          </div>
          {subtitle && <div style={{ fontSize: 10, color: theme.textDim, marginTop: 1 }}>{subtitle}</div>}
        </div>
        <span style={{
          fontSize: 11,
          color: theme.textDim,
          transform: open ? "rotate(180deg)" : "rotate(0deg)",
          transition: "transform 0.25s cubic-bezier(0.4,0,0.2,1)",
          flexShrink: 0,
        }}>▼</span>
      </button>
      <div
        className="gb-accordion-body"
        style={{
          maxHeight: open ? 4000 : 0,
          opacity: open ? 1 : 0,
        }}
      >
        <div style={{ padding: "0 14px 14px" }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ── QUICK STATS ────────────────────────────────────────────────────────────
// Grid 4 ô tổng quan nhanh: Streak / XP hôm nay / Tổng XP / Level.
// Thay cho phần header cũ ở đầu tab Today — Hdr vẫn giữ nguyên ở cấp App
// cho các tab khác (không xoá, không đổi props của Hdr).
function QuickStats({ str, dayE, txp, lv, rt, targetXP }) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);

  const cells = [
    { key: "streak", icon: "🔥", label: "Streak", value: `${str}`, unit: "ngày", color: str >= 7 ? theme.success : theme.danger },
    { key: "xpToday", icon: "⭐", label: "XP hôm nay", value: `${dayE}`, unit: `/${targetXP}`, color: dayE >= targetXP ? theme.success : accent },
    { key: "xpTotal", icon: "💎", label: "Tổng XP", value: `${txp}`, unit: "", color: theme.primary },
    { key: "level", icon: rt?.icon || "🏅", label: "Level", value: `${lv.l}`, unit: rt?.name || "", color: accent },
  ];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8 }}>
      {cells.map(c => (
        <div key={c.key} className="gb-card-hover gb-card-elevate" style={{
          background: theme.surfaceAlt,
          border: `1px solid ${theme.border}`,
          borderRadius: 12,
          padding: "10px 12px",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <span style={{ fontSize: 13 }}>{c.icon}</span>
            <span style={{ fontSize: 9, color: theme.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>{c.label}</span>
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 3 }}>
            <span style={{ fontSize: 18, fontWeight: 800, color: c.color }}>
              <CountUp value={Number(c.value) || 0} />
            </span>
            {c.unit && <span style={{ fontSize: 10, color: theme.textDim }}>{c.unit}</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

function Today({td,data,dayE,save,setts,saveSetts,studyRunning,studySecs,stopStudy,startStudy,challenge,chalDone,str,db,txp,dayExp,lv,rt,finTxs,onOpenPomodoro,onSwitchTab,showWeeklyBanner,onOpenWeeklyReview,onSkipWeeklyReview,taskPool,goalPool,onAddPoolTask,onEditPoolTask,onDeletePoolTask,onToggleHidePoolTask,onAddGoalPool,onEditGoalPool,onDeleteGoalPool,onMarkGoalPicked,onBumpGoalDoneCount,onBumpGoalSkipCount,onTogglePoolTask,onSwapDailyTask}) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [newTask,setNewTask]=useState("");
  const [moodOpen,setMoodOpen]=useState(false);
  const [showSetts,setShowSetts]=useState(false);
  const [newRec,setNewRec]=useState("");
  const [poolManagerOpen,setPoolManagerOpen]=useState(false);
  const [goalManagerOpen,setGoalManagerOpen]=useState(false);
  const custom=Array.isArray(data.custom)?data.custom:[];

  // XP fly-up + sound khi dayE tăng
  const prevDayERef = useRef(dayE);
  const [xpGain, setXpGain] = useState(null);
  useEffect(()=>{
    if(dayE > prevDayERef.current){
      const amount = dayE - prevDayERef.current;
      setXpGain({amount, key: Date.now()});
      playSound("xp");
      const t = setTimeout(()=>setXpGain(null), 700);
      prevDayERef.current = dayE;
      return ()=>clearTimeout(t);
    }
    prevDayERef.current = dayE;
  },[dayE]);

  // P-03: debounced journal — prevents save flood on every keystroke
  const [journalVal, setJournalVal] = useDebounceField(
    data.journal||"",
    (v) => save(td, {journal: v}),
    1500
  );

  const moodA=()=>{
    const m=data.mood||{morning:0,noon:0,afternoon:0,night:0};
    const v=[m.morning,m.noon,m.afternoon,m.night].filter(x=>x>0);
    return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—";
  };

  useEffect(()=>{
    const rec=setts.recurring||[];
    if(!rec.length) return;
    // H-1: data.custom comes from parent (latest db snapshot), save reads dbRef internally
    const cur=Array.isArray(data.custom)?data.custom:[];
    const miss=rec.filter(r=>!cur.find(c=>c.id===r.id));
    if(miss.length) save(td,{custom:[...cur,...miss.map(r=>({...r,done:false}))]});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[setts.recurring, save, td]);

  const add=()=>{if(!newTask.trim())return;save(td,{custom:[...custom,{id:"ct_"+Date.now(),label:newTask.trim(),done:false}]});setNewTask("");};
  const tog=id=>{
    const c0 = custom.find(c=>c.id===id);
    if(c0 && !c0.done) playSound("tick");
    save(td,{custom:custom.map(c=>c.id===id?{...c,done:!c.done}:c)});
  };
  const del=id=>save(td,{custom:custom.filter(c=>c.id!==id)});
  const mv=(id,dir)=>{const i=custom.findIndex(c=>c.id===id);if(i<0)return;const a=[...custom];const ni=i+dir;if(ni<0||ni>=a.length)return;[a[i],a[ni]]=[a[ni],a[i]];save(td,{custom:a});};
  const addRec=()=>{if(!newRec.trim())return;const r={id:"rec_"+Date.now(),label:newRec.trim()};saveSetts({recurring:[...(setts.recurring||[]),r]});save(td,{custom:[...custom,{...r,done:false}]});setNewRec("");};

  // ── AI Planner "today" bucket — nâng lên đây để MorningWidget và
  // DailyRouteCard dùng CHUNG 1 state, tránh trường hợp cả hai tự load
  // storage độc lập rồi không đồng bộ với nhau sau khi người dùng bấm
  // "Áp dụng"/"Làm lại" trong MorningWidget (DailyRouteCard trước đó chỉ
  // load 1 lần lúc mount và không có cách nào biết MorningWidget vừa ghi
  // entry mới, nên card cứ đứng im ở trạng thái rỗng ban đầu).
  const plannerStorage = useMemo(() => createPlannerStorage(S), []);
  const [plannerToday, setPlannerToday] = useState(null);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const rotated = await plannerStorage.rotateDay(td);
      if (!cancelled) setPlannerToday(rotated);
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [td]);

  // [PATCH] ── Tự động chọn 1 Mục tiêu lớn từ Kho mỗi ngày ────────────────
  // Chỉ chạy khi: (a) goalPool đã tải xong, (b) hôm nay CHƯA có goal nào
  // fromPoolId (tức là chưa được AI tự chọn), (c) todayGoals còn trống slot
  // (giữ đúng quy tắc "tối đa 1 mục tiêu/ngày" của BigGoalCard hiện có —
  // nếu người dùng đã tự thêm 1 goal thủ công thì AI không ghi đè lên).
  const autoPickRef = useRef(null); // ngày đã xử lý gần nhất, tránh chọn lặp lại trong cùng ngày
  useEffect(() => {
    if (goalPool === null || goalPool === undefined) return; // chờ pool tải xong
    if (!goalPool.length) return; // kho trống — không có gì để chọn
    const todayGoals = Array.isArray(data.bigGoalsToday) ? data.bigGoalsToday : [];
    if (todayGoals.length > 0) return; // đã có goal hôm nay (thủ công hoặc đã auto-pick) — không ghi đè
    if (autoPickRef.current === td) return; // đã xử lý ngày này, đang chờ save() hoàn tất
    autoPickRef.current = td;
    const picked = pickBigGoalForToday(goalPool, td);
    if (!picked) return;
    save(td, { bigGoalsToday: [...todayGoals, { id: "bg_" + Date.now(), text: picked.text, done: false, fromPoolId: picked.id }] });
    if (onMarkGoalPicked) onMarkGoalPicked(picked.id, td);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [goalPool, td, data.bigGoalsToday]);

  return (
    <div>
      {/* ══════════════════════════════════════════════════════════════════
          PHẦN 1 — TỔNG QUAN NHANH (luôn mở, không bọc trong Section để
          luôn hiển thị ngay khi vào tab, không cần bấm mở rộng)
          ══════════════════════════════════════════════════════════════════ */}
      <div style={{ marginBottom: 14 }}>
        <QuickStats str={str} dayE={dayE} txp={txp} lv={lv} rt={rt} targetXP={setts.targetXP || 150} />
      </div>

      {/* XP Progress hôm nay — đưa lên đầu cùng Quick Stats */}
      <div style={{ marginBottom: 14, position: "relative", background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: "12px 14px", boxShadow: "0 6px 20px rgba(0,0,0,0.28)" }}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:theme.textDim,marginBottom:5}}>
          <span>Tiến độ hôm nay</span>
          <span style={{color:dayE>=setts.targetXP?theme.success:accent,transition:"color 0.2s ease",position:"relative"}}>
            {dayE}/{setts.targetXP} XP
            {xpGain && <span key={xpGain.key} className="gb-xp-fly" style={{right:0,top:-2,color:theme.success}}>+{xpGain.amount}</span>}
          </span>
        </div>
        <div style={{height:8,background:theme.border,borderRadius:4,overflow:"hidden"}}>
          <div className="gb-progress-fill" style={{height:"100%",width:`${Math.min(100,(dayE/Math.max(setts.targetXP,1))*100)}%`,
            background:dayE>=setts.targetXP?`linear-gradient(90deg,${theme.success},${theme.primary})`:`linear-gradient(90deg,${accent},${accent}cc)`,
            borderRadius:4,
            boxShadow:`0 0 8px ${accent}66`}}/>
        </div>
      </div>

      {/* Banner / thẻ ngữ cảnh luôn hiển thị ngay dưới tổng quan — không bọc Section vì
          bản chất là cảnh báo/tiến độ cần chú ý ngay, không phải nội dung có thể ẩn */}
      <RecoveryBanner td={td} data={data} db={db} save={save} taskPool={taskPool} onAddPoolTask={onAddPoolTask}/>
      <DeadlineProgressCard td={td}/>

      {showWeeklyBanner&&(
        <div style={{background:`${theme.accent}14`,borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
          <div style={{fontSize:12,color:theme.text,marginBottom:10}}>📅 Weekly Review tuần trước đã sẵn sàng</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onOpenWeeklyReview} style={{flex:1,padding:"8px 0",borderRadius:999,border:"none",background:theme.accent,color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>Xem ngay</button>
            <button onClick={onSkipWeeklyReview} style={{padding:"8px 16px",borderRadius:999,border:`1px solid ${theme.border}`,background:"transparent",color:theme.textDim,fontSize:12,cursor:"pointer"}}>Bỏ qua</button>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════════
          PHẦN 2 — KẾ HOẠCH & NHIỆM VỤ CHÍNH (mở rộng mặc định)
          ══════════════════════════════════════════════════════════════════ */}
      <Section title="Kế hoạch & Nhiệm vụ chính" icon="🎯" theme={theme} defaultOpen={true}>
        {/* Morning Widget (AI Planner) */}
        <MorningWidget td={td} data={data} db={db} dayExp={dayExp} setts={setts} save={save} onSwitchTab={onSwitchTab} taskPool={taskPool} onAddPoolTask={onAddPoolTask} onEditPoolTask={onEditPoolTask}
          plannerStorage={plannerStorage} plannerToday={plannerToday} onPlannerTodayChange={setPlannerToday}/>

        {/* Mục tiêu lớn */}
        <BigGoalCard td={td} data={data} goalPool={goalPool} save={save} onOpenManager={()=>setGoalManagerOpen(true)}
          onMarkGoalPicked={onMarkGoalPicked} onBumpGoalDoneCount={onBumpGoalDoneCount} onBumpGoalSkipCount={onBumpGoalSkipCount}/>

        {/* 5 việc nhỏ hôm nay */}
        <DailyPicksCard td={td} data={data} taskPool={taskPool} onToggle={onTogglePoolTask} onSwap={onSwapDailyTask} onOpenManager={()=>setPoolManagerOpen(true)}/>

        {/* Lịch trình thông minh theo giờ — đọc từ kế hoạch AI hôm nay, tự ẩn nếu chưa có kế hoạch */}
        <SmartSchedule td={td} data={data} db={db} dayExp={dayExp} setts={setts} save={save} taskPool={taskPool}
          plannerStorage={plannerStorage} plannerToday={plannerToday} onPlannerTodayChange={setPlannerToday}/>

        {/* Chuẩn bị ngày mai */}
        <TomorrowPrepCard td={td} data={data} save={save}/>

        {/* Dashboard tổng hợp (x/5 task, mục tiêu lớn, TikTok còn bao nhiêu phút, streak, AI Insight...) */}
        <DashboardHome td={td} data={data} dayE={dayE} db={db} txp={txp} str={str} lv={lv} rt={rt} dayExp={dayExp} setts={setts}
          finTxs={finTxs} onOpenMood={()=>setMoodOpen(true)} onOpenPomodoro={onOpenPomodoro} onSwitchTab={onSwitchTab}/>
      </Section>

      {poolManagerOpen && (
        <TaskPoolManagerModal taskPool={taskPool}
          onAdd={onAddPoolTask} onEdit={onEditPoolTask} onDelete={onDeletePoolTask} onToggleHide={onToggleHidePoolTask}
          onClose={()=>setPoolManagerOpen(false)}/>
      )}
      {goalManagerOpen && (
        <GoalPoolManagerModal goalPool={goalPool}
          onAdd={onAddGoalPool} onEdit={onEditGoalPool} onDelete={onDeleteGoalPool}
          onClose={()=>setGoalManagerOpen(false)}/>
      )}

      {/* ══════════════════════════════════════════════════════════════════
          PHẦN 3 — HỌC TẬP & TẬP TRUNG (mở rộng mặc định)
          ══════════════════════════════════════════════════════════════════ */}
      <Section title="Học tập & Tập trung" icon="📚" theme={theme} defaultOpen={true}>
        {/* Study Timer */}
        <div style={{background:studyRunning?"rgba(245,158,11,.1)":"rgba(52,211,153,.06)",borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)",transition:"box-shadow 0.2s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:studyRunning?theme.warning:theme.success,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>
                {studyRunning?"⏱ Đang học":"📚 Time Tracker"}
              </div>
              <div style={{fontSize:12,color:theme.text}}>
                Hôm nay: <b>{Math.floor(((data.studyTime||0)/60)/60)}h {Math.floor((data.studyTime||0)/60)%60}m</b>
                {studyRunning&&<span style={{color:theme.warning}}> (+{fmtHM(studySecs)})</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              {!studyRunning
                ?<button onClick={startStudy} style={{padding:"6px 16px",borderRadius:999,border:"none",background:theme.success,color:"#000",fontWeight:700,fontSize:12,cursor:"pointer"}}>▶ Bắt đầu</button>
                :<button onClick={stopStudy} style={{padding:"6px 14px",borderRadius:999,border:"none",background:theme.danger,color:"white",fontWeight:700,fontSize:11,cursor:"pointer"}}>⏹ Dừng</button>
              }
            </div>
          </div>
        </div>

        {/* Pomodoro */}
        <button onClick={onOpenPomodoro} className="gb-card-hover" style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px 0",borderRadius:12,border:`1px solid ${accent}44`,background:`${accent}0F`,color:accent,fontWeight:700,fontSize:12,cursor:"pointer",marginBottom:12}}>
          🍅 Mở Pomodoro
        </button>

        {/* Học theo kết quả */}
        <StudyByResultCard td={td} data={data} save={save} onOpenPomodoro={onOpenPomodoro}/>
      </Section>

      {/* ══════════════════════════════════════════════════════════════════
          PHẦN 4 — SỨC KHỎE & THÓI QUEN (thu gọn mặc định)
          ══════════════════════════════════════════════════════════════════ */}
      <Section title="Sức khỏe & Thói quen" icon="💪" theme={theme} defaultOpen={false}>
        {/* Mood — widget nhỏ, chỉ hiện trung bình, nút mở rộng để ghi chi tiết */}
        <div style={{background:`${theme.accent}0F`,borderRadius:12,padding:"10px 14px",marginBottom:12,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:10,fontWeight:600,color:theme.textDim,textTransform:"uppercase",letterSpacing:1}}>🌈 Tâm trạng hôm nay</div>
            <span style={{fontSize:12,color:theme.textDim,fontWeight:600}}>{moodA()}/5</span>
          </div>
          {!moodOpen?(
            <button onClick={()=>setMoodOpen(true)} style={{width:"100%",padding:"6px 0",marginTop:6,borderRadius:999,border:`1px solid ${accent}33`,background:"transparent",color:accent,fontSize:11,cursor:"pointer",fontWeight:600,transition:"all 0.2s ease"}}>
              + Ghi tâm trạng
            </button>
          ):(
            <MoodPicker data={data} onSave={m=>{save(td,{mood:m});setMoodOpen(false);}}/>
          )}
        </div>

        {/* Nội dung ngắn */}

          <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:8,marginBottom:12}}>
            {[
              {id:"sleep",   icon:"🌙", label:"Ngủ đủ"},
              {id:"exercise",icon:"🏃", label:"Vận động"},
              {id:"swim",    icon:"🏊", label:"Bơi/TT"},
            ].map(h=>{
              const on = !!data.tasks?.[h.id];
              return (
                <button key={h.id} onClick={()=>{ if(!on) playSound("tick"); save(td,{tasks:{[h.id]:!on}}); }}
                  className="gb-card-hover"
                  style={{
                    display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                    padding:"10px 4px",borderRadius:12,cursor:"pointer",
                    border:`1px solid ${on?theme.success+"66":theme.border}`,
                    background:on?`${theme.success}18`:theme.surface,
                    transition:"all 0.2s ease",
                  }}>
                  <span style={{fontSize:18}}>{h.icon}</span>
                  <span style={{fontSize:9,color:on?theme.success:theme.textDim,fontWeight:on?700:400}}>{h.label}</span>
                  <span style={{fontSize:9,color:on?theme.success:theme.textDim}}>{on?"✓ Đã làm":"Chưa"}</span>
                </button>
              );
            })}
          </div>
          <div style={{borderTop:`1px solid ${theme.border}33`,paddingTop:10}}>
            <div style={{fontSize:9,color:theme.textDim,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>📱 Điện thoại (phụ)</div>
            <PhoneRow value={data.phone} unlocks={data.unlocks} onSave={(p,u)=>save(td,{phone:p,unlocks:u})}/>

      {/* ══════════════════════════════════════════════════════════════════
          PHẦN 5 — NHẬT KÝ & GHI CHÚ (thu gọn mặc định)
          ══════════════════════════════════════════════════════════════════ */}
      <Section title="Nhật ký & Ghi chú" icon="📝" theme={theme} defaultOpen={false}>
        {/* Journal + Lọ */}
        <div style={{background:theme.surface,borderRadius:12,padding:13,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:9,color:theme.text}}>🧬 Theo dõi</div>
          <textarea value={journalVal} onChange={e=>setJournalVal(e.target.value)} placeholder="Hôm nay thế nào?" rows={2} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${accent}33`,borderRadius:14,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",resize:"none",marginBottom:11}}/>
          <div style={{borderTop:`1px solid ${theme.border}33`,paddingTop:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:theme.textDim}}>🔒 Lọ hôm nay</span>
              <button onClick={()=>save(td,{lo:!data.lo})} style={{padding:"5px 16px",borderRadius:999,border:"none",cursor:"pointer",fontWeight:600,fontSize:11,background:data.lo?"rgba(239,68,68,.2)":"rgba(52,211,153,.15)",color:data.lo?theme.danger:theme.success,transition:"all 0.2s ease"}}>
                {data.lo?"Có ✓":"Không ✓"}
              </button>
            </div>
          </div>
        </div>

        {/* Việc cần làm (Custom tasks) */}
        <div style={{background:`${accent}08`,borderRadius:12,padding:14,marginBottom:0,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:600}}>📌 Việc cần làm</span>
            <span style={{fontSize:10,color:theme.textDim}}>{custom.filter(c=>c.done).length}/{custom.length}</span>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Thêm việc..." style={{flex:1,background:theme.surfaceAlt,border:`1px solid ${accent}44`,borderRadius:14,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none"}}/>
            <button onClick={add} style={{background:accent,border:"none",borderRadius:14,padding:"0 16px",color:"white",fontWeight:600,fontSize:12,cursor:"pointer",transition:"background 0.2s ease"}}>+</button>
          </div>
          {custom.length===0?<div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"8px 0"}}>Chưa có việc nào</div>
            :custom.map((c,idx)=>{
              const isRec=(setts.recurring||[]).find(r=>r.id===c.id);
              return (
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:`1px solid ${theme.border}`}}>
                  <NeonCheckbox checked={c.done} onChange={()=>tog(c.id)} accent={accent}/>
                  {isRec&&<span style={{fontSize:9,color:theme.textDim}}>↻</span>}
                  <span style={{flex:1,fontSize:12}}>
                    <span key={c.done?"done":"undone"} className={c.done?"task-text-done":""} style={{"--strike-color":accent}}>{c.label}</span>
                  </span>
                  <button onClick={()=>mv(c.id,-1)} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:11,padding:"0 2px"}}>↑</button>
                  <button onClick={()=>mv(c.id,1)}  style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:11,padding:"0 2px"}}>↓</button>
                  <button onClick={()=>del(c.id)} style={{background:"none",border:"none",color:theme.danger,cursor:"pointer",fontSize:17,padding:"0 2px"}}>×</button>
                </div>

            })
