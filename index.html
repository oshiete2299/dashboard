        </div>
      </Section>

      {/* ══════════════════════════════════════════════════════════════════
          PHẦN 6 — TIỆN ÍCH & CÀI ĐẶT NHANH (thu gọn mặc định)
          ══════════════════════════════════════════════════════════════════ */}
      <Section title="Tiện ích & Cài đặt nhanh" icon="⚙️" theme={theme} defaultOpen={false}>
        {/* Daily Challenge */}
        {challenge&&(
          <div style={{background:chalDone?"rgba(52,211,153,.08)":`${accent}0A`,borderRadius:12,padding:"11px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <span style={{fontSize:20}}>{challenge.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:10,fontWeight:700,color:chalDone?theme.success:theme.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Daily Challenge</div>
              <div style={{fontSize:12,color:theme.text}}>{challenge.text}</div>
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:14,fontWeight:700,color:chalDone?theme.success:theme.warning}}>+{challenge.bonus}</div>
              <div style={{fontSize:8,color:theme.textDim}}>XP</div>
            </div>
          </div>
        )}

        {/* Quick Advice */}
        <div style={{marginBottom:12}}>
          <QuickAdviceCard td={td}/>
        </div>

        {/* XP x2 + Settings row */}
        <div style={{display:"flex",gap:8}}>
          {(()=>{
            const doneCount=TASKS.filter(t=>data.tasks?.[t.id]).length;
            const allTasksDone=doneCount>=TASKS.length;
            const streakMilestone=str===7||str===14||str===30||str===60||str===100;
            // Achievement quan trọng đạt được HÔM NAY (không tính đã đạt từ trước)
            const IMPORTANT_ACH_IDS=["streak30","xp1000","xp5000","srank","allTasks"];
            let importantAchToday=null;
            if(db && typeof txp==="number"){
              const dbYesterday={...db}; delete dbYesterday[td];
              const txpYesterday=txp-dayE;
              for(const a of ACHIEVEMENTS){
                if(!IMPORTANT_ACH_IDS.includes(a.id)) continue;
                const hasNow=a.check(db,str,txp);
                const hadBefore=a.check(dbYesterday,Math.max(0,str-1),txpYesterday);
                if(hasNow&&!hadBefore){ importantAchToday=a; break; }
              }
            }
            const eligible=allTasksDone||chalDone||streakMilestone||!!importantAchToday;
            const reasons=[
              allTasksDone&&"hoàn thành 20/20 task",
              chalDone&&"hoàn thành thử thách hôm nay",
              streakMilestone&&`chuỗi ${str} ngày`,
              importantAchToday&&`mở khóa thành tựu "${importantAchToday.name}"`,
            ].filter(Boolean);
            const alreadyUsedToday=!!data.x2; // đã kích hoạt trong ngày → khóa lại, không cho bật/tắt nữa
            const canActivate=eligible&&!alreadyUsedToday;
            const label=alreadyUsedToday?"⚡ XP×2 ĐANG BẬT":canActivate?"⚡ XP×2 Đã sẵn sàng":"🔒 XP×2 Chưa mở khóa";
            const tooltip=alreadyUsedToday
              ?"Đã kích hoạt hôm nay — mỗi ngày chỉ được dùng 1 lần"
              :eligible
                ?`Điều kiện đạt được: ${reasons.join(", ")}. Bấm để kích hoạt (chỉ 1 lần/ngày).`
                :"Cần đạt 1 trong các điều kiện: hoàn thành 20/20 task, hoàn thành thử thách hôm nay, mốc streak (7/14/30/60/100 ngày), hoặc mở khóa 1 thành tựu quan trọng hôm nay.";
            return (
              <button
                disabled={!canActivate}
                onClick={()=>canActivate&&save(td,{x2:true})}
                title={tooltip}
                style={{flex:1,padding:"8px 0",borderRadius:12,border:`1px solid ${alreadyUsedToday?theme.warning+"66":theme.border}`,background:alreadyUsedToday?"rgba(251,191,36,.12)":theme.surface,color:alreadyUsedToday?theme.warning:canActivate?theme.success:theme.textDim+"66",fontSize:11,cursor:canActivate?"pointer":"not-allowed",fontWeight:alreadyUsedToday?700:400,transition:"all 0.2s ease"}}>
                {label}
              </button>
            );
          })()}
          <button onClick={()=>setShowSetts(p=>!p)} title="Cài đặt mục tiêu XP, âm thanh, task lặp lại" style={{padding:"8px 16px",borderRadius:12,border:`1px solid ${theme.border}`,background:theme.surface,color:theme.textDim,fontSize:12,cursor:"pointer"}}>⚙️ Cài đặt</button>
        </div>

        {showSetts&&(
          <div style={{background:`${accent}08`,borderRadius:12,padding:14,marginTop:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:11,fontWeight:700,color:accent,marginBottom:10,transition:"color 0.2s ease"}}>⚙️ Cài đặt</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${theme.border}33`}}>
              <div style={{fontSize:11,color:theme.text}}>🔊 Âm thanh</div>
              <button onClick={()=>saveSetts({soundOn: setts.soundOn===false ? true : false})} style={{
                width:40,height:22,borderRadius:999,border:"none",cursor:"pointer",position:"relative",
                background: setts.soundOn===false ? theme.neutral+"55" : accent,
                transition:"background 0.2s ease",
              }}>
                <span style={{position:"absolute",top:2,left: setts.soundOn===false?2:20,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s ease"}}/>
              </button>
            </div>
            {/* V24 MỤC 10: Toggle Boss Fight — mặc định OFF, khi OFF ẩn hoàn toàn tab Boss (không xoá dữ liệu) */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${theme.border}33`}}>
              <div style={{fontSize:11,color:theme.text}}>⚔️ Boss Fight</div>
              <button onClick={()=>saveSetts({bossEnabled: !setts.bossEnabled})} style={{
                width:40,height:22,borderRadius:999,border:"none",cursor:"pointer",position:"relative",
                background: setts.bossEnabled ? accent : theme.neutral+"55",
                transition:"background 0.2s ease",
              }}>
                <span style={{position:"absolute",top:2,left: setts.bossEnabled?20:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s ease"}}/>
              </button>
            </div>
            {/* V25 MỤC 5: Boss tự nhận sát thương — mặc định OFF (gameplay hiện tại giữ nguyên khi tắt).
                Khi bật: hoàn thành việc nhỏ / mục tiêu lớn / kết quả học / chuẩn bị ngày mai sẽ tự động
                gây damage cho Boss đang đánh (nếu có), không cần bấm nút tấn công thủ công. */}
            {setts.bossEnabled && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${theme.border}33`}}>
                <div style={{fontSize:11,color:theme.text}}>🤖 Boss tự nhận sát thương</div>
                <button onClick={()=>saveSetts({bossAutoDamage: !setts.bossAutoDamage})} style={{
                  width:40,height:22,borderRadius:999,border:"none",cursor:"pointer",position:"relative",
                  background: setts.bossAutoDamage ? accent : theme.neutral+"55",
                  transition:"background 0.2s ease",
                }}>
                  <span style={{position:"absolute",top:2,left: setts.bossAutoDamage?20:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s ease"}}/>
                </button>
              </div>
            )}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>🎯 Mục tiêu XP mỗi ngày</div>
              <div style={{display:"flex",gap:4}}>
                {[100,150,200,250,300].map(v=>(
                  <button key={v} onClick={()=>saveSetts({targetXP:v})} style={{flex:1,padding:"5px 0",borderRadius:6,border:`1px solid ${setts.targetXP===v?theme.primary:theme.neutral}`,background:setts.targetXP===v?theme.tertiary:theme.neutral+"22",color:setts.targetXP===v?theme.primary:theme.textDim,fontSize:10,cursor:"pointer"}}>{v}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:theme.textDim,marginBottom:6}}>🔄 Task lặp hàng ngày</div>
              {(setts.recurring||[]).map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${theme.border}22`}}>
                  <span style={{flex:1,fontSize:11,color:theme.text}}>↻ {r.label}</span>
                  <button onClick={()=>saveSetts({recurring:(setts.recurring||[]).filter(x=>x.id!==r.id)})} style={{background:"none",border:"none",color:theme.danger,cursor:"pointer",fontSize:14}}>×</button>
                </div>
              ))}
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <input value={newRec} onChange={e=>setNewRec(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addRec()} placeholder="Task mới hàng ngày..." style={{flex:1,background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:10,padding:"6px 8px",color:theme.text,fontSize:11,outline:"none"}}/>
                <button onClick={addRec} style={{background:theme.accent,border:"none",borderRadius:10,padding:"0 10px",color:"white",fontSize:12,cursor:"pointer"}}>+</button>
              </div>
            </div>
            {/* Reminders */}
            <div style={{marginTop:10}}>
              <div style={{fontSize:11,color:theme.textDim,marginBottom:6}}>🔔 Nhắc nhở</div>
              {(setts.reminders||[]).map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${theme.border}22`,opacity:r.done?.5:1}}>
                  <span style={{flex:1,fontSize:11,color:theme.text}}>{r.done?"✓ ":""}{r.text}</span>
                  <button onClick={()=>saveSetts({reminders:(setts.reminders||[]).filter(x=>x.id!==r.id)})} style={{background:"none",border:"none",color:theme.danger,cursor:"pointer",fontSize:14}}>×</button>
                </div>
              ))}
              <div style={{display:"flex",gap:6,marginTop:6}}>
                <input id="reminderInput" placeholder="Nhắc nhở mới..." style={{flex:1,background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:10,padding:"6px 8px",color:theme.text,fontSize:11,outline:"none"}}
                  onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){saveSetts({reminders:[...(setts.reminders||[]),{id:"rem_"+Date.now(),text:e.target.value.trim(),done:false}]});e.target.value="";}}}/>
                <button onClick={()=>{const el=document.getElementById("reminderInput");if(el&&el.value.trim()){saveSetts({reminders:[...(setts.reminders||[]),{id:"rem_"+Date.now(),text:el.value.trim(),done:false}]});el.value="";}}} style={{background:theme.warning,border:"none",borderRadius:10,padding:"0 10px",color:"#000",fontSize:12,cursor:"pointer",fontWeight:700}}>+</button>
              </div>
            </div>
          </div>
        )}
      </Section>

      {/* Distraction history hôm nay — luôn hiển thị nếu có dữ liệu, không bọc Section
          (là lịch sử sự kiện hôm nay, không phải cấu hình/nội dung ẩn được) */}
      {(data.distractions||[]).length>0&&<DistrHistory distractions={data.distractions||[]} onUpdate={arr=>save(td,{distractions:arr})}/>}

      {/* Reminder Banner — luôn hiển thị nếu có nhắc nhở chưa xong */}
      {(setts.reminders||[]).filter(r=>!r.done).length>0&&(
        <div style={{background:"rgba(251,191,36,.08)",borderRadius:12,padding:"10px 16px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
          <div style={{fontSize:11,fontWeight:700,color:theme.warning,marginBottom:6,display:"flex",justifyContent:"space-between"}}>
            <span>🔔 Nhắc nhở hôm nay</span>
            <button onClick={()=>{}} style={{background:"none",border:"none",color:theme.textDim,fontSize:9,cursor:"pointer"}}>Quản lý trong ⚙️</button>
          </div>
          {(setts.reminders||[]).filter(r=>!r.done).map(r=>(
            <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:`1px solid ${theme.warning}22`}}>
              <div onClick={()=>saveSetts({reminders:(setts.reminders||[]).map(x=>x.id===r.id?{...x,done:true}:x)})}
                style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${theme.warning}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              </div>
              <span style={{flex:1,fontSize:11,color:theme.text}}>{r.text}</span>
              <button onClick={()=>saveSetts({reminders:(setts.reminders||[]).filter(x=>x.id!==r.id)})}
                style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:13}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PhoneRow({value,unlocks,onSave}) {
  const theme = useContext(ThemeContext);
  const [ph,setPh]=useState(String(value||"")); const [ul,setUl]=useState(String(unlocks||""));
  useEffect(()=>{setPh(String(value||""));setUl(String(unlocks||""));},[value,unlocks]);
  const mins=parseInt(ph)||0;
  return (
    <div style={{display:"flex",gap:10,marginTop:4}}>
      <div style={{flex:1}}>
        <div style={{fontSize:11,color:theme.textDim,marginBottom:4}}>📱 Thời gian (phút)</div>
        <input type="number" value={ph} onChange={e=>setPh(e.target.value)} onBlur={()=>onSave(parseInt(ph)||0,parseInt(ul)||0)} placeholder="0"
          style={{width:"100%",boxSizing:"border-box",background:theme.border,border:`1px solid ${mins>0?pColor(mins)+"55":theme.border}`,borderRadius:14,padding:"7px 8px",color:mins>0?pColor(mins):theme.text,fontSize:12,outline:"none"}}/>
        <div style={{fontSize:9,color:mins>0?pColor(mins):theme.textDim,marginTop:2}}>{pLabel(mins)||"Chưa ghi"}</div>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:11,color:theme.textDim,marginBottom:4}}>🔓 Số lần mở khoá</div>
        <input type="number" value={ul} onChange={e=>setUl(e.target.value)} onBlur={()=>onSave(parseInt(ph)||0,parseInt(ul)||0)} placeholder="0"
          style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:14,padding:"7px 8px",color:parseInt(ul)>80?theme.danger:theme.text,fontSize:12,outline:"none"}}/>
        <div style={{fontSize:9,color:theme.textDim,marginTop:2}}>{parseInt(ul)>80?"Nhiều lắm 🔴":parseInt(ul)>0?"Ghi nhận ✓":""}</div>
      </div>
    </div>
  );
}

// ── MOOD PICKER ────────────────────────────────────────────────────────────
function MoodPicker({data,onSave}) {
  const theme = useContext(ThemeContext);
  const [m,setM]=useState(data.mood||{morning:0,noon:0,afternoon:0,night:0});
  const periods=[{k:"morning",l:"🌅 Sáng"},{k:"noon",l:"☀️ Trưa"},{k:"afternoon",l:"🌇 Chiều"},{k:"night",l:"🌙 Tối"}];
  return (
    <div style={{marginTop:8}}>
      {periods.map(p=>(
        <div key={p.k} style={{marginBottom:8}}>
          <div style={{fontSize:10,color:theme.textDim,marginBottom:4}}>{p.l}</div>
          <div style={{display:"flex",gap:4}}>
            {[1,2,3,4,5].map(lv=>(
              <button key={lv} onClick={()=>setM({...m,[p.k]:lv})} style={{flex:1,padding:"6px 0",borderRadius:6,border:`2px solid ${m[p.k]===lv?theme.primary:theme.neutral}`,background:m[p.k]===lv?theme.tertiary:theme.neutral+"22",fontSize:14,cursor:"pointer"}}>
                {moodEmoji(lv)}
              </button>
            ))}
          </div>
        </div>
      ))}
      <button onClick={()=>onSave(m)} style={{width:"100%",padding:"9px 0",marginTop:6,borderRadius:999,border:"none",background:theme.accent,color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>
        ✅ Lưu tâm trạng
      </button>
    </div>
  );
}

// ── DISTRACTION MODAL ──────────────────────────────────────────────────────
// DistrModal — dùng chung cho Add và Edit
function DistrModal({onClose,onSave,initial=null}) {
  const theme = useContext(ThemeContext);
  const isEdit=!!initial;
  const [src,setSrc]=useState(initial?.source||"TikTok");
  const [dur,setDur]=useState(initial?.duration||5);
  const [ctx,setCtx]=useState(initial?.context||"Học");
  const [note,setNote]=useState(initial?.note||"");
  const [customDur,setCustomDur]=useState(String(initial?.duration||5));
  const [useCustom,setUseCustom]=useState(initial?!DISTR_DURATIONS.includes(initial.duration):false);

  const finalDur=useCustom?(parseInt(customDur)||5):dur;

  return (
    <ModalPortal>
    <div className="gb-modal-backdrop-fade" style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="gb-modal-fade-scale" style={{background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:22,width:"100%",maxWidth:340,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.danger,marginBottom:12}}>{isEdit?"✏️ Sửa bản ghi":"📱 Tao bị kéo đi"}</div>

        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>Bị kéo bởi:</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {DISTR_SOURCES.map(s=><button key={s} onClick={()=>setSrc(s)} style={{padding:"5px 10px",borderRadius:999,border:`1px solid ${src===s?theme.danger:theme.border}`,background:src===s?"rgba(239,68,68,.15)":theme.border,color:src===s?theme.danger:theme.textDim,fontSize:11,cursor:"pointer"}}>{s}</button>)}
          </div>
        </div>

        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>Mất bao lâu:</div>
          <div style={{display:"flex",gap:4,marginBottom:6}}>
            {DISTR_DURATIONS.map(d=><button key={d} onClick={()=>{setDur(d);setUseCustom(false);}} style={{flex:1,padding:"6px 0",borderRadius:999,border:`1px solid ${!useCustom&&dur===d?theme.warning:theme.border}`,background:!useCustom&&dur===d?"rgba(251,191,36,.15)":theme.border,color:!useCustom&&dur===d?theme.warning:theme.textDim,fontSize:11,cursor:"pointer"}}>{d}p</button>)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="number" value={customDur} onChange={e=>{setCustomDur(e.target.value);setUseCustom(true);}} placeholder="Khác..." style={{width:70,background:theme.border,border:`1px solid ${useCustom?theme.warning:theme.border}`,borderRadius:10,padding:"5px 7px",color:useCustom?theme.warning:theme.textDim,fontSize:11,outline:"none"}}/>
            <span style={{fontSize:10,color:theme.textDim}}>phút (tuỳ chỉnh)</span>
          </div>
        </div>

        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>Trước đó đang:</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {DISTR_CONTEXTS.map(c=><button key={c} onClick={()=>setCtx(c)} style={{padding:"5px 10px",borderRadius:999,border:`1px solid ${ctx===c?theme.primary:theme.neutral}`,background:ctx===c?theme.tertiary:theme.neutral+"22",color:ctx===c?theme.primary:theme.textDim,fontSize:11,cursor:"pointer"}}>{c}</button>)}
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>Ghi chú (tuỳ chọn):</div>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Thêm ghi chú..." style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:10,padding:"7px 9px",color:theme.text,fontSize:11,outline:"none"}}/>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onSave({
            id:initial?.id||"d_"+Date.now(),
            source:src,duration:finalDur,context:ctx,note:note.trim(),
            timestamp:initial?.timestamp||Date.now()
          })} style={{flex:1,padding:"11px 0",borderRadius:999,border:"none",background:`linear-gradient(135deg,${theme.danger},${theme.warning})`,color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>{isEdit?"💾 Lưu chỉnh sửa":"✅ Ghi lại"}</button>
          <button onClick={onClose} style={{padding:"11px 16px",borderRadius:999,border:`1px solid ${theme.neutral}`,background:theme.neutral+"22",color:theme.textDim,fontSize:12,cursor:"pointer"}}>Huỷ</button>
        </div>
      </div>
    </div>
    </ModalPortal>
  );
}


// ── INLINE CONFIRM ─────────────────────────────────────────────────────────
// P-06: replaces window.confirm() which is blocked in artifact environments
function InlineConfirm({message, onConfirm, onCancel, confirmLabel="Xoá", cancelLabel="Huỷ"}) {
  const theme = useContext(ThemeContext);
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0"}}>
      <span style={{fontSize:10,color:theme.textDim,flex:1}}>{message}</span>
      <button
        onClick={onCancel}
        style={{padding:"4px 12px",borderRadius:999,border:`1px solid ${theme.border}`,background:theme.surface,color:theme.textDim,fontSize:10,cursor:"pointer"}}>
        {cancelLabel}
      </button>
      <button
        onClick={onConfirm}
        style={{padding:"4px 12px",borderRadius:999,border:"none",background:theme.danger,color:"white",fontSize:10,fontWeight:700,cursor:"pointer"}}>
        {confirmLabel}
      </button>
    </div>
  );
}

// ── DISTRACTION HISTORY (hiện trong Today) ────────────────────────────────
function DistrHistory({distractions,onUpdate}) {
  const theme = useContext(ThemeContext);
  const [editItem,setEditItem]=useState(null);
  // P-06: inline confirm replaces window.confirm
  const [confirmId,setConfirmId]=useState(null);
  const total=distractions.reduce((s,d)=>s+(d.duration||0),0);
  return (
    <div style={{background:"rgba(239,68,68,.06)",borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:theme.danger}}>📱 Sa lầy hôm nay</div>
        <div style={{fontSize:10,color:theme.textDim}}>{distractions.length} lần · {total} phút</div>
      </div>
      {distractions.map((d,i)=>{
        const uid=d.id||(d.timestamp+"");
        return (
          <div key={d.id||i}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:`1px solid ${theme.border}22`}}>
              <span style={{fontSize:10,color:theme.danger,minWidth:14,fontWeight:700}}>{d.source?.slice(0,2)}</span>
              <span style={{flex:1,fontSize:10,color:theme.textDim}}>{d.source} · {d.duration}p · {d.context}</span>
              {d.note&&<span style={{fontSize:9,color:theme.textDim,maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.note}</span>}
              <button onClick={()=>setEditItem(d)} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:12,padding:"0 2px"}}>✏️</button>
              <button onClick={()=>setConfirmId(uid)} style={{background:"none",border:"none",color:theme.danger,cursor:"pointer",fontSize:14,padding:"0 2px"}}>×</button>
            </div>
            {confirmId===uid&&(
              <InlineConfirm
                message="Xoá bản ghi này?"
                onConfirm={()=>{onUpdate(distractions.filter(x=>(x.id||(x.timestamp+""))!==uid));setConfirmId(null);}}
                onCancel={()=>setConfirmId(null)}
              />
            )}
          </div>
        );
      })}
      {editItem&&(
        <DistrModal
          initial={editItem}
          onClose={()=>setEditItem(null)}
          onSave={updated=>{
            onUpdate(distractions.map(d=>(d.id||d.timestamp)===(editItem.id||editItem.timestamp)?updated:d));
            setEditItem(null);
          }}
        />
      )}
    </div>
  );
}

// ── WEEKLY REVIEW MODAL ─────────────────────────────────────────────────────
function WeeklyReviewModal({weekStart,db,dayExp,targetXP,review,onSave,onClose}) {
  const theme = useContext(ThemeContext);
  const media = useContext(MediaContext);
  const dates = weekDates(weekStart);
  const weekEnd = dates[6];
  const days = dates.map(iso=>({iso, d: db[iso]||null}));
  const presentDays = days.filter(x=>x.d);

  // 📊 Tổng quan
  const totalXP = days.reduce((s,x)=>s+dayExp(x.iso),0);
  const moods = presentDays.map(x=>avgMood(x.d)).filter(m=>m>0);
  const avgMoodWeek = moods.length ? moods.reduce((a,b)=>a+b,0)/moods.length : 0;
  const totalStudyMin = presentDays.reduce((s,x)=>s+(x.d.studyTime||0),0);
  // streak hiện tại: consecutive clean days counting back from weekEnd
  let curStreak=0;
  for(let i=dates.length-1;i>=0;i--){
    const dd=db[dates[i]];
    if(!dd) break;
    if(dd.lo) break;
    curStreak++;
  }

  // 🏆 Thành tựu
  let bestXPDay=null, bestXP=-1;
  days.forEach(x=>{ const e=dayExp(x.iso); if(e>bestXP){bestXP=e; bestXPDay=x.iso;} });
  const targetXPVal = targetXP || 150;
  const daysHitTarget = days.filter(x=>dayExp(x.iso)>=targetXPVal).length;
  let leastPhoneDay=null, leastPhone=Infinity;
  presentDays.forEach(x=>{ const p=x.d.phone||0; if(p>0 && p<leastPhone){leastPhone=p; leastPhoneDay=x.iso;} });

  // ⚠️ Cần cải thiện
  const allDistrs = presentDays.flatMap(x=>x.d.distractions||[]);
  let topDistrSource=null;
  if(allDistrs.length){
    const bySrc={};
    allDistrs.forEach(d=>{bySrc[d.source]=(bySrc[d.source]||0)+1;});
    topDistrSource=Object.entries(bySrc).sort((a,b)=>b[1]-a[1])[0];
  }
  const subjectIds=["math","physics","chem","lit"];
  const subjectLabels={math:"Toán",physics:"Lý",chem:"Hóa",lit:"Văn"};
  const subjCounts=subjectIds.map(id=>({id,cnt:presentDays.filter(x=>x.d.tasks?.[id]).length}));
  const leastSubject=subjCounts.sort((a,b)=>a.cnt-b.cnt)[0];
  const totalPhoneMin=presentDays.reduce((s,x)=>s+(x.d.phone||0),0);

  // [PATCH] MỤC 3 — Dữ liệu bổ sung cho các gợi ý "⚠️ Cần cải thiện" cụ thể hơn
  const avgPhoneMin = presentDays.length ? totalPhoneMin/presentDays.length : 0;
  const poolStats = presentDays.reduce((acc,x)=>{
    const picks = Array.isArray(x.d.dailyPicks) ? x.d.dailyPicks : [];
    const done = picks.filter(id=>x.d.poolDone?.[id]).length;
    acc.picks += picks.length; acc.done += done; return acc;
  }, {picks:0, done:0});
  const poolCompletionRate = poolStats.picks>0 ? poolStats.done/poolStats.picks : null;
  const distinctSubjectsThisWeek = subjectIds.filter(id=>presentDays.some(x=>x.d.tasks?.[id])).length;
  const hasReflectionNote = !!((review?.reflection?.satisfied||"").trim() || (review?.reflection?.improve||"").trim());

  const improvementSuggestions = [];
  if (curStreak < 3) improvementSuggestions.push("Streak còn ngắn, hãy đặt mục tiêu nhỏ: chỉ cần 2 phút/ngày là thành công");
  if (avgPhoneMin > 300) improvementSuggestions.push("Phone cao, thử quy tắc 'điện thoại ở phòng khác khi ăn'");
  if (poolCompletionRate !== null && poolCompletionRate < 0.5) improvementSuggestions.push("Việc nhỏ hoàn thành thấp, thử giảm số lượng xuống 3 việc/ngày");
  if (distinctSubjectsThisWeek < 2) improvementSuggestions.push("Học ít môn, thử xen kẽ 2 môn/ngày để tránh nhàm chán");
  if (avgMoodWeek > 0 && avgMoodWeek < 3) improvementSuggestions.push("Mood thấp, ưu tiên ngủ đủ và tập thể dục trước khi học");
  if (!hasReflectionNote) improvementSuggestions.push("Viết 1 dòng về điều tốt nhất tuần này");

  // ✍ Reflection
  const initialReflection = review?.reflection || {satisfied:"",improve:""};
  const [satisfied,setSatisfied]=useState(initialReflection.satisfied||"");
  const [improve,setImprove]=useState(initialReflection.improve||"");

  const handleSave = () => {
    onSave({
      weekStart, weekEnd,
      viewedAt: review?.viewedAt || new Date().toISOString(),
      reflection: { satisfied, improve },
    });
    onClose();
  };

  // mark as viewed as soon as opened (even if user closes without typing reflection)
  useEffect(()=>{
    if(!review?.viewedAt){
      onSave({ weekStart, weekEnd, viewedAt: new Date().toISOString(), reflection: initialReflection });
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  const fmtShort = iso => { const [y,m,d]=iso.split("-"); return `${d}/${m}`; };

  return (
    <ModalPortal>
    <div className="gb-modal-backdrop-fade" style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="gb-modal-fade-scale" style={{...modalBgStyle(theme, media?.settings?.modalBg),border:`2px solid ${theme.accent}`,borderRadius:12,padding:20,width:"100%",maxWidth:420,maxHeight:"88vh",overflowY:"auto",boxSizing:"border-box"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{fontSize:14,fontWeight:800,color:theme.accent}}>📅 Weekly Review</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:18}}>×</button>
        </div>
        <div style={{fontSize:10,color:theme.textDim,marginBottom:14}}>{fmtShort(weekStart)} – {fmtShort(weekEnd)}</div>

        {/* Tổng quan */}
        <div style={{fontSize:12,fontWeight:700,color:theme.text,marginBottom:8}}>📊 Tổng quan</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{background:theme.surfaceAlt,borderRadius:14,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:theme.textDim}}>Tổng XP tuần</div>
            <div style={{fontSize:16,fontWeight:700,color:theme.accent}}>{totalXP}</div>
          </div>
          <div style={{background:theme.surfaceAlt,borderRadius:14,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:theme.textDim}}>Streak hiện tại</div>
            <div style={{fontSize:16,fontWeight:700,color:curStreak>=7?theme.success:theme.warning}}>{curStreak} ngày</div>
          </div>
          <div style={{background:theme.surfaceAlt,borderRadius:14,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:theme.textDim}}>Mood trung bình</div>
            <div style={{fontSize:16,fontWeight:700,color:theme.accent}}>{avgMoodWeek>0?avgMoodWeek.toFixed(1):"—"}/5</div>
          </div>
          <div style={{background:theme.surfaceAlt,borderRadius:14,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:theme.textDim}}>Tổng thời gian học</div>
            <div style={{fontSize:16,fontWeight:700,color:theme.success}}>{Math.floor((totalStudyMin/60)/60)}h {Math.floor(totalStudyMin/60)%60}m</div>
          </div>
        </div>

        {/* Thành tựu */}
        <div style={{fontSize:12,fontWeight:700,color:theme.success,marginBottom:8}}>🏆 Thành tựu</div>
        <div style={{background:"rgba(52,211,153,.06)",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:11,color:theme.text,lineHeight:1.8}}>
          <div>• Ngày nhiều XP nhất: {bestXPDay?`${fmtShort(bestXPDay)} (${bestXP} XP)`:"—"}</div>
          <div>• Số ngày đạt target XP: {daysHitTarget}/7</div>
          <div>• Ngày dùng điện thoại ít nhất: {leastPhoneDay?`${fmtShort(leastPhoneDay)} (${Math.floor(leastPhone/60)}h${leastPhone%60>0?` ${leastPhone%60}m`:""})`:"—"}</div>
        </div>

        {/* Cần cải thiện */}
        <div style={{fontSize:12,fontWeight:700,color:theme.danger,marginBottom:8}}>⚠️ Cần cải thiện</div>
        <div style={{background:"rgba(239,68,68,.06)",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:11,color:theme.text,lineHeight:1.8}}>
          <div>• Nguồn distraction nhiều nhất: {topDistrSource?`${topDistrSource[0]} (${topDistrSource[1]} lần)`:"—"}</div>
          <div>• Môn học ít nhất: {leastSubject?`${subjectLabels[leastSubject.id]} (${leastSubject.cnt}/7 ngày)`:"—"}</div>
          <div>• Tổng thời gian điện thoại: {totalPhoneMin>0?`${Math.floor(totalPhoneMin/60)}h ${totalPhoneMin%60}m`:"—"}</div>
        </div>

        {/* [PATCH] MỤC 3 — Gợi ý cải thiện cụ thể dựa trên dữ liệu tuần này */}
        {improvementSuggestions.length>0 && (
          <div style={{background:"rgba(239,68,68,.10)",border:`1px solid ${theme.danger}33`,borderRadius:10,padding:"10px 12px",marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:theme.danger,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>💡 Gợi ý</div>
            <div style={{fontSize:11,color:theme.text,lineHeight:1.9}}>
              {improvementSuggestions.map((s,idx)=>(<div key={idx}>→ {s}</div>))}
            </div>
          </div>
        )}

        {/* Reflection */}
        <div style={{fontSize:12,fontWeight:700,color:theme.warning,marginBottom:8}}>✍ Reflection</div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>Điều mình hài lòng nhất tuần này?</div>
          <textarea value={satisfied} onChange={e=>setSatisfied(e.target.value)} rows={2}
            style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 10px",color:theme.text,fontSize:12,outline:"none",resize:"none"}}/>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:theme.textDim,marginBottom:5}}>Tuần sau muốn cải thiện gì?</div>
          <textarea value={improve} onChange={e=>setImprove(e.target.value)} rows={2}
            style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 10px",color:theme.text,fontSize:12,outline:"none",resize:"none"}}/>
        </div>

        <button onClick={handleSave} style={{width:"100%",padding:"11px 0",borderRadius:999,border:"none",background:theme.accent,color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ Lưu</button>
      </div>
    </div>
    </ModalPortal>
  );
}
// Thay Calendar grid = list ngày có data, nhóm theo tháng, không navigation tháng
function CalTab({db,save,dayExp,td,weeklyReviews,targetXP,onOpenWeeklyReviewWeek}) {
  const theme = useContext(ThemeContext);
  const [sel,setSel]=useState(null);
  const [filter,setFilter]=useState(""); // "2026-06" hoặc ""

  // Build danh sách ngày: tất cả ngày có data + 30 ngày gần nhất
  const allKeys=new Set(Object.keys(db));
  for(let i=0;i<30;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    allKeys.add(d.toISOString().split("T")[0]);
  }
  const sorted=[...allKeys]
    .filter(iso=>/^\d{4}-\d{2}-\d{2}$/.test(iso)) // chỉ valid ISO dates
    .sort((a,b)=>b.localeCompare(a));
  const filtered=filter?sorted.filter(iso=>iso.startsWith(filter)):sorted;

  // Nhóm theo tháng
  const groups={};
  filtered.forEach(iso=>{
    const m=iso.slice(0,7);
    if(!groups[m]) groups[m]=[];
    groups[m].push(iso);
  });
  const monthKeys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  // Tháng nào đang có dữ liệu thực sự
  const months=[...new Set(Object.keys(db).map(k=>k.slice(0,7)))].sort((a,b)=>b.localeCompare(a));

  const fmtMonthLabel = m => {
    const d = new Date(m+"-01T00:00:00");
    return d.toLocaleDateString("vi-VN",{month:"long",year:"numeric"});
  };

  const donesCountFor = day => {
    if(!day) return 0;
    const fixed = TASKS.filter(t=>day.tasks?.[t.id]).length;
    const cust = Array.isArray(day.custom) ? day.custom.filter(c=>c.done).length : 0;
    return fixed + cust;
  };

  return (
    <div>
      {/* Filter bar */}
      <div style={{marginBottom:6}}>
        <div style={{fontSize:9,color:theme.textDim,marginBottom:4,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>
          📋 Lịch Sử — {Object.keys(db).length} ngày đã ghi
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>setFilter("")} className="gb-ripple" onMouseDown={gbRipple} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===""?theme.primary:theme.neutral}`,background:filter===""?theme.tertiary:"transparent",color:filter===""?theme.primary:theme.textDim,fontSize:10,cursor:"pointer"}}>
            Tất cả
          </button>
          {months.slice(0,8).map(m=>(
            <button key={m} onClick={()=>setFilter(filter===m?"":m)} className="gb-ripple" onMouseDown={gbRipple} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===m?theme.primary:theme.neutral}`,background:filter===m?theme.tertiary:"transparent",color:filter===m?theme.primary:theme.textDim,fontSize:10,cursor:"pointer"}}>
              {m.slice(5)}
            </button>
          ))}
        </div>
      </div>

      {/* Grouped list */}
      {monthKeys.length===0&&(
        <div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"30px 0"}}>
          Chưa có dữ liệu nào 📭
        </div>
      )}
      {monthKeys.map(month=>(
        <div key={month} style={{marginBottom:8}}>
          <div style={{fontSize:9,fontWeight:700,color:theme.textDim,marginBottom:4,
            textTransform:"uppercase",letterSpacing:1}}>
            {fmtMonthLabel(month)}
          </div>
          {groups[month].map(iso=>{
            let e=0, rl="—", rc="#374151", mA=0, hasData=false;
            try {
              e=dayExp(iso);
              [rl,rc]=rank(e);
              const day=db[iso];
              if(day) {
                hasData=true;
                if(day.mood&&typeof day.mood==="object"){
                  const vals=[day.mood.morning,day.mood.noon,day.mood.afternoon,day.mood.night].filter(v=>typeof v==="number"&&v>0);
                  mA=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
                }
              }
            } catch(_) {}

            const isToday=iso===td;
            const isSel=iso===sel;
            const day=db[iso];
            const isSRank = hasData && rl==="S";

            return (
              <div key={iso}>
                <div onClick={()=>setSel(isSel?null:iso)} className="gb-card-hover" style={{
                  display:"flex",alignItems:"center",gap:7,
                  padding:"5px 9px",marginBottom:isSel?0:3,
                  background:isSel?`${theme.accent}14`:isToday?`${theme.accent}0C`:hasData?theme.surface:"transparent",
                  border:`1px solid ${isSel?theme.accent:isToday?theme.accent+"55":hasData?theme.border:"transparent"}`,
                  borderRadius:8,cursor:"pointer",
                  boxShadow:hasData?"0 2px 8px rgba(0,0,0,0.18)":"none",
                  transition:"background 0.15s ease, border-color 0.15s ease",
                }}>
                  {/* Date */}
                  <div style={{flexShrink:0,textAlign:"center",width:24}}>
                    <div style={{fontSize:12,fontWeight:700,color:isToday?theme.accent:hasData?theme.text:theme.neutral,lineHeight:1.1}}>
                      {iso.slice(8)}
                    </div>
                    <div style={{fontSize:6.5,color:theme.textDim,marginTop:1}}>
                      {["CN","T2","T3","T4","T5","T6","T7"][new Date(iso+"T00:00:00").getDay()]}
                    </div>
                  </div>

                  {/* Rank badge — S rank được làm nổi bật hơn */}
                  <div style={{
                    width:20,height:20,borderRadius:6,flexShrink:0,
                    background:hasData?(isSRank?`linear-gradient(135deg,${rc}33,${rc}11)`:`${rc}1A`):theme.border,
                    border:`1px solid ${hasData?rc+(isSRank?"AA":"44"):theme.border}`,
                    boxShadow:isSRank?`0 0 6px ${rc}66`:"none",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:10,fontWeight:800,color:hasData?rc:theme.neutral,
                  }}>
                    {hasData?rl:"—"}
                  </div>

                  {/* Info: XP nổi bật, mood nhỏ, phone icon gọn */}
                  <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:5,flexWrap:"nowrap",overflow:"hidden"}}>
                    {hasData&&e>0&&<span style={{fontSize:11,color:theme.accent,fontWeight:800,flexShrink:0}}>{e}</span>}
                    {mA>0&&<span style={{fontSize:9,flexShrink:0,opacity:0.85}}>{moodEmoji(Math.round(mA))}</span>}
                    {day?.lo&&<span style={{fontSize:7,padding:"1px 4px",borderRadius:5,background:`${theme.danger}22`,color:theme.danger,flexShrink:0}}>lọ</span>}
                    {day?.phone>0&&<span style={{fontSize:8,color:pColor(day.phone),flexShrink:0,display:"inline-flex",alignItems:"center",gap:1}}>📱{Math.floor(day.phone/60)}h</span>}
                    {donesCountFor(day)>0&&<span style={{fontSize:7.5,color:theme.textDim,flexShrink:0}}>✓{donesCountFor(day)}</span>}
                    {day?.journal&&<span style={{fontSize:8,color:theme.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>· {day.journal.slice(0,24)}</span>}
                  </div>

                  {/* Arrow */}
                  <span style={{color:theme.textDim,fontSize:9,transform:isSel?"rotate(180deg)":"none",transition:"transform .18s",flexShrink:0}}>▾</span>
                </div>

                {/* DayDetail inline — fade + slide nhẹ khi mở */}
                {isSel&&(
                  <div className="gb-day-expand">
                    <DayDetail
                      key={iso}
                      date={iso}
                      data={db[iso]||blank()}
                      save={save}
                      dayE={e}
                      isToday={isToday}
                    />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}

      {/* 📅 Weekly Review đã lưu */}
      <WeeklyReviewHistorySection weeklyReviews={weeklyReviews} onOpen={onOpenWeeklyReviewWeek}/>

      <div style={{height:16}}/>
    </div>
  );
}

// ── STATS ──────────────────────────────────────────────────────────────────
function Stats({db,dayExp,lv,rt,txp,str,exportData,importData,setts,saveSetts,onReset,backupList=[],restoreFromBackup,taskPool=[]}) {
  const theme = useContext(ThemeContext);
  const [chartDays,setChartDays]=useState(7);
  // P-07: hidden file input ref for Import
  const importRef = useRef(null);
  // Auto-backup restore UI
  const [showBackupList,setShowBackupList]=useState(false);
  const [confirmRestoreKey,setConfirmRestoreKey]=useState(null);
  const allDays=Object.keys(db).filter(k=>dayExp(k)>0);
  const avgXP=allDays.length?Math.round(txp/allDays.length):0;

  const lastN=Array.from({length:chartDays},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(chartDays-1)+i);
    const iso=d.toISOString().split("T")[0];
    const e=dayExp(iso),day=db[iso];
    const mA=avgMood(day);
    return {iso,e,lo:day?.lo||false,phone:day?.phone||0,unlocks:day?.unlocks||0,
      studyTime:day?.studyTime||0,distractions:day?.distractions||[],moodAvg:mA,
      label:d.toLocaleDateString("vi-VN",{weekday:"short"}).slice(0,3)};
  });
  const maxE=Math.max(...lastN.map(d=>d.e),1);

  // ── 30-day data for line charts ───────────────────────────────────
  const last30=Array.from({length:30},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-29+i);
    const iso=d.toISOString().split("T")[0];
    const day=db[iso];
    return {
      iso,
      e:dayExp(iso),
      moodAvg:avgMood(day),
      studyTime:day?.studyTime||0,
      label:d.toLocaleDateString("vi-VN",{day:"numeric",month:"numeric"}),
      short:d.getDate(),
    };
  });

  // ── Rank Prediction ───────────────────────────────────────────────
  const xpAvg7  = allDays.length>=1 ? Math.round(lastN.slice(-7).reduce((s,d)=>s+d.e,0)/7) : 0;
  const xpAvg30 = allDays.length>=1 ? Math.round(last30.reduce((s,d)=>s+d.e,0)/30) : 0;
  const predictXP30 = txp + xpAvg7*30;
  const predictLv30 = calcLv(predictXP30);
  const predictRt30 = getRankTitle(predictLv30.l);
  const predictXP90 = txp + xpAvg7*90;
  const predictLv90 = calcLv(predictXP90);
  const predictRt90 = getRankTitle(predictLv90.l);
  // V25 MỤC 6: predictStr30 (str+30, biến riêng không dùng ở đâu — UI dùng str+days inline) đã bị xoá,
  // xác nhận an toàn: không có tham chiếu nào khác trong toàn bộ file.

  // ══════════════════ V25 MỤC 4: THỐNG KÊ MỚI (thay "4 môn" / "Recall") ═══════
  // Nguồn dữ liệu: dailyPicks/poolDone (việc nhỏ), bigGoalsToday (mục tiêu lớn),
  // studyResults (học theo kết quả), shortContent (nội dung ngắn), tomorrowPrep
  // (chuẩn bị ngày mai) — trong 30 ngày gần nhất. Không đụng Heatmap/Charts/
  // Hall of Fame/Rank/XP/Level/Streak (giữ nguyên bên dưới).
  const stat30Dates = Array.from({length:30},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-29+i); return mkISO(d.getFullYear(),d.getMonth(),d.getDate()); });
  const stat30Days = stat30Dates.map(iso=>({iso,day:db[iso]||null})).filter(x=>x.day);

  // Việc nhỏ: tỉ lệ hoàn thành 5/5, việc được làm nhiều nhất / bị bỏ nhiều nhất
  const poolPickCount={}, poolDoneCount={};
  let pool30TotalPicks=0, pool30TotalDone=0, pool30FullDays=0;
  stat30Days.forEach(({day})=>{
    const picks=Array.isArray(day.dailyPicks)?day.dailyPicks:[];
    pool30TotalPicks+=picks.length;
    let doneToday=0;
    picks.forEach(id=>{
      poolPickCount[id]=(poolPickCount[id]||0)+1;
      if(day.poolDone?.[id]){ poolDoneCount[id]=(poolDoneCount[id]||0)+1; doneToday++; }
    });
    pool30TotalDone+=doneToday;
    if(picks.length>=5 && doneToday>=picks.length) pool30FullDays++;
  });
  const poolCompletionRate = pool30TotalPicks>0 ? Math.round((pool30TotalDone/pool30TotalPicks)*100) : 0;
  const poolById = Object.fromEntries((taskPool||[]).map(t=>[t.id,t]));
  const mostDoneTask = Object.entries(poolDoneCount).sort((a,b)=>b[1]-a[1])[0];
  const mostSkippedTask = Object.entries(poolPickCount)
    .map(([id,picked])=>({id,picked,done:poolDoneCount[id]||0,skipped:picked-(poolDoneCount[id]||0)}))
    .filter(x=>x.skipped>0).sort((a,b)=>b.skipped-a.skipped)[0];

  // Mục tiêu lớn: hoàn thành 30 ngày + streak hiện tại (ngày liên tiếp gần nhất có ≥1 mục tiêu lớn hoàn thành)
  const bigGoal30Done = stat30Days.reduce((s,{day})=>s+((day.bigGoalsToday||[]).filter(g=>g.done).length),0);
  const bigGoal30Total = stat30Days.reduce((s,{day})=>s+((day.bigGoalsToday||[]).length),0);
  let bigGoalStreak=0; { const today=new Date(); for(let i=0;i<90;i++){ const d=new Date(today); d.setDate(d.getDate()-i); const iso=mkISO(d.getFullYear(),d.getMonth(),d.getDate()); const day=db[iso]; if(!day){ if(i===0) continue; break; } const hasGoal=(day.bigGoalsToday||[]).some(g=>g.done); if(!hasGoal) break; bigGoalStreak++; } }

  // Học theo kết quả: hoàn thành 30 ngày
  const studyResult30Done = stat30Days.reduce((s,{day})=>s+((day.studyResults||[]).filter(r=>r.done).length),0);
  const studyResult30Total = stat30Days.reduce((s,{day})=>s+((day.studyResults||[]).length),0);

  // Chuẩn bị ngày mai: số ngày hoàn thành / 30 ngày
  const tomorrowPrepDone30 = stat30Days.filter(({day})=>!!day.tomorrowPrep?.doneAt).length;

  // Nội dung ngắn: tổng phút + số ngày vượt giới hạn trong 30 ngày
  let shortContentTotalMin=0, shortContentOverDays=0;
  stat30Days.forEach(({iso,day})=>{
    const used=(day.shortContent||[]).reduce((s,x)=>s+(x.minutes||0),0);
    shortContentTotalMin+=used;
    if(used>shortContentLimitMin(iso)) shortContentOverDays++;
  });

  // Tag phổ biến nhất — Kho việc nhỏ hiện chưa có field "tag" riêng nên dùng icon (i) làm nhóm phân loại tạm thời
  const tagCount={};
  stat30Days.forEach(({day})=>{
    (Array.isArray(day.dailyPicks)?day.dailyPicks:[]).forEach(id=>{
      if(!day.poolDone?.[id]) return;
      const t=poolById[id]; if(!t) return;

            <div style={{fontSize:9,color:theme.textDim}}>7 ngày</div>

          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:"#6ee7b7"}}>{Math.round((totalStudyMins/60)/Math.max(Object.keys(db).length,1))}</div>
            <div style={{fontSize:9,color:theme.textDim}}>TB phút/ngày</div>
          </div>

// ── LINE CHART 30 DAYS ─────────────────────────────────────────────────────
function LineChart30({title, data, color, maxVal, unit, emptyLabel=""}) {
  const theme = useContext(ThemeContext);
  const W=300, H=80, PAD=8;
  const validData = data.filter(d=>d.v>0);
  if(validData.length<2) return (
    <div style={{background:theme.surface,borderRadius:10,padding:16,marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>{title}</div>
      <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"20px 0"}}>Chưa đủ dữ liệu</div>
    </div>
  );
  const pts = data.map((d,i)=>{
    const x = PAD + (i/(data.length-1))*(W-PAD*2);
    const y = d.v>0 ? H-PAD-(d.v/maxVal)*(H-PAD*2) : null;
    return {x,y,v:d.v,label:d.label};
  });
  // Build path skipping nulls
  let path="";
  pts.forEach((p,i)=>{
    if(p.y===null) return;
    const cmd = path==="" || pts.slice(0,i).every(x=>x.y===null) ? "M" : "L";
    path+=`${cmd}${p.x.toFixed(1)},${p.y.toFixed(1)} `;
  });
  // Area fill path
  const validPts=pts.filter(p=>p.y!==null);
  let area="";
  if(validPts.length>=2){
    area=`M${validPts[0].x.toFixed(1)},${H-PAD} `;
    validPts.forEach(p=>{ area+=`L${p.x.toFixed(1)},${p.y.toFixed(1)} `; });
    area+=`L${validPts[validPts.length-1].x.toFixed(1)},${H-PAD} Z`;
  }
  const avg=validData.length?Math.round(validData.reduce((s,d)=>s+d.v,0)/validData.length*10)/10:0;
  const maxV=Math.max(...validData.map(d=>d.v));
  const minV=Math.min(...validData.map(d=>d.v));
  return (
    <div style={{background:theme.surface,borderRadius:10,padding:16,marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:600}}>{title}</div>
        <div style={{display:"flex",gap:10,fontSize:9,color:theme.textDim}}>
          <span>TB <b style={{color}}>{avg}{unit}</b></span>
          <span>Max <b style={{color:theme.warning}}>{maxV}{unit}</b></span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
        {/* Grid lines */}
        {[0.25,0.5,0.75,1].map(f=>(
          <line key={f} x1={PAD} x2={W-PAD} y1={H-PAD-(f*(H-PAD*2))} y2={H-PAD-(f*(H-PAD*2))} stroke={theme.border} strokeWidth={0.5}/>
        ))}
        {/* Area */}
        {area&&<path d={area} fill={color} fillOpacity={0.08}/>}
        {/* Line */}
        <path d={path} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round" strokeLinecap="round"/>
        {/* Dots on valid points — only show every ~5th to avoid clutter */}
        {validPts.filter((_,i)=>i===0||i===validPts.length-1||i%5===0).map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={2.5} fill={color} opacity={0.9}/>
        ))}
      </svg>
      {/* X axis labels: show every 5th day */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        {data.filter((_,i)=>i===0||i===14||i===29).map((d,i)=>(
          <span key={i} style={{fontSize:8,color:theme.textDim}}>{d.label}</span>
        ))}
      </div>
    </div>
  );
}

// ── POMODORO ───────────────────────────────────────────────────────────────
function PomodoroModal({onClose,onDone,pomSetts={},savePomSetts}) {
  const theme = useContext(ThemeContext);
  const media = useContext(MediaContext);
  const [showPlaylistEdit,setShowPlaylistEdit]=useState(false);
  const DURS=[{l:"25 phút",s:1500},{l:"50 phút",s:3000},{l:"10 phút",s:600}];
  const [di,setDi]=useState(0); const [secs,setSecs]=useState(1500);
  const [running,setRunning]=useState(false); const [done,setDone]=useState(false);
  const [taskId,setTaskId]=useState(""); const ref=useRef(null);

  // H-2: interval is created only when running flips to true, NOT on every secs change.
  // setSecs uses functional updater so the callback never captures stale secs.
  useEffect(()=>{
    if(!running) return;
    ref.current=setInterval(()=>{
      setSecs(s=>{
        if(s<=1){
          clearInterval(ref.current);
          // schedule state updates outside the updater to avoid batching issues
          setTimeout(()=>{ setRunning(false); setDone(true); }, 0);
          return 0;
        }
        return s-1;
      });
    },1000);
    return()=>{ clearInterval(ref.current); ref.current=null; };
  },[running]);
  const sel=i=>{setDi(i);setSecs(DURS[i].s);setRunning(false);setDone(false);};
  const reset=()=>{clearInterval(ref.current);setSecs(DURS[di].s);setRunning(false);setDone(false);};
  const pct=1-(secs/DURS[di].s); const r=60,circ=2*Math.PI*r;
  return(
    <ModalPortal>
    <div className="gb-modal-backdrop-fade" style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="gb-modal-fade-scale" style={{...modalBgStyle(theme, media?.settings?.modalBg),border:`1px solid ${theme.border}`,borderRadius:12,padding:26,width:"100%",maxWidth:340}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:700}}>🍅 Pomodoro</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:theme.textDim,fontSize:20,cursor:"pointer"}}>×</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {DURS.map((d,i)=><button key={i} onClick={()=>sel(i)} style={{flex:1,padding:"6px 0",borderRadius:7,border:`1px solid ${di===i?theme.primary:theme.neutral}`,background:di===i?theme.tertiary:theme.neutral+"22",color:di===i?theme.primary:theme.textDim,fontSize:11,cursor:"pointer"}}>{d.l}</button>)}
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          <svg width={150} height={150}>
            <circle cx={75} cy={75} r={r} fill="none" stroke={theme.border} strokeWidth={8}/>
            <circle cx={75} cy={75} r={r} fill="none" stroke={done?theme.success:theme.accent} strokeWidth={8}
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform="rotate(-90 75 75)" style={{transition:"stroke-dashoffset .5s"}}/>
            <text x={75} y={80} textAnchor="middle" fill={done?theme.success:theme.text} fontSize={24} fontWeight={700}>{done?"✓":fmtHM(secs)}</text>
          </svg>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <button onClick={()=>setRunning(r=>!r)} style={{flex:1,padding:"11px 0",borderRadius:999,border:"none",background:theme.accent,color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>{running?"⏸":"▶"}</button>
          <button onClick={reset} style={{padding:"11px 16px",borderRadius:999,border:`1px solid ${theme.border}`,background:theme.border,color:theme.textDim,cursor:"pointer"}}>↺</button>
        </div>
        {/* Playlist links */}
        <div style={{marginBottom:12,borderTop:`1px solid ${theme.border}`,paddingTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:700,color:theme.textDim,textTransform:"uppercase",letterSpacing:1}}>🎵 Playlist học</div>
            <button onClick={()=>setShowPlaylistEdit(p=>!p)} style={{background:"none",border:"none",color:theme.textDim,fontSize:10,cursor:"pointer"}}>{showPlaylistEdit?"Đóng":"Chỉnh sửa"}</button>
          </div>
          {showPlaylistEdit?(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {Object.entries({math:"📐 Toán",physics:"⚡ Lý",chem:"🧪 Hóa",lit:"📝 Văn"}).map(([k,l])=>(
                <div key={k} style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:10,color:theme.textDim,width:50,flexShrink:0}}>{l}</span>
                  <input defaultValue={pomSetts[k]||""} onBlur={e=>savePomSetts&&savePomSetts({...pomSetts,[k]:e.target.value.trim()})} placeholder="Link YouTube/Spotify..." style={{flex:1,background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:5,padding:"5px 7px",color:theme.text,fontSize:10,outline:"none"}}/>
                </div>
              ))}
            </div>
          ):(
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {Object.entries({math:"📐 Toán",physics:"⚡ Lý",chem:"🧪 Hóa",lit:"📝 Văn"}).map(([k,l])=>{
                const link=pomSetts[k]||"";
                return link?(
                  <a key={k} href={link} target="_blank" rel="noreferrer" style={{padding:"4px 10px",borderRadius:6,background:`${theme.accent}26`,border:`1px solid ${theme.accent}33`,color:theme.accent,fontSize:10,textDecoration:"none"}}>{l}</a>
                ):null;
              })}
              {!Object.values(pomSetts).some(Boolean)&&<span style={{fontSize:10,color:theme.textDim}}>Chưa có link — bấm Chỉnh sửa</span>}
            </div>
          )}
        </div>
        {done&&(
          <div>
            <div style={{fontSize:11,color:theme.textDim,marginBottom:8}}>Tick task nào?</div>
            <select value={taskId} onChange={e=>setTaskId(e.target.value)} style={{width:"100%",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:14,padding:"8px 10px",color:theme.text,fontSize:12,marginBottom:10,outline:"none"}}>
              <option value="">— Không —</option>
              {TASKS.filter(t=>t.c==="Học").map(t=><option key={t.id} value={t.id}>{t.i} {t.l}</option>)}
            </select>
            <button onClick={()=>{onDone(taskId);onClose();}} style={{width:"100%",padding:"9px 0",borderRadius:8,border:"none",background:theme.success,color:"#000",fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ Xong phiên học!</button>
          </div>
        )}
      </div>
    </div>
    </ModalPortal>
  );
}

                ))}
              </div>
            </div>
          )}
        </div>
      );})}
    </div>
  );
}

function AiRoleSection() {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [promptModalOpen, setPromptModalOpen] = useState(false);
  const [copiedIdx, setCopiedIdx] = useState(null);

  const copyPrompt = async (text, idx) => {
    try {
      if (navigator?.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
      }
      setCopiedIdx(idx);
      setTimeout(()=>setCopiedIdx(null), 1500);
    } catch {}
  };

    <div style={{ marginBottom:18 }}>

// ── HALL OF FAME ───────────────────────────────────────────────────────────
function HallOfFame({db,dayExp,str}) {
  const theme = useContext(ThemeContext);
  const records = [];
  let maxXP=0,maxXPDate="",maxStudy=0,maxStudyDate="",minPhone=Infinity,minPhoneDate="";
  Object.keys(db).forEach(iso=>{
    const d=db[iso]; const e=dayExp(iso);
    if(e>maxXP){maxXP=e;maxXPDate=iso;}
    if((d.studyTime||0)>maxStudy){maxStudy=d.studyTime;maxStudyDate=iso;}
    if(d.phone>0&&d.phone<minPhone){minPhone=d.phone;minPhoneDate=iso;}
  });
  if(maxXPDate) records.push({icon:"⭐",label:"XP cao nhất",val:`${maxXP} XP`,date:maxXPDate,c:theme.warning});
  if(maxStudyDate) records.push({icon:"📚",label:"Học nhiều nhất",val:`${Math.floor((maxStudy/60)/60)}h${Math.floor(maxStudy/60)%60>0?` ${Math.floor(maxStudy/60)%60}m`:""}`,date:maxStudyDate,c:theme.success});
  if(minPhoneDate&&minPhone<Infinity) records.push({icon:"📵",label:"Phone ít nhất",val:`${Math.floor(minPhone/60)}h${minPhone%60>0?` ${minPhone%60}m`:""}`,date:minPhoneDate,c:theme.accent});
  if(str>0) records.push({icon:"🔥",label:"Chuỗi hiện tại",val:`${str} ngày`,date:"",c:"#fb923c"});
  if(!records.length) return null;
  return (
    <div style={{background:`linear-gradient(135deg,${theme.warning}14,${theme.secondary}14)`,border:`1px solid ${theme.warning}33`,borderRadius:16,padding:14,marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:600,color:theme.warning,marginBottom:12}}>🏆 Hall of Fame</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {records.map((r,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,.2)",borderRadius:14,padding:"10px 12px"}}>
            <div style={{fontSize:20,marginBottom:4}}>{r.icon}</div>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:2}}>{r.label}</div>
            <div style={{fontSize:16,fontWeight:700,color:r.c}}>{r.val}</div>
            {r.date&&<div style={{fontSize:8,color:theme.textDim,marginTop:2}}>{new Date(r.date+"T00:00:00").toLocaleDateString("vi-VN",{day:"numeric",month:"numeric",year:"numeric"})}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// Biến danh sách item của Kho Kiến Thức thành cây quan hệ trực quan.

//   - Item không có parentId → là con trực tiếp của nhánh tag của nó.
//   - Item có parentId → là con của item cha (nếu cha tồn tại), bất kể tag khác nhau.
//   - Chỉ hiện tag nào có ít nhất 1 item, để đỡ rối.
function buildKnowledgeTree(items) {
  const byId = {}; items.forEach(it=>{ byId[it.id]=it; });
  const childrenOf = {}; // parentKey -> [item]
  const usedTags = new Set();
  items.forEach(it=>{
    let parentKey;
    if(it.parentId && byId[it.parentId] && it.parentId!==it.id){
      parentKey = "item:"+it.parentId;
    } else {
      parentKey = "tag:"+(it.tag||"Khác");
      usedTags.add(it.tag||"Khác");
    }
    if(!childrenOf[parentKey]) childrenOf[parentKey]=[];
    childrenOf[parentKey].push(it);
  });
  const buildNode = (key,label,color,depth,it)=>{
    const kids = (childrenOf[key]||[]).map(child=>buildNode("item:"+child.id, child.title, KB_TAG_C[child.tag]||color, depth+1, child));
    return { key, label, color, depth, item:it||null, children:kids };
  };
  const tagNodes = [...usedTags].map(tag=>buildNode("tag:"+tag, tag, KB_TAG_C[tag]||"#8892A8", 0, null));
  return { key:"root", label:"Kho Kiến Thức", color:"#34d399", depth:-1, item:null, children:tagNodes };
}

// Radial layout: đặt node theo vòng tròn quanh root, mỗi tầng bán kính lớn hơn.
function layoutRadial(root) {
  const positions = [];
  const countLeaves = node => node.children.length===0 ? 1 : node.children.reduce((s,c)=>s+countLeaves(c),0);
  const place = (node,angleStart,angleEnd,radius) => {
    const angle = (angleStart+angleEnd)/2;
    const x = radius*Math.cos(angle), y = radius*Math.sin(angle);
    if(node.depth>=0) positions.push({...node,x,y,angle});
    if(node.children.length){
      const totalLeaves = countLeaves(node);
      let cursor = angleStart;
      const nextRadius = radius + (node.depth===-1?90:70);
      node.children.forEach(child=>{
        const share = countLeaves(child)/totalLeaves;
        const span = (angleEnd-angleStart)*share;
        place(child,cursor,cursor+span,nextRadius);
        cursor += span;
      });
    }
  };
  place(root,0,Math.PI*2,0);
  return positions;
}

function KnowledgeGraph({items,onOpenItem}) {
  const theme = useContext(ThemeContext);
  const [search,setSearch]=useState("");
  const [tagFilter,setTagFilter]=useState("Tất cả");
  const [scale,setScale]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const dragRef = useRef(null); // {startX,startY,panX,panY}

  const filteredItems = useMemo(()=>{
    const q = search.trim().toLowerCase();
    return items.filter(it=>{
      const matchTag = tagFilter==="Tất cả"||it.tag===tagFilter;
      const matchSearch = !q || (it.title+" "+(it.content||"")).toLowerCase().includes(q);
      return matchTag && matchSearch;
    });
  },[items,search,tagFilter]);

  const tree = useMemo(()=>buildKnowledgeTree(filteredItems),[filteredItems]);
  const nodes = useMemo(()=>layoutRadial(tree),[tree]);
  // PERF (MỤC 9): trước đây tìm node cha bằng nodes.find(...) BÊN TRONG
  // nodes.map(...) khi vẽ edges — với N node là O(N²). Với danh sách kiến
  // thức lớn dần theo thời gian, đây có thể gây giật khi vẽ lại Graph.
  // Dùng map tra cứu theo key (O(1)) và theo tagRoot label, tính 1 lần.
  const nodeByKey = useMemo(()=>{
    const m = new Map();
    nodes.forEach(n=>m.set(n.key,n));
    return m;
  },[nodes]);
  const tagRootByLabel = useMemo(()=>{
    const m = new Map();
    nodes.forEach(n=>{ if(n.depth===0) m.set(n.label,n); });
    return m;
  },[nodes]);

  const VIEW = 320; // viewBox half-size (đủ nhỏ để vừa 360px màn hình, zoom bù phần còn lại)
  const center = VIEW;

  const onWheel = e=>{
    e.preventDefault();
    const delta = e.deltaY>0 ? -0.1 : 0.1;
    setScale(s=>Math.min(2.5,Math.max(0.4,s+delta)));
  };
  const onPointerDown = e=>{
    dragRef.current = {startX:e.clientX,startY:e.clientY,panX:pan.x,panY:pan.y};
  };
  const onPointerMove = e=>{
    if(!dragRef.current) return;
    const dx = e.clientX-dragRef.current.startX, dy = e.clientY-dragRef.current.startY;
    setPan({x:dragRef.current.panX+dx, y:dragRef.current.panY+dy});
  };
  const onPointerUp = ()=>{ dragRef.current=null; };
  const resetView = ()=>{ setScale(1); setPan({x:0,y:0}); };

  if(items.length===0){
    return (
      <div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"40px 0"}}>
        Chưa có ghi chú nào để dựng Graph — thêm ghi chú ở tab Danh sách trước 📝
      </div>
    );
  }

  return (
    <div>
      {/* Search + Filter cho Graph */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Tìm node..." style={{flex:1,background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 12px",color:theme.text,fontSize:11,outline:"none"}}/>
        <button onClick={resetView} style={{padding:"0 12px",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,color:theme.textDim,fontSize:11,cursor:"pointer"}}>⟲ Reset</button>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
        {["Tất cả",...KB_TAGS].map(t=>(
          <button key={t} onClick={()=>setTagFilter(t)} style={{padding:"4px 10px",borderRadius:999,border:`1px solid ${tagFilter===t?(KB_TAG_C[t]||theme.accent):theme.border}`,background:tagFilter===t?`${KB_TAG_C[t]||theme.accent}22`:"transparent",color:tagFilter===t?(KB_TAG_C[t]||theme.accent):theme.textDim,fontSize:9,cursor:"pointer"}}>{t}</button>
        ))}
      </div>

      {/* Canvas Graph — kéo để pan, cuộn chuột để zoom */}
      <div
        style={{position:"relative",width:"100%",aspectRatio:"1/1",background:theme.surfaceAlt,borderRadius:14,overflow:"hidden",touchAction:"none",cursor:dragRef.current?"grabbing":"grab"}}
        onWheel={onWheel}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerLeave={onPointerUp}
      >
        <svg viewBox={`0 0 ${VIEW*2} ${VIEW*2}`} width="100%" height="100%">
          <g transform={`translate(${center+pan.x},${center+pan.y}) scale(${scale})`} style={{transition:dragRef.current?"none":"transform 0.15s cubic-bezier(0.4,0,0.2,1)"}}>
            {/* Root node */}
            <circle cx={0} cy={0} r={14} fill={theme.success} opacity={0.9}/>
            <text x={0} y={-20} textAnchor="middle" fontSize={11} fill={theme.text} fontWeight={700}>📚</text>
            {/* Edges: mỗi node nối với node cha (item cha thật, hoặc gốc theo tag nếu không có cha) */}
            {nodes.map(n=>{
              if(n.depth===0){
                return <line key={"e-"+n.key} x1={0} y1={0} x2={n.x} y2={n.y} stroke={n.color} strokeWidth={1.5} opacity={0.45}/>;
              }
              // tìm cha: node có key khớp parentId hoặc tag (O(1) qua Map thay vì nodes.find O(N))
              const parentKey = n.item?.parentId ? "item:"+n.item.parentId : null;
              const parentNode = parentKey ? nodeByKey.get(parentKey) : tagRootByLabel.get(n.item?.tag||"");
              if(!parentNode) return null;
              return <line key={"e-"+n.key} x1={parentNode.x} y1={parentNode.y} x2={n.x} y2={n.y} stroke={n.color} strokeWidth={1.2} opacity={0.35}/>;
            })}
            {/* Nodes */}
            {nodes.map(n=>{
              const isTagRoot = n.depth===0;
              const r = isTagRoot ? 9 : 6;
              return (
                <g key={n.key} onClick={()=>{ if(n.item) onOpenItem(n.item.id); }} style={{cursor:n.item?"pointer":"default"}}>
                  <circle cx={n.x} cy={n.y} r={r} fill={n.color} opacity={isTagRoot?0.9:0.75} stroke={theme.surface} strokeWidth={1.5}/>
                  <text x={n.x} y={n.y+r+9} textAnchor="middle" fontSize={isTagRoot?9:7.5} fill={theme.text} fontWeight={isTagRoot?700:400} style={{pointerEvents:"none"}}>
                    {n.label.length>12 ? n.label.slice(0,11)+"…" : n.label}
                  </text>
                </g>
              );
            })}
          </g>
        </svg>
      </div>
      <div style={{fontSize:9,color:theme.textDim,textAlign:"center",marginTop:6}}>Kéo để di chuyển · Cuộn chuột để zoom · Chạm vào node để mở ghi chú</div>
    </div>
  );
}

  const [viewMode,setViewMode]=useState("list"); // list | graph — MỤC 5: Knowledge Graph
  // P-06: inline confirm for KB delete
  const [kbConfirm,setKbConfirm]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("kb:items");if(r)setItems(JSON.parse(r));}catch{}
    })();

  const saveItems=async arr=>{try{await S.set("kb:items",JSON.stringify(arr));}catch{} setItems(arr);};

  const toggleFav=(id,e)=>{
    e?.stopPropagation();
    saveItems(items.map(x=>x.id===id?{...x,favorite:!x.favorite}:x));
