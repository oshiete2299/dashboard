    if (/^https?:\/\//i.test(url)) {
      const { blobUrl } = await fetchAsBlobUrl(url);
      if (!blobUrl) { coverArtCache.set(data, null); return null; }
      const blobRes = await fetch(blobUrl);
      source = await blobRes.blob();
    }

    const picture = await new Promise((resolve) => {
      // Timeout thủ công: 1 số file lỗi/quá lớn có thể khiến jsmediatags treo.
      const timer = setTimeout(() => resolve(null), 8000);
      try {
        window.jsmediatags.read(source, {
          onSuccess: (tag) => {
            clearTimeout(timer);
            resolve(tag?.tags?.picture || null);
          },
          onError: () => { clearTimeout(timer); resolve(null); },
        });
      } catch { clearTimeout(timer); resolve(null); }
    });

    if (!picture || !picture.data || !picture.data.length) {
      coverArtCache.set(data, null);
      return null;
    }

    const bytes = new Uint8Array(picture.data);
    const blob = new Blob([bytes], { type: picture.format || "image/jpeg" });
    const blobUrl = URL.createObjectURL(blob);
    coverArtCache.set(data, blobUrl);
    return blobUrl;
  } catch {
    coverArtCache.set(data, null);
    return null;
  }
}

// ── FILE UPLOAD → BASE64 (né hoàn toàn CORS vì không có request mạng nào) ──
// Đọc file người dùng chọn (từ máy) và convert sang data: URL (Base64) ngay
// trong trình duyệt bằng FileReader — không cần internet, không cần proxy,
// không có khái niệm CORS ở đây vì file đã nằm sẵn trên máy người dùng.
// Giới hạn nhẹ để tránh làm app quá nặng / vượt giới hạn localStorage.
const MAX_UPLOAD_BYTES = 8 * 1024 * 1024; // 8MB — đủ cho hầu hết clip nhạc/SFX ngắn

function formatBytes(n) {
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
  return `${(n / (1024 * 1024)).toFixed(1)} MB`;
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    if (!file) { reject(new Error("no-file")); return; }
    if (file.size > MAX_UPLOAD_BYTES) {
      reject(new Error(`too-large:${formatBytes(file.size)}`));
      return;
    }
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // đã là data:...;base64,... sẵn
    reader.onerror = () => reject(new Error("read-failed"));
    reader.readAsDataURL(file);
  });
}


const defaultMediaSettings = () => ({
  logo: "",
  background: "",
  backgroundOpacity: 40,
  headers: {},          // {[tabIndex]: base64}
  modalBg: "",          // ảnh nền chung cho Pomodoro/Reset/Weekly Review modals
  bgm: "",
  bgmName: "",
  tabMusic: {},          // {[tabIndex]: base64} nhạc theo tab, ghi đè BGM khi ở tab đó
  eventMusic: {},         // {levelup, bosswin, capsule} → base64, phát 1 lần khi sự kiện xảy ra
  playlist: [],           // [{name, data}]
  currentTrack: -1,       // index trong playlist đang phát, -1 = đang phát bgm gốc
  sfx: {},                // {[name]: base64}
  volume: { bgm: 30, sfx: 50 },
  isPlaying: false,
  muted: false,
});

// Hook quản lý toàn bộ Media Settings: load/save qua S (window.storage),
// điều khiển phát BGM/playlist, và expose playEventMusic cho level up / boss
// win / mở capsule. Được gọi 1 lần duy nhất ở App và truyền xuống qua
// MediaContext để mọi component con dùng chung 1 nguồn sự thật.
function useMediaSettings() {
  const [settings, setSettings] = useState(null);
  const bgmAudioRef = useRef(null);
  // Blob URL hiện đang dùng cho BGM (nếu có) — cần revoke khi đổi bài / unmount
  // để tránh rò rỉ bộ nhớ (mỗi blob: URL giữ nguyên data trong RAM cho tới khi
  // revoke rõ ràng).
  const bgmBlobUrlRef = useRef(null);
  // Token tăng dần mỗi lần playBGM được gọi — dùng để huỷ kết quả fetch cũ nếu
  // người dùng đổi bài / bấm Test liên tục trước khi fetch trước xong.
  const bgmLoadTokenRef = useRef(0);
  // Thông báo lỗi phát nhạc gần nhất (vd link Drive chưa public, CORS...).
  // Modal đọc giá trị này để hiện hướng dẫn cho người dùng.
  const [playbackError, setPlaybackError] = useState(null);
  // Trạng thái tải nhạc: { loading, progress (0-100), url, name } — dùng để
  // hiện "⏳ Đang tải nhạc..." + thanh progress trong Modal.
  const [bgmLoadState, setBgmLoadState] = useState({ loading: false, progress: 0 });

  useEffect(() => {
    let cancelled = false;
    (async () => {
      let loaded = defaultMediaSettings();
      try {
        const raw = await S.get(MEDIA_KEY);
        if (raw && raw !== "null") loaded = { ...defaultMediaSettings(), ...JSON.parse(raw) };
      } catch {}
      if (!cancelled) setSettings(loaded);
    })();
    return () => { cancelled = true; };
  }, []);

  // Giữ ref module-level đồng bộ cho playSound() toàn cục dùng SFX
  useEffect(() => { setMediaSettingsRef(settings); }, [settings]);

  const persist = useCallback(async (next) => {
    try { await S.set(MEDIA_KEY, JSON.stringify(next)); } catch {}
  }, []);

  // patch: cập nhật + lưu ngay. functional-updater để tránh stale closure
  // khi nhiều field được sửa liên tiếp (vd headers theo từng tab).
  const save = useCallback((patch) => {
    setSettings(prev => {
      const base = prev || defaultMediaSettings();
      const next = typeof patch === "function" ? patch(base) : { ...base, ...patch };
      persist(next);
      return next;
    });
  }, [persist]);

  const resolveVolume = useCallback((kind) => {
    if (settings?.muted) return 0;
    return (settings?.volume?.[kind] ?? (kind === "bgm" ? 30 : 50)) / 100;
  }, [settings]);

  // Phát BGM chính (hoặc bài trong playlist nếu trackIndex hợp lệ).
  // Chấp nhận cả URL (http/https) lẫn Base64 (data:...). Với URL Google
  // Drive dạng chia sẻ, tự đổi sang direct-download link qua resolveMediaUrl.
  //
  // Cơ chế: fetch() trước để tải về dạng blob rồi mới phát (né CORS của
  // <audio src="URL"> trên nhiều host). Nếu URL gốc bị chặn CORS/network,
  // fetchAsBlobUrl tự thử lần lượt qua 2 proxy dự phòng (corsproxy.io,
  // allorigins.win) trước khi báo lỗi. Nếu tất cả đều fail, fallback cuối
  // cùng là new Audio(url) thẳng (vẫn ăn với link localhost/same-origin).
  const playBGM = useCallback(async (data, name) => {
    if (!data) return;
    setPlaybackError(null);
    const url = resolveMediaUrl(data);
    const myToken = ++bgmLoadTokenRef.current;

    // Dọn audio + blob URL cũ trước khi tải bài mới.
    if (bgmAudioRef.current) { bgmAudioRef.current.pause(); bgmAudioRef.current = null; }
    if (bgmBlobUrlRef.current) { try { URL.revokeObjectURL(bgmBlobUrlRef.current); } catch {} bgmBlobUrlRef.current = null; }

    setBgmLoadState({ loading: true, progress: 0, url, name, stage: "direct" });

    const startPlayback = (playUrl, viaBlobUrl, fetchError) => {
      if (myToken !== bgmLoadTokenRef.current) return; // đã bị huỷ bởi 1 lần gọi playBGM mới hơn
      try {
        const audio = new Audio(playUrl);
        audio.loop = true;
        audio.volume = resolveVolume("bgm");
        audio.onerror = () => {
          if (myToken !== bgmLoadTokenRef.current) return;
          setPlaybackError(describeMediaFetchError(fetchError || "cors-or-network", url));
          setBgmLoadState({ loading: false, progress: 0 });
          save({ isPlaying: false });
        };
        audio.play().then(() => {
          if (myToken !== bgmLoadTokenRef.current) return;
          setPlaybackError(null);
        }).catch(() => {
          // Autoplay bị chặn do chưa có tương tác trực tiếp — không phải lỗi
          // link, chỉ cần bấm Play/Test lại 1 lần. Không báo lỗi ở đây.
          if (myToken !== bgmLoadTokenRef.current) return;
          save({ isPlaying: false });
        });
        bgmAudioRef.current = audio;
        if (viaBlobUrl) bgmBlobUrlRef.current = playUrl;
        setBgmLoadState({ loading: false, progress: 100 });
        save(s => ({ ...s, isPlaying: true, bgmName: name ?? s.bgmName }));
      } catch {
        if (myToken !== bgmLoadTokenRef.current) return;
        setPlaybackError("Link nhạc không hợp lệ.");
        setBgmLoadState({ loading: false, progress: 0 });
      }
    };

    const { blobUrl, error, viaProxy, proxyIndex } = await fetchAsBlobUrl(
      url,
      (pct) => {
        if (myToken !== bgmLoadTokenRef.current) return;
        setBgmLoadState(prev => ({ ...prev, loading: true, progress: pct, url, name }));
      },
      (stage) => {
        if (myToken !== bgmLoadTokenRef.current) return;
        setBgmLoadState(prev => ({ ...prev, loading: true, progress: 0, url, name, stage }));
      }
    );

    if (myToken !== bgmLoadTokenRef.current) return; // 1 lần gọi mới hơn đã bắt đầu

    if (blobUrl) {
      startPlayback(blobUrl, true, null);
      return;
    }

    // Fetch trực tiếp + cả 2 proxy đều fail → fallback cuối: thử phát thẳng
    // từ URL gốc (đúng như cơ chế cũ). Nếu đây cũng lỗi, audio.onerror phía
    // trên sẽ báo đúng mã lỗi thật (404/403/CORS/timeout) từ lần fetch cuối.
    startPlayback(url, false, error);
  }, [resolveVolume, save]);

  const stopBGM = useCallback(() => {
    bgmLoadTokenRef.current++; // huỷ mọi fetch đang chạy dở
    if (bgmAudioRef.current) { bgmAudioRef.current.pause(); bgmAudioRef.current = null; }
    if (bgmBlobUrlRef.current) { try { URL.revokeObjectURL(bgmBlobUrlRef.current); } catch {} bgmBlobUrlRef.current = null; }
    setBgmLoadState({ loading: false, progress: 0, stage: null });
    save({ isPlaying: false });
  }, [save]);

  // Thử lại: phát lại đúng bài đang bị lỗi (dùng lastAttempt trong bgmLoadState).
  const retryBGM = useCallback(() => {
    const { url, name } = bgmLoadState;
    if (url) playBGM(url, name);
  }, [bgmLoadState, playBGM]);

  // Dọn blob URL khi unmount để tránh rò rỉ bộ nhớ.
  useEffect(() => () => {
    if (bgmBlobUrlRef.current) { try { URL.revokeObjectURL(bgmBlobUrlRef.current); } catch {} }
  }, []);

  const toggleBGM = useCallback(() => {
    if (!settings) return;
    if (bgmAudioRef.current && !bgmAudioRef.current.paused) {
      bgmAudioRef.current.pause();
      save({ isPlaying: false });
    } else if (bgmAudioRef.current) {
      bgmAudioRef.current.play().catch(()=>{});
      save({ isPlaying: true });
    } else {
      const track = settings.currentTrack >= 0 ? settings.playlist?.[settings.currentTrack] : null;
      playBGM(track ? track.data : settings.bgm, track ? track.name : settings.bgmName);
    }
  }, [settings, playBGM, save]);

  const playTrackAt = useCallback((idx) => {
    if (!settings) return;
    const track = settings.playlist?.[idx];
    if (!track) return;
    save({ currentTrack: idx });
    playBGM(track.data, track.name);
  }, [settings, playBGM, save]);

  const nextTrack = useCallback(() => {
    if (!settings?.playlist?.length) return;
    const idx = (settings.currentTrack + 1 + settings.playlist.length) % settings.playlist.length;
    playTrackAt(idx);
  }, [settings, playTrackAt]);

  const prevTrack = useCallback(() => {
    if (!settings?.playlist?.length) return;
    const idx = (settings.currentTrack - 1 + settings.playlist.length) % settings.playlist.length;
    playTrackAt(idx);
  }, [settings, playTrackAt]);

  // Khi đổi volume trong lúc đang phát, áp ngay không cần restart audio
  useEffect(() => {
    if (bgmAudioRef.current) bgmAudioRef.current.volume = resolveVolume("bgm");
  }, [settings?.volume?.bgm, settings?.muted, resolveVolume]);

  // Nhạc theo tab: gọi từ App mỗi khi đổi tab. Nếu tab có tabMusic riêng thì
  // phát bài đó (ghi đè BGM); nếu không, quay lại BGM gốc/playlist hiện tại.
  const playForTab = useCallback((tabIndex) => {
    if (!settings) return;
    const tabTrack = settings.tabMusic?.[tabIndex];
    if (tabTrack) { playBGM(tabTrack, `Tab: ${TABS[tabIndex] || tabIndex}`); return; }
    const track = settings.currentTrack >= 0 ? settings.playlist?.[settings.currentTrack] : null;
    if (track) playBGM(track.data, track.name);
    else if (settings.bgm) playBGM(settings.bgm, settings.bgmName);
  }, [settings, playBGM]);

  const playSFX = useCallback(async (name) => {
    const data = settings?.sfx?.[name];
    if (data) {
      const url = resolveMediaUrl(data);
      try {
        // SFX cần phát nhanh/gọn nên không có loading UI riêng — nhưng vẫn áp
        // dụng fetch-as-blob trước để né CORS giống BGM. Base64 trả về ngay
        // (không tốn thời gian fetch mạng).
        const { blobUrl } = await fetchAsBlobUrl(url);
        const audio = new Audio(blobUrl || url); // fallback: phát thẳng URL gốc nếu fetch lỗi
        audio.volume = resolveVolume("sfx");
        audio.play().catch(()=>{});
        if (blobUrl && blobUrl.startsWith("blob:")) {
          audio.onended = () => { try { URL.revokeObjectURL(blobUrl); } catch {} };
        }
        return;
      } catch {}
    }
    if (SOUNDS[name]) { try { SOUNDS[name](); } catch {} }
  }, [settings, resolveVolume]);

  const resetDefaults = useCallback(() => {
    stopBGM();
    const fresh = defaultMediaSettings();
    setSettings(fresh);
    persist(fresh);
  }, [stopBGM, persist]);

  // BUGFIX: object trả về PHẢI được memo hoá. Trước đây đây là 1 object
  // literal mới mỗi lần useMediaSettings() chạy lại — tức là mỗi lần App
  // re-render (kể cả do chuyển tab, gõ chữ ở form khác, timer Pomodoro
  // tick...) thì `media` có identity mới → MediaContext.Provider phát value
  // mới → MỌI component dùng useContext(MediaContext) (Hdr, ResetModal,
  // WeeklyReviewModal, PomodoroModal, MusicPlayer) bị buộc re-render theo,
  // dù dữ liệu media không hề đổi. Với 1 app 12k dòng, hiệu ứng dây chuyền
  // này gây đơ/đứng hình ngẫu nhiên khi thao tác nhanh (chuyển tab liên
  // tục...). useMemo đảm bảo object chỉ đổi khi 1 trong các hàm/settings
  // bên trong thực sự đổi identity.
  // bgmAudioRef: expose thẳng ref (không phải giá trị) để MusicPlayer đọc
  // currentTime/duration mỗi frame (qua rAF/interval riêng trong component,
  // không qua re-render) và gọi seek (audio.currentTime = x) khi kéo progress
  // bar. Ref là 1 object cố định identity suốt vòng đời hook nên đưa vào đây
  // KHÔNG phá vỡ memo hoá phía trên (object.current đổi nhưng ref thì không).
  return useMemo(() => ({
    settings, save, playBGM, stopBGM, toggleBGM, playTrackAt, nextTrack, prevTrack,
    playForTab, playEventMusic, playSFX, resetDefaults, playbackError, retryBGM, bgmLoadState,
    bgmAudioRef,
    clearPlaybackError: () => setPlaybackError(null),
  }), [settings, save, playBGM, stopBGM, toggleBGM, playTrackAt, nextTrack, prevTrack,
      playForTab, playEventMusic, playSFX, resetDefaults, playbackError, retryBGM, bgmLoadState]);
}
// eventAudioRef bên trong hook không còn dùng (đã chuyển playEventMusic ra
// module-level để component sâu trong cây gọi được), giữ playEventMusic
// module-level làm alias để giữ API của object trả về không đổi.

// Trả về style ảnh nền cho modal (Pomodoro/Reset/Weekly Review), phủ 1 lớp
// màu theme mờ lên trên ảnh để chữ vẫn đọc được rõ. Nếu chưa set ảnh, trả về
// background màu theme gốc như cũ — không đổi giao diện mặc định.
function modalBgStyle(theme, modalBg) {
  if (!modalBg) return { background: theme.surface };
  return {
    backgroundImage: `linear-gradient(${theme.surface}E6,${theme.surface}E6), url(${modalBg})`,
    backgroundSize: "cover",
    backgroundPosition: "center",
  };
}

// Nút "📁 Tải file lên" dùng chung: mở file picker hệ thống, đọc file đã
// chọn thành Base64 (không qua mạng → không CORS), rồi gọi onLoaded(dataUrl,
// fileName). accept mặc định giới hạn theo audio, có thể override cho ảnh.
function FileUploadButton({ onLoaded, accept = "audio/*", theme, accent, label = "📁 Tải file lên" }) {
  const inputRef = useRef(null);
  const [state, setState] = useState({ loading: false, error: null });

  const handleChange = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // cho phép chọn lại đúng file đó lần sau nếu cần
    if (!file) return;
    setState({ loading: true, error: null });
    try {
      const dataUrl = await readFileAsBase64(file);
      setState({ loading: false, error: null });
      onLoaded(dataUrl, file.name);
    } catch (err) {
      const msg = String(err && err.message || "");
      let text = "Không đọc được file. Thử lại hoặc chọn file khác.";
      if (msg.startsWith("too-large:")) {
        text = `File quá nặng (${msg.split(":")[1]}). Giới hạn ${formatBytes(MAX_UPLOAD_BYTES)} mỗi mục.`;
      }
      setState({ loading: false, error: text });
    }
  };

  return (
    <div style={{display:"inline-flex",flexDirection:"column",gap:3}}>
      <input ref={inputRef} type="file" accept={accept} onChange={handleChange} style={{display:"none"}}/>
      <button type="button" onClick={()=>inputRef.current && inputRef.current.click()} disabled={state.loading}
        style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${theme.border}`,background:"transparent",color:accent,fontSize:10,cursor:state.loading?"default":"pointer",whiteSpace:"nowrap"}}>
        {state.loading ? "⏳ Đang đọc..." : label}
      </button>
      {state.error && <div style={{fontSize:9,color:theme.danger,maxWidth:160,lineHeight:1.4}}>{state.error}</div>}
    </div>
  );
}

function MediaField({label, value, placeholder, onChange, rows=2, theme, extra, accent, onFileLoaded, uploadAccept}) {
  return (
    <div style={{marginBottom:6}}>
      {label && <div style={{fontSize:10,color:theme.textDim,marginBottom:3}}>{label}</div>}
      <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
        <textarea value={value||""} onChange={e=>onChange(e.target.value)}
          placeholder={placeholder} rows={rows}
          style={{flex:1,minWidth:0,boxSizing:"border-box",fontSize:10,padding:6,borderRadius:8,border:`1px solid ${theme.border}`,background:theme.bg,color:theme.text,resize:"vertical",fontFamily:"monospace"}}/>
        {onFileLoaded && (
          <FileUploadButton theme={theme} accent={accent} accept={uploadAccept}
            onLoaded={(dataUrl, fileName)=>onFileLoaded(dataUrl, fileName)}/>
        )}
      </div>
      {extra}
    </div>
  );
}

// ── MusicPlayer ──────────────────────────────────────────────────────────
// Thay thế AudioPlayer cũ. 2 trạng thái:
//   - Thu gọn: thanh ngang nhỏ góc trái dưới — ảnh bìa tròn quay chậm khi
//     đang phát + tên bài 1 dòng + nút play/pause.
//   - Mở rộng: bấm vào thanh thu gọn → phình thành "viên thuốc" (capsule)
//     dọc — ảnh bìa to xoay liên tục khi phát, tên bài + nghệ sĩ, progress
//     bar kéo được (seek), thời gian đã phát/tổng, play/pause/next/prev/volume,
//     nút đóng quay lại trạng thái thu gọn.
// Ảnh bìa: đọc ID3 cover art thật qua fetchCoverArt() (jsmediatags), có cache
// theo bài; trong lúc đang tải hoặc khi thất bại → DEFAULT_COVER_ART (đĩa
// nhạc SVG tím/đen, luôn hiển thị được vì không cần mạng).
// Progress bar: đọc trực tiếp từ bgmAudioRef.current (audio element thật)
// bằng setInterval nhẹ (250ms) khi đang phát — không dùng state cho mỗi
// currentTime để tránh re-render toàn App theo mỗi tick.
function formatTime(sec) {
  if (!Number.isFinite(sec) || sec < 0) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}

function MusicPlayer() {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const media = useContext(MediaContext);
  const [expanded, setExpanded] = useState(false);
  const [progress, setProgress] = useState({ current: 0, duration: 0 });
  const [coverUrl, setCoverUrl] = useState(null);
  const [coverLoading, setCoverLoading] = useState(false);
  const [seeking, setSeeking] = useState(null); // 0-100 khi đang kéo, null khi không kéo
  const { settings, toggleBGM, nextTrack, prevTrack, save, bgmAudioRef } = media;
  const s = settings;

  const hasAnything = s && (s.bgm || (s.playlist && s.playlist.length > 0));

  const currentTrack = (s?.currentTrack >= 0 && s?.playlist?.[s.currentTrack]) ? s.playlist[s.currentTrack] : null;
  const currentName = currentTrack ? currentTrack.name : (s?.bgmName || "Nhạc nền");
  const currentData = currentTrack ? currentTrack.data : s?.bgm;

  // Đọc progress thật từ audio element mỗi 250ms khi đang phát — tách khỏi
  // React state chính để không kéo theo re-render toàn App mỗi tick.
  useEffect(() => {
    const tick = () => {
      const audio = bgmAudioRef?.current;
      if (audio) {
        setProgress({
          current: audio.currentTime || 0,
          duration: Number.isFinite(audio.duration) ? audio.duration : 0,
        });
      }
    };
    tick();
    const id = setInterval(tick, 250);
    return () => clearInterval(id);
  }, [bgmAudioRef, s?.isPlaying, currentData]);

  // Tải ảnh bìa (ID3) mỗi khi đổi bài. Huỷ áp dụng kết quả nếu bài đã đổi
  // tiếp trước khi fetch xong (tránh hiện nhầm ảnh bìa của bài cũ).
  useEffect(() => {
    let cancelled = false;
    setCoverUrl(null);
    if (!currentData) { setCoverLoading(false); return; }
    setCoverLoading(true);
    fetchCoverArt(currentData).then((url) => {
      if (cancelled) return;
      setCoverLoading(false);
      setCoverUrl(url || null);
    }).catch(() => { if (!cancelled) setCoverLoading(false); });
    return () => { cancelled = true; };
  }, [currentData]);

  if (!hasAnything) return null;

  const coverSrc = coverUrl || DEFAULT_COVER_ART;
  const pct = progress.duration > 0 ? (progress.current / progress.duration) * 100 : 0;
  const displayPct = seeking !== null ? seeking : pct;

  const handleSeek = (e) => {
    const val = Number(e.target.value);
    setSeeking(val);
  };
  const commitSeek = (e) => {
    const val = Number(e.target.value);
    const audio = bgmAudioRef?.current;
    if (audio && progress.duration > 0) {
      audio.currentTime = (val / 100) * progress.duration;
    }
    setSeeking(null);
  };

  // Ảnh bìa dùng chung cho cả 2 trạng thái — quay chậm liên tục khi đang
  // phát (CSS animation, tự dừng qua animationPlayState khi pause).
  const coverImg = (size) => (
    <img src={coverSrc} alt="" style={{
      width: size, height: size, borderRadius: "50%", objectFit: "cover",
      border: `1px solid ${theme.border}`, flexShrink: 0,
      animation: "gb-music-spin 8s linear infinite",
      animationPlayState: s.isPlaying ? "running" : "paused",
    }}/>
  );

  if (!expanded) {
    return (
      <button onClick={() => setExpanded(true)} style={{
        position: "fixed", bottom: 20, left: 16, zIndex: 50,
        display: "flex", alignItems: "center", gap: 8,
        background: theme.surface, border: `1px solid ${theme.border}`,
        borderRadius: 999, padding: "6px 12px 6px 6px",
        boxShadow: "0 8px 24px rgba(0,0,0,0.5)", cursor: "pointer",
        maxWidth: 220, textAlign: "left",
      }}>
        {coverImg(28)}
        <span style={{
          flex: 1, fontSize: 11, color: theme.text, fontWeight: 600,
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>
          {currentName}
        </span>
        <span
          onClick={(e) => { e.stopPropagation(); toggleBGM(); }}
          style={{ fontSize: 15, color: accent, flexShrink: 0, cursor: "pointer" }}>
          {s.isPlaying ? "⏸️" : "▶️"}
        </span>
      </button>
    );
  }

  return (
    <div style={{
      position: "fixed", bottom: 20, left: 16, zIndex: 50,
      background: theme.surface, border: `1px solid ${theme.border}`,
      borderRadius: 24, padding: 16, boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
      width: 240,
    }}>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 4 }}>
        <button onClick={() => setExpanded(false)} title="Thu gọn"
          style={{ background: "none", border: "none", color: theme.textDim, cursor: "pointer", fontSize: 13 }}>✕</button>
      </div>

      <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
        {coverImg(96)}
      </div>

      <div style={{ textAlign: "center", marginBottom: 10 }}>
        <div style={{
          fontSize: 13, fontWeight: 700, color: theme.text,
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>
          {currentName}
        </div>
        <div style={{ fontSize: 10, color: theme.textDim, marginTop: 2 }}>
          {coverLoading ? "Đang tìm ảnh bìa…" : "GiaBaoDashboard"}
        </div>
      </div>

      {/* Progress bar — kéo để tua (seek) */}
      <div style={{ marginBottom: 4 }}>
        <input type="range" min={0} max={100} step={0.1}
          value={displayPct}
          onChange={handleSeek}
          onMouseUp={commitSeek}
          onTouchEnd={commitSeek}
          style={{ width: "100%", accentColor: accent }}/>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: theme.textDim, marginBottom: 10 }}>
        <span>{formatTime(progress.current)}</span>
        <span>{formatTime(progress.duration)}</span>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14, marginBottom: 10 }}>
        <button onClick={prevTrack} disabled={!s.playlist?.length}
          style={{ background: "none", border: "none", fontSize: 16,
            color: s.playlist?.length ? theme.text : theme.textDim,
            cursor: s.playlist?.length ? "pointer" : "default",
            opacity: s.playlist?.length ? 1 : 0.4 }}>⏮</button>
        <button onClick={toggleBGM}
          style={{ background: accent, border: "none", color: "#fff", cursor: "pointer",
            fontSize: 18, width: 44, height: 44, borderRadius: "50%",
            display: "flex", alignItems: "center", justifyContent: "center" }}>
          {s.isPlaying ? "⏸️" : "▶️"}
        </button>
        <button onClick={nextTrack} disabled={!s.playlist?.length}
          style={{ background: "none", border: "none", fontSize: 16,
            color: s.playlist?.length ? theme.text : theme.textDim,
            cursor: s.playlist?.length ? "pointer" : "default",
            opacity: s.playlist?.length ? 1 : 0.4 }}>⏭</button>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <button onClick={() => save({ muted: !s.muted })} title={s.muted ? "Bật tiếng" : "Tắt tiếng"}
          style={{ background: "none", border: "none", color: s.muted ? theme.danger : theme.textDim, cursor: "pointer", fontSize: 12 }}>
          {s.muted ? "🔇" : "🔊"}
        </button>
        <input type="range" min={0} max={100} value={s.volume?.bgm ?? 30}
          onChange={e => save(prev => ({ ...prev, volume: { ...prev.volume, bgm: Number(e.target.value) } }))}
          style={{ flex: 1, height: 3, accentColor: accent }}/>
      </div>
    </div>
  );
}

// ── MỤC 8: CountUp — đếm số mượt bằng requestAnimationFrame, React thuần ──
// Dùng cho các con số thống kê (XP, %, số ngày...). Chỉ nhận number; nếu value
// không phải number (vd chuỗi "Lv 3 · Dũng sĩ") thì component cha tự không dùng.
// Không tạo timer thừa: 1 rAF loop / lần value đổi, tự huỷ khi xong hoặc unmount.
function CountUp({ value, duration = 600, formatter, className, style }) {
  const [display, setDisplay] = useState(value);
  const rafRef = useRef(null);
  const fromRef = useRef(value);

  useEffect(() => {
    const from = fromRef.current;
    const to = value;
    if (from === to) { setDisplay(to); return; }
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      const cur = from + (to - from) * eased;
      setDisplay(Number.isInteger(from) && Number.isInteger(to) ? Math.round(cur) : cur);
      if (t < 1) { rafRef.current = requestAnimationFrame(tick); }
      else { fromRef.current = to; }
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [value, duration]);

  const shown = formatter ? formatter(display) : display;
  return <span className={`gb-count-up${className ? " " + className : ""}`} style={style}>{shown}</span>;
}

// ── MỤC 8: Ripple handler dùng chung cho mọi phần tử có className "gb-ripple" ──
// .gb-ripple (CSS) đã tồn tại từ trước nhưng chưa có gì tạo ra ".gb-ripple-dot"
// nên hiệu ứng ripple chưa từng chạy. Hàm này chỉ chèn 1 <span> tạm thời tại vị
// trí click rồi tự xoá sau khi animation xong — không đụng onClick/logic gốc
// của bất kỳ button nào, chỉ cần thêm onMouseDown={gbRipple} cạnh className có sẵn.
function gbRipple(e) {
  try {
    const el = e.currentTarget;
    if (!el || el.disabled) return;
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const clientX = e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? rect.left + rect.width/2;
    const clientY = e.clientY ?? (e.touches && e.touches[0]?.clientY) ?? rect.top + rect.height/2;
    const x = clientX - rect.left - size/2;
    const y = clientY - rect.top - size/2;
    const dot = document.createElement("span");
    dot.className = "gb-ripple-dot";
    dot.style.width = dot.style.height = size + "px";
    dot.style.left = x + "px";
    dot.style.top = y + "px";
    el.appendChild(dot);
    setTimeout(() => { try { dot.remove(); } catch {} }, 520);
  } catch {}
}

  }, []);
}

function App() {

  const [setts,setSetts]= useState({targetXP:150,recurring:[],quotes:[...DEFAULT_QUOTES]});
  const [pomOpen,setPomOpen]         = useState(false);

  const [weeklyReviews,setWeeklyReviews]=useState({}); // key: weekStart ISO -> {weekStart,weekEnd,viewedAt,reflection}

  const [weeklyBannerSkip,setWeeklyBannerSkip]=useState(false); // session-only dismiss
  // Finance transactions — nguồn chân lý dùng chung cho Dashboard (mục 1) và tab Tài chính.

  const [finTxs,setFinTxs] = useState(null); // null = chưa tải xong

  // ── V24 ──
  const [taskPool,setTaskPool] = useState(null);   // null = chưa tải xong; [{id,l,e,i,hidden}]
  const [goalPool,setGoalPool] = useState(null);   // null = chưa tải xong; [{id,text,createdAt}]
  const [v24Popup,setV24Popup] = useState(false);  // popup "Dashboard đã được nâng cấp" — chỉ hiện 1 lần
  const taskPoolRef = useRef([]);
  useEffect(()=>{
    taskPoolRef.current = taskPool||[];
    setTaskPoolXpIndex(Object.fromEntries((taskPool||[]).map(t=>[t.id, Number(t.e)||TP_XP])));
  },[taskPool]);

  // C-1: keep a ref always pointing at latest db so save() never captures stale closure
  const dbRef = useRef({});
  useEffect(() => { dbRef.current = db; }, [db]);
  useEffect(() => { setSoundEnabled(setts.soundOn !== false); }, [setts.soundOn]);

  // C-2: persist study timer start-time so a page reload doesn't lose elapsed seconds
  const studyStartRef = useRef(null);

  const td = toISO();

  useEffect(()=>{
    (async()=>{
      let loadedDb={};
      try {
        const keys = await S.list("d:");
        const entries={};
        for(const k of keys){
          try{
            const v=await S.get(k);
            // C-3 guard: skip keys whose value was set to "{}" or "null" by an old reset
            if(v && v !== "{}" && v !== "null"){
              const parsed = JSON.parse(v);
              // only store if it's a real day object (has at least one recognised key)
              if(parsed && typeof parsed === "object" && !Array.isArray(parsed)){
                entries[k.replace("d:","")] = parsed;
              }
            }
          }catch{}
        }
        loadedDb=entries;
        setDb(entries);
      }catch{}
      let loadedSetts=null;
      try{ const sv=await S.get("settings"); if(sv && sv!=="null"){ loadedSetts=JSON.parse(sv); setSetts(loadedSetts); } }catch{}
      try{ const wr=await S.get("weeklyReviews"); if(wr && wr!=="null") setWeeklyReviews(JSON.parse(wr)); }catch{}
      try{ const th=await S.get("theme"); if(th && th!=="null" && THEMES[th]) setThemeKey(th); }catch{}
      try{ const ft=await S.get("finance:transactions"); setFinTxs(ft && ft!=="null" ? JSON.parse(ft) : []); }catch{ setFinTxs([]); }
      // C-2: restore in-progress study timer
      try{
        const ts=await S.get("study:start");
        if(ts && ts!=="null"){
          const elapsed=Math.floor((Date.now()-parseInt(ts,10))/1000);
          if(elapsed>0 && elapsed<86400){ // sanity: ignore if >24h
            studyStartRef.current=parseInt(ts,10);
            setStudySecs(elapsed);
            setStudyRunning(true);
          } else {
            await S.set("study:start","null");
          }
        }
      }catch{}

      // ── V24: migration (idempotent) + load Kho việc nhỏ / Kho mục tiêu lớn ──
      try{
        const curTxp = Object.keys(loadedDb).reduce((s,k)=>s+dayExpFull(loadedDb[k],k),0);
        let curStr=0; { const today=new Date(); for(let i=0;i<90;i++){ const d=new Date(today); d.setDate(d.getDate()-i); const iso=d.toISOString().split("T")[0]; const day=loadedDb[iso]; if(!day){ if(i===0) continue; break; } if(day.lo) break; curStr++; } }
        const { migrated } = await runV24Migration(loadedDb, curStr, curTxp);
        if (migrated) {
          const shown = await S.get(V24_POPUP_SHOWN_KEY);
          if (!shown || shown==="null") {
            setV24Popup(true);
            await S.set(V24_POPUP_SHOWN_KEY, "1");
          }
        }
      }catch(e){ console.error("V24 migration check lỗi:", e); }
      try{
        const tp=await S.get(TASK_POOL_KEY);
        if (tp && tp!=="null") {
          // [PATCH] Kho việc nhỏ ĐÃ tồn tại từ trước (không phải lần đầu
          // migration) — merge thêm các seed task MỚI (vd tp_journal,
          // tp_lightex) nếu id đó chưa có, KHÔNG đụng/xoá/sắp xếp lại bất
          // kỳ entry cũ nào của Bảo.
          const existing = JSON.parse(tp);
          const existingIds = new Set(existing.map(t=>t.id));
          const missing = TASK_POOL_SEED.filter(t=>!existingIds.has(t.id));
          setTaskPool(missing.length ? [...existing, ...missing] : existing);
        } else {
          setTaskPool([...TASK_POOL_SEED]);
        }
      }catch{ setTaskPool([...TASK_POOL_SEED]); }
      try{ const gp=await S.get(GOAL_POOL_KEY); setGoalPool(gp && gp!=="null" ? JSON.parse(gp) : []); }catch{ setGoalPool([]); }
    })();
  },[]);

  // ── V24: lưu Kho việc nhỏ / Kho mục tiêu lớn mỗi khi thay đổi (sau khi đã tải xong lần đầu) ──
  const taskPoolLoadedRef = useRef(false);
  useEffect(()=>{
    if(taskPool===null) return;
    if(!taskPoolLoadedRef.current){ taskPoolLoadedRef.current=true; return; }
    S.set(TASK_POOL_KEY, JSON.stringify(taskPool)).catch(()=>{});
  },[taskPool]);
  const goalPoolLoadedRef = useRef(false);
  useEffect(()=>{
    if(goalPool===null) return;
    if(!goalPoolLoadedRef.current){ goalPoolLoadedRef.current=true; return; }
    S.set(GOAL_POOL_KEY, JSON.stringify(goalPool)).catch(()=>{});
  },[goalPool]);

  // ── AUTO BACKUP (daily) ──────────────────────────────────────────────────
  const [backupDoneToday,setBackupDoneToday]=useState(null); // null = chưa biết, true/false sau khi check
  const [backupList,setBackupList]=useState([]); // [{key,date}] mới nhất trước

  const refreshBackupList = useCallback(async ()=>{
    try{
      const keys = await S.list("backup:auto:");
      const items = keys
        .map(k=>({key:k, date:k.replace("backup:auto:","")}))
        .sort((a,b)=>b.date.localeCompare(a.date)); // mới nhất trước
      setBackupList(items);
      return items;
    }catch{ return []; }
  },[]);

  // Tạo 1 bản backup tự động ngay bây giờ (payload giống exportData) và dọn bớt bản cũ, giữ tối đa 7
  const runAutoBackup = useCallback(async (dateStr)=>{
    try{
      let kb=[], qaNotes=[], qaImported=[], bossHistory=[], bossCurrent=null, timeline=[], capsules=[], weeklyReviewsExp={};
      try { const r=await S.get("kb:items");      if(r&&r!=="null") kb=JSON.parse(r); } catch {}
      try { const r=await S.get("qa:notes");      if(r&&r!=="null") qaNotes=JSON.parse(r); } catch {}
      try { const r=await S.get("qa:imported");   if(r&&r!=="null") qaImported=JSON.parse(r); } catch {}
      try { const r=await S.get("boss:history");  if(r&&r!=="null") bossHistory=JSON.parse(r); } catch {}
      try { const r=await S.get("boss:current");  if(r&&r!=="null") bossCurrent=JSON.parse(r); } catch {}
      try { const r=await S.get("timeline");      if(r&&r!=="null") timeline=JSON.parse(r); } catch {}
      try { const r=await S.get("capsules");      if(r&&r!=="null") capsules=JSON.parse(r); } catch {}
      try { const r=await S.get("weeklyReviews");  if(r&&r!=="null") weeklyReviewsExp=JSON.parse(r); } catch {}
      let financeTx=[], financeCats=null;
      try { const r=await S.get("finance:transactions"); if(r&&r!=="null") financeTx=JSON.parse(r); } catch {}
      try { const r=await S.get("finance:categories");   if(r&&r!=="null") financeCats=JSON.parse(r); } catch {}
      // V25 MỤC 1: bổ sung Kho việc nhỏ / Kho mục tiêu lớn / legacy frozen snapshot vào auto-backup
      let taskPoolExp=[], goalPoolExp=[], legacyFrozenExp=null;
      try { const r=await S.get(TASK_POOL_KEY); if(r&&r!=="null") taskPoolExp=JSON.parse(r); } catch {}
      try { const r=await S.get(GOAL_POOL_KEY); if(r&&r!=="null") goalPoolExp=JSON.parse(r); } catch {}
      try { const r=await S.get("v24:legacyFrozenSnapshot"); if(r&&r!=="null") legacyFrozenExp=JSON.parse(r); } catch {}

      const payload = {
        schemaVersion: 2,
        exportedAt: new Date().toISOString(),
        db: dbRef.current,
        settings: setts,
        kb,
        qa: { notes: qaNotes, imported: qaImported },
        bossHistory,
        bossCurrent,
        timeline,
        capsules,
        weeklyReviews: weeklyReviewsExp,
        financeTransactions: financeTx,
        financeCategories: financeCats,
        // V25 MỤC 1
        taskPool: taskPoolExp,
        goalPool: goalPoolExp,
        legacyFrozenSnapshot: legacyFrozenExp,
      };

      await S.set("backup:auto:"+dateStr, JSON.stringify(payload));
      await S.set("backup:last_date", dateStr);

      // Giữ tối đa 7 bản — xoá bản cũ nhất nếu vượt
      const keys = await S.list("backup:auto:");
      if(keys.length>7){
        const sorted = keys.map(k=>k.replace("backup:auto:","")).sort(); // tăng dần — cũ nhất trước
        const toDelete = sorted.slice(0, keys.length-7);
        for(const d of toDelete) await S.del("backup:auto:"+d);
      }
      await refreshBackupList();
      setBackupDoneToday(true);
      playSound("backup");
    }catch(e){
      console.error("Auto-backup lỗi:", e);
    }
  },[setts, refreshBackupList]);

  // Kiểm tra mỗi khi app mở: nếu chưa backup hôm nay → tự backup
  useEffect(()=>{
    (async()=>{
      try{
        const lastDate = await S.get("backup:last_date");
        await refreshBackupList();
        if(lastDate === td){
          setBackupDoneToday(true);
        } else {
          setBackupDoneToday(false);
          // chờ db load xong (effect init ở trên) rồi mới backup, tránh backup rỗng
          setTimeout(()=>runAutoBackup(td), 800);
        }
      }catch{}
    })();
    // chỉ chạy 1 lần khi app mở
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Khôi phục từ 1 bản backup tự động — logic giống importData nhưng đọc từ storage thay vì File
  const restoreFromBackup = useCallback(async (key)=>{
    try{
      const raw = await S.get(key);
      if(!raw || raw==="null"){ alert("❌ Không đọc được bản backup này."); return; }
      const parsed = JSON.parse(raw);
      if(!parsed || typeof parsed!=="object" || !parsed.db || typeof parsed.db!=="object"){
        alert("❌ Bản backup không đúng định dạng.");
        return;
      }
      const importedDb     = parsed.db;
      const importedSetts  = parsed.settings || null;
      const importedKB       = parsed.kb       || null;
      const importedQA       = parsed.qa       || null;
      const importedBossH    = parsed.bossHistory  || null;
      const importedBossCur  = parsed.bossCurrent  || null;
      const importedTimeline = parsed.timeline || null;
      const importedCapsules = parsed.capsules || null;
      const importedWeeklyReviews = parsed.weeklyReviews || null;
      const importedFinanceTx   = parsed.financeTransactions || null;
      const importedFinanceCats = parsed.financeCategories   || null;
      // V25 MỤC 1: Kho việc nhỏ / Kho mục tiêu lớn / legacy frozen snapshot — optional (backup cũ không có)
      const importedTaskPool = Array.isArray(parsed.taskPool) ? parsed.taskPool : null;
      const importedGoalPool = Array.isArray(parsed.goalPool) ? parsed.goalPool : null;
      const importedLegacyFrozen = (parsed.legacyFrozenSnapshot && typeof parsed.legacyFrozenSnapshot === "object") ? parsed.legacyFrozenSnapshot : null;

      const oldKeys = await S.list("d:");
      for (const k of oldKeys) await S.del(k);
      for (const [date, dayData] of Object.entries(importedDb)) {
        if (typeof dayData === "object" && dayData !== null) {
          await S.set("d:" + date, JSON.stringify(dayData));
        }
      }
      if (importedSetts && typeof importedSetts === "object") await S.set("settings", JSON.stringify(importedSetts));
      if (Array.isArray(importedKB))       await S.set("kb:items",      JSON.stringify(importedKB));
      if (importedQA) {
        if (Array.isArray(importedQA.notes))    await S.set("qa:notes",    JSON.stringify(importedQA.notes));
        if (Array.isArray(importedQA.imported)) await S.set("qa:imported", JSON.stringify(importedQA.imported));
      }
      if (Array.isArray(importedBossH))    await S.set("boss:history",   JSON.stringify(importedBossH));
      if (importedBossCur !== null)        await S.set("boss:current",   importedBossCur ? JSON.stringify(importedBossCur) : "null");
      if (Array.isArray(importedTimeline)) await S.set("timeline",       JSON.stringify(importedTimeline));
      if (Array.isArray(importedCapsules)) await S.set("capsules",       JSON.stringify(importedCapsules));
      if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") await S.set("weeklyReviews", JSON.stringify(importedWeeklyReviews));
      if (Array.isArray(importedFinanceTx))   await S.set("finance:transactions", JSON.stringify(importedFinanceTx));
      if (importedFinanceCats && typeof importedFinanceCats === "object") await S.set("finance:categories", JSON.stringify(importedFinanceCats));
      // V25 MỤC 1
      if (importedTaskPool)     await S.set(TASK_POOL_KEY, JSON.stringify(importedTaskPool));
      if (importedGoalPool)     await S.set(GOAL_POOL_KEY, JSON.stringify(importedGoalPool));
      if (importedLegacyFrozen) await S.set("v24:legacyFrozenSnapshot", JSON.stringify(importedLegacyFrozen));

      // reload state
      setDb(importedDb);
      if (importedSetts) setSetts(importedSetts);
      if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") setWeeklyReviews(importedWeeklyReviews);
      if (Array.isArray(importedFinanceTx)) setFinTxs(importedFinanceTx);
      // V25 MỤC 1
      if (importedTaskPool) setTaskPool(importedTaskPool);
      if (importedGoalPool) setGoalPool(importedGoalPool);
      if (importedLegacyFrozen) setLegacyFrozenSnapshot(importedLegacyFrozen);
      alert(`✅ Đã khôi phục từ backup: ${Object.keys(importedDb).length} ngày dữ liệu.`);
    }catch(e){
      alert("❌ Lỗi khi khôi phục: " + e.message);
    }
  },[]);

  useEffect(()=>{
    if(!studyRunning) return;
    // C-2: use wall-clock diff so accuracy survives background throttling
    if(!studyStartRef.current) studyStartRef.current = Date.now() - studySecs*1000;
    const iv=setInterval(()=>{
      setStudySecs(Math.floor((Date.now()-studyStartRef.current)/1000));
    },1000);
    return ()=>clearInterval(iv);
  },[studyRunning]);

  // C-1: deps array is empty — dbRef.current always has latest db, no stale closure
  const save = useCallback(async (date,patch)=>{
    const base=dbRef.current[date]||blank();
    const next={...base,...patch};
    if(patch.tasks) next.tasks={...base.tasks,...patch.tasks};
    if(!("custom" in patch)) next.custom=base.custom;
    await S.set("d:"+date,JSON.stringify(next));
    setDb(p=>({...p,[date]:next}));
  },[]);

  const saveSetts = useCallback(async patch=>{
    const next={...setts,...patch};
    await S.set("settings",JSON.stringify(next));
    setSetts(next);
  },[setts]);

  // ── THEME ────────────────────────────────────────────────────────────────

    if(!THEMES[key]) return;
    setThemeKey(key);

    await S.set("theme", key);
  },[]);

  const saveWeeklyReview = useCallback(async (weekStart, patch)=>{
    setWeeklyReviews(prev=>{
      const base = prev[weekStart] || {weekStart, weekEnd: weekDates(weekStart)[6], viewedAt:null, reflection:{satisfied:"",improve:""}};
      const next = {...prev, [weekStart]: {...base, ...patch}};
      S.set("weeklyReviews", JSON.stringify(next));
      return next;

  // ══════════════════════════════ V24 ══════════════════════════════════════

  const addPoolTask = useCallback((label, xp, icon)=>{
    const t = { id:"tp_"+Date.now()+"_"+Math.random().toString(36).slice(2,6), l:label.trim(), e:Number(xp)||TP_XP, i:icon||"✅", hidden:false };
    setTaskPool(p=>[...(p||[]), t]);
    return t.id;
  },[]);

    setTaskPool(p=>(p||[]).map(t=>t.id===id?{...t,...patch}:t));
  },[]);
  const deletePoolTask = useCallback((id)=>{
    setTaskPool(p=>(p||[]).filter(t=>t.id!==id));
  },[]);
  const toggleHidePoolTask = useCallback((id)=>{
    setTaskPool(p=>(p||[]).map(t=>t.id===id?{...t,hidden:!t.hidden}:t));
  },[]);

  // ── Kho mục tiêu lớn: CRUD đầy đủ ──
  // [PATCH] thêm lastPickedAt/doneCount/skipCount — dùng bởi
  // pickBigGoalForToday() để tự động chọn 1 mục tiêu mỗi ngày.
  const addGoalPool = useCallback((text)=>{
    const g = { id:"gp_"+Date.now()+"_"+Math.random().toString(36).slice(2,6), text:text.trim(), createdAt:new Date().toISOString(),
      lastPickedAt:null, doneCount:0, skipCount:0 };
    setGoalPool(p=>[...(p||[]), g]);
    return g.id;
  },[]);
  const editGoalPool = useCallback((id, text)=>{
    setGoalPool(p=>(p||[]).map(g=>g.id===id?{...g,text}:g));
  },[]);
  const deleteGoalPool = useCallback((id)=>{
    setGoalPool(p=>(p||[]).filter(g=>g.id!==id));
  },[]);
  // [PATCH] cập nhật lastPickedAt khi AI tự chọn 1 goal cho hôm nay, hoặc
  // doneCount/skipCount khi ngày đó goal được hoàn thành/bỏ qua.
  const markGoalPicked = useCallback((id, dateIso)=>{
    setGoalPool(p=>(p||[]).map(g=>g.id===id?{...g,lastPickedAt:dateIso}:g));
  },[]);
  const bumpGoalDoneCount = useCallback((id, delta=1)=>{
    setGoalPool(p=>(p||[]).map(g=>g.id===id?{...g,doneCount:Math.max(0,(g.doneCount||0)+delta)}:g));
  },[]);
  const bumpGoalSkipCount = useCallback((id, delta=1)=>{
    setGoalPool(p=>(p||[]).map(g=>g.id===id?{...g,skipCount:Math.max(0,(g.skipCount||0)+delta)}:g));
  },[]);

  // ── Đảm bảo hôm nay đã có 5 việc nhỏ random + đưa "chuẩn bị ngày mai" của hôm qua vào hôm nay ──
  const ensureDailyPicksRef = useRef(null); // lưu ngày (iso) đã xử lý gần nhất, để không lặp lại trong cùng ngày nhưng vẫn chạy lại khi sang ngày mới
  useEffect(()=>{
    if(taskPool===null) return; // chờ pool tải xong
    const todayData = dbRef.current[td];
    if(todayData && Array.isArray(todayData.dailyPicks) && todayData.dailyPicks.length>0) return; // đã có rồi, không random lại
    if(ensureDailyPicksRef.current === td) return; // đã xử lý ngày này rồi (đang chờ save() hoàn tất)
    ensureDailyPicksRef.current = td;
    (async()=>{
      // lịch sử lần cuối mỗi task xuất hiện, để ưu tiên task lâu chưa ra
      const historyByPoolId = {};
      const sortedDates = Object.keys(dbRef.current).sort();
      for(const iso of sortedDates){
        const d = dbRef.current[iso];
        (d?.dailyPicks||[]).forEach(id=>{ historyByPoolId[id]=iso; });
      }
      const yesterday = (()=>{ const dt=new Date(td+"T00:00:00"); dt.setDate(dt.getDate()-1); return dt.toISOString().split("T")[0]; })();
      const yesterdayPicks = dbRef.current[yesterday]?.dailyPicks || [];
      const picks = pickDailyTasks(taskPoolRef.current, td, historyByPoolId, yesterdayPicks, 5);

      // chuyển "chuẩn bị ngày mai" (tomorrowDraft) mà HÔM QUA đã tạo → thành tomorrowPrep của HÔM NAY
      const base = dbRef.current[td] || blank();
      const patch = { dailyPicks: picks, swapsUsed: base.swapsUsed||0 };
      const yesterdayData = dbRef.current[yesterday];
      if(yesterdayData?.tomorrowDraft?.text && !base.tomorrowPrep){
        patch.tomorrowPrep = { text: yesterdayData.tomorrowDraft.text, createdAt: yesterdayData.tomorrowDraft.createdAt, doneAt:null };
      }
      await save(td, patch);
    })();
  },[taskPool, td]);

  // ── Đổi việc: random lại 1 việc nhỏ CHƯA hoàn thành trong 5 việc hôm nay, tối đa 2 lần/ngày ──
  const swapDailyTask = useCallback((poolIdToReplace)=>{
    const today = dbRef.current[td] || blank();
    const used = today.swapsUsed || 0;
    if(used>=2) return false;
    const picks = today.dailyPicks || [];
    if(!picks.includes(poolIdToReplace)) return false;
    if(today.poolDone?.[poolIdToReplace]) return false; // không đổi việc đã hoàn thành
    const pool = taskPoolRef.current.filter(t=>!t.hidden);
    const candidates = pool.filter(t=>!picks.includes(t.id));
    if(candidates.length===0) return false;
    const rnd = seededRandom(td+":"+used+":"+poolIdToReplace);
    const chosen = candidates[Math.floor(rnd()*candidates.length)];
    const newPicks = picks.map(id=>id===poolIdToReplace?chosen.id:id);
    save(td, { dailyPicks:newPicks, swapsUsed: used+1 });
    return true;
  },[td, save]);

  // ── Toggle 1 việc nhỏ trong 5 việc hôm nay ──
  const togglePoolTaskToday = useCallback((poolId)=>{
    const today = dbRef.current[td] || blank();
    const wasDone = !!today.poolDone?.[poolId];
    if(!wasDone) playSound("tick");
    save(td, { poolDone: { ...(today.poolDone||{}), [poolId]: !wasDone } });
  },[td, save]);

  // H-3: streak only increments when the day has real data; a gap of 0 days (today) is tolerated
  // V25 MỤC 7 (regression fix): 'str' được chuyển lên TRƯỚC 'dayExp'/'txp' vì dayExp (V25 MỤC 2)
  // giờ đọc 'str' trong ctx — nếu khai báo str sau txp sẽ gây "Cannot access 'str' before
  // initialization" do txp gọi dayExp() ngay trong lúc render, trước khi str được khởi tạo.
  const str = useMemo(()=>{
    let n=0; const today=new Date();
    for(let i=0;i<90;i++){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const iso=d.toISOString().split("T")[0];
      const day=db[iso];
      if(!day){
        if(i===0) continue;
        break;
      }
      if(day.lo) break;
      n++;
    }
    return n;
  },[db]);
  // V25 MỤC 2: truyền ctx={finTxs, str} để Daily Challenge mới (tài chính/streak) có đủ dữ liệu.
  // str chỉ áp dụng chính xác cho "hôm nay" (td) — với các ngày lịch sử khác, streak-tại-thời-điểm-đó
  // không được lưu lại nên bỏ qua (challenge đó chỉ tính bonus khi kiểm tra hôm nay, không hồi tố).
  const dayExp = useCallback(date=>dayExpFull(db[date],date,{finTxs, str: date===td?str:undefined}),[db,finTxs,str,td]);
  // PERF (MỤC 9): totXP/streak trước đây là hàm được GỌI TRỰC TIẾP trong
  // thân render, nghĩa là reduce trên Object.keys(db) và vòng lặp 90 ngày
  // chạy lại ở MỌI lần App re-render — kể cả mỗi giây khi Study Timer tick.
  // Đây là nguyên nhân chính gây khựng. Chuyển sang useMemo.
  const txp = useMemo(()=>Object.keys(db).reduce((s,k)=>s+dayExp(k),0),[db,dayExp]);
  const lv = useMemo(()=>calcLv(txp),[txp]);
  const rt = useMemo(()=>getRankTitle(lv.l),[lv.l]);

  // Sound: phát âm level-up khi cấp độ tăng (so với lần render trước)
  const prevLvRef = useRef(null);
  const [justLeveledUp, setJustLeveledUp] = useState(false);
  useEffect(()=>{
    if(prevLvRef.current !== null && lv.l > prevLvRef.current){
      playSound("levelup");
      playEventMusic("levelup");
      setJustLeveledUp(true);
      const t = setTimeout(()=>setJustLeveledUp(false), 1200);
      prevLvRef.current = lv.l;
      return ()=>clearTimeout(t);
    }
    prevLvRef.current = lv.l;
  },[lv.l]);

  const todayData=db[td]||blank();
  const todayE=dayExp(td);
  const todayRank=rank(todayE);
  const challenge=getDailyChallenge(td);
  const chalDone=challenge?.check(todayData, {str, finTxs, td});
  const quoteToday=getQuoteOfDay(setts.quotes||DEFAULT_QUOTES,td);

  // Weekly Review: show banner only on Monday, for the week that just ended (last week), if not yet viewed
  const todayDow = new Date(td+"T00:00:00").getDay(); // 0=Sun..6=Sat
  const isMonday = todayDow===1;
  const lastWeekStart = isMonday ? (()=>{ const d=new Date(td+"T00:00:00"); d.setDate(d.getDate()-7); return mkISO(d.getFullYear(),d.getMonth(),d.getDate()); })() : null;
  const lastWeekReview = lastWeekStart ? weeklyReviews[lastWeekStart] : null;
  const showWeeklyBanner = isMonday && !weeklyBannerSkip && !(lastWeekReview && lastWeekReview.viewedAt);

  // V24 MỤC 9: gộp "Tâm lý"(3) + "Bản thân"(4) + "Q&A"(5) thành 1 tab "🧠 Tâm lý & Bản thân" tại
  // index 3 (nội dung render bởi PsychProfileQA, có 3 subtab bên trong — giữ nguyên toàn bộ chức năng).
  // Index 4 và 5 vẫn tồn tại trong mảng để KHÔNG phải renumber toàn bộ tab===N phía dưới, nhưng bị ẩn
  // khỏi thanh tab để tránh trùng lặp.
  // TABS giờ khai báo ở module scope (đầu file) để AIPlannerBeta's Dev Tools dùng chung.
  // FAB toàn cục (Study Timer / Pomodoro / Distraction) chỉ hiện ở các tab trong whitelist này.
  // Hiện tại chỉ tab 0 (Hôm nay). Thêm index vào đây nếu muốn FAB xuất hiện ở tab khác sau này.
  const FAB_WHITELIST_TABS = [0];
  // V24 MỤC 10: Boss Fight ẩn/hiện qua Settings (setts.bossEnabled), mặc định OFF. Không xoá code/dữ liệu.
  // V24 MỤC 9: index 4, 5 ẩn khỏi thanh tab vì đã gộp vào tab 3.
  const HIDDEN_TAB_INDEXES = [4, 5, ...(setts.bossEnabled ? [] : [8])];
  const VISIBLE_TABS=TABS.map((t,i)=>({t,i})).filter(x=>!HIDDEN_TAB_INDEXES.includes(x.i));

  const switchTab = (i) => { setTab(i); playSound("tab"); media.playForTab(i); };

  // C-2: persist start timestamp so reload can restore elapsed time
  const startStudy = useCallback(async ()=>{
    const ts = Date.now();
    studyStartRef.current = ts;
    await S.set("study:start", String(ts));
    setStudySecs(0);
    setStudyRunning(true);
  },[]);

  const stopStudy = useCallback(async ()=>{
    // C-2: read elapsed directly from ref to avoid stale studySecs
    const elapsed = studyStartRef.current
      ? Math.floor((Date.now()-studyStartRef.current)/1000)
      : studySecs;
    studyStartRef.current = null;
    await S.set("study:start","null");
    const base = dbRef.current[td] || blank();
    save(td,{studyTime:(base.studyTime||0)+elapsed});
    setStudySecs(0); setStudyRunning(false);
  },[studySecs, save, td]);

  // H-5: revoke blob URL after browser has time to initiate download
  const exportData = useCallback(async () => {
    // P-07: read auxiliary stores so they can be restored on import
    let kb=[], qaNotes=[], qaImported=[], bossHistory=[], bossCurrent=null, timeline=[], capsules=[], weeklyReviewsExp={};
    try { const r=await S.get("kb:items");      if(r&&r!=="null") kb=JSON.parse(r); } catch {}
    try { const r=await S.get("qa:notes");      if(r&&r!=="null") qaNotes=JSON.parse(r); } catch {}
    try { const r=await S.get("qa:imported");   if(r&&r!=="null") qaImported=JSON.parse(r); } catch {}
    try { const r=await S.get("boss:history");  if(r&&r!=="null") bossHistory=JSON.parse(r); } catch {}
    try { const r=await S.get("boss:current");  if(r&&r!=="null") bossCurrent=JSON.parse(r); } catch {}
    try { const r=await S.get("timeline");      if(r&&r!=="null") timeline=JSON.parse(r); } catch {}
    try { const r=await S.get("capsules");      if(r&&r!=="null") capsules=JSON.parse(r); } catch {}
    try { const r=await S.get("weeklyReviews");  if(r&&r!=="null") weeklyReviewsExp=JSON.parse(r); } catch {}
    let financeTx=[], financeCats=null;
    try { const r=await S.get("finance:transactions"); if(r&&r!=="null") financeTx=JSON.parse(r); } catch {}
    try { const r=await S.get("finance:categories");   if(r&&r!=="null") financeCats=JSON.parse(r); } catch {}
    // V25 MỤC 1: bổ sung Kho việc nhỏ / Kho mục tiêu lớn / legacy frozen snapshot vào export
    let taskPoolExp=[], goalPoolExp=[], legacyFrozenExp=null;
    try { const r=await S.get(TASK_POOL_KEY); if(r&&r!=="null") taskPoolExp=JSON.parse(r); } catch {}
    try { const r=await S.get(GOAL_POOL_KEY); if(r&&r!=="null") goalPoolExp=JSON.parse(r); } catch {}
    try { const r=await S.get("v24:legacyFrozenSnapshot"); if(r&&r!=="null") legacyFrozenExp=JSON.parse(r); } catch {}

    const payload = {
      schemaVersion: 2,
      exportedAt: new Date().toISOString(),
      db,
      settings: setts,
      kb,
      qa: { notes: qaNotes, imported: qaImported },
      bossHistory,
      bossCurrent,
      timeline,
      capsules,
      weeklyReviews: weeklyReviewsExp,
      financeTransactions: financeTx,
      financeCategories: financeCats,
      // V25 MỤC 1
      taskPool: taskPoolExp,
      goalPool: goalPoolExp,
      legacyFrozenSnapshot: legacyFrozenExp,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `giabao-${td}.json`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, [db, setts, td]);

  // P-07: Import JSON backup — validate → write storage → update state
  const importData = useCallback(async (file) => {
    if (!file) return;
    let parsed;
    try {
      const text = await file.text();
      parsed = JSON.parse(text);
    } catch {
      alert("❌ File JSON không hợp lệ — không thể parse.");
      return;
    }
    // Schema validation: must have a "db" key that is an object
    if (!parsed || typeof parsed !== "object" || !parsed.db || typeof parsed.db !== "object") {
      alert("❌ File không đúng định dạng — thiếu key \"db\".");
      return;
    }
    const importedDb     = parsed.db;
    const importedSetts  = parsed.settings || null;
    // Optional auxiliary keys
    const importedKB       = parsed.kb       || null;
    const importedQA       = parsed.qa       || null;
    const importedBossH    = parsed.bossHistory  || null;
    const importedBossCur  = parsed.bossCurrent  || null;
    const importedTimeline = parsed.timeline || null;
    const importedCapsules = parsed.capsules || null;
    const importedWeeklyReviews = parsed.weeklyReviews || null;
    const importedFinanceTx   = parsed.financeTransactions || null;
    const importedFinanceCats = parsed.financeCategories   || null;
    // V25 MỤC 1: Kho việc nhỏ / Kho mục tiêu lớn / legacy frozen snapshot — optional,
    // hỗ trợ cả backup cũ (schemaVersion 1) không có các key này (importedTaskPool sẽ là null → bỏ qua, không ghi đè).
    const importedTaskPool = Array.isArray(parsed.taskPool) ? parsed.taskPool : null;
    const importedGoalPool = Array.isArray(parsed.goalPool) ? parsed.goalPool : null;
    const importedLegacyFrozen = (parsed.legacyFrozenSnapshot && typeof parsed.legacyFrozenSnapshot === "object") ? parsed.legacyFrozenSnapshot : null;

    try {
      // 1. Day records — delete old keys first, then write imported ones
      const oldKeys = await S.list("d:");
      for (const k of oldKeys) await S.del(k);
      for (const [date, dayData] of Object.entries(importedDb)) {
        if (typeof dayData === "object" && dayData !== null) {
          await S.set("d:" + date, JSON.stringify(dayData));
        }
      }
      // 2. Settings
      if (importedSetts && typeof importedSetts === "object") {
        await S.set("settings", JSON.stringify(importedSetts));
      }
      // 3. Auxiliary stores — only write if present in backup
      if (Array.isArray(importedKB))       await S.set("kb:items",      JSON.stringify(importedKB));
      if (importedQA) {
        if (Array.isArray(importedQA.notes))    await S.set("qa:notes",    JSON.stringify(importedQA.notes));
        if (Array.isArray(importedQA.imported)) await S.set("qa:imported", JSON.stringify(importedQA.imported));
      }
      if (Array.isArray(importedBossH))    await S.set("boss:history",   JSON.stringify(importedBossH));
      if (importedBossCur !== null)        await S.set("boss:current",   importedBossCur ? JSON.stringify(importedBossCur) : "null");
      if (Array.isArray(importedTimeline)) await S.set("timeline",       JSON.stringify(importedTimeline));
      if (Array.isArray(importedCapsules)) await S.set("capsules",       JSON.stringify(importedCapsules));
      if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") await S.set("weeklyReviews", JSON.stringify(importedWeeklyReviews));
      if (Array.isArray(importedFinanceTx))   await S.set("finance:transactions", JSON.stringify(importedFinanceTx));
      if (importedFinanceCats && typeof importedFinanceCats === "object") await S.set("finance:categories", JSON.stringify(importedFinanceCats));
      // V25 MỤC 1
      if (importedTaskPool)     await S.set(TASK_POOL_KEY, JSON.stringify(importedTaskPool));
      if (importedGoalPool)     await S.set(GOAL_POOL_KEY, JSON.stringify(importedGoalPool));
      if (importedLegacyFrozen) await S.set("v24:legacyFrozenSnapshot", JSON.stringify(importedLegacyFrozen));
    } catch (e) {
      alert("❌ Lỗi khi ghi dữ liệu vào storage: " + e.message);
      return;
    }

    // 4. Update React state — single batch
    setDb(importedDb);
    if (importedSetts) setSetts(importedSetts);
    if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") setWeeklyReviews(importedWeeklyReviews);
    if (Array.isArray(importedFinanceTx)) setFinTxs(importedFinanceTx);
    // V25 MỤC 1: cập nhật state Kho việc nhỏ / Kho mục tiêu lớn / frozen snapshot nếu có trong file import
    if (importedTaskPool) setTaskPool(importedTaskPool);
    if (importedGoalPool) setGoalPool(importedGoalPool);
    if (importedLegacyFrozen) setLegacyFrozenSnapshot(importedLegacyFrozen);
    alert(`✅ Import thành công: ${Object.keys(importedDb).length} ngày dữ liệu.`);
  }, []);

  const mediaBg = media.settings?.background;
  const mediaBgOpacity = media.settings?.backgroundOpacity ?? 40;
  const currentTabHeaderImg = media.settings?.headers?.[tab];

  return (
    <ThemeContext.Provider value={theme}>
    <AccentContext.Provider value={accent}>
    <MediaContext.Provider value={media}>
    <div style={{position:"relative",background:theme.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",color:theme.text,maxWidth:480,margin:"0 auto",paddingBottom:"calc(80px + env(safe-area-inset-bottom, 0px))",transition:"background 0.3s ease,color 0.3s ease"}}>
      {/* Ảnh nền toàn app — lớp cố định phía sau mọi nội dung, độ mờ chỉnh qua Media Settings */}
      {mediaBg && (
        <div style={{
          position:"absolute",inset:0,zIndex:0,pointerEvents:"none",
          backgroundImage:`url(${mediaBg})`,backgroundSize:"cover",backgroundPosition:"center",
          backgroundAttachment:"fixed",
          opacity:mediaBgOpacity/100,
        }}/>
      )}
      <div style={{position:"relative",zIndex:1}}>
      {/* Ảnh header riêng theo tab hiện tại */}
      {currentTabHeaderImg && (
        <div style={{
          height:90,backgroundImage:`url(${currentTabHeaderImg})`,backgroundSize:"cover",backgroundPosition:"center",
          borderRadius:"0 0 18px 18px",marginBottom:-18,
        }}/>
      )}
      <Hdr lv={lv} rt={rt} todayE={todayE} todayRank={todayRank} str={str} txp={txp}
           quoteToday={quoteToday} setts={setts} saveSetts={saveSetts} challenge={challenge} chalDone={chalDone}
           backupDoneToday={backupDoneToday} justLeveledUp={justLeveledUp}
           themeKey={themeKey} themeMenuOpen={themeMenuOpen} setThemeMenuOpen={setThemeMenuOpen} chooseTheme={chooseTheme}
           mediaModalOpen={mediaModalOpen} setMediaModalOpen={setMediaModalOpen}/>
      {/* Pill Tab Bar */}
      <div style={{position:"sticky",top:0,zIndex:10,background:theme.surfaceAlt,borderBottom:`1px solid ${theme.border}`,display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",padding:"8px 10px",gap:6}}>
        {VISIBLE_TABS.map(({t,i})=>{
          const isActive = tab===i;
          const tabColor = TAB_COLORS[i] || accent;
          return (
            <button key={i} onClick={()=>switchTab(i)} className="gb-ripple" onMouseDown={gbRipple} style={{
              flex:"0 0 auto",
              padding: isActive ? "6px 16px" : "6px 12px",
              border:"none",
              background: isActive ? `linear-gradient(135deg,${tabColor},${tabColor}CC)` : "transparent",
              cursor:"pointer",
              color: isActive ? "#FFFFFF" : theme.textDim,
              borderRadius:999,
              fontSize:11,
              fontWeight: isActive ? 700 : 400,
              boxShadow: isActive ? `0 4px 14px ${tabColor}55` : "none",
              whiteSpace:"nowrap",
              transition:"all 0.2s ease",
            }}>
              {t}
            </button>
          );
        })}
      </div>

      {/* FAB toàn cục: chỉ hiện ở tab Hôm nay — whitelist bằng FAB_WHITELIST_TABS nếu cần mở rộng sau này */}
      {FAB_WHITELIST_TABS.includes(tab) && (
        <>
          {/* Floating: Study Timer */}
          <button onClick={()=>studyRunning?stopStudy():startStudy()}
            title={studyRunning?"Dừng học":"Bắt đầu học"}
            className="gb-ripple gb-float-btn" onMouseDown={gbRipple}
            style={{position:"fixed",bottom:90,right:16,zIndex:50,width:52,height:52,borderRadius:"50%",
              background:studyRunning?`linear-gradient(135deg,${theme.warning},${theme.danger})`:`linear-gradient(135deg,${theme.success},${accent})`,
              border:"none",cursor:"pointer",
              boxShadow:studyRunning?`0 8px 24px ${theme.warning}66`:`0 8px 24px ${accent}66`,
              fontSize:studyRunning?12:20,fontWeight:700,color:"#0A0A0A",
              display:"flex",alignItems:"center",justifyContent:"center",
              transition:"box-shadow 0.25s ease, transform 0.15s ease"}}>
            {studyRunning?fmtHM(studySecs):"📚"}
          </button>

          {/* Floating: Pomodoro */}
          <button onClick={()=>setPomOpen(true)} title="Pomodoro"
            className="gb-ripple gb-float-btn" onMouseDown={gbRipple}
            style={{position:"fixed",bottom:154,right:16,zIndex:50,width:48,height:48,borderRadius:"50%",
              background:`linear-gradient(135deg,${theme.primary},${theme.secondary})`,border:"none",cursor:"pointer",
              boxShadow:`0 8px 24px ${accent}66`,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",
              transition:"box-shadow 0.25s ease, transform 0.15s ease"}}>
            🍅
          </button>

          {/* Floating: Distraction */}
          <button onClick={()=>setDistrOpen(true)} title="Tao bị kéo đi"
            className="gb-ripple gb-float-btn" onMouseDown={gbRipple}
            style={{position:"fixed",bottom:214,right:16,zIndex:50,width:48,height:48,borderRadius:"50%",
              background:`linear-gradient(135deg,${theme.danger},${theme.warning})`,border:"none",cursor:"pointer",
              boxShadow:`0 8px 24px ${theme.danger}66`,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",
              transition:"box-shadow 0.25s ease, transform 0.15s ease"}}>
            📱
          </button>
        </>
      )}
