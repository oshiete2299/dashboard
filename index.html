// ── DASHBOARD (Life OS tổng hợp) ─────────────────────────────────────────────
// Đọc dữ liệu có sẵn (db, XP, mood, finance...) — không tạo database mới.
// Compact, đọc được trong 1 màn hình, thu gọn được để không chiếm chỗ tab Hôm nay.
// MỤC 3: hỗ trợ bộ lọc phạm vi thời gian (Hôm nay / 7 ngày / 30 ngày) áp lên toàn bộ widget.
// Toàn bộ dữ liệu vẫn lấy từ props có sẵn (db, finTxs, setts...) — không tạo storage/database mới.
const DASH_RANGES = [
  {k:"today", l:"Hôm nay", days:1},
  {k:"7d",    l:"7 ngày",  days:7},
  {k:"30d",   l:"30 ngày", days:30},
];

function DashboardHome({td,data,dayE,db,txp,str,lv,rt,dayExp,setts,finTxs,onOpenMood,onOpenPomodoro,onSwitchTab}) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [open,setOpen]=useState(true);
  const [range,setRange]=useState("7d"); // today | 7d | 30d

  const rangeDef = DASH_RANGES.find(r=>r.k===range) || DASH_RANGES[1];
  const rangeDays = rangeDef.days;

  // ── Danh sách ngày trong phạm vi đã chọn (bao gồm hôm nay) — memo theo db/td/range ──
  const { presentRange, moodRangeAvg, sleepDaysCnt, swimCnt, phoneAvg, phoneVals, rangeXP } = useMemo(()=>{
    const list = Array.from({length:rangeDays},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(rangeDays-1)+i);
      const iso=d.toISOString().split("T")[0];
      return {iso, day:db[iso]||null};
    });
    const present = list.filter(x=>x.day);
    const moodVals = present.map(x=>avgMood(x.day)).filter(v=>v>0);
    const mAvg = moodVals.length ? (moodVals.reduce((a,b)=>a+b,0)/moodVals.length) : 0;
    const sleepCnt = present.filter(x=>x.day.tasks?.sleep).length;
    const swim = present.filter(x=>x.day.tasks?.swim).length;
    const pVals = present.map(x=>x.day.phone||0).filter(v=>v>0);
    const pAvg = pVals.length ? Math.round(pVals.reduce((a,b)=>a+b,0)/pVals.length) : 0;
    const xpSum = list.reduce((s,x)=>s+dayExp(x.iso),0);
    return { presentRange:present, moodRangeAvg:mAvg, sleepDaysCnt:sleepCnt, swimCnt:swim, phoneAvg:pAvg, phoneVals:pVals, rangeXP:xpSum };
  },[db,td,rangeDays,dayExp]);

  // Tiến độ học: số môn (Toán/Lý/Hóa/Văn) hoàn thành hôm nay — giữ lại cho tương thích dữ liệu cũ,
  // không còn hiển thị trực tiếp trên Dashboard (đã thay bằng "Việc nhỏ" ở V24 MỤC 8) nhưng vẫn tính để không phá vỡ chỗ khác dùng.
  const subjectIds=["math","physics","chem","lit"];
  const subjectsDoneToday = subjectIds.filter(id=>data.tasks?.[id]).length;
  const studyTimeToday = data.studyTime||0;

  // ── V24 MỤC 8: x/5 việc nhỏ, mục tiêu lớn, TikTok còn bao nhiêu phút ──
  const picksToday = Array.isArray(data.dailyPicks) ? data.dailyPicks : [];
  const picksTotalToday = picksToday.length || 5;
  const picksDoneToday = picksToday.filter(id=>data.poolDone?.[id]).length;
  const bigGoalsToday = Array.isArray(data.bigGoalsToday) ? data.bigGoalsToday : [];
  const bigGoalsTotalToday = bigGoalsToday.length;
  const bigGoalsDoneToday = bigGoalsToday.filter(g=>g.done).length;
  const shortContentUsedToday = (data.shortContent||[]).reduce((s,x)=>s+(x.minutes||0),0);
  const shortContentLimitToday = shortContentLimitMin(td);
  const shortContentRemain = Math.max(0, shortContentLimitToday - shortContentUsedToday);

  // Top achievement — memo theo db/str/txp (ACHIEVEMENTS.check khá rẻ nhưng vẫn tránh lặp lại vô ích)
  const topAchievement = useMemo(()=>{
    const unlocked = ACHIEVEMENTS.filter(a=>a.check(db,str,txp));
    return unlocked.length ? unlocked[unlocked.length-1] : null;
  },[db,str,txp]);

  // ── Showcase — 3 achievement đã pin (MỤC 4), chỉ hiện những cái thực sự đã unlock ──
  const showcaseAchievements = useMemo(()=>{
    const pinnedIds = setts?.pinnedAchievements || [];
    if(!pinnedIds.length) return [];
    return pinnedIds
      .map(id=>ACHIEVEMENTS.find(a=>a.id===id))
      .filter(a=>a && a.check(db,str,txp))
      .slice(0,3);
  },[setts,db,str,txp]);

  // ── Tài chính — theo phạm vi đã chọn (finTxs đến từ App root, chỉ memo phép lọc/cộng) ──
  const { periodBalance, monthTxs, monthIncome, monthExpense, monthBalance } = useMemo(()=>{
    const thisMonth = finMonthKey(td);
    const mTxs = (finTxs||[]).filter(t=>finMonthKey(t.date)===thisMonth);
    const mInc = mTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const mExp = mTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-(rangeDays-1));
    const cutoffIso = cutoff.toISOString().split("T")[0];
    const pTxs = (finTxs||[]).filter(t=>t.date>=cutoffIso&&t.date<=td);
    const pInc = pTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const pExp = pTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

    return { periodBalance:pInc-pExp, monthTxs:mTxs, monthIncome:mInc, monthExpense:mExp, monthBalance:mInc-mExp };
  },[finTxs,td,rangeDays]);
  const finLoaded = finTxs!==null && finTxs!==undefined;

  // ── Weekly / Monthly Goal — dựa trên setts.targetXP (mục tiêu XP/ngày đã có sẵn, không tạo state mới) ──
  const goalInfo = useMemo(()=>{
    const dailyTarget = setts?.targetXP || 150;
    const periodTarget = dailyTarget * rangeDays;
    const pct = periodTarget>0 ? Math.min(100, Math.round((rangeXP/periodTarget)*100)) : 0;
    return { dailyTarget, periodTarget, pct };
  },[setts,rangeDays,rangeXP]);

  // ── XP Forecast — ước tính XP cuối phạm vi nếu giữ nhịp trung bình hiện tại ──
  const xpForecast = useMemo(()=>{
    const daysElapsed = presentRange.length;
    if(daysElapsed===0) return null;
    const avgPerDay = rangeXP/daysElapsed;
    const projected = Math.round(avgPerDay*rangeDays);
    return { avgPerDay:Math.round(avgPerDay), projected, daysElapsed };
  },[presentRange.length,rangeXP,rangeDays]);

  // ── Mood Trend / Sleep Trend — so sánh nửa đầu vs nửa sau của phạm vi để biết đang tăng/giảm ──
  const trendInfo = useMemo(()=>{
    if(presentRange.length<4) return { mood:null, sleep:null };
    const mid = Math.floor(presentRange.length/2);
    const firstHalf = presentRange.slice(0,mid), secondHalf = presentRange.slice(mid);
    const moodOf = arr=>{ const v=arr.map(x=>avgMood(x.day)).filter(x=>x>0); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; };
    const m1=moodOf(firstHalf), m2=moodOf(secondHalf);
    const moodTrend = (m1>0&&m2>0) ? {from:m1,to:m2,dir:m2>m1?"up":m2<m1?"down":"flat"} : null;
    const sleepRateOf = arr=> arr.length ? arr.filter(x=>x.day.tasks?.sleep).length/arr.length : 0;
    const s1=sleepRateOf(firstHalf), s2=sleepRateOf(secondHalf);
    const sleepTrend = {from:Math.round(s1*100),to:Math.round(s2*100),dir:s2>s1?"up":s2<s1?"down":"flat"};
    return { mood:moodTrend, sleep:sleepTrend };
  },[presentRange]);

  // ── Productivity Score / Focus Score — điểm tổng hợp 0-100 từ dữ liệu có sẵn, không thêm field mới ──
  const scores = useMemo(()=>{
    if(presentRange.length===0) return { productivity:0, focus:0 };
    const n = presentRange.length;
    // Productivity: trung bình %target XP đạt mỗi ngày trong phạm vi, cap 100/ngày
    const dailyTarget = setts?.targetXP || 150;
    const perDayPct = presentRange.map(x=>Math.min(100,(dayExp(x.iso)/Math.max(dailyTarget,1))*100));
    const productivity = Math.round(perDayPct.reduce((a,b)=>a+b,0)/n);
    // Focus: kết hợp study time trung bình/ngày (chuẩn hoá theo 120' = 100 điểm) và phone time nghịch (ít phone = điểm cao)
    const avgStudy = presentRange.reduce((s,x)=>s+(x.day.studyTime||0),0)/n;
    const studyScore = Math.min(100, Math.round(((avgStudy/60)/120)*100));
    const phoneScoreRaw = phoneAvg>0 ? Math.round(100-((phoneAvg-180)/6)) : 50;
    const phoneScore = Math.min(100,Math.max(0,phoneScoreRaw));
    const focus = Math.round(Math.min(100,Math.max(0,studyScore*0.6+phoneScore*0.4)));
    return { productivity, focus };
  },[presentRange,setts,dayExp,phoneAvg]);

  // ── 1 Insight nổi bật nhất trong phạm vi (chỉ 1 dòng — chi tiết đầy đủ xem ở tab Khám Phá) ──
  const insight = useMemo(()=>{
    if(presentRange.length<3) return null;
    const candidates=[];
    const swimDays=presentRange.filter(x=>x.day.tasks?.swim);
    const noSwimDays=presentRange.filter(x=>!x.day.tasks?.swim);
    if(swimDays.length>=1 && noSwimDays.length>=1){
      const sM=swimDays.reduce((s,x)=>s+avgMood(x.day),0)/swimDays.length;
      const nM=noSwimDays.reduce((s,x)=>s+avgMood(x.day),0)/noSwimDays.length;
      if(sM>0 && nM>0 && sM>nM) candidates.push({icon:"🏊",text:`Mood cao hơn vào ngày có bơi (${sM.toFixed(1)} so với ${nM.toFixed(1)})`});
    }
    const prevStart = new Date(); prevStart.setDate(prevStart.getDate()-(rangeDays*2-1));
    const prevList = Array.from({length:rangeDays},(_,i)=>{const d=new Date(prevStart);d.setDate(d.getDate()+i);return db[d.toISOString().split("T")[0]];}).filter(Boolean);
    if(prevList.length>=3 && phoneVals.length>=3){
      const prevPhoneVals=prevList.map(d=>d.phone||0).filter(v=>v>0);
      if(prevPhoneVals.length>=2){
        const prevAvg=prevPhoneVals.reduce((a,b)=>a+b,0)/prevPhoneVals.length;
        if(phoneAvg<prevAvg*0.9) candidates.push({icon:"📉",text:`Screen Time giảm ${Math.round((1-phoneAvg/prevAvg)*100)}% so với kỳ trước`});
      }
    }
    const prevStart2 = new Date(); prevStart2.setDate(prevStart2.getDate()-(rangeDays*2-1));
    const prevXP = Array.from({length:rangeDays},(_,i)=>{const d=new Date(prevStart2);d.setDate(d.getDate()+i);return dayExp(d.toISOString().split("T")[0]);}).reduce((a,b)=>a+b,0);
    if(prevXP>0 && rangeXP>prevXP) candidates.push({icon:"⚡",text:`XP kỳ này (${rangeXP}) cao hơn kỳ trước (${prevXP})`});
    const maxStudyBefore = Math.max(0,...presentRange.filter(x=>x.iso!==td).map(x=>x.day.studyTime||0));
    if(studyTimeToday>0 && studyTimeToday>maxStudyBefore && maxStudyBefore>0) candidates.push({icon:"📚",text:`Study Time hôm nay đạt kỷ lục trong kỳ`});
    return candidates[0]||null;
  },[presentRange,phoneVals,phoneAvg,db,td,dayExp,studyTimeToday,rangeDays,rangeXP]);

  const StatCell = ({icon,label,value,color}) => (
    <div className="gb-card-hover gb-card-elevate" style={{background:theme.surfaceAlt,borderRadius:10,padding:"8px 10px"}}>
      <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>{icon} {label}</div>
      <div style={{fontSize:13,fontWeight:700,color:color||theme.text}}>{value}</div>
    </div>
  );

  const rangeLabel = rangeDef.l;

  return (
    <div style={{background:`linear-gradient(135deg,${accent}12,${accent}04)`,border:`1px solid ${accent}33`,borderRadius:14,padding:"12px 14px",marginBottom:14,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div onClick={()=>setOpen(p=>!p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
        <div style={{fontSize:12,fontWeight:700,color:accent}}>🧭 Dashboard</div>
        <span style={{fontSize:11,color:theme.textDim}}>{open?"▲ Thu gọn":"▼ Mở rộng"}</span>
      </div>

      {open && (
        <div className="gb-fade-in" style={{marginTop:10}}>
          {/* Bộ lọc phạm vi thời gian */}
          <div style={{display:"flex",gap:6,marginBottom:10}} onClick={e=>e.stopPropagation()}>
            {DASH_RANGES.map(r=>(
              <button key={r.k} onClick={()=>setRange(r.k)} style={{flex:1,padding:"6px 0",borderRadius:999,border:`1px solid ${range===r.k?accent:theme.border}`,background:range===r.k?`${accent}22`:"transparent",color:range===r.k?accent:theme.textDim,fontSize:10,fontWeight:range===r.k?700:400,cursor:"pointer",transition:"all 0.2s ease"}}>{r.l}</button>
            ))}
          </div>

          {/* Hàng 1: Streak / XP / Rank / Việc nhỏ hôm nay (V24 MỤC 8: x/5 task) */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8}}>
            <StatCell icon="🔥" label="Streak" value={`${str}d`} color={str>=7?theme.success:theme.warning}/>
            <StatCell icon="⭐" label="XP" value={txp.toLocaleString()} color={theme.warning}/>
            <StatCell icon="🏆" label="Rank" value={`Lv${lv.l}`} color={accent}/>
            <StatCell icon="✅" label="Việc nhỏ" value={`${picksDoneToday}/${picksTotalToday}`} color={picksDoneToday>=picksTotalToday&&picksTotalToday>0?theme.success:theme.text}/>
          </div>

          {/* Hàng 1b: Mục tiêu lớn hôm nay / TikTok còn bao nhiêu phút (V24 MỤC 8) */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <StatCell icon="🎯" label="Mục tiêu lớn" value={`${bigGoalsDoneToday}/${bigGoalsTotalToday}`} color={bigGoalsDoneToday>=bigGoalsTotalToday&&bigGoalsTotalToday>0?theme.success:theme.text}/>
            <StatCell icon="📱" label="TikTok còn lại" value={`${shortContentRemain} phút`} color={shortContentRemain<=0?theme.danger:shortContentRemain<=10?theme.warning:theme.success}/>
          </div>

          {/* Hàng 2: Mood / Sleep / Swim / Phone — theo phạm vi đã chọn */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8}}>
            <StatCell icon="😊" label={`Mood ${rangeLabel}`} value={moodRangeAvg>0?`${moodRangeAvg.toFixed(1)}/5`:"—"} color={theme.accent}/>
            <StatCell icon="😴" label={`Sleep ${rangeLabel}`} value={`${sleepDaysCnt}/${rangeDays}`} color={sleepDaysCnt>=Math.ceil(rangeDays*0.7)?theme.success:theme.text}/>
            <StatCell icon="🏊" label={`Swim ${rangeLabel}`} value={`${swimCnt}x`} color={theme.accent}/>
            <StatCell icon="📱" label="Phone TB" value={phoneAvg>0?`${Math.floor(phoneAvg/60)}h${phoneAvg%60}m`:"—"} color={pColor(phoneAvg)}/>
          </div>

          {/* Weekly/Monthly Goal + XP Forecast */}
          <div style={{background:theme.surfaceAlt,borderRadius:10,padding:"9px 12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:10,color:theme.textDim}}>🎯 Mục tiêu XP ({rangeLabel})</span>

            </div>
            <div style={{height:6,background:theme.border,borderRadius:3,overflow:"hidden",marginBottom:6}}>
              <div className="gb-progress-fill" style={{height:"100%",width:`${goalInfo.pct}%`,background:goalInfo.pct>=100?`linear-gradient(90deg,${theme.success},${theme.primary})`:`linear-gradient(90deg,${accent},${accent}cc)`,borderRadius:3}}/>
            </div>
            {xpForecast && rangeDays>1 && (
              <div style={{fontSize:9,color:theme.textDim}}>
                📈 Dự báo cuối kỳ: <b style={{color:xpForecast.projected>=goalInfo.periodTarget?theme.success:theme.warning}}>{xpForecast.projected} XP</b> (nhịp TB {xpForecast.avgPerDay} XP/ngày)

          </div>

          {/* Mood Trend / Sleep Trend */}
          {(trendInfo.mood || trendInfo.sleep) && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
              {trendInfo.mood && (
                <div style={{background:theme.surfaceAlt,borderRadius:10,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>😊 Mood Trend</div>
                  <div style={{fontSize:12,fontWeight:700,color:trendInfo.mood.dir==="up"?theme.success:trendInfo.mood.dir==="down"?theme.danger:theme.text}}>
                    {trendInfo.mood.dir==="up"?"↗":trendInfo.mood.dir==="down"?"↘":"→"} {trendInfo.mood.from.toFixed(1)}→{trendInfo.mood.to.toFixed(1)}
                  </div>
                </div>
              )}
              {trendInfo.sleep && (
                <div style={{background:theme.surfaceAlt,borderRadius:10,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>😴 Sleep Trend</div>
                  <div style={{fontSize:12,fontWeight:700,color:trendInfo.sleep.dir==="up"?theme.success:trendInfo.sleep.dir==="down"?theme.danger:theme.text}}>
                    {trendInfo.sleep.dir==="up"?"↗":trendInfo.sleep.dir==="down"?"↘":"→"} {trendInfo.sleep.from}%→{trendInfo.sleep.to}%
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Productivity Score / Focus Score */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <div style={{background:theme.surfaceAlt,borderRadius:10,padding:"8px 10px"}}>
              <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>⚙️ Productivity Score</div>
              <div style={{fontSize:13,fontWeight:700,color:scores.productivity>=70?theme.success:scores.productivity>=40?theme.warning:theme.danger}}>{scores.productivity}/100</div>
            </div>
            <div style={{background:theme.surfaceAlt,borderRadius:10,padding:"8px 10px"}}>
              <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>🎯 Focus Score</div>
              <div style={{fontSize:13,fontWeight:700,color:scores.focus>=70?theme.success:scores.focus>=40?theme.warning:theme.danger}}>{scores.focus}/100</div>
            </div>
          </div>

          {/* Tài chính — tháng này (cố định) + theo phạm vi đã chọn */}
          <div style={{background:theme.surfaceAlt,borderRadius:10,padding:"9px 12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:10,color:theme.textDim}}>💰 Tài chính tháng này</span>
              {!finLoaded
                ? <span style={{fontSize:10,color:theme.textDim}}>Đang tải…</span>

              }
            </div>
            {finLoaded && monthTxs.length>0 && (
              <div style={{display:"flex",gap:12,marginTop:4,fontSize:9,color:theme.textDim}}>
                <span>Thu: <b style={{color:theme.success}}>{fmtVND(monthIncome)}</b></span>
                <span>Chi: <b style={{color:theme.danger}}>{fmtVND(monthExpense)}</b></span>
              </div>
            )}
            {finLoaded && monthTxs.length===0 && (
              <div style={{fontSize:9,color:theme.textDim,marginTop:4}}>Chưa có giao dịch tháng này</div>
            )}
            {finLoaded && rangeDays>1 && (
              <div style={{fontSize:9,color:theme.textDim,marginTop:6,paddingTop:6,borderTop:`1px solid ${theme.border}`}}>
                Trong {rangeLabel.toLowerCase()}: <b style={{color:periodBalance>=0?theme.success:theme.danger}}>{periodBalance>=0?"+":""}{fmtVND(periodBalance)} ₫</b>
              </div>
            )}
          </div>

          {/* Showcase — 3 achievement đã pin (MỤC 4). Nếu chưa pin gì, fallback về Top Achievement như cũ */}
          {showcaseAchievements.length>0 ? (
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:theme.textDim,marginBottom:5}}>🏅 Showcase</div>

                {showcaseAchievements.map(a=>(
                  <div key={a.id} style={{background:`${a.c}14`,border:`1px solid ${a.c}44`,borderRadius:10,padding:"8px 8px",textAlign:"center"}}>
                    <div style={{fontSize:16,marginBottom:2}}>{a.icon}</div>
                    <div style={{fontSize:9,fontWeight:700,color:a.c}}>{a.name}</div>
                  </div>
                ))}
              </div>
            </div>
          ) : topAchievement && (
            <div style={{display:"flex",alignItems:"center",gap:8,background:`${topAchievement.c}14`,border:`1px solid ${topAchievement.c}44`,borderRadius:10,padding:"8px 12px",marginBottom:8}}>
              <span style={{fontSize:16}}>{topAchievement.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,color:theme.textDim}}>🏅 Thành tựu nổi bật</div>
                <div style={{fontSize:11,fontWeight:600,color:topAchievement.c}}>{topAchievement.name}</div>
              </div>
            </div>
          )}

          {/* 1 Insight nổi bật + nút Xem thêm (chi tiết đầy đủ nằm ở Correlation Lab, không copy lại ở đây) */}
          <div style={{background:`linear-gradient(135deg,${theme.primary}14,${theme.secondary}14)`,borderRadius:10,padding:"9px 12px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:9,fontWeight:700,color:theme.primary}}>💡 Insight nổi bật</span>
              {onSwitchTab && (
                <button onClick={()=>onSwitchTab(9)} style={{background:"none",border:"none",color:theme.primary,fontSize:9,fontWeight:600,cursor:"pointer"}}>Xem thêm →</button>
              )}
            </div>
            {insight
              ? <div style={{fontSize:11,color:theme.text,lineHeight:1.5}}>{insight.icon} {insight.text}</div>
              : <div style={{fontSize:10,color:theme.textDim}}>Cần thêm vài ngày dữ liệu để hiện insight.</div>
            }
          </div>

          {/* Quick Actions — gọi thẳng callback từ props, không qua CustomEvent */}
          <div style={{display:"flex",gap:6}}>
            <button onClick={onOpenPomodoro} className="gb-ripple" onMouseDown={gbRipple} style={{flex:1,padding:"8px 0",borderRadius:999,border:`1px solid ${accent}44`,background:"transparent",color:accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>📚 Pomodoro</button>
            <button onClick={onOpenMood} className="gb-ripple" onMouseDown={gbRipple} style={{flex:1,padding:"8px 0",borderRadius:999,border:`1px solid ${accent}44`,background:"transparent",color:accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>🌈 Ghi mood</button>
            <button onClick={()=>onSwitchTab?.(10)} className="gb-ripple" onMouseDown={gbRipple} style={{flex:1,padding:"8px 0",borderRadius:999,border:`1px solid ${accent}44`,background:"transparent",color:accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>💰 Thêm chi tiêu</button>
          </div>

          {/* MỤC 7 — Widget mới: AI Insight (Top 3 Insight / Top Warning / Quick Suggestion). Widget cũ ở trên giữ nguyên. */}
          <div style={{marginTop:10}}>
            <AiInsightWidget db={db} dayExp={dayExp} finTxs={finTxs} setts={setts} str={str} txp={txp} onOpenAiInsight={()=>onSwitchTab?.(9)}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════ V24: 5 VIỆC NHỎ HÔM NAY ═══════════════════
function DailyPicksCard({td,data,taskPool,onToggle,onSwap,onOpenManager}) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [collapsed,setCollapsed] = useState(false);
  const picks = Array.isArray(data.dailyPicks) ? data.dailyPicks : [];
  const poolById = Object.fromEntries((taskPool||[]).map(t=>[t.id,t]));
  const doneCount = picks.filter(id=>data.poolDone?.[id]).length;
  const swapsUsed = data.swapsUsed||0;
  return (
    <div style={{background:theme.surface,borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:collapsed?0:10}}>
        <span style={{fontSize:13,fontWeight:700,color:accent}}>📋 Nhiệm vụ hôm nay</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:10,color:theme.textDim}}>{doneCount}/{picks.length||5}</span>
          <button onClick={()=>setCollapsed(c=>!c)} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:12,padding:"0 4px"}}>{collapsed?"▾":"▴"}</button>
        </div>
      </div>
      {!collapsed && <>
      {picks.length===0 && <div style={{fontSize:11,color:theme.textDim,padding:"6px 0"}}>Đang chọn việc cho hôm nay…</div>}
      {picks.map((id,idx)=>{
        const t = poolById[id];
        if(!t) return null; // task đã bị xoá khỏi kho — bỏ qua an toàn, không crash
        const checked = !!data.poolDone?.[id];
        const canSwap = swapsUsed<2 && !checked;
        return (
          <div key={id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",marginBottom:6,background:checked?`${accent}0D`:theme.surfaceAlt,borderRadius:8,boxShadow:"0 4px 14px rgba(0,0,0,0.2)"}}>
            <div onClick={()=>onToggle(id)} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
              <NeonCheckbox checked={checked} onChange={()=>onToggle(id)} accent={accent}/>
              <span style={{fontSize:14}}>{t.i||"✅"}</span>
              <span style={{flex:1,fontSize:12,minWidth:0}}>
                <span key={checked?"done":"undone"} className={checked?"task-text-done":""} style={{"--strike-color":accent}}>
                  <b style={{opacity:0.6,fontWeight:600}}>{idx+1}.</b> {t.l}
                </span>
                {t.why && <div style={{fontSize:10,color:theme.textDim,marginTop:2,fontWeight:400}}>💡 {t.why}</div>}
              </span>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:999,background:checked?`${accent}22`:"rgba(255,255,255,.05)",color:checked?accent:theme.textDim,flexShrink:0}}>+{t.e||TP_XP}XP</span>
            </div>
            <button disabled={!canSwap} onClick={()=>onSwap(id)} title={swapsUsed>=2?"Đã hết lượt đổi hôm nay (2/2)":checked?"Không thể đổi việc đã hoàn thành":"Đổi việc này"}
              style={{background:"none",border:"none",color:canSwap?theme.textDim:theme.textDim+"44",cursor:canSwap?"pointer":"not-allowed",fontSize:14,flexShrink:0}}>🔄</button>
          </div>
        );
      })}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
        <span style={{fontSize:9,color:theme.textDim}}>🔄 Đổi việc: {swapsUsed}/2 lần hôm nay</span>
        <button onClick={onOpenManager} style={{background:"none",border:"none",color:accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>📚 Quản lý Kho việc nhỏ</button>
      </div>
      </>}
    </div>
  );
}

// ══════════════════════════════ V24: MỤC TIÊU LỚN ═══════════════════════════
function BigGoalCard({td,data,goalPool,save,onOpenManager,onMarkGoalPicked,onBumpGoalDoneCount,onBumpGoalSkipCount}) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [quickText,setQuickText]=useState("");
  const [pickerOpen,setPickerOpen]=useState(false);
  const [collapsed,setCollapsed]=useState(false);
  const todayGoals = Array.isArray(data.bigGoalsToday) ? data.bigGoalsToday : [];

  const addFromPool = (goalId)=>{
    const g = (goalPool||[]).find(x=>x.id===goalId);
    if(!g) return;
    if(todayGoals.length>=1) return;
    save(td,{bigGoalsToday:[...todayGoals,{id:"bg_"+Date.now(),text:g.text,done:false,fromPoolId:g.id}]});
    if(onMarkGoalPicked) onMarkGoalPicked(g.id, td); // [PATCH] người chọn tay từ Kho cũng tính là "đã pick hôm nay"
    setPickerOpen(false);
  };
  const addQuick = ()=>{
    if(!quickText.trim()||todayGoals.length>=1) return;
    save(td,{bigGoalsToday:[...todayGoals,{id:"bg_"+Date.now(),text:quickText.trim(),done:false}]});
    setQuickText("");
  };
  // [PATCH] khi goal đến từ Kho (fromPoolId) và được đánh dấu HOÀN THÀNH,
  // cộng doneCount cho goal đó trong Kho — dùng bởi pickBigGoalForToday()
  // để ưu tiên goal ít khi được hoàn thành.
  const toggle = id=>{
    const g0 = todayGoals.find(g=>g.id===id);
    if(g0 && !g0.done){
      playSound("tick");
      if(g0.fromPoolId && onBumpGoalDoneCount) onBumpGoalDoneCount(g0.fromPoolId, 1);
    } else if(g0 && g0.done && g0.fromPoolId && onBumpGoalDoneCount){
      onBumpGoalDoneCount(g0.fromPoolId, -1); // bỏ tick lại → trừ lại doneCount
    }
    save(td,{bigGoalsToday:todayGoals.map(g=>g.id===id?{...g,done:!g.done}:g)});
  };
  // [PATCH] xoá 1 goal chưa hoàn thành trong ngày = coi như bỏ qua → tăng
  // skipCount cho goal đó trong Kho, để pickBigGoalForToday() biết mà cân nhắc.
  const remove = id=>{
    const g0 = todayGoals.find(g=>g.id===id);
    if(g0 && !g0.done && g0.fromPoolId && onBumpGoalSkipCount) onBumpGoalSkipCount(g0.fromPoolId, 1);
    save(td,{bigGoalsToday:todayGoals.filter(g=>g.id!==id)});
  };

  return (
    <div style={{background:`linear-gradient(135deg,${theme.primary}14,${theme.secondary}0A)`,borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:collapsed?0:10}}>
        <span style={{fontSize:13,fontWeight:700,color:theme.primary}}>🎯 Mục tiêu hôm nay</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:10,color:theme.textDim}}>{todayGoals.filter(g=>g.done).length}/{todayGoals.length||0} · tối đa 1</span>
          <button onClick={()=>setCollapsed(c=>!c)} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:12,padding:"0 4px"}}>{collapsed?"▾":"▴"}</button>
        </div>
      </div>
      {!collapsed && <>
      {todayGoals.length===0 && <div style={{fontSize:11,color:theme.textDim,marginBottom:8}}>Chưa có mục tiêu lớn nào cho hôm nay.</div>}
      {todayGoals.map(g=>(
        <div key={g.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:6,background:g.done?`${theme.primary}14`:theme.surfaceAlt,borderRadius:8}}>
          <NeonCheckbox checked={g.done} onChange={()=>toggle(g.id)} accent={theme.primary}/>
          <span style={{flex:1,fontSize:12,minWidth:0}}>
            <span key={g.done?"done":"undone"} className={g.done?"task-text-done":""} style={{"--strike-color":theme.primary}}>{g.text}</span>
          </span>
          <span style={{fontSize:9,color:theme.textDim,flexShrink:0}}>+15XP</span>
          <button onClick={()=>remove(g.id)} style={{background:"none",border:"none",color:theme.danger,fontSize:15,cursor:"pointer",flexShrink:0}}>×</button>
        </div>
      ))}
      {todayGoals.length<1 && (
        <div>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <input value={quickText} onChange={e=>setQuickText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQuick()} placeholder="Nhập nhanh mục tiêu..." style={{flex:1,background:theme.surfaceAlt,border:`1px solid ${theme.primary}44`,borderRadius:10,padding:"7px 10px",color:theme.text,fontSize:11,outline:"none"}}/>
            <button onClick={addQuick} style={{background:theme.primary,border:"none",borderRadius:10,padding:"0 12px",color:"white",fontWeight:600,fontSize:12,cursor:"pointer"}}>+</button>
          </div>
          <button onClick={()=>setPickerOpen(p=>!p)} style={{width:"100%",padding:"6px 0",borderRadius:999,border:`1px solid ${theme.primary}33`,background:"transparent",color:theme.primary,fontSize:10,fontWeight:600,cursor:"pointer"}}>📚 Chọn từ Kho mục tiêu lớn</button>
          {pickerOpen && (
            <div style={{marginTop:8,maxHeight:160,overflowY:"auto"}}>
              {(goalPool||[]).length===0 && <div style={{fontSize:10,color:theme.textDim,padding:"6px 0"}}>Kho mục tiêu lớn đang trống.</div>}
              {(goalPool||[]).map(g=>(
                <div key={g.id} onClick={()=>addFromPool(g.id)} style={{padding:"7px 10px",marginBottom:4,background:theme.surfaceAlt,borderRadius:8,fontSize:11,color:theme.text,cursor:"pointer"}}>{g.text}</div>
              ))}
            </div>
          )}
        </div>
      )}
      <button onClick={onOpenManager} style={{marginTop:8,background:"none",border:"none",color:theme.textDim,fontSize:9,fontWeight:600,cursor:"pointer"}}>⚙️ Quản lý Kho mục tiêu lớn</button>
      </>}
    </div>
  );
}

function TomorrowPrepCard({td,data,save}) {

  const accent = useContext(AccentContext);
  const [modalOpen,setModalOpen]=useState(false);
  const [text,setText]=useState("");
  const prep = data.tomorrowPrep; // {text, createdAt, doneAt} | null — do HÔM QUA tạo cho HÔM NAY

  const createForTomorrow = ()=>{
    if(!text.trim()) return;
    // Lưu nháp cho ngày mai vào field riêng — App sẽ tự chuyển nó thành tomorrowPrep của ngày mai lúc load.
    save(td,{ tomorrowDraft: { text:text.trim(), createdAt:new Date().toISOString() } });
    setText("");
    setModalOpen(false);
    playSound("tick");
  };
  const toggleDone = ()=>{
    if(!prep) return;
    save(td,{ tomorrowPrep: { ...prep, doneAt: prep.doneAt ? null : new Date().toISOString() } });
    if(!prep.doneAt) playSound("tick");
  };

  return (
    <div style={{background:theme.surface,borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>

          <NeonCheckbox checked={!!prep.doneAt} onChange={toggleDone} accent={accent}/>
          <span style={{flex:1,fontSize:12,minWidth:0}}>
            <span key={prep.doneAt?"done":"undone"} className={prep.doneAt?"task-text-done":""} style={{"--strike-color":accent}}>{prep.text}</span>

          <span style={{fontSize:10,color:theme.textDim,flexShrink:0}}>+5XP</span>

        <div style={{fontSize:11,color:theme.textDim,marginBottom:10}}>Hôm qua chưa chuẩn bị gì cho hôm nay.</div>

        + Chuẩn bị cho ngày mai
      </button>
      {modalOpen && (
        <ModalPortal>
          <div style={{background:theme.surface,borderRadius:16,padding:18,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
            <div style={{fontSize:14,fontWeight:700,color:accent,marginBottom:10}}>🌙 Chuẩn bị cho ngày mai</div>
            <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Việc cần chuẩn bị cho ngày mai..." rows={3}
              style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${accent}33`,borderRadius:10,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",resize:"none",marginBottom:12}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={createForTomorrow} style={{flex:1,padding:"9px 0",borderRadius:999,border:"none",background:accent,color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>Lưu (+5XP)</button>
              <button onClick={()=>setModalOpen(false)} style={{padding:"9px 16px",borderRadius:999,border:`1px solid ${theme.border}`,background:"transparent",color:theme.textDim,fontSize:12,cursor:"pointer"}}>Huỷ</button>
            </div>
          </div>
        </ModalPortal>
      )}
    </div>
  );
}

// ══════════════════════════════ V24: NỘI DUNG NGẮN (widget riêng) ═══════════
function ShortContentCard({td,data,save}) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [source,setSource]=useState(SHORT_CONTENT_SOURCES[0]);
  const [minutes,setMinutes]=useState("5");
  const list = Array.isArray(data.shortContent) ? data.shortContent : [];
  const used = list.reduce((s,x)=>s+(x.minutes||0),0);
  const limit = shortContentLimitMin(td);
  const pct = Math.min(100,(used/limit)*100);
  const barColor = pct>=100?theme.danger:pct>=70?theme.warning:theme.success;
  const add=()=>{
    const m=Number(minutes);
    if(!m||m<=0) return;
    save(td,{shortContent:[...list,{id:"sc_"+Date.now(),source,minutes:m,at:new Date().toISOString()}]});
    setMinutes("5");
  };
  const del=id=>save(td,{shortContent:list.filter(x=>x.id!==id)});
  return (
    <div style={{background:theme.surface,borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:accent}}>📱 Nội dung ngắn</span>
        <span style={{fontSize:11,fontWeight:700,color:barColor}}>{used}/{limit} phút</span>
      </div>
      <div style={{height:8,background:theme.border,borderRadius:4,overflow:"hidden",marginBottom:4}}>
        <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:4,transition:"width 0.3s ease"}}/>
      </div>
      <div style={{fontSize:9,color:theme.textDim,marginBottom:10}}>
        {pct>=100?"🔴 Đã vượt giới hạn hôm nay":pct>=70?"🟡 Sắp hết giới hạn":"🟢 Trong tầm kiểm soát"} · Giới hạn: {limit===60?"60 phút (T7-CN)":"30 phút (T2-T6)"}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <select value={source} onChange={e=>setSource(e.target.value)} style={{background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:10,padding:"6px 8px",color:theme.text,fontSize:11,outline:"none"}}>
          {SHORT_CONTENT_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <input value={minutes} onChange={e=>setMinutes(e.target.value.replace(/[^0-9]/g,""))} placeholder="Phút" style={{width:60,background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:10,padding:"6px 8px",color:theme.text,fontSize:11,outline:"none",textAlign:"center"}}/>
        <button onClick={add} style={{flex:1,background:accent,border:"none",borderRadius:10,padding:"0 10px",color:"white",fontWeight:600,fontSize:11,cursor:"pointer"}}>+ Ghi nhận</button>
      </div>
      {list.length>0 && (
        <div style={{maxHeight:110,overflowY:"auto"}}>
          {list.map(x=>(
            <div key={x.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:`1px solid ${theme.border}22`}}>
              <span style={{flex:1,fontSize:10,color:theme.textDim}}>{x.source}</span>
              <span style={{fontSize:10,color:theme.text}}>{x.minutes} phút</span>
              <button onClick={()=>del(x.id)} style={{background:"none",border:"none",color:theme.danger,cursor:"pointer",fontSize:13}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// [PATCH] MỤC 6 — LỘ TRÌNH NGƯỢC CHO DEADLINE (bước đầu, mức additive/UI-only
// theo đúng lưu ý của Bảo: "có thể implement sau, ưu tiên các mục trên
// trước"). Khi chip "⏰ Có deadline" được chọn, thử trích xuất 1 ngày cụ thể
// từ ô ghi chú (vd "20/7", "sự kiện game 20/7") để tính số ngày còn lại +
// hiển thị progress bar. Việc "tự thêm 1 task nhỏ mỗi ngày vào schedule"
// (phần tự động chia nhỏ công việc) CHƯA implement ở bước này — chỉ có
// phần đếm ngược + progress hiển thị, không đụng plannerOutput/Core.
function parseDeadlineFromNote(text) {
  const t = String(text || "");
  // dd/mm hoặc dd/mm/yyyy
  const m = t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
  if (!m) return null;
  const day = Number(m[1]), month = Number(m[2]);
  if (day < 1 || day > 31 || month < 1 || month > 12) return null;
  const now = new Date();
  let year = m[3] ? Number(m[3].length === 2 ? "20" + m[3] : m[3]) : now.getFullYear();
  let target = new Date(year, month - 1, day);
  // nếu ngày đã qua trong năm nay, giả định là năm sau
  if (!m[3] && target < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
    target = new Date(year + 1, month - 1, day);
  }
  // nhãn sự kiện: phần chữ trước con số ngày/tháng, nếu có
  const labelMatch = t.match(/^(.*?)\s*\d{1,2}[\/\-]\d{1,2}/);
  const label = labelMatch && labelMatch[1].trim() ? labelMatch[1].trim() : "Sự kiện";
  return { label, targetDate: target };
}

function daysBetweenDates(a, b) {
  const ms = new Date(b.getFullYear(), b.getMonth(), b.getDate()) - new Date(a.getFullYear(), a.getMonth(), a.getDate());
  return Math.round(ms / 86400000);
}

// [PATCH] DeadlineProgressCard — hiển thị "Còn X ngày đến {label}" + progress
// bar dựa trên số ngày ĐÃ QUA kể từ lúc lộ trình bắt đầu được ghi nhận
// (createdAt lưu trong v25:deadlinePlan). Progress = số ngày đã trôi qua /
// tổng số ngày ban đầu. Thuần UI-only, không tạo task tự động vào schedule
// (phần đó để lại cho bước sau theo đúng thứ tự ưu tiên Bảo đã nêu).
// [PATCH v30] Schema mở rộng: { label, targetDate, createdAt, totalDays,
// remainingHours, carryOverMinutes, assignedMinutesToday, settledDate }.
// remainingHours là số giờ CÒN LẠI (giảm dần mỗi ngày qua
// settleDeadlineProgress); carryOverMinutes = phần dư của HÔM TRƯỚC nếu
// làm chưa đủ, cộng dồn vào hôm nay (MỤC 3 yêu cầu gốc);
// assignedMinutesToday = số phút mà enrichTasksWithContext đã giao cho
// HÔM NAY (ghi lại để hôm sau settle biết cần đối chiếu với bao nhiêu).
const DEADLINE_PLAN_KEY = "v25:deadlinePlan"; // { label, targetDate, createdAt, totalDays, remainingHours, carryOverMinutes, assignedMinutesToday, settledDate } | null

// [PATCH v30] settleDeadlineProgress — chạy 1 LẦN mỗi khi sang ngày mới
// (gọi từ MorningWidget lúc mount/đổi ngày), đối chiếu xem hôm qua đã làm
// đủ phút cho task "Làm sự kiện: {label}" chưa — dựa trên
// yesterdayData.scheduleDone mà SmartSchedule đã ghi, khớp theo tên task
// bắt đầu bằng "Làm sự kiện:". Cập nhật remainingHours + carryOverMinutes
// cho hôm nay. Nếu remainingHours <= 0 → trả về null (tự tắt chế độ
// deadline, đúng MỤC 3 "làm xong trước deadline → tự động tắt"). Hàm
// THUẦN — không tự đọc/ghi storage, caller chịu trách nhiệm S.get/S.set
// xung quanh nó.
function settleDeadlineProgress(plan, td, yesterdayData, yesterdayRouteItems) {
  if (!plan) return plan;
  if (plan.settledDate === td) return plan; // đã settle hôm nay rồi, tránh trừ 2 lần
  if (!yesterdayData || !plan.assignedMinutesToday) {
    // Chưa có gì để đối chiếu (plan vừa tạo hôm nay, hoặc chưa từng chạy
    // pipeline hôm qua) — chỉ đánh dấu settled, không trừ giờ.
    return { ...plan, settledDate: td };
  }

  // Tìm item deadline trong lịch hôm qua (khớp theo tên, do SmartSchedule
  // không tạo key cố định cho task này — nó nằm cuối schedule, key dạng "tNN").
  const deadlineItem = (yesterdayRouteItems || []).find(it => (it.name || "").startsWith("Làm sự kiện:"));
  const doneMin = deadlineItem && yesterdayData.scheduleDone?.[deadlineItem.key]
    ? (deadlineItem.dur || plan.assignedMinutesToday) : 0;

  const shortfall = Math.max(0, plan.assignedMinutesToday - doneMin);
  const hoursUsed = doneMin / 60;
  const nextRemaining = Math.max(0, (plan.remainingHours || 0) - hoursUsed);

  if (nextRemaining <= 0) return null; // xong sớm — tự tắt deadline mode

  return { ...plan, remainingHours: nextRemaining, carryOverMinutes: shortfall, settledDate: td };
}

function DeadlineProgressCard({ td }) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [plan, setPlan] = useState(undefined); // undefined = chưa tải xong

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const raw = await S.get(DEADLINE_PLAN_KEY);
        if (!cancelled) setPlan(raw && raw !== "null" ? JSON.parse(raw) : null);
      } catch { if (!cancelled) setPlan(null); }
    })();
    return () => { cancelled = true; };
  }, []);

  if (!plan) return null;
  const today = new Date(td + "T00:00:00");
  const target = new Date(plan.targetDate);
  const daysLeft = Math.max(0, daysBetweenDates(today, target));
  const totalDays = plan.totalDays || Math.max(1, daysBetweenDates(new Date(plan.createdAt), target));
  const daysElapsed = Math.max(0, totalDays - daysLeft);
  const pct = Math.min(100, Math.round((daysElapsed / totalDays) * 100));

  if (daysLeft <= 0) return null; // deadline đã qua — tự ẩn, không nhắc nữa

  return (
    <div style={{ background: theme.surface, borderRadius: 16, padding: 14, marginBottom: 14, border: `1px solid ${theme.border}` }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: theme.text, marginBottom: 6 }}>
        📅 Còn {daysLeft} ngày đến {plan.label}
      </div>
      <div style={{ fontSize: 10, color: theme.textDim, marginBottom: 8 }}>
        Tiến độ: {daysElapsed}/{totalDays} ngày
        {/* [PATCH v30] hiển thị thêm số giờ còn lại nếu plan có remainingHours */}
        {typeof plan.remainingHours === "number" && ` · Còn ${Math.round(plan.remainingHours*10)/10}h cần làm`}
      </div>
      <div style={{ height: 6, borderRadius: 999, background: theme.bg, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: accent, transition: "width 0.3s ease" }}/>
      </div>
    </div>
  );
}

// [PATCH] parseNaturalLanguage(text) — trích xuất tín hiệu từ câu tiếng
// Việt tự do của Bảo, KHÔNG đụng vào aiPlannerCore.js. Trả về đúng những
// field mà form cứng (energy/homework/event) từng thu bằng slider/nút bấm,
// cộng thêm 2 field mới (goalMode, extraEvents) chỉ dùng ở lớp UI. Parser
// luôn có giá trị mặc định an toàn, và câu gốc luôn được giữ nguyên văn
// trong freeNote.
function parseNaturalLanguage(text) {
  const raw = String(text || "").trim();
  const t = raw.toLowerCase();

  // ── Năng lượng: cao/trung bình/thấp → 1-5 ──
  let energy = null;
  if (/(mệt|đuối|kiệt sức|không có sức|buồn ngủ|uể oải)/.test(t)) energy = 2;
  if (/(năng lượng thấp|ít năng lượng)/.test(t)) energy = 2;
  if (/(năng lượng cao|đầy năng lượng|khỏe|sung|tràn đầy)/.test(t)) energy = 5;
  if (/(năng lượng (trung bình|vừa|ổn))/.test(t)) energy = 3;
  if (/rất mệt|kiệt sức/.test(t)) energy = 1;
  const energyNumMatch = t.match(/năng lượng\s*(\d)/);
  if (energyNumMatch) energy = Math.max(1, Math.min(5, Number(energyNumMatch[1])));

  // ── Bài tập: đã xong / chưa xong ──
  let homework = null;
  if (/(chưa (làm|xong) bài tập|bài tập chưa xong|chưa làm bài)/.test(t)) homework = false;
  if (/(đã (làm|xong) bài tập|xong bài tập rồi|làm bài tập rồi)/.test(t)) homework = true;

  // ── event (giữ đúng enum core dùng: none/wantsRest/slipped/noData/wantsOverride) ──
  let event = "none";
  if (/(muốn nghỉ|không muốn làm gì|nghỉ hẳn|nghỉ ngơi hôm nay)/.test(t)) event = "wantsRest";
  else if (/(xem (nhiều|hơi nhiều) (tiktok|nội dung ngắn|reels|shorts)|lướt tiktok nhiều|lỡ xem)/.test(t)) event = "slipped";
  else if (/(hơi mệt|mệt mỏi|không khỏe)/.test(t) && energy === null) event = "noData";
  else if (/(căng thẳng|áp lực|stress|lo lắng)/.test(t)) event = "wantsOverride";

  // ── goalMode: học tập / thư giãn / sáng tạo / hoàn thành sự kiện ──
  let goalMode = "study";
  if (/(thư giãn|nghỉ ngơi|nhẹ nhàng|xả hơi)/.test(t)) goalMode = "relax";
  else if (/(sáng tạo|làm video|viết lách|vẽ|chỉnh ảnh|edit)/.test(t)) goalMode = "create";
  else if (/(báo cáo|deadline|nộp)/.test(t) && /(hoàn thành|xong)/.test(t)) goalMode = "event";
  else if (/(học|bài tập|ôn thi|ôn bài)/.test(t)) goalMode = "study";

  // ── Sự kiện đặc biệt kèm giờ, vd "họp lúc 10h", "hẹn 14:30", "đi khám 9h30" ──
  const extraEvents = [];
  const timeEventRe = /(họp|hẹn|đi khám|có lịch|đi học thêm|gặp|phỏng vấn|thi)[^0-9]{0,15}(\d{1,2})[h:](\d{2})?/g;
  let m;
  while ((m = timeEventRe.exec(t)) !== null) {
    const label = m[1];
    const hh = Number(m[2]);
    const mm = m[3] ? Number(m[3]) : 0;
    if (hh >= 0 && hh <= 23) {
      const startH = String(hh).padStart(2, "0");
      const startM = String(mm).padStart(2, "0");
      const endMin = hh * 60 + mm + 60; // mặc định giả định sự kiện dài 60'
      const endH = String(Math.min(23, Math.floor(endMin / 60))).padStart(2, "0");
      const endM = String(endMin % 60).padStart(2, "0");
      const nameMap = { "họp": "Họp", "hẹn": "Hẹn", "đi khám": "Đi khám", "có lịch": "Lịch hẹn", "đi học thêm": "Học thêm", "gặp": "Gặp mặt", "phỏng vấn": "Phỏng vấn", "thi": "Thi" };
      extraEvents.push({ name: nameMap[label] || "Sự kiện", start: `${startH}:${startM}`, end: `${endH}:${endM}` });
    }
  }

  // ── Tâm trạng chung (chỉ để hiển thị, không đưa vào core) ──
  let mood = null;
  if (/(vui|hào hứng|phấn khích)/.test(t)) mood = "vui";
  else if (/(buồn|chán|tệ)/.test(t)) mood = "buồn";
  else if (/(bình thường|ổn)/.test(t)) mood = "bình thường";

  return { energy, homework, event, goalMode, extraEvents, mood, freeNote: raw };
}

// [PATCH] diversifyTasksWithPool — SAU KHI plannerOutput đã có từ core
// (KHÔNG sửa gì trong plannerOutput/aiPlannerCore.js), hàm này chỉ tính
// thêm 1 danh sách gợi ý bổ sung từ Kho việc nhỏ (taskPool) để trộn vào
// bước "Áp dụng vào hôm nay", cho đa dạng hơn thay vì chỉ lặp lại Toán/Lý.
// Ưu tiên: lọc theo năng lượng + TikTok hôm nay, rồi ưu tiên task lâu chưa
// xuất hiện — cùng tinh thần pickDailyTasks() nhưng hoàn toàn độc lập,
// không sửa pickDailyTasks gốc.
//
// [PATCH] MỤC 5 — ĐA DẠNG HOÁ (KHÔNG LẶP):
//   - Task đã xuất hiện trong 3 ngày gần nhất bị LOẠI (trừ khi task đó có
//     priority:"high" trên chính pool entry — task quan trọng vẫn được
//     phép lặp lại sớm nếu cần).
//   - skipCount cao (task hay bị bỏ qua, dữ liệu từ v25:skipHistory được
//     tính sẵn thành skipCountByTaskId ở caller) → giảm điểm ưu tiên, nghĩa
//     là ít xuất hiện hơn — nhưng KHÔNG loại hẳn, để vẫn có cơ hội quay lại.
//   - Task chưa từng xuất hiện (daysSince=9999, tức không có trong
//     historyByPoolId) → tăng điểm ưu tiên rõ rệt (neverAppearedBonus).
function diversifyTasksWithPool({ taskPool, goalMode, energy, tiktokMin, historyByPoolId, date, count = 2, skipCountByTaskId = {} }) {
  const pool = (taskPool || []).filter(t => !t.hidden);
  if (!pool.length) return [];

  const energyOk = (t) => (energy !== null && energy <= 2) ? (t.e || 0) <= 12 : true;
  const tiktokOk = (t) => (tiktokMin >= 90) ? (t.e || 0) <= 15 : true;

  const goalKeywordsMap = {
    relax: ["đọc", "nhạc", "đi bộ", "nghỉ", "giải trí", "nhật ký"],
    create: ["ảnh", "nhạc", "viết", "sáng tạo", "video"],
    event: ["chuẩn bị", "dọn", "backup", "sắp xếp"],
    study: ["ôn", "học", "recall", "từ vựng", "đọc sách"],
  };
  const keywords = goalKeywordsMap[goalMode] || [];
  const matchesGoal = (t) => keywords.length === 0 ? true : keywords.some(k => (t.l || "").toLowerCase().includes(k));

  // [PATCH] loại task xuất hiện trong 3 ngày gần nhất, trừ khi priority:"high"
  const recentlyUsed = (t) => {
    const hist = historyByPoolId?.[t.id];
    if (!hist) return false;
    const daysSince = Math.max(0, Math.round((new Date(date) - new Date(hist)) / 86400000));
    return daysSince < 3;
  };
  const isHighPriority = (t) => t.priority === "high";

  const candidates = pool.filter(t => energyOk(t) && tiktokOk(t) && (!recentlyUsed(t) || isHighPriority(t)));
  if (!candidates.length) return [];

  const rnd = seededRandom(date + goalMode);
  const scored = candidates.map(t => {
    const hist = historyByPoolId?.[t.id];
    const daysSince = hist ? Math.max(0, Math.round((new Date(date) - new Date(hist)) / 86400000)) : 9999;
    const neverAppearedBonus = hist ? 0 : 25; // [PATCH] chưa từng xuất hiện → ưu tiên cao hơn
    const goalBonus = matchesGoal(t) ? 20 : 0;
    const skipPenalty = Math.min((skipCountByTaskId[t.id] || 0) * 8, 30); // [PATCH] skip nhiều → giảm điểm, tối đa -30
    const score = Math.min(daysSince, 60) + neverAppearedBonus + goalBonus - skipPenalty + rnd() * 15;
    return { t, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, count).map(s => s.t);
}

// ── Display-only shortening of the Core's why/doneWhen text. ──────────────
// The Core's reason strings (aiPlannerCore.js, untouched) are written for
// the full AI Planner Beta tab and can run 2-3 sentences. For the Morning
// Widget's compact card we show at most ~2 short sentences worth of text.
// This NEVER rewrites or replaces the underlying string — it's purely a
// render-time truncation, and the full text is still visible on tab 11.
function summarizeReason(text, maxLen = 90) {
  if (!text) return "";
  // Keep at most the first 2 sentences (split on ". " / "; " / "—").
  const parts = text.split(/(?<=[.;])\s+|\s+—\s+/).filter(Boolean);
  let short = parts.slice(0, 2).join(" ");
  if (short.length > maxLen) {
    short = short.slice(0, maxLen).replace(/\s+\S*$/, "") + "…";
  }
  return short;
}

// [PATCH] ── MỤC 1: ALL-OR-NOTHING FIX — Banner nhắc nhở khi streak bị đứt ──
// storage key: v26:recoveryBannerDismiss:{td} → "1" nếu người dùng đã bấm "Bỏ qua" hôm nay.
// Không đụng vào aiPlannerCore.js — chỉ đọc data(td)/db(hôm qua) đã có sẵn trong Today.
const RECOVERY_MICRO_TASKS = [
  { l: "Đứng dậy uống nước", i: "💧" },
  { l: "Hít thở sâu 3 lần", i: "🌬️" },
];
function RecoveryBanner({ td, data, db, save, taskPool, onAddPoolTask }) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [dismissed, setDismissed] = useState(null); // null = đang tải, true/false sau khi biết
  const [taskModalOpen, setTaskModalOpen] = useState(false);
  const dismissKey = `v26:recoveryBannerDismiss:${td}`;

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const v = await S.get(dismissKey);
      if (!cancelled) setDismissed(v === "1");
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [td]);

  // Điều kiện hiển thị: hôm qua có streak >0 (tức có data & không lọ) và hôm nay
  // chưa có dữ liệu học/lọ gì (chưa hoàn thành gì) HOẶC hôm nay vừa đánh dấu "Lọ".
  const yesterdayIso = useMemo(() => isoDateMinusDays(td, 1), [td]);
  const yesterday = db[yesterdayIso];
  const yesterdayHadStreak = !!(yesterday && !yesterday.lo);
  const todayMarkedLo = !!data.lo;
  const todayNoDataYet = (() => {
    const picksDone = Object.keys(data.poolDone || {}).length > 0;
    const hasStudy = (data.studyTime || 0) > 0;
    const hasCustomDone = (data.custom || []).some(c => c.done);
    const hasJournal = !!(data.journal || "").trim();
    return !picksDone && !hasStudy && !hasCustomDone && !hasJournal;
  })();
  const shouldShow = dismissed === false && (todayMarkedLo || (yesterdayHadStreak && todayNoDataYet));

  if (dismissed === null || !shouldShow) return null;

  const handleDismiss = async () => {
    await S.set(dismissKey, "1");
    setDismissed(true);
  };

  const handleMicroTaskDone = async (task) => {
    playSound("tick");
    // Nếu là task siêu dễ mới (chưa có trong Kho việc nhỏ) → thêm luôn vào Kho, đồng thời tick "lọ" = false để phá vòng lặp.
    const existing = (taskPool || []).find(t => t.l === task.l);
    if (!existing && onAddPoolTask) {
      onAddPoolTask(task.l, 5, task.i);
    }
    await save(td, { lo: false });
    setTaskModalOpen(false);
    await S.set(dismissKey, "1");
    setDismissed(true);
  };

  return (
    <div style={{ background: `linear-gradient(135deg,${theme.warning}14,${accent}14)`, border: `1px solid ${theme.warning}44`, borderRadius:12, padding:"12px 14px", marginBottom:12, boxShadow:"0 6px 20px rgba(0,0,0,0.28)" }}>
      <div style={{ fontSize:11, color:theme.text, lineHeight:1.7, marginBottom:10 }}>
        <div>💡 1 ngày bỏ = 1 điểm dữ liệu, KHÔNG PHẢI thất bại</div>
        <div>📌 Chỉ cần làm 1 việc 30 giây để quay lại</div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={() => setTaskModalOpen(true)} style={{ flex:1, padding:"8px 0", borderRadius:999, border:"none", background:theme.warning, color:"#000", fontWeight:700, fontSize:12, cursor:"pointer" }}>
          🔄 Làm 1 việc 30 giây
        </button>
        <button onClick={handleDismiss} style={{ padding:"8px 14px", borderRadius:999, border:`1px solid ${theme.border}`, background:"transparent", color:theme.textDim, fontSize:12, cursor:"pointer" }}>
          ✅ Bỏ qua, tôi sẽ quay lại sau
        </button>
      </div>

      {taskModalOpen && (
        <ModalPortal>
          <div className="gb-modal-backdrop-fade" style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,.9)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <div className="gb-modal-fade-scale" style={{ background:theme.surface, border:`2px solid ${theme.warning}`, borderRadius:12, padding:20, width:"100%", maxWidth:360, boxSizing:"border-box" }}>
              <div style={{ fontSize:14, fontWeight:800, color:theme.warning, marginBottom:4 }}>🔄 Chọn 1 việc siêu dễ</div>
              <div style={{ fontSize:11, color:theme.textDim, marginBottom:14 }}>Chỉ 30 giây thôi — làm xong là quay lại được rồi.</div>
              {(() => {
                const poolEasy = (taskPool || []).filter(t => (t.e || TP_XP) <= 8 && !t.hidden).slice(0, 3);
                const options = poolEasy.length ? poolEasy.map(t => ({ l: t.l, i: t.i || "✅" })) : RECOVERY_MICRO_TASKS;
                return options.map((task, idx) => (
                  <button key={idx} onClick={() => handleMicroTaskDone(task)} style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 12px", marginBottom:8, borderRadius:10, border:`1px solid ${theme.border}`, background:theme.surfaceAlt, color:theme.text, fontSize:12, cursor:"pointer", textAlign:"left" }}>
                    <span style={{ fontSize:16 }}>{task.i}</span>
                    <span style={{ flex:1 }}>{task.l}</span>
                    <span style={{ color:theme.warning, fontSize:11 }}>✓</span>
                  </button>
                ));
              })()}
              <button onClick={() => setTaskModalOpen(false)} style={{ width:"100%", padding:"9px 0", marginTop:4, borderRadius:999, border:`1px solid ${theme.border}`, background:"transparent", color:theme.textDim, fontSize:12, cursor:"pointer" }}>Đóng</button>
            </div>
          </div>
        </ModalPortal>
      )}
    </div>
  );
}

function MorningWidget({ td, data, db, dayExp, setts, save, onSwitchTab, taskPool, onAddPoolTask, onEditPoolTask, plannerStorage, plannerToday, onPlannerTodayChange }) {

  const accent = useContext(AccentContext);

  // core stays local (stateless computation object); storage is now shared
  // from Today so MorningWidget and DailyRouteCard never read/write two
  // independent copies of the same v25:aiPlanner:today bucket.
  const core = useMemo(() => createAIPlannerCore(), []);
  const storage = plannerStorage;
  const today = plannerToday;
  const setToday = onPlannerTodayChange;

  const [loading, setLoading] = useState(true);
  const [quickForm, setQuickForm] = useState(null);
  const [running, setRunning] = useState(false);
  const [errorMsg, setErrorMsg] = useState(null);
  const [checkinOpen, setCheckinOpen] = useState(false);
  // Local tick state for the checklist — purely a UI affordance mirroring

    let cancelled = false;
    (async () => {
      setLoading(true);

      // rotateDay is now called once, up in Today — here we just wait for
      // plannerToday to arrive as a prop instead of rotating a second time.
      // (rotateDay is idempotent, but calling it from two components at
      // once was the actual source of the race — this removes that.)

      // 2. bridgeDashboardToRawState — identical call, no reimplementation.
      const now = new Date();
      const todayData = db?.[td] || {};
      const bridged = bridgeDashboardToRawState({ todayData, td, now });

      // 3. computeBehaviorMetrics — identical call, no reimplementation.
      let metrics = { recent: "mixed", completionRate: 70 };
      try {
        metrics = computeBehaviorMetrics({ td, db, dayExp, targetXP: setts.targetXP || 150 });
