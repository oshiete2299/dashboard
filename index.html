              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                <span onClick={e=>toggleFav(it.id,e)} style={{fontSize:13,cursor:"pointer",color:it.favorite?theme.warning:theme.textDim+"55"}}>{it.favorite?"⭐":"☆"}</span>
                <span style={{fontSize:9,padding:"2px 7px",borderRadius:20,background:`${KB_TAG_C[it.tag]||theme.textDim}22`,color:KB_TAG_C[it.tag]||theme.textDim}}>{it.tag}</span>
              </div>
            </div>
            {it.content&&<div style={{fontSize:11,color:theme.textDim,lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{it.content}</div>}
            <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center"}}>
              <span style={{fontSize:9,color:theme.textDim}}>{fmtDate(it.createdAt)}</span>
              {it.link&&<span style={{fontSize:9,color:theme.accent}}>🔗 link</span>}
            </div>
          </div>
        ))
      }
      </>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

// ── HANH TRINH: Monthly Reflection + Time Capsule ─────────────────────────
// ── MILESTONE LOG / TIMELINE 2.0 (Nhật ký phát triển) ────────────────────────
// Thay thế/di dời từ LifeTimeline cũ. Dữ liệu vẫn dùng key "timeline" trong storage
// nên các cột mốc cũ đã lưu KHÔNG bị mất — chỉ thêm field MỚI, tất cả optional:
//   status        - "completed" | "upcoming" (thiếu → suy ra từ date so với hôm nay)
//   achievementId - id trỏ tới ACHIEVEMENTS, hiện badge + click mở chi tiết
//   icon          - override icon riêng cho milestone (thay icon mặc định theo type)
const MS_TYPES=["Coding","Study","Swimming","Mindset","Project","Life","Achievement","Failure","Summer Mission"];
const MS_TYPE_C={
  Coding:"#818cf8", Study:"#60a5fa", Swimming:"#22d3ee", Mindset:"#c084fc",
  Project:"#34d399", Life:"#fbbf24", Achievement:"#f472b6", Failure:"#ef4444",
  "Summer Mission":"#fb923c",
};
const MS_TYPE_I={
  Coding:"💻", Study:"📚", Swimming:"🏊", Mindset:"🧠",
  Project:"🚀", Life:"🌱", Achievement:"🏆", Failure:"💥",
  "Summer Mission":"☀️",
};
// Suy ra trạng thái completed/upcoming khi item không có field status tường minh (dữ liệu cũ).
const msStatus=(it,today)=> it.status || (it.date>today ? "upcoming" : "completed");

function MilestoneLog({db,str,txp}) {
  const theme = useContext(ThemeContext);
  const [items,setItems]=useState([]);
  const [form,setForm]=useState(null);
  const [typeFilter,setTypeFilter]=useState("Tất cả");
  const [statusFilter,setStatusFilter]=useState("all"); // all | completed | upcoming
  const [yearFilter,setYearFilter]=useState("all");
  const [achFilterOn,setAchFilterOn]=useState(false); // chỉ hiện mốc gắn achievement
  const [tagFilter,setTagFilter]=useState("");
  const [query,setQuery]=useState("");
  const [sortDir,setSortDir]=useState("desc"); // desc = mới nhất trước
  const [viewMode,setViewMode]=useState("timeline"); // timeline | card
  const [groupMode,setGroupMode]=useState("month"); // month | year | none
  const [lightbox,setLightbox]=useState(null); // url ảnh đang xem lớn
  const [openAch,setOpenAch]=useState(null); // achievement đang mở chi tiết (từ badge)
  const today=toISO();

  useEffect(()=>{
    (async()=>{try{const r=await S.get("timeline");if(r)setItems(JSON.parse(r));}catch{}})();
  },[]);

  const saveItems=async arr=>{try{await S.set("timeline",JSON.stringify(arr));}catch{} setItems(arr);};

  // Achievement thực sự đã unlock (dùng logic check() có sẵn — không đổi kiến trúc Achievement 2.0)
  const unlockedAchIds = useMemo(()=>{
    if(!db) return [];
    try{ return ACHIEVEMENTS.filter(a=>a.check(db,str,txp)).map(a=>a.id); }catch{ return []; }
  },[db,str,txp]);

  const allTags = useMemo(()=>[...new Set(items.flatMap(x=>Array.isArray(x.tags)?x.tags:[]))],[items]);
  const allYears = useMemo(()=>[...new Set(items.map(x=>x.date?.slice(0,4)).filter(Boolean))].sort((a,b)=>b.localeCompare(a)),[items]);

  const filtered = useMemo(()=>{
    let f=items.filter(x=>{
      if(typeFilter!=="Tất cả"&&(x.type||x.cat)!==typeFilter) return false;
      if(yearFilter!=="all"&&x.date?.slice(0,4)!==yearFilter) return false;
      if(statusFilter!=="all"&&msStatus(x,today)!==statusFilter) return false;
      if(achFilterOn&&!x.achievementId) return false;
      if(tagFilter&&!(x.tags||[]).includes(tagFilter)) return false;
      if(query.trim()){
        const q=query.trim().toLowerCase();
        const hay=`${x.title||""} ${x.desc||""} ${(x.tags||[]).join(" ")}`.toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    f=f.sort((a,b)=>sortDir==="desc"?b.date.localeCompare(a.date):a.date.localeCompare(b.date));
    return f;
  },[items,typeFilter,yearFilter,statusFilter,achFilterOn,tagFilter,query,sortDir,today]);

  // Statistics — MỤC 6: tổng / đã hoàn thành / đang chờ / completion %
  const stats = useMemo(()=>{
    const total=items.length;
    const completed=items.filter(x=>msStatus(x,today)==="completed").length;
    const upcoming=total-completed;
    const pct=total>0?Math.round((completed/total)*100):0;
    return {total,completed,upcoming,pct};
  },[items,today]);

  const saveForm=()=>{
    if(!form||!form.title?.trim()||!form.date) return;
    const item={
      id:form.id||"tl_"+Date.now(),
      date:form.date,
      title:form.title.trim(),
      desc:form.desc||"",
      type:form.type||"Life",
      tags:form.tags||[],
      image:form.image||null,
      status:form.status||(form.date>today?"upcoming":"completed"),
      achievementId:form.achievementId||null,
      icon:form.icon||null,
    };
    const arr=form.id?items.map(x=>x.id===form.id?item:x):[item,...items];
    saveItems(arr); setForm(null);
  };

  const onImagePick=(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>setForm(f=>({...f,image:reader.result}));
    reader.readAsDataURL(file);
  };

  // Gợi ý "mốc quan trọng hôm nay": nếu hôm nay đã có mốc rồi thì không gợi ý nữa
  const hasTodayMilestone=items.some(x=>x.date===today);

  // Group theo tháng hoặc năm
  const {groups,groupKeys} = useMemo(()=>{
    if(groupMode==="none") return {groups:{},groupKeys:[]};
    const g={};
    filtered.forEach(x=>{
      const key=groupMode==="year"?x.date.slice(0,4):x.date.slice(0,7);
      if(!g[key]) g[key]=[];
      g[key].push(x);
    });
    const keys=Object.keys(g).sort((a,b)=>sortDir==="desc"?b.localeCompare(a):a.localeCompare(b));
    return {groups:g,groupKeys:keys};
  },[filtered,groupMode,sortDir]);

  const fmtGroupLabel=key=>{
    if(groupMode==="year") return `Năm ${key}`;
    const d=new Date(key+"-01T00:00:00");
    return d.toLocaleDateString("vi-VN",{month:"long",year:"numeric"});
  };

  const AchBadge=({achId})=>{
    const a=ACHIEVEMENTS.find(x=>x.id===achId);
    if(!a) return null;
    const done=unlockedAchIds.includes(achId);
    const rarity=RARITY_INFO[a.rarity]||RARITY_INFO.common;
    return (
      <span onClick={(e)=>{e.stopPropagation();setOpenAch({...a,done});}} title={done?a.name:"Achievement chưa mở"}
        style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,padding:"3px 8px",borderRadius:999,background:done?`${a.c}1c`:`${theme.border}55`,border:`1px solid ${done?a.c+"55":theme.border}`,cursor:"pointer"}}>
        <span style={{fontSize:11}}>{done?a.icon:"❓"}</span>
        <span style={{fontSize:8,fontWeight:700,color:done?a.c:theme.textDim}}>{done?a.name:"???"}</span>
        <span style={{fontSize:7,fontWeight:700,color:rarity.c}}>{rarity.label}</span>
      </span>
    );
  };

  const renderItem=(it)=>{
    const type=it.type||it.cat||"Life";
    const c=MS_TYPE_C[type]||theme.accent;
    const icon=it.icon||MS_TYPE_I[type]||"●";
    const st=msStatus(it,today);
    const isUpcoming=st==="upcoming";
    const bodyContent=(
      <>
        {it.image&&<img src={it.image} alt="" onClick={()=>setLightbox(it.image)} style={{width:"100%",maxHeight:viewMode==="card"?140:120,objectFit:"cover",borderRadius:8,marginBottom:8,cursor:"zoom-in"}}/>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
              <span style={{fontSize:9,color:c,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{icon} {type}</span>
              {isUpcoming&&<span style={{fontSize:8,fontWeight:700,color:theme.warning,background:`${theme.warning}18`,borderRadius:6,padding:"1px 6px"}}>⏳ Sắp tới</span>}
            </div>
            <div style={{fontSize:12,fontWeight:600,color:theme.text}}>{it.title}</div>
            <div style={{fontSize:9,color:theme.textDim,marginTop:3}}>{it.date}</div>
            {it.desc&&<div style={{fontSize:11,color:theme.textDim,marginTop:5,lineHeight:1.5}}>{it.desc}</div>}
            {it.achievementId&&<div><AchBadge achId={it.achievementId}/></div>}
            {(it.tags||[]).length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>{it.tags.map(t=>(
              <span key={t} onClick={()=>setTagFilter(tagFilter===t?"":t)} style={{fontSize:8,padding:"2px 7px",borderRadius:8,background:`${c}18`,color:c,cursor:"pointer"}}>#{t}</span>
            ))}</div>}
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>setForm({...it,tagsInput:(it.tags||[]).join(", ")})} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:12}}>✎</button>
            <button onClick={()=>saveItems(items.filter(x=>x.id!==it.id))} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:15}}>×</button>
          </div>
        </div>
      </>
    );
    if(viewMode==="card"){
      return (
        <div key={it.id} style={{background:theme.surface,border:`1px solid ${c}44`,borderRadius:12,padding:12,marginBottom:10,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",opacity:isUpcoming?0.75:1}}>
          {bodyContent}
        </div>
      );
    }
    // timeline view
    return (
      <div key={it.id} style={{display:"flex",gap:12,marginBottom:12,paddingLeft:8}}>
        <div style={{width:18,height:18,borderRadius:"50%",background:isUpcoming?theme.surfaceAlt:c,border:`3px solid ${theme.surfaceAlt}`,boxShadow:isUpcoming?`inset 0 0 0 2px ${c}`:"none",flexShrink:0,marginTop:2,zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8}}>
          {icon}
        </div>
        <div style={{flex:1,background:theme.surface,borderRadius:10,padding:"10px 12px",boxShadow:"0 8px 32px rgba(0,0,0,0.3)",opacity:isUpcoming?0.75:1}}>
          {bodyContent}
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Gợi ý mốc quan trọng hôm nay */}
      {!hasTodayMilestone&&(
        <div style={{background:"rgba(167,139,250,.08)",border:`1px solid ${theme.accent}33`,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div style={{fontSize:11,color:theme.textDim}}>✨ Hôm nay có hoàn thành điều gì lớn không?</div>
          <button onClick={()=>setForm({date:today,title:"",desc:"",type:"Life",tags:[],tagsInput:"",status:"completed"})} style={{background:theme.accent,border:"none",borderRadius:999,padding:"5px 12px",color:"white",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0}}>+ Ghi lại</button>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8,flexWrap:"wrap"}}>
        <div style={{fontSize:12,fontWeight:600,color:theme.accent}}>📖 Nhật Ký Phát Triển</div>
        <button onClick={()=>setForm({date:today,title:"",desc:"",type:"Life",tags:[],tagsInput:"",status:"completed"})} className="gb-ripple" onMouseDown={gbRipple} style={{background:`linear-gradient(135deg,${theme.accent},${theme.secondary})`,border:"none",borderRadius:999,padding:"6px 14px",color:"white",fontWeight:700,fontSize:11,cursor:"pointer",flexShrink:0}}>+ Thêm mốc</button>
      </div>

      {/* Statistics — MỤC 6 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        {[
          {l:"Tổng mốc",v:stats.total,cc:theme.text},
          {l:"Hoàn thành",v:stats.completed,cc:theme.success},
          {l:"Đang chờ",v:stats.upcoming,cc:theme.warning},
          {l:"Tỉ lệ",v:`${stats.pct}%`,cc:theme.accent},
        ].map(s=>(
          <div key={s.l} style={{background:theme.surfaceAlt,borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:700,color:s.cc}}>{s.v}</div>
            <div style={{fontSize:8,color:theme.textDim}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Search */}
      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔍 Tìm theo tiêu đề, mô tả, tag..." style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:10,padding:"7px 10px",color:theme.text,fontSize:11,outline:"none",marginBottom:8}}/>

      {/* Type filter */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
        {["Tất cả",...MS_TYPES].map(t=>(
          <button key={t} onClick={()=>setTypeFilter(t)} style={{padding:"4px 10px",borderRadius:999,border:`1px solid ${typeFilter===t?(MS_TYPE_C[t]||theme.accent):theme.border}`,background:typeFilter===t?`${MS_TYPE_C[t]||theme.accent}22`:"transparent",color:typeFilter===t?(MS_TYPE_C[t]||theme.accent):theme.textDim,fontSize:9,cursor:"pointer",transition:"all 0.2s ease"}}>{MS_TYPE_I[t]?`${MS_TYPE_I[t]} `:""}{t}</button>
        ))}
      </div>

      {/* Status + Year + Achievement filter — MỤC 6.4 */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
        {[["all","Tất cả trạng thái"],["completed","✅ Đã hoàn thành"],["upcoming","⏳ Chưa hoàn thành"]].map(([k,l])=>(
          <button key={k} onClick={()=>setStatusFilter(k)} style={{padding:"4px 10px",borderRadius:999,border:`1px solid ${statusFilter===k?theme.accent:theme.border}`,background:statusFilter===k?`${theme.accent}22`:"transparent",color:statusFilter===k?theme.accent:theme.textDim,fontSize:9,cursor:"pointer"}}>{l}</button>
        ))}
        {allYears.length>0&&(
          <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)} style={{padding:"4px 8px",borderRadius:999,border:`1px solid ${theme.border}`,background:theme.surfaceAlt,color:theme.textDim,fontSize:9,cursor:"pointer",outline:"none"}}>
            <option value="all">Mọi năm</option>
            {allYears.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        )}
        <button onClick={()=>setAchFilterOn(v=>!v)} style={{padding:"4px 10px",borderRadius:999,border:`1px solid ${achFilterOn?theme.accent:theme.border}`,background:achFilterOn?`${theme.accent}22`:"transparent",color:achFilterOn?theme.accent:theme.textDim,fontSize:9,cursor:"pointer"}}>🏅 Có Achievement</button>
      </div>

      {/* Tag filter (nếu có tag) */}
      {allTags.length>0&&(
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
          {allTags.map(t=>(
            <button key={t} onClick={()=>setTagFilter(tagFilter===t?"":t)} style={{padding:"3px 9px",borderRadius:999,border:`1px solid ${tagFilter===t?theme.accent:theme.border}`,background:tagFilter===t?`${theme.accent}22`:"transparent",color:tagFilter===t?theme.accent:theme.textDim,fontSize:9,cursor:"pointer"}}>#{t}</button>
          ))}
        </div>
      )}

      {/* View controls: sort, group, view mode */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>setSortDir(d=>d==="desc"?"asc":"desc")} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${theme.border}`,background:theme.surfaceAlt,color:theme.textDim,fontSize:9,cursor:"pointer"}}>
          {sortDir==="desc"?"↓ Mới nhất":"↑ Cũ nhất"}
        </button>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1px solid ${theme.border}`}}>
          {[["month","Tháng"],["year","Năm"],["none","Gộp"]].map(([k,l])=>(
            <button key={k} onClick={()=>setGroupMode(k)} style={{padding:"4px 9px",border:"none",background:groupMode===k?theme.accent:theme.surfaceAlt,color:groupMode===k?"white":theme.textDim,fontSize:9,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1px solid ${theme.border}`}}>
          {[["timeline","🛤️ Timeline"],["card","🗂️ Card"]].map(([k,l])=>(
            <button key={k} onClick={()=>setViewMode(k)} style={{padding:"4px 9px",border:"none",background:viewMode===k?theme.accent:theme.surfaceAlt,color:viewMode===k?"white":theme.textDim,fontSize:9,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
      </div>

      {/* Form thêm/sửa mốc */}
      {form&&(
        <div style={{background:"rgba(167,139,250,.06)",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
          <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value,status:form.status||(e.target.value>today?"upcoming":"completed")})} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 10px",color:theme.text,fontSize:11,outline:"none",marginBottom:8}}/>
          <input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Tiêu đề mốc *" style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",marginBottom:8}}/>
          <textarea value={form.desc||""} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Mô tả..." rows={2} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 12px",color:theme.text,fontSize:11,outline:"none",resize:"none",marginBottom:8}}/>
          <input value={form.tagsInput??(form.tags||[]).join(", ")} onChange={e=>setForm({...form,tagsInput:e.target.value,tags:e.target.value.split(",").map(s=>s.trim()).filter(Boolean)})} placeholder="Tags, cách nhau bởi dấu phẩy..." style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 12px",color:theme.text,fontSize:11,outline:"none",marginBottom:8}}/>

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <label style={{fontSize:10,color:theme.textDim,padding:"6px 10px",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:8,cursor:"pointer"}}>
              🖼️ {form.image?"Đổi ảnh":"Thêm ảnh"}
              <input type="file" accept="image/*" onChange={onImagePick} style={{display:"none"}}/>
            </label>
            {form.image&&<button onClick={()=>setForm({...form,image:null})} style={{fontSize:10,color:theme.danger,background:"none",border:"none",cursor:"pointer"}}>Xoá ảnh</button>}
          </div>
          {form.image&&<img src={form.image} alt="" style={{width:"100%",maxHeight:120,objectFit:"cover",borderRadius:8,marginBottom:10}}/>}

          {/* Trạng thái: completed / upcoming */}
          <div style={{fontSize:10,color:theme.textDim,marginBottom:5}}>Trạng thái</div>
          <div style={{display:"flex",gap:4,marginBottom:10}}>
            {[["completed","✅ Đã hoàn thành"],["upcoming","⏳ Sắp tới"]].map(([k,l])=>(
              <button key={k} onClick={()=>setForm({...form,status:k})} style={{flex:1,padding:"6px 0",borderRadius:999,border:`1px solid ${form.status===k?theme.accent:theme.border}`,background:form.status===k?`${theme.accent}22`:"transparent",color:form.status===k?theme.accent:theme.textDim,fontSize:10,cursor:"pointer"}}>{l}</button>
            ))}
          </div>

          {/* Gắn Achievement — MỤC 6.3 */}
          <div style={{fontSize:10,color:theme.textDim,marginBottom:5}}>Gắn Achievement (tuỳ chọn)</div>
          <select value={form.achievementId||""} onChange={e=>setForm({...form,achievementId:e.target.value||null})} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"8px 10px",color:theme.text,fontSize:11,outline:"none",marginBottom:10}}>
            <option value="">— Không gắn —</option>
            {ACHIEVEMENTS.filter(a=>!a.secret||unlockedAchIds.includes(a.id)).map(a=>(
              <option key={a.id} value={a.id}>{a.icon} {a.name}</option>
            ))}
          </select>

          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
            {MS_TYPES.map(t=>(
              <button key={t} onClick={()=>setForm({...form,type:t})} style={{padding:"4px 11px",borderRadius:999,border:`1px solid ${form.type===t?(MS_TYPE_C[t]||theme.accent):theme.border}`,background:form.type===t?`${MS_TYPE_C[t]||theme.accent}22`:"transparent",color:form.type===t?(MS_TYPE_C[t]||theme.accent):theme.textDim,fontSize:9,cursor:"pointer"}}>{MS_TYPE_I[t]} {t}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>

                {filtered.map(renderItem)}

function HanhTrinh({capsuleNotif,setCapsuleNotif,db,str,txp}) {
  const theme = useContext(ThemeContext);
  const [activeTab,setActiveTab]=useState("milestones");
  const [reflections,setReflections]=useState({});
  const [capsules,setCapsules]=useState([]);
  const [editMonth,setEditMonth]=useState(null);
  const [editCap,setEditCap]=useState(null);
  const [capDeleteConfirm,setCapDeleteConfirm]=useState(null);

  const thisMonth=today.slice(0,7);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("reflections");if(r)setReflections(JSON.parse(r));}catch{}
      try{const r=await S.get("capsules");if(r){
        const caps=JSON.parse(r); setCapsules(caps);
        const due=caps.find(c=>!c.opened&&c.openDate<=today);

    })();
  },[]);

  const saveRef=async data=>{const next={...reflections,...data};try{await S.set("reflections",JSON.stringify(next));}catch{} setReflections(next);};

    {k:"good",l:"Điều làm tốt",ph:"Mày đã làm tốt điều gì?"},
    {k:"problems",l:"Vấn đề gặp phải",ph:"Khó khăn gặp phải là gì?"},
    {k:"lessons",l:"Bài học rút ra",ph:"Học được gì từ tháng này?"},
    {k:"grateful",l:"Điều biết ơn",ph:"Biết ơn điều gì?"},
    {k:"nextGoal",l:"Mục tiêu tháng sau",ph:"Tháng sau muốn làm gì?"},

    reflect: "Tổng kết tuần/tháng, nhìn lại bản thân.",
    capsule: "Viết cho bản thân trong tương lai.",
  };

  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:8}}>
        {[["milestones","🛤️ Nhật ký"],["reflect","📖 Reflection"],["capsule","💌 Time Capsule"]].map(([k,l])=>(
          <button key={k} onClick={()=>setActiveTab(k)} className="gb-ripple" onMouseDown={gbRipple} style={{flex:1,padding:"8px 0",borderRadius:999,border:"none",background:activeTab===k?theme.accent:"transparent",color:activeTab===k?"#fff":theme.textDim,fontSize:11,fontWeight:activeTab===k?700:400,cursor:"pointer",boxShadow:activeTab===k?`0 4px 16px ${theme.accent}55`:"none",transition:"all 0.2s ease"}}>{l}</button>
        ))}
      </div>
      <div className="gb-fade-in" key={activeTab} style={{fontSize:10,color:theme.textDim,marginBottom:12,lineHeight:1.5,padding:"0 2px"}}>{HT_DESC[activeTab]}</div>

      {activeTab==="milestones"&&<MilestoneLog db={db} str={str} txp={txp}/>}

      {activeTab==="reflect"&&(
        <div>
          {capsuleNotif&&(
            <div style={{background:`${theme.accent}1F`,borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
              <div style={{fontSize:11,fontWeight:700,color:theme.accent,marginBottom:4}}>📬 Bạn có thư từ quá khứ!</div>
              <div style={{fontSize:12,color:theme.text,marginBottom:8,fontWeight:600}}>{capsuleNotif.title}</div>
              <div style={{fontSize:11,color:theme.textDim,lineHeight:1.6,marginBottom:8,whiteSpace:"pre-wrap"}}>{capsuleNotif.content}</div>
              <button onClick={()=>{const arr=capsules.map(c=>c.id===capsuleNotif.id?{...c,opened:true}:c);saveCaps(arr);setCapsuleNotif(null);}} style={{background:theme.accent,border:"none",borderRadius:999,padding:"7px 18px",color:"#000",fontWeight:700,fontSize:11,cursor:"pointer"}}>✓ Đã đọc</button>
            </div>
          )}
          <div style={{fontSize:10,color:theme.textDim,marginBottom:10,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Chọn tháng để điền</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {months.map(m=>{
              const has=!!reflections[m];

              return <button key={m} onClick={()=>setEditMonth(editMonth===m?null:m)} className="gb-ripple" onMouseDown={gbRipple} style={{padding:"5px 14px",borderRadius:999,border:isCurrent&&editMonth!==m?`1px solid ${theme.accent}66`:"none",background:editMonth===m?theme.accent:has?`${theme.accent}22`:theme.surface,color:editMonth===m?"#fff":has?theme.accent:theme.textDim,fontSize:11,cursor:"pointer",transition:"all 0.2s ease"}}>{m}{has?" ✓":""}{isCurrent&&editMonth!==m?" •":""}</button>;

        <div>

            💌 Viết thư cho bản thân tương lai
          </button>
          {editCap&&(
            <div style={{background:`${theme.accent}0F`,borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
              <input value={editCap.title} onChange={e=>setEditCap({...editCap,title:e.target.value})} placeholder="Tiêu đề thư..." style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",marginBottom:8}}/>
              <textarea value={editCap.content} onChange={e=>setEditCap({...editCap,content:e.target.value})} placeholder="Viết cho bản thân tương lai..." rows={5} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",resize:"vertical",lineHeight:1.6,marginBottom:8}}/>
              <div style={{fontSize:11,color:theme.textDim,marginBottom:4}}>📅 Ngày mở thư:</div>
              <input type="date" value={editCap.openDate} onChange={e=>setEditCap({...editCap,openDate:e.target.value})} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",marginBottom:12}}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{if(!editCap.title.trim()||!editCap.openDate)return;const arr=editCap.isEdit?capsules.map(c=>c.id===editCap.id?editCap:c):[...capsules,{...editCap,createdAt:Date.now(),opened:false}];saveCaps(arr);setEditCap(null);}} style={{flex:1,background:theme.accent,border:"none",borderRadius:999,padding:"10px 0",color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>💌 Niêm phong</button>
                <button onClick={()=>setEditCap(null)} style={{padding:"10px 16px",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:999,color:theme.textDim,fontSize:12,cursor:"pointer"}}>Huỷ</button>
              </div>
            </div>
          )}
          {capsules.length===0?<div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"20px 0"}}>Chưa có thư nào 💌</div>
            :capsules.slice().reverse().map(c=>(
              <div key={c.id} style={{background:c.opened?"rgba(52,211,153,.06)":theme.surface,border:`1px solid ${c.opened?theme.success:c.openDate<=today?theme.accent:theme.border}`,borderRadius:10,padding:"13px 16px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:12,fontWeight:600,color:c.opened?theme.success:c.openDate<=today?theme.accent:theme.textDim}}>{c.title}</div>
                  {capDeleteConfirm===c.id?(
                    <InlineConfirm
                      message="Xoá thư này?"
                      onConfirm={()=>{saveCaps(capsules.filter(x=>x.id!==c.id));setCapDeleteConfirm(null);}}
                      onCancel={()=>setCapDeleteConfirm(null)}
                    />
                  ):(
                    <button onClick={()=>setCapDeleteConfirm(c.id)} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:16}}>×</button>
                  )}
                </div>
                <div style={{fontSize:9,color:theme.textDim,marginTop:4}}>Mở ngày {c.openDate} · {c.opened?"Đã đọc ✓":c.openDate<=today?"Có thể mở rồi! 📬":"Đang niêm phong 🔒"}</div>
                {c.opened&&<div style={{fontSize:11,color:theme.textDim,marginTop:6,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{c.content}</div>}
                {!c.opened&&c.openDate<=today&&<button onClick={()=>saveCaps(capsules.map(x=>x.id===c.id?{...x,opened:true}:x))} style={{marginTop:8,background:theme.accent,border:"none",borderRadius:999,padding:"6px 16px",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer"}}>📬 Mở thư</button>}
              </div>
            ))
          }
        </div>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

// ── BOSS FIGHT ─────────────────────────────────────────────────────────────
const BOSS_PRESETS=[
  {name:"TikTok Demon",icon:"📱",maxHp:100,c:"#ef4444"},
  {name:"Ngủ Muộn",icon:"😴",maxHp:100,c:"#6366f1"},
  {name:"Trì Hoãn",icon:"🧠",maxHp:100,c:"#fbbf24"},
  {name:"Sa Lầy",icon:"🎮",maxHp:100,c:"#fb923c"},
];

function BossFight({db,save,td,setts={}}) {
  const theme = useContext(ThemeContext);
  const [boss,setBoss]=useState(null);
  const [history,setHistory]=useState([]);
  const [showNew,setShowNew]=useState(false);
  const [customName,setCustomName]=useState("");
  const [customIcon,setCustomIcon]=useState("👹");
  const [customHp,setCustomHp]=useState(100);
  // P-06: inline confirm for abandon
  const [abandonConfirm,setAbandonConfirm]=useState(false);
  // MỤC 8: hitFx chỉ để kích hoạt animation rung khi bị đánh — không ảnh hưởng dữ liệu boss
  const [hitFx,setHitFx]=useState(0);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("boss:current");if(r)setBoss(JSON.parse(r));}catch{}
      try{const r=await S.get("boss:history");if(r)setHistory(JSON.parse(r));}catch{}
    })();
  },[]);

  const saveBoss=async b=>{try{await S.set("boss:current",b?JSON.stringify(b):"null");}catch{} setBoss(b);};
  const saveHist=async arr=>{try{await S.set("boss:history",JSON.stringify(arr));}catch{} setHistory(arr);};

  const attack=(dmg)=>{
    if(!boss)return;
    const newHp=Math.max(0,boss.hp-dmg);
    setHitFx(h=>h+1);
    if(newHp===0){
      playSound("bosswin");
      playEventMusic("bosswin");
      const defeated={...boss,hp:0,defeatedAt:Date.now()};
      saveHist([defeated,...history]);
      saveBoss(null);
      setAbandonConfirm(false);
    } else { playSound("bosshit"); saveBoss({...boss,hp:newHp}); }
  };

  // ══════════════════ V25 MỤC 5: Boss tự nhận sát thương (tuỳ chọn, mặc định OFF) ══════════════
  // Không đổi gameplay hiện tại: khi setts.bossAutoDamage tắt (mặc định), khối này không chạy gì cả
  // và Boss hoạt động y hệt trước đây (chỉ đánh thủ công qua các nút bên dưới). Khi bật: mỗi lần số
  // lượng việc nhỏ/mục tiêu lớn/kết quả học/chuẩn bị ngày mai đã hoàn thành HÔM NAY tăng thêm, tự động
  // gọi attack() với sát thương tương ứng — dùng ref đếm số lượng đã áp dụng để không đánh lặp lại khi
  // component re-render hoặc storage đồng bộ lại (đếm số lần TĂNG, không phải tổng tuyệt đối mỗi lần).
  const autoDmgAppliedRef = useRef({ date:null, small:0, big:0, study:0, prep:0 });
  useEffect(()=>{
    if(!setts.bossEnabled || !setts.bossAutoDamage) return;
    if(!boss) return;
    const today = db?.[td];
    if(!today) return;
    if(autoDmgAppliedRef.current.date !== td){
      // sang ngày mới (hoặc lần đầu) — reset bộ đếm, không cộng dồn damage từ ngày cũ
      autoDmgAppliedRef.current = { date: td, small:0, big:0, study:0, prep:0 };
    }
    const applied = autoDmgAppliedRef.current;
    const smallDoneCount = Object.values(today.poolDone||{}).filter(Boolean).length;
    const bigDoneCount = (today.bigGoalsToday||[]).filter(g=>g.done).length;
    const studyDoneCount = (today.studyResults||[]).filter(r=>r.done).length;
    const prepDoneCount = today.tomorrowPrep?.doneAt ? 1 : 0;

    let totalDmg = 0;
    if(smallDoneCount > applied.small){ totalDmg += (smallDoneCount-applied.small)*3; applied.small = smallDoneCount; }
    if(bigDoneCount > applied.big){ totalDmg += (bigDoneCount-applied.big)*10; applied.big = bigDoneCount; }
    if(studyDoneCount > applied.study){ totalDmg += (studyDoneCount-applied.study)*5; applied.study = studyDoneCount; }
    if(prepDoneCount > applied.prep){ totalDmg += (prepDoneCount-applied.prep)*5; applied.prep = prepDoneCount; }

    if(totalDmg > 0) attack(totalDmg);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[setts.bossEnabled, setts.bossAutoDamage, boss, db, td]);

  const startBoss=(preset)=>{
    const b={...preset,hp:preset.maxHp,startDate:td,id:"boss_"+Date.now()};
    saveBoss(b); setShowNew(false);
  };

  const startCustom=()=>{
    if(!customName.trim())return;
    startBoss({name:customName.trim(),icon:customIcon,maxHp:customHp,c:theme.accent});
    setCustomName(""); setCustomIcon("👹"); setCustomHp(100);
  };

  const pct=boss?(boss.hp/boss.maxHp)*100:0;

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,rgba(239,68,68,.1),rgba(251,146,60,.08))",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.danger,marginBottom:4}}>⚔️ Boss Fight Tháng</div>
        <div style={{fontSize:11,color:theme.textDim}}>Chọn thứ muốn chinh phục. Mỗi ngày hoàn thành mục tiêu = đánh boss.</div>
      </div>

      {boss?(
        <div>
          {/* Boss card */}
          <div key={hitFx} className={hitFx>0?"gb-boss-hit":""} style={{background:"rgba(239,68,68,.08)",border:`1px solid ${boss.c||theme.danger}`,borderRadius:12,padding:18,marginBottom:12,textAlign:"center",boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:48,marginBottom:8}}>{boss.icon}</div>
            <div style={{fontSize:16,fontWeight:800,color:boss.c||theme.danger,marginBottom:4}}>{boss.name}</div>
            <div style={{fontSize:12,color:theme.textDim,marginBottom:12}}>HP: {boss.hp}/{boss.maxHp}</div>
            {/* HP bar */}
            <div style={{height:16,background:theme.border,borderRadius:999,overflow:"hidden",marginBottom:12}}>
              <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${boss.c||theme.danger},#fb923c)`,borderRadius:999,transition:"width .4s",boxShadow:`0 0 8px ${boss.c||theme.danger}88`}}/>
            </div>
            {/* Attack buttons */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <button onClick={()=>attack(5)} style={{padding:"11px 0",borderRadius:14,border:"none",background:"rgba(52,211,153,.2)",color:theme.success,fontWeight:700,fontSize:12,cursor:"pointer"}}>⚔️ -5 HP<div style={{fontSize:9,fontWeight:400}}>Hoàn thành ≥10 task</div></button>

      <div style={{height:16}}/>

  );
}

// ── AI INSIGHT: helper functions (dùng chung cho nhiều rule) ───────────────
const aiLastNDays = (db, n, endIso) => {
  const end = endIso ? new Date(endIso) : new Date();
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(end); d.setDate(d.getDate() - i);
    const iso = d.toISOString().split("T")[0];
    out.push({ iso, day: db[iso] || null });
  }
  return out;
};
const aiPresent = list => list.filter(x => x.day);
const aiAvg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
const aiPct = (a, b) => (b > 0 ? Math.round((a / b) * 100) : 0);
const aiTaskRate = (days, taskId) => {
  const present = aiPresent(days);
  if (!present.length) return 0;
  return present.filter(x => x.day.tasks?.[taskId]).length / present.length;
};
const aiCurrentTaskStreak = (db, taskId, endIso) => {
  let streak = 0;
  let cursor = endIso ? new Date(endIso) : new Date();
  for (;;) {
    const iso = cursor.toISOString().split("T")[0];
    const day = db[iso];
    if (day?.tasks?.[taskId]) { streak++; cursor.setDate(cursor.getDate() - 1); }
    else break;
  }
  return streak;
};
const aiFinCatSum = (finTxs, catId, type, startIso, endIso) =>
  (finTxs || [])
    .filter(t => t.type === type && t.cat === catId && t.date >= startIso && t.date <= endIso)
    .reduce((s, t) => s + t.amount, 0);
const aiStudySubjectRate = (days, subjectId) => aiTaskRate(days, subjectId);
const aiFmtPct = n => `${n > 0 ? "+" : ""}${n}%`;

// ── V25 MỤC 3: helper cho AI Insight đọc dữ liệu V24 (dailyPicks/poolDone/
// bigGoalsToday/studyResults/shortContent/tomorrowPrep) thay vì TASKS cố định ──
const aiPoolDoneRate = days => {
  const present = aiPresent(days);
  if (!present.length) return 0;
  const rates = present.map(x => {
    const picks = Array.isArray(x.day.dailyPicks) ? x.day.dailyPicks : [];
    if (!picks.length) return null;
    const done = picks.filter(id => x.day.poolDone?.[id]).length;
    return done / picks.length;
  }).filter(v => v !== null);
  return rates.length ? aiAvg(rates) : 0;
};
const aiBigGoalDoneCount = days => aiPresent(days).reduce((s, x) => s + (x.day.bigGoalsToday || []).filter(g => g.done).length, 0);
const aiStudyResultDoneCount = days => aiPresent(days).reduce((s, x) => s + (x.day.studyResults || []).filter(r => r.done).length, 0);
const aiTomorrowPrepRate = days => {
  const present = aiPresent(days);
  if (!present.length) return 0;
  return present.filter(x => !!x.day.tomorrowPrep?.doneAt).length / present.length;
};
const aiShortContentOverLimitDays = days => aiPresent(days).filter(x => {
  const used = (x.day.shortContent || []).reduce((s, c) => s + (c.minutes || 0), 0);
  return used > shortContentLimitMin(x.iso);
}).length;
const aiShortContentAvgMin = days => {
  const present = aiPresent(days);
  if (!present.length) return 0;
  return aiAvg(present.map(x => (x.day.shortContent || []).reduce((s, c) => s + (c.minutes || 0), 0)));
};

      const pct = Math.round(((m2 - m1) / m1) * 100);

        title: "Ngủ đủ giúp tâm trạng tốt hơn",
        description: `Bạn đã ngủ đủ giờ ${sleepStreak} ngày liên tiếp và Mood tăng ${aiFmtPct(pct)} so với nửa đầu tuần.`,

      if (!finTxs || !finTxs.length) return null;
      const end = new Date(td);
      const curStart = new Date(end); curStart.setDate(curStart.getDate() - 6);
      const prevEnd = new Date(curStart); prevEnd.setDate(prevEnd.getDate() - 1);
      const prevStart = new Date(prevEnd); prevStart.setDate(prevStart.getDate() - 6);
      const iso = d => d.toISOString().split("T")[0];

      const prev = aiFinCatSum(finTxs, "anuong", "expense", iso(prevStart), iso(prevEnd));
      if (prev <= 0) return null;

// ── AI INSIGHT: EVALUATOR ───────────────────────────────────────────────────
function evaluateAiInsights(ctx) {
  const out = [];
  for (const rule of AI_RULES) {
    let result = null;
    try { result = rule.run(ctx); } catch (e) { result = null; }
    if (!result) continue;
    const typeInfo = AI_TYPE_INFO[result.type] || AI_TYPE_INFO.insight;
    const catInfo = AI_CATEGORY_INFO[rule.category] || {};
    out.push({
      id: rule.id,
      icon: result.icon || catInfo.icon || typeInfo.icon,
      title: result.title,
      description: result.description,
      reason: result.reason || "",
      category: rule.category,
      type: result.type || "insight",
      severity: result.severity || "low",
      date: ctx.td,
      priority: typeof result.priority === "number" ? result.priority : 50,
    });
  }
  const typeWeight = { warning: 3, achievement: 2, suggestion: 1, insight: 0, trend: 0 };
  return out.sort((a, b) => (b.priority - a.priority) || ((typeWeight[b.type]||0) - (typeWeight[a.type]||0)));
}

// Hook: build ctx 1 lần và evaluate — chỉ recompute khi db/finTxs/setts/str/txp/td đổi (MEMO)
function useAiInsights({ db, dayExp, finTxs, setts, str, txp, td }) {
  return useMemo(() => {
    const anchor = td || toISO();
    const last7 = aiLastNDays(db, 7, anchor);
    const prevEnd = new Date(anchor); prevEnd.setDate(prevEnd.getDate() - 7);
    const prevEndIso = prevEnd.toISOString().split("T")[0];
    const prev7 = aiLastNDays(db, 7, prevEndIso);
    const last14 = aiLastNDays(db, 14, anchor);
    const last30 = aiLastNDays(db, 30, anchor);
    const ctx = { db, dayExp, finTxs, setts, str, txp, td: anchor, last7, prev7, last14, last30 };
    return evaluateAiInsights(ctx);
  }, [db, dayExp, finTxs, setts, str, txp, td]);
}

      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>

          return (
            <button key={c} onClick={()=>setCatFilter(c)} style={{padding:"4px 10px",borderRadius:999,border:`1px solid ${catFilter===c?(info?.c||theme.accent):theme.border}`,background:catFilter===c?`${info?.c||theme.accent}22`:"transparent",color:catFilter===c?(info?.c||theme.accent):theme.textDim,fontSize:9,cursor:"pointer",transition:"all 0.2s ease"}}>{c==="Tất cả"?c:`${info?.icon||""} ${c}`}</button>
          );

      </div>

      {/* List */}
      {filtered.length===0 ? (
        allInsights.length===0 ? (
          <div className="gb-fade-in" style={{textAlign:"center",padding:"28px 16px",background:theme.surfaceAlt,borderRadius:14}}>
            <div className="gb-ai-pulse" style={{fontSize:36,marginBottom:10}}>🤖</div>
            <div style={{fontSize:13,fontWeight:700,color:theme.text,marginBottom:12}}>AI đang học thói quen của bạn</div>

              <div>• {emptyStateStats.taskCount} nhiệm vụ</div>

        )
      ) : (
        filtered.map(item=><AiInsightCard key={item.id} item={item} theme={theme}/>)
      )}
      <div style={{height:16}}/>
    </div>
  );
}

// ── AI INSIGHT: WIDGET gọn cho Dashboard Home (Top 3 Insight / Warning / Suggestion) ──
const AI_MATURITY_DAYS = 14; // số ngày dữ liệu để coi là "đã học đủ" — chỉ dùng cho progress hiển thị, KHÔNG ảnh hưởng rule engine

function AiInsightWidget({db,dayExp,finTxs,setts,str,txp,onOpenAiInsight}) {
  const theme = useContext(ThemeContext);
  const td = useMemo(()=>toISO(),[]);
  const allInsights = useAiInsights({db,dayExp,finTxs,setts,str,txp,td});

  const topInsights = useMemo(()=>allInsights.filter(i=>i.type==="insight"||i.type==="trend").slice(0,3),[allInsights]);
  const topWarning = useMemo(()=>allInsights.find(i=>i.type==="warning")||null,[allInsights]);
  const quickSuggestion = useMemo(()=>allInsights.find(i=>i.type==="suggestion"||i.type==="achievement")||null,[allInsights]);

  const daysCollected = useMemo(()=>Object.keys(db||{}).length,[db]);

  // MỤC 8 — Không còn return null khi thiếu dữ liệu. Luôn hiển thị widget,
  // dùng placeholder đẹp khi allInsights rỗng thay vì ẩn hẳn khỏi Dashboard.
  if(!allInsights.length) {
    const pct = Math.min(100, Math.round((daysCollected/AI_MATURITY_DAYS)*100));
    return (
      <div className="gb-fade-in" style={{background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:"14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span className="gb-ai-pulse" style={{fontSize:22}}>🤖</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700,color:theme.accent}}>AI Insight</div>
            <div style={{fontSize:10,color:theme.textDim,marginTop:1}}>Đang học thói quen của bạn...</div>
          </div>
        </div>
        <div style={{height:8,background:theme.border,borderRadius:4,overflow:"hidden",marginBottom:6}}>
          <div className="gb-progress-fill gb-ai-shimmer" style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${theme.accent},${theme.secondary||theme.accent})`,borderRadius:4,boxShadow:`0 0 8px ${theme.accent}66`}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:theme.textDim}}>
          <span>Đã thu thập: {daysCollected}/{AI_MATURITY_DAYS} ngày</span>
          <span>{pct}%</span>
        </div>
        <div style={{fontSize:9,color:theme.textDim,marginTop:8,textAlign:"center",opacity:0.85}}>Cần thêm vài ngày để AI đưa ra Insight chính xác 📊</div>
      </div>
    );
  }

  return (
    <div className="gb-fade-in" style={{background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:theme.accent}}>🤖 AI Insight</div>
        {onOpenAiInsight && (
          <button onClick={onOpenAiInsight} style={{background:"none",border:"none",color:theme.textDim,fontSize:10,cursor:"pointer"}}>Xem tất cả →</button>
        )}
      </div>

      {topWarning && (
        <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8,padding:"8px 10px",background:`${AI_TYPE_INFO.warning.c}14`,borderRadius:8}}>
          <span style={{fontSize:14}}>{topWarning.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:700,color:theme.text}}>{topWarning.title}</div>
            <div style={{fontSize:9,color:theme.textDim,marginTop:2}}>{topWarning.description}</div>
          </div>
        </div>
      )}

      {topInsights.map(item=>(
        <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6,padding:"6px 8px",background:theme.surfaceAlt,borderRadius:8}}>
          <span style={{fontSize:12}}>{item.icon}</span>
          <div style={{fontSize:9,color:theme.textDim,lineHeight:1.4}}>{item.description}</div>
        </div>
      ))}

      {quickSuggestion && (
        <div style={{display:"flex",gap:8,alignItems:"flex-start",marginTop:6,padding:"8px 10px",background:`${AI_TYPE_INFO.suggestion.c}14`,borderRadius:8}}>
          <span style={{fontSize:14}}>{quickSuggestion.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:700,color:theme.text}}>{quickSuggestion.title}</div>
            <div style={{fontSize:9,color:theme.textDim,marginTop:2}}>{quickSuggestion.description}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function KhamPha({db,dayExp,str,txp,finTxs,setts}) {
  // Khám Phá (Insights): Ideas & Discoveries — sổ tay ý tưởng nhanh, không phải ghi hành trình.
  // 3 sub-tab: Ideas | AI Insight (rule-based, local) | Correlation Lab (chuyển từ tab Thống kê sang đây).
  const theme = useContext(ThemeContext);
  const [khSubTab,setKhSubTab]=useState("ideas"); // ideas | insight | corrlab
  const [ideas,setIdeas]=useState([]);
  const [form,setForm]=useState(null); // null=closed, {}=new, {id}=edit
  const [catFilter,setCatFilter]=useState("Tất cả");
  const [doneFilter,setDoneFilter]=useState("all"); // all | done | pending
  const [search,setSearch]=useState("");
  const [ideaConfirm,setIdeaConfirm]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("ideas:items");if(r)setIdeas(JSON.parse(r));}catch{}
    })();
  },[]);

  const saveIdeas=async arr=>{try{await S.set("ideas:items",JSON.stringify(arr));}catch{} setIdeas(arr);};

  const toggleDone=(id)=>{
    saveIdeas(ideas.map(x=>x.id===id?{...x,done:!x.done}:x));
  };

  const saveForm=()=>{
    if(!form||!form.title?.trim()) return;
    const item={
      id:form.id||"idea_"+Date.now(),
      title:form.title.trim(),
      cat:form.cat||"Cuộc sống",
      priority:form.priority||"med",
      done:form.done||false,
      createdAt:form.createdAt||Date.now(),
    };
    const arr=form.id?ideas.map(x=>x.id===form.id?item:x):[item,...ideas];
    saveIdeas(arr); setForm(null);
  };

  const PRIO_ORDER={high:0,med:1,low:2};
  const filtered=ideas.filter(it=>{
    const q=search.toLowerCase();
    const matchSearch=!q||it.title.toLowerCase().includes(q);
    const matchCat=catFilter==="Tất cả"||it.cat===catFilter;
    const matchDone=doneFilter==="all"||(doneFilter==="done"?it.done:!it.done);
    return matchSearch&&matchCat&&matchDone;
  }).sort((a,b)=>{
    if(!!a.done!==!!b.done) return a.done?1:-1; // chưa làm lên trước
    const pd=PRIO_ORDER[a.priority]-PRIO_ORDER[b.priority];
    if(pd!==0) return pd;
    return b.createdAt-a.createdAt;
  });

  return (
    <div>
      {/* MỤC 7: Sub-tab bar — Ideas | AI Insight | Correlation Lab (chuyển từ tab Thống kê sang đây) */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{k:"ideas",l:"💡 Ideas"},{k:"insight",l:"✨ AI Insight"},{k:"corrlab",l:"🔬 Corr. Lab"}].map(o=>(
          <button key={o.k} onClick={()=>setKhSubTab(o.k)} className="gb-ripple" onMouseDown={gbRipple} style={{position:"relative",flex:1,padding:"8px 0",borderRadius:999,border:"none",background:khSubTab===o.k?theme.accent:theme.surfaceAlt,color:khSubTab===o.k?"#fff":theme.textDim,fontSize:11,fontWeight:khSubTab===o.k?700:400,cursor:"pointer",boxShadow:khSubTab===o.k?`0 4px 16px ${theme.accent}55`:"none",transition:"all 0.2s ease"}}>
            {o.l}
            {o.k==="insight" && (
              <span className="gb-new-badge" style={{position:"absolute",top:-6,right:6,fontSize:7,fontWeight:800,color:"#fff",background:theme.danger||"#ef4444",borderRadius:8,padding:"1px 5px",letterSpacing:0.5,boxShadow:"0 2px 6px rgba(0,0,0,0.35)"}}>NEW</span>
            )}
          </button>
        ))}
      </div>

      {khSubTab==="insight" && (
        <AiInsightPanel db={db} dayExp={dayExp} finTxs={finTxs} setts={setts} str={str} txp={txp}/>
      )}

      {khSubTab==="corrlab" && (
        <div className="gb-tab-fade">
          <div style={{background:`linear-gradient(135deg,${theme.accent}14,${theme.secondary}14)`,borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:13,fontWeight:700,color:theme.accent,marginBottom:4}}>🔬 Correlation Lab</div>
            <div style={{fontSize:11,color:theme.textDim}}>Phân tích tự động: tìm quy luật giữa mood, XP, ngủ, phone, học tập...</div>
          </div>
          <CorrelationLab db={db} dayExp={dayExp}/>
        </div>
      )}

      {khSubTab==="ideas" && (
      <>
      <div style={{background:`linear-gradient(135deg,${theme.accent}14,${theme.secondary}14)`,borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.accent,marginBottom:4}}>💡 Ideas & Discoveries</div>
        <div style={{fontSize:11,color:theme.textDim}}>Ghi nhanh ý tưởng Dashboard, Game, học tập, cuộc sống.</div>
      </div>

      {/* Search + Add */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Tìm ý tưởng..." style={{flex:1,background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:"10px 14px",color:theme.text,fontSize:12,outline:"none"}}/>
        <button onClick={()=>setForm({title:"",cat:"Cuộc sống",priority:"med",done:false})} className="gb-ripple" onMouseDown={gbRipple} style={{background:`linear-gradient(135deg,${theme.accent},${theme.secondary})`,border:"none",borderRadius:12,padding:"0 16px",color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Thêm</button>
      </div>

      {/* Done filter */}
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[{k:"all",l:"📋 Tất cả"},{k:"pending",l:"⏳ Chưa làm"},{k:"done",l:"✅ Đã làm"}].map(o=>(
          <button key={o.k} onClick={()=>setDoneFilter(o.k)} style={{flex:1,padding:"6px 0",borderRadius:10,border:`1px solid ${doneFilter===o.k?theme.accent:theme.border}`,background:doneFilter===o.k?`${theme.accent}1F`:"transparent",color:doneFilter===o.k?theme.accent:theme.textDim,fontSize:10,fontWeight:doneFilter===o.k?700:400,cursor:"pointer",transition:"all 0.2s ease"}}>{o.l}</button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
        {["Tất cả",...IDEA_CATS].map(c=>(
          <button key={c} onClick={()=>setCatFilter(c)} style={{padding:"4px 12px",borderRadius:999,border:`1px solid ${catFilter===c?(IDEA_CAT_C[c]||theme.accent):theme.border}`,background:catFilter===c?`${IDEA_CAT_C[c]||theme.accent}22`:"transparent",color:catFilter===c?(IDEA_CAT_C[c]||theme.accent):theme.textDim,fontSize:10,cursor:"pointer",transition:"all 0.2s ease"}}>{c==="Tất cả"?c:`${IDEA_CAT_I[c]} ${c}`}</button>
        ))}
      </div>

      {/* Add/Edit form */}
      {form&&(
        <div style={{background:`${theme.accent}0A`,borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
          <div style={{fontSize:11,fontWeight:700,color:theme.accent,marginBottom:10}}>{form.id?"✏️ Chỉnh sửa ý tưởng":"💡 Ý tưởng mới"}</div>
          <input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Tên ý tưởng *" style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",marginBottom:8}}/>
          <div style={{fontSize:10,color:theme.textDim,marginBottom:5}}>Nhóm ý tưởng</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {IDEA_CATS.map(c=>(
              <button key={c} onClick={()=>setForm({...form,cat:c})} style={{padding:"4px 12px",borderRadius:999,border:`1px solid ${form.cat===c?(IDEA_CAT_C[c]||theme.accent):theme.border}`,background:form.cat===c?`${IDEA_CAT_C[c]||theme.accent}22`:"transparent",color:form.cat===c?(IDEA_CAT_C[c]||theme.accent):theme.textDim,fontSize:10,cursor:"pointer"}}>{IDEA_CAT_I[c]} {c}</button>
            ))}
          </div>
          <div style={{fontSize:10,color:theme.textDim,marginBottom:5}}>Độ ưu tiên</div>
          <div style={{display:"flex",gap:4,marginBottom:10}}>
            {IDEA_PRIORITIES.map(p=>(
              <button key={p.k} onClick={()=>setForm({...form,priority:p.k})} style={{flex:1,padding:"6px 0",borderRadius:999,border:`1px solid ${form.priority===p.k?IDEA_PRIO_C[p.k]:theme.border}`,background:form.priority===p.k?`${IDEA_PRIO_C[p.k]}22`:"transparent",color:form.priority===p.k?IDEA_PRIO_C[p.k]:theme.textDim,fontSize:10,cursor:"pointer"}}>{p.l}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveForm} style={{flex:1,background:`linear-gradient(135deg,${theme.accent},${theme.secondary})`,border:"none",borderRadius:999,padding:"10px 0",color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>✅ Lưu</button>
            <button onClick={()=>setForm(null)} style={{padding:"10px 16px",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:999,color:theme.textDim,fontSize:12,cursor:"pointer"}}>Huỷ</button>
          </div>
        </div>
      )}

      {/* List */}
      {filtered.length===0
        ?<div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"30px 0"}}>
            {ideas.length===0?"Chưa có ý tưởng nào — bấm + Thêm 💡":"Không tìm thấy kết quả"}
          </div>
        :filtered.map(it=>(
          <div key={it.id} style={{background:theme.surface,border:`1px solid ${it.done?theme.border:(IDEA_CAT_C[it.cat]||theme.textDim)}`,borderRadius:10,padding:"12px 14px",marginBottom:8,opacity:it.done?0.6:1,boxShadow:"0 6px 20px rgba(0,0,0,0.28)",transition:"opacity 0.2s ease"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <button onClick={()=>toggleDone(it.id)} style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${it.done?theme.success:theme.border}`,background:it.done?theme.success:"transparent",color:"white",fontSize:11,cursor:"pointer",flexShrink:0,marginTop:1}}>
                {it.done?"✓":""}
              </button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:theme.text,textDecoration:it.done?"line-through":"none",marginBottom:4}}>{it.title}</div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:9,padding:"2px 7px",borderRadius:20,background:`${IDEA_CAT_C[it.cat]||theme.textDim}22`,color:IDEA_CAT_C[it.cat]||theme.textDim}}>{IDEA_CAT_I[it.cat]} {it.cat}</span>
                  <span style={{fontSize:9,padding:"2px 7px",borderRadius:20,background:`${IDEA_PRIO_C[it.priority]}22`,color:IDEA_PRIO_C[it.priority]}}>{IDEA_PRIORITIES.find(p=>p.k===it.priority)?.l}</span>
                  <span style={{fontSize:9,color:theme.textDim}}>{fmtDate(it.createdAt)}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                <button onClick={()=>setForm({...it})} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:12}}>✏️</button>
                {ideaConfirm===it.id?(
                  <InlineConfirm
                    message="Xoá ý tưởng này?"
                    onConfirm={()=>{saveIdeas(ideas.filter(x=>x.id!==it.id));setIdeaConfirm(null);}}
                    onCancel={()=>setIdeaConfirm(null)}
                  />
                ):(
                  <button onClick={()=>setIdeaConfirm(it.id)} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:13}}>×</button>
                )}
              </div>
            </div>
          </div>
        ))
      }
      <div style={{height:16}}/>
      </>
      )}
    </div>
  );
}

const fmtVND = n => (Math.round(n)||0).toLocaleString("vi-VN");

function TaiChinh({txs=[], onTxsChange}) {

    })();
  },[]);

  // txs là nguồn chân lý ở App root (finTxs) — ghi storage rồi báo ngược lên qua onTxsChange
  const saveTxs = async arr => { try{ await S.set("finance:transactions", JSON.stringify(arr)); }catch{} onTxsChange?.(arr); };
  const saveCats = async obj => { try{ await S.set("finance:categories", JSON.stringify(obj)); }catch{} setCats(obj); };


  const allCats = (type) => cats[type] || [];
  const findCat = (type,id) => allCats(type).find(c=>c.id===id) || {id,name:id,icon:"📦"};

  // PERF (MỤC 9): toàn bộ khối thống kê tài chính bên dưới (monthTxs,
  // pieData, last6Months, last7Days, last4Weeks, last14Days, cashFlowData,
  // insights...) trước đây được tính TRỰC TIẾP trong thân component, không
  // có useMemo — nghĩa là mỗi lần gõ phím trong ô tìm kiếm lịch sử, mỗi lần
  // mở form thêm giao dịch, hay bất kỳ setState nội bộ nào của tab Tài
  // chính cũng khiến ~15 vòng lặp filter/reduce trên toàn bộ mảng giao dịch
  // chạy lại từ đầu — dù `txs` không hề đổi. Đây là nguyên nhân chính gây
  // khựng khi thao tác trong tab Tài chính. Gộp toàn bộ vào 1 useMemo,
  // chỉ phụ thuộc txs/cats — logic tính toán giữ nguyên 100%, không đổi.
  const finCalc = useMemo(()=>{
    const todayIso = toISO();
    const thisMonth = finMonthKey(todayIso);
    const findCat2 = (type,id) => (cats[type]||[]).find(c=>c.id===id) || {id,name:id,icon:"📦"};

    const monthTxs = txs.filter(t=>finMonthKey(t.date)===thisMonth);
    const monthIncome = monthTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const monthExpense = monthTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const monthBalance = monthIncome - monthExpense;
    const totalBalance = txs.reduce((s,t)=>s+(t.type==="income"?t.amount:-t.amount),0);

    const prevMonthDate = new Date(thisMonth+"-01T00:00:00"); prevMonthDate.setMonth(prevMonthDate.getMonth()-1);
    const prevMonthKey = `${prevMonthDate.getFullYear()}-${String(prevMonthDate.getMonth()+1).padStart(2,"0")}`;
    const prevMonthTxs = txs.filter(t=>finMonthKey(t.date)===prevMonthKey);
    const prevExpense = prevMonthTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const prevIncome  = prevMonthTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);

    const expenseByCat = {};
    monthTxs.filter(t=>t.type==="expense").forEach(t=>{ expenseByCat[t.cat]=(expenseByCat[t.cat]||0)+t.amount; });
    const pieData = Object.entries(expenseByCat)
      .map(([cat,amt])=>({cat,amt,cinfo:findCat2("expense",cat)}))
      .sort((a,b)=>b.amt-a.amt);
    const top5Cats = pieData.slice(0,5);

    const last6Months = Array.from({length:6},(_,i)=>{
      const d=new Date(thisMonth+"-01T00:00:00"); d.setMonth(d.getMonth()-(5-i));
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const exp = txs.filter(t=>finMonthKey(t.date)===key && t.type==="expense").reduce((s,t)=>s+t.amount,0);
      const inc = txs.filter(t=>finMonthKey(t.date)===key && t.type==="income").reduce((s,t)=>s+t.amount,0);
      return {key, label:d.toLocaleDateString("vi-VN",{month:"numeric",year:"2-digit"}), exp, inc};
    });
    const maxBar = Math.max(...last6Months.map(m=>Math.max(m.exp,m.inc)),1);

    const dayOfMonth = new Date(todayIso+"T00:00:00").getDate();
    const avgPerDay = monthExpense / Math.max(dayOfMonth,1);

    const biggestExpense = monthTxs.filter(t=>t.type==="expense").sort((a,b)=>b.amount-a.amount)[0] || null;

    const savingRate = monthIncome>0 ? Math.round((monthBalance/monthIncome)*100) : null;

    const last7Days = Array.from({length:7},(_,i)=>{
      const d=new Date(todayIso+"T00:00:00"); d.setDate(d.getDate()-6+i);
      const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const exp = txs.filter(t=>t.date===iso&&t.type==="expense").reduce((s,t)=>s+t.amount,0);
      return {iso, exp, label:d.toLocaleDateString("vi-VN",{weekday:"short"}).slice(0,3)};
    });
    const max7Day = Math.max(...last7Days.map(d=>d.exp),1);

    const last4Weeks = Array.from({length:4},(_,w)=>{
      const wIdx = 3-w;
      const endD = new Date(todayIso+"T00:00:00"); endD.setDate(endD.getDate()-wIdx*7);
      const startD = new Date(endD); startD.setDate(startD.getDate()-6);
      const startIso = `${startD.getFullYear()}-${String(startD.getMonth()+1).padStart(2,"0")}-${String(startD.getDate()).padStart(2,"0")}`;
      const endIso = `${endD.getFullYear()}-${String(endD.getMonth()+1).padStart(2,"0")}-${String(endD.getDate()).padStart(2,"0")}`;
      const exp = txs.filter(t=>t.type==="expense"&&t.date>=startIso&&t.date<=endIso).reduce((s,t)=>s+t.amount,0);
      return {label:`${startD.getDate()}/${startD.getMonth()+1}-${endD.getDate()}/${endD.getMonth()+1}`, exp};
    });
    const maxWeek = Math.max(...last4Weeks.map(w=>w.exp),1);

    const last14Days = Array.from({length:14},(_,i)=>{
      const d=new Date(todayIso+"T00:00:00"); d.setDate(d.getDate()-13+i);
      const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const dayNet = txs.filter(t=>t.date===iso).reduce((s,t)=>s+(t.type==="income"?t.amount:-t.amount),0);
      return {iso, dayNet, label:`${d.getDate()}/${d.getMonth()+1}`};
    });
    const balanceBefore14 = txs.filter(t=>t.date<last14Days[0].iso).reduce((s,t)=>s+(t.type==="income"?t.amount:-t.amount),0);
    let runningBal = balanceBefore14;
    const cashFlowData = last14Days.map(d=>{ runningBal+=d.dayNet; return {...d, cum:runningBal}; });

    const insights = [];
    if(txs.length>20){
      if(top5Cats[0]) insights.push(`${top5Cats[0].cinfo.icon} Bạn chi nhiều nhất cho ${top5Cats[0].cinfo.name}.`);
      const cafeCount = monthTxs.filter(t=>t.type==="expense"&&t.cat==="cafe").length;
      if(cafeCount>0){
        const weeksElapsed = Math.max(dayOfMonth/7,1);
        insights.push(`☕ Trung bình mỗi tuần bạn chi tiêu Cafe ${(cafeCount/weeksElapsed).toFixed(1)} lần.`);
      }
      if(prevExpense>0){
        const pct = Math.round(((monthExpense-prevExpense)/prevExpense)*100);
        if(pct<0) insights.push(`📉 Chi tiêu tháng này giảm ${Math.abs(pct)}% so với tháng trước.`);
        else if(pct>0) insights.push(`📈 Chi tiêu tháng này tăng ${pct}% so với tháng trước.`);
      }
      if(prevIncome>0){
        const pct = Math.round(((monthIncome-prevIncome)/prevIncome)*100);
        if(pct>0) insights.push(`📈 Thu nhập tăng ${pct}% so với tháng trước.`);
        else if(pct<0) insights.push(`📉 Thu nhập giảm ${Math.abs(pct)}% so với tháng trước.`);
      }
      const bestMonth = last6Months.reduce((best,m)=>{
        const saved = m.inc - m.exp;
        return (!best || saved>best.saved) ? {...m, saved} : best;
      }, null);
      if(bestMonth && bestMonth.saved>0) insights.push(`🎉 Tháng tiết kiệm nhất gần đây là ${bestMonth.label}.`);
    }

    return {
      todayIso, thisMonth, monthTxs, monthIncome, monthExpense, monthBalance, totalBalance,
      prevExpense, prevIncome, pieData, top5Cats, last6Months, maxBar, dayOfMonth, avgPerDay,
      biggestExpense, savingRate, last7Days, max7Day, last4Weeks, maxWeek, cashFlowData, insights,
    };
  },[txs, cats]);

  const {
    todayIso, thisMonth, monthTxs, monthIncome, monthExpense, monthBalance, totalBalance,
    prevExpense, prevIncome, pieData, top5Cats, last6Months, maxBar, dayOfMonth, avgPerDay,
    biggestExpense, savingRate, last7Days, max7Day, last4Weeks, maxWeek, cashFlowData, insights,
  } = finCalc;

  // ── Lịch sử: filter — tách riêng khỏi finCalc vì phụ thuộc historySearch/
  // historyFilter (đổi liên tục khi gõ), để gõ tìm kiếm không kéo theo tính
  // lại toàn bộ thống kê tài chính ở trên.
  const filteredHistory = useMemo(()=>{
    const now = new Date(todayIso+"T00:00:00");
    return txs.filter(t=>{
      const q = historySearch.trim().toLowerCase();
      if(q && !t.name.toLowerCase().includes(q)) return false;
      const d = new Date(t.date+"T00:00:00");
      if(historyFilter==="today") return t.date===todayIso;
      if(historyFilter==="week"){
        const diffDays = Math.floor((now-d)/86400000);
        return diffDays>=0 && diffDays<7;
      }
      if(historyFilter==="month") return finMonthKey(t.date)===thisMonth;
      if(historyFilter==="year") return t.date.slice(0,4)===todayIso.slice(0,4);
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt-a.createdAt);
  },[txs, historySearch, historyFilter, todayIso, thisMonth]);

  const saveForm = () => {
    if(!form || !form.name?.trim() || !form.amount || Number(form.amount)<=0 || !form.cat) return;
    const item = {
      id: form.id || "fin_"+Date.now(),
      type: form.type || "expense",
      cat: form.cat,
      name: form.name.trim(),
      amount: Math.abs(Number(form.amount)),
      date: form.date || todayIso,
      note: form.note?.trim() || "",
      createdAt: form.createdAt || Date.now(),
    };
    const arr = form.id ? txs.map(x=>x.id===form.id?item:x) : [item,...txs];
    saveTxs(arr);
    if(!form.id) { setCoinFx({key:Date.now(),isIncome:item.type==="income"}); playSound("coin"); }
    setForm(null);
  };

  const addCategory = () => {
    if(!newCatName.trim() || !form) return;
    const type = form.type || "expense";
    const id = "custom_"+Date.now();
    const next = {...cats, [type]: [...(cats[type]||[]), {id, name:newCatName.trim(), icon:newCatIcon||"📦"}]};
    saveCats(next);
    setForm({...form, cat:id});
    setNewCatName(""); setNewCatIcon("📦"); setNewCatOpen(false);
  };

  const recentTxs = useMemo(()=>
    txs.slice().sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt-a.createdAt).slice(0,30)
  ,[txs]);

  return (
    <div>
      {/* Dashboard header */}
      <div style={{background:`linear-gradient(135deg,${theme.primary}1A,${theme.secondary}1A)`,borderRadius:14,padding:"16px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)",position:"relative"}}>
        <div style={{fontSize:11,color:theme.textDim,marginBottom:2}}>💰 Còn lại</div>
        <div style={{fontSize:24,fontWeight:800,color:monthBalance>=0?theme.success:theme.danger,marginBottom:10,position:"relative",display:"inline-block"}}>
          <CountUp value={monthBalance} formatter={n=>fmtVND(n)}/> ₫
          {coinFx && (
            <span key={coinFx.key} className="gb-coin-fly" style={{right:-22,top:-4,color:coinFx.isIncome?theme.success:theme.danger,fontSize:16}} onAnimationEnd={()=>setCoinFx(null)}>
              {coinFx.isIncome?"🪙":"💸"}
            </span>
          )}
        </div>
        <div style={{display:"flex",gap:8}}>
          <div className="gb-card-hover gb-card-elevate" style={{flex:1,background:theme.surface,borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>Thu tháng này</div>
            <div style={{fontSize:13,fontWeight:700,color:theme.success}}><CountUp value={monthIncome} formatter={n=>fmtVND(n)}/> ₫</div>
          </div>
          <div className="gb-card-hover gb-card-elevate" style={{flex:1,background:theme.surface,borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:theme.textDim,marginBottom:2}}>Chi tháng này</div>
            <div style={{fontSize:13,fontWeight:700,color:theme.danger}}><CountUp value={monthExpense} formatter={n=>fmtVND(n)}/> ₫</div>
          </div>
        </div>
      </div>

      {/* Section switcher */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{k:"chi",l:"💸 Chi tiêu"},{k:"stats",l:"📊 Thống kê"},{k:"history",l:"📅 Lịch sử"}].map(o=>(
          <button key={o.k} onClick={()=>setSection(o.k)} className="gb-ripple" onMouseDown={gbRipple} style={{flex:1,padding:"8px 0",borderRadius:999,border:"none",background:section===o.k?`linear-gradient(135deg,${theme.primary},${theme.secondary})`:theme.surface,color:section===o.k?"#fff":theme.textDim,fontSize:11,fontWeight:section===o.k?700:400,cursor:"pointer",boxShadow:section===o.k?`0 4px 14px ${theme.primary}55`:"none",transition:"all 0.2s ease"}}>{o.l}</button>
        ))}
      </div>

      {/* ── CHI TIÊU (danh sách gần đây) ── */}
      {section==="chi" && (
        <div className="gb-fade-in">
          {recentTxs.length===0
            ? <div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"30px 0"}}>Chưa có giao dịch nào — bấm nút + để thêm 💰</div>
            : recentTxs.map(t=>{
                const c = findCat(t.type, t.cat);
                return (
                  <div key={t.id} className="gb-card-hover" style={{background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:10,padding:"11px 14px",marginBottom:8,boxShadow:"0 6px 20px rgba(0,0,0,0.28)",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:20,flexShrink:0}}>{c.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:theme.text}}>{t.name}</div>
                      <div style={{fontSize:9,color:theme.textDim}}>{c.name} · {fmtDate(new Date(t.date+"T00:00:00").getTime())}{t.note?` · ${t.note}`:""}</div>
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:t.type==="income"?theme.success:theme.danger,flexShrink:0}}>
                      {t.type==="income"?"+":"-"}{fmtVND(t.amount)}
                    </div>
                    <div style={{display:"flex",gap:2,flexShrink:0}}>
                      <button onClick={()=>setForm({...t,amount:String(t.amount)})} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:12}}>✏️</button>
                    </div>
                  </div>
                );
              })
          }
          <div style={{height:16}}/>
        </div>
      )}

      {/* ── THỐNG KÊ ── */}
      {section==="stats" && (
        <div className="gb-fade-in">
          {txs.length===0 ? (
            <div style={{background:theme.surface,borderRadius:14,padding:"36px 20px",textAlign:"center",boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
              <div style={{fontSize:36,marginBottom:10}}>📊</div>
              <div style={{fontSize:13,fontWeight:700,color:theme.text,marginBottom:6}}>Chưa có dữ liệu thống kê</div>
              <div style={{fontSize:11,color:theme.textDim,lineHeight:1.6}}>Ghi lại vài giao dịch thu/chi đầu tiên để xem biểu đồ và phân tích tại đây.</div>
            </div>
          ) : (
          <>
          {/* Tổng quan: TB chi/ngày, Saving Rate, Biggest Expense */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:8}}>📊 Tổng quan tháng này</div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
              <span style={{color:theme.textDim}}>Trung bình chi/ngày</span>
              <span style={{fontWeight:700,color:theme.text}}>{fmtVND(avgPerDay)} ₫</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
              <span style={{color:theme.textDim}}>Tỷ lệ tiết kiệm (Saving Rate)</span>
              <span style={{fontWeight:700,color:savingRate===null?theme.textDim:savingRate>=0?theme.success:theme.danger}}>{savingRate===null?"—":`${savingRate}%`}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
              <span style={{color:theme.textDim}}>Tổng số dư (từ trước đến nay)</span>
              <span style={{fontWeight:700,color:totalBalance>=0?theme.success:theme.danger}}>{fmtVND(totalBalance)} ₫</span>
            </div>
          </div>

          {/* Biggest Expense */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:8}}>💥 Khoản chi lớn nhất tháng này</div>
            {biggestExpense ? (
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>{findCat("expense",biggestExpense.cat).icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:theme.text}}>{biggestExpense.name}</div>
                  <div style={{fontSize:9,color:theme.textDim}}>{findCat("expense",biggestExpense.cat).name} · {fmtDate(new Date(biggestExpense.date+"T00:00:00").getTime())}</div>
                </div>
                <div style={{fontSize:14,fontWeight:800,color:theme.danger}}>{fmtVND(biggestExpense.amount)} ₫</div>
              </div>
            ) : <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"6px 0"}}>Chưa có khoản chi nào tháng này</div>}
          </div>

          {/* Donut chart: chi tiêu theo danh mục */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:10}}>🍩 Chi tiêu theo danh mục (tháng này)</div>
            {pieData.length===0
              ? <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"14px 0"}}>Chưa có dữ liệu chi tiêu</div>
              : <FinPieChart data={pieData} total={monthExpense}/>
            }
          </div>

          {/* 7-day Trend */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:10}}>📈 Xu hướng chi tiêu 7 ngày</div>
            {last7Days.every(d=>d.exp===0)
              ? <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"14px 0"}}>Chưa có chi tiêu trong 7 ngày qua</div>
              : <Fin7DayTrend data={last7Days} maxVal={max7Day}/>
            }
          </div>

          {/* Weekly Spending */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:10}}>🗓️ Chi tiêu theo tuần (4 tuần gần nhất)</div>
            {last4Weeks.every(w=>w.exp===0)
              ? <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"14px 0"}}>Chưa có dữ liệu 4 tuần gần đây</div>
              : <FinWeeklyBar data={last4Weeks} maxVal={maxWeek}/>
            }
          </div>

          {/* Cash Flow */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:10}}>💵 Dòng tiền (Cash Flow) — 14 ngày</div>
            {txs.length<3
              ? <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"14px 0"}}>Cần thêm giao dịch để vẽ dòng tiền</div>
              : <FinCashFlow data={cashFlowData}/>
            }
          </div>

          {/* Bar chart: 6 tháng gần nhất */}
          <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:10}}>📊 Thu vs Chi theo tháng</div>
            <FinBarChart data={last6Months} maxVal={maxBar}/>
          </div>

          {/* Top 5 danh mục chi nhiều nhất */}
          {top5Cats.length>0 && (
            <div style={{background:theme.surface,borderRadius:12,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
              <div style={{fontSize:10,color:theme.textDim,marginBottom:8}}>🏆 Top 5 danh mục chi nhiều nhất</div>
              {top5Cats.map((c,i)=>{
                const pct = monthExpense>0 ? Math.round((c.amt/monthExpense)*100) : 0;
                return (
                  <div key={c.cat} style={{marginBottom:i<top5Cats.length-1?10:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:14}}>{c.cinfo.icon}</span>
                      <span style={{flex:1,fontSize:11,color:theme.text}}>{c.cinfo.name}</span>
                      <span style={{fontSize:11,fontWeight:700,color:theme.danger}}>{fmtVND(c.amt)} ₫</span>
                    </div>
                    <div style={{height:5,background:theme.border,borderRadius:3,overflow:"hidden"}}>
