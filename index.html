function FinPieChart({data, total}) {
  const theme = useContext(ThemeContext);
  const size = 140, r = 52, cx = size/2, cy = size/2;
  const circumference = 2*Math.PI*r;
  let offsetAcc = 0;
  const slices = data.map((d,i)=>{
    const pct = total>0 ? d.amt/total : 0;
    const dash = pct*circumference;
    const slice = {
      color: FIN_CHART_COLORS[i%FIN_CHART_COLORS.length],
      pct, cat:d.cinfo,
      dasharray: `${dash} ${circumference-dash}`,
      dashoffset: -offsetAcc,
    };
    offsetAcc += dash;
    return slice;
  });
  return (
    <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={theme.border} strokeWidth={18}/>
          {slices.map((s,i)=>(
            <circle key={i} className="gb-donut-slice" cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={18}
              strokeDasharray={s.dasharray} strokeDashoffset={s.dashoffset} strokeLinecap="butt"/>
          ))}
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:9,color:theme.textDim}}>Tổng chi</div>
          <div style={{fontSize:12,fontWeight:800,color:theme.text}}>{fmtVND(total)}</div>
        </div>
      </div>
      <div style={{flex:1,minWidth:120}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,fontSize:10}}>
            <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{color:theme.text,flex:1}}>{s.cat.icon} {s.cat.name}</span>
            <span style={{color:theme.textDim}}>{Math.round(s.pct*100)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Cash Flow — đường số dư cộng dồn 14 ngày (SVG polyline đơn giản)
function FinCashFlow({data}) {
  const theme = useContext(ThemeContext);
  const w=280, h=90, pad=6;
  const vals = data.map(d=>d.cum);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max-min)||1;
  const stepX = (w-pad*2)/Math.max(data.length-1,1);
  const points = data.map((d,i)=>{
    const x = pad + i*stepX;
    const y = pad + (1-(d.cum-min)/range)*(h-pad*2);
    return {x,y,d};
  });
  const pathD = points.map((p,i)=>`${i===0?"M":"L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
  const lastPositive = data[data.length-1]?.cum>=0;
  return (
    <div>
      <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{overflow:"visible"}}>
        <path d={pathD} fill="none" stroke={lastPositive?theme.success:theme.danger} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
        {points.map((p,i)=>(i===0||i===points.length-1)&&(
          <circle key={i} cx={p.x} cy={p.y} r={3} fill={lastPositive?theme.success:theme.danger}/>
        ))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4,fontSize:9,color:theme.textDim,marginTop:6}}>
        <span>Đầu kỳ ({data[0].label}): {fmtVND(data[0].cum)} ₫</span>
        <span style={{color:lastPositive?theme.success:theme.danger,fontWeight:700}}>Hiện tại ({data[data.length-1].label}): {fmtVND(data[data.length-1].cum)} ₫</span>
      </div>
    </div>
  );
}

                <div className="gb-timeline-node" style={{width:18,height:18,borderRadius:"50%",background:c,border:`3px solid ${theme.surfaceAlt}`,flexShrink:0,marginTop:2,zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8}}>
                  {TL_CAT_I[it.cat]||"●"}
                </div>
                <div className="gb-card-hover" style={{flex:1,background:theme.surface,borderRadius:10,padding:"12px 14px",boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:9,color:c,fontWeight:700,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>{it.cat}</div>
                      <div style={{fontSize:12,fontWeight:600,color:theme.text}}>{it.title}</div>
                      <div style={{fontSize:9,color:theme.textDim,marginTop:3}}>{it.date}</div>
                      {it.desc&&<div style={{fontSize:11,color:theme.textDim,marginTop:5,lineHeight:1.5}}>{it.desc}</div>}
                    </div>
                    <button onClick={()=>saveItems(items.filter(x=>x.id!==it.id))} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:15,flexShrink:0}}>×</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

function CorrelationLab({db,dayExp}) {
  const theme = useContext(ThemeContext);
  // PERF (MỤC 9): toàn bộ phần phân tích bên dưới (~15 vòng lặp filter/
  // reduce trên allDates) trước đây chạy trực tiếp trong thân component mỗi
  // lần render, không có useMemo. Component này chỉ re-render khi cha
  // (KhamPha) render lại, nhưng vẫn bọc useMemo cho nhất quán với các nơi
  // khác và để tránh tính lại khi cha re-render vì lý do không liên quan
  // đến db (vd đổi filter/tab con khác trong KhamPha). Logic bên trong giữ
  // nguyên 100%, chỉ đổi chỗ chạy.
  const insights = useMemo(()=>{
  const allDates=Object.keys(db);
  const insights=[];

  // Swimming vs mood
  const swimDays=allDates.filter(d=>db[d]?.tasks?.swim);
  const noSwimDays=allDates.filter(d=>!db[d]?.tasks?.swim&&db[d]);
  const swimMood=swimDays.length?swimDays.reduce((s,d)=>s+avgMood(db[d]),0)/swimDays.length:0;
  const noSwimMood=noSwimDays.length?noSwimDays.reduce((s,d)=>s+avgMood(db[d]),0)/noSwimDays.length:0;
  if(swimDays.length>=3&&swimMood>0&&noSwimMood>0){
    const diff=Math.round((swimMood-noSwimMood)*100);
    insights.push({icon:"🏊",title:"Bơi lội và tâm trạng",body:`Ngày đi bơi tâm trạng trung bình ${swimMood.toFixed(1)}/5 — cao hơn ${diff>0?"+":""}${diff}% so với ngày không bơi (${noSwimMood.toFixed(1)}/5).`,color:diff>0?theme.success:theme.danger});
  }

  // Sleep vs XP
  const sleepDays=allDates.filter(d=>db[d]?.tasks?.sleep);
  const noSleepDays=allDates.filter(d=>!db[d]?.tasks?.sleep&&db[d]);
  const sleepXP=sleepDays.length?sleepDays.reduce((s,d)=>s+dayExp(d),0)/sleepDays.length:0;
  const noSleepXP=noSleepDays.length?noSleepDays.reduce((s,d)=>s+dayExp(d),0)/noSleepDays.length:0;
  if(sleepDays.length>=3){
    const diff=Math.round(sleepXP-noSleepXP);
    insights.push({icon:"🌙",title:"Ngủ sớm và XP",body:`Ngày ngủ trước 11h30 đạt trung bình ${Math.round(sleepXP)} XP — ${diff>0?"cao hơn":"thấp hơn"} ${Math.abs(diff)} XP so với ngày ngủ muộn.`,color:diff>0?theme.success:theme.warning});
  }

  // Sleep vs mood
  const sleepMood=sleepDays.length?sleepDays.reduce((s,d)=>s+avgMood(db[d]),0)/sleepDays.length:0;
  const noSleepMood=noSleepDays.length?noSleepDays.reduce((s,d)=>s+avgMood(db[d]),0)/noSleepDays.length:0;
  if(sleepDays.length>=3&&sleepMood>0&&noSleepMood>0){
    const diff=Math.round((sleepMood-noSleepMood)*100);
    insights.push({icon:"😴",title:"Ngủ sớm và tâm trạng",body:`Ngày ngủ trước 11h30 tâm trạng trung bình ${sleepMood.toFixed(1)}/5 — ${diff>0?"cao":"thấp"} hơn ${Math.abs(diff)}% so với ngày ngủ muộn (${noSleepMood.toFixed(1)}/5).`,color:diff>0?theme.success:theme.warning});
  }

  // Study time vs XP (tách theo ngày học nhiều / học ít, dùng ngưỡng trung vị đơn giản)
  const studyDaysAll=allDates.filter(d=>(db[d]?.studyTime||0)>0);
  if(studyDaysAll.length>=5){
    const sorted=studyDaysAll.map(d=>db[d].studyTime).sort((a,b)=>a-b);
    const median=sorted[Math.floor(sorted.length/2)];
    const lowStudy=studyDaysAll.filter(d=>db[d].studyTime<median);
    const highStudy=studyDaysAll.filter(d=>db[d].studyTime>=median);
    const lsXP=lowStudy.length?lowStudy.reduce((s,d)=>s+dayExp(d),0)/lowStudy.length:0;
    const hsXP=highStudy.length?highStudy.reduce((s,d)=>s+dayExp(d),0)/highStudy.length:0;
    if(lowStudy.length>=2&&highStudy.length>=2){
      const diff=Math.round(hsXP-lsXP);
      insights.push({icon:"⏱️",title:"Thời gian học và XP",body:`Ngày học nhiều hơn (Pomodoro) đạt trung bình ${Math.round(hsXP)} XP — ${diff>0?"cao hơn":"thấp hơn"} ${Math.abs(diff)} XP so với ngày học ít (${Math.round(lsXP)} XP).`,color:diff>0?theme.success:theme.warning});
    }

    // Study time vs mood (dùng chung ngưỡng median ở trên)
    const lowStudy2=lowStudy, highStudy2=highStudy;
    const lsMood=lowStudy2.length?lowStudy2.reduce((s,d)=>s+avgMood(db[d]),0)/lowStudy2.length:0;
    const hsMood=highStudy2.length?highStudy2.reduce((s,d)=>s+avgMood(db[d]),0)/highStudy2.length:0;
    if(lowStudy2.length>=2&&highStudy2.length>=2&&lsMood>0&&hsMood>0){
      const diff=Math.round((hsMood-lsMood)*100);
      insights.push({icon:"📖",title:"Thời gian học và tâm trạng",body:`Ngày học nhiều hơn tâm trạng trung bình ${hsMood.toFixed(1)}/5 — ${diff>0?"cao":"thấp"} hơn ${Math.abs(diff)}% so với ngày học ít (${lsMood.toFixed(1)}/5).`,color:diff>0?theme.success:theme.warning});
    }
  }

  // Phone vs mood
  const lowPhoneDays=allDates.filter(d=>db[d]?.phone>0&&db[d]?.phone<240);
  const highPhoneDays=allDates.filter(d=>db[d]?.phone>=360);
  const lpMood=lowPhoneDays.length?lowPhoneDays.reduce((s,d)=>s+avgMood(db[d]),0)/lowPhoneDays.length:0;
  const hpMood=highPhoneDays.length?highPhoneDays.reduce((s,d)=>s+avgMood(db[d]),0)/highPhoneDays.length:0;
  if(lowPhoneDays.length>=2&&highPhoneDays.length>=2&&lpMood>0&&hpMood>0){
    const diff=Math.round((lpMood-hpMood)*100);
    insights.push({icon:"📵",title:"Thời gian điện thoại và tâm trạng",body:`Ngày dùng phone <4h tâm trạng ${lpMood.toFixed(1)}/5 — ${diff>0?"cao":"thấp"} hơn ${Math.abs(diff)}% so với ngày dùng >6h (${hpMood.toFixed(1)}/5).`,color:diff>0?theme.success:theme.danger});
  }

  // Unlock count vs mood
  const lowUnlockDays=allDates.filter(d=>db[d]?.unlocks>0&&db[d]?.unlocks<40);
  const highUnlockDays=allDates.filter(d=>db[d]?.unlocks>=80);
  const luMood=lowUnlockDays.length?lowUnlockDays.reduce((s,d)=>s+avgMood(db[d]),0)/lowUnlockDays.length:0;
  const huMood=highUnlockDays.length?highUnlockDays.reduce((s,d)=>s+avgMood(db[d]),0)/highUnlockDays.length:0;
  if(lowUnlockDays.length>=2&&highUnlockDays.length>=2&&luMood>0&&huMood>0){
    const diff=Math.round((luMood-huMood)*100);
    insights.push({icon:"🔓",title:"Số lần mở khoá và tâm trạng",body:`Ngày mở khoá <40 lần tâm trạng ${luMood.toFixed(1)}/5 — ${diff>0?"cao":"thấp"} hơn ${Math.abs(diff)}% so với ngày mở khoá ≥80 lần (${huMood.toFixed(1)}/5).`,color:diff>0?theme.success:theme.danger});
  }

  // Unlock count vs XP
  const luXP=lowUnlockDays.length?lowUnlockDays.reduce((s,d)=>s+dayExp(d),0)/lowUnlockDays.length:0;
  const huXP=highUnlockDays.length?highUnlockDays.reduce((s,d)=>s+dayExp(d),0)/highUnlockDays.length:0;
  if(lowUnlockDays.length>=2&&highUnlockDays.length>=2){
    const diff=Math.round(luXP-huXP);
    insights.push({icon:"🔓",title:"Mở khoá nhiều và XP",body:`Ngày mở khoá <40 lần đạt trung bình ${Math.round(luXP)} XP — ${diff>0?"cao hơn":"thấp hơn"} ${Math.abs(diff)} XP so với ngày mở khoá ≥80 lần (${Math.round(huXP)} XP).`,color:diff>0?theme.success:theme.warning});
  }

  // Unlock count vs Screen Time
  const ulPhone=allDates.filter(d=>db[d]?.unlocks>0&&db[d]?.phone>0);
  if(ulPhone.length>=5){
    const n=ulPhone.length;
    const sumU=ulPhone.reduce((s,d)=>s+db[d].unlocks,0), avgU=sumU/n;
    const sumP=ulPhone.reduce((s,d)=>s+db[d].phone,0), avgP=sumP/n;
    let cov=0; ulPhone.forEach(d=>{cov+=(db[d].unlocks-avgU)*(db[d].phone-avgP);});
    const corr=cov>0?"cùng tăng":cov<0?"ngược chiều":"không rõ xu hướng";
    insights.push({icon:"📲",title:"Mở khoá và Screen Time",body:`Trên ${n} ngày có dữ liệu, số lần mở khoá và thời gian dùng điện thoại có xu hướng ${corr} — trung bình ${Math.round(avgU)} lần mở khoá và ${Math.floor(avgP/60)}h${Math.round(avgP%60)}m/ngày.`,color:cov>0?theme.warning:theme.success});
  }

  // Best day of week
  const xpByDow=[0,1,2,3,4,5,6].map(dow=>{
    const days=allDates.filter(d=>new Date(d+"T00:00:00").getDay()===dow);
    return {dow,avg:days.length?days.reduce((s,d)=>s+dayExp(d),0)/days.length:0,n:days.length};
  });
  const bestDow=xpByDow.filter(x=>x.n>=2).sort((a,b)=>b.avg-a.avg)[0];
  if(bestDow){
    const dowName=["Chủ nhật","Thứ hai","Thứ ba","Thứ tư","Thứ năm","Thứ sáu","Thứ bảy"][bestDow.dow];
    insights.push({icon:"📅",title:"Ngày tốt nhất trong tuần",body:`${dowName} là ngày mày thường đạt nhiều XP nhất — trung bình ${Math.round(bestDow.avg)} XP.`,color:theme.accent});
  }

  // Distraction trigger
  const allDistrs=allDates.flatMap(d=>db[d]?.distractions||[]);
  if(allDistrs.length>=5){
    const bySrc={};
    allDistrs.forEach(d=>{bySrc[d.source]=(bySrc[d.source]||0)+1;});
    const top=Object.entries(bySrc).sort((a,b)=>b[1]-a[1])[0];
    const byCtx={};
    allDistrs.forEach(d=>{byCtx[d.context]=(byCtx[d.context]||0)+1;});
    const topCtx=Object.entries(byCtx).sort((a,b)=>b[1]-a[1])[0];
    insights.push({icon:"📱",title:"Pattern sa lầy",body:`${top[0]} là nguyên nhân phổ biến nhất (${top[1]} lần). Phần lớn xảy ra khi đang ${topCtx[0].toLowerCase()} (${topCtx[1]} lần).`,color:theme.danger});
  }

  return insights;
  },[db,dayExp,theme]);

  return (
    <div>
      <div style={{background:"rgba(16,185,129,.06)",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.success,marginBottom:4}}>🔬 Phòng Thí Nghiệm</div>
        <div style={{fontSize:11,color:theme.textDim}}>Tự động phân tích dữ liệu của mày để tìm quy luật cá nhân.</div>
      </div>
      {insights.length===0
        ?<div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"30px 16px"}}>
            Cần ít nhất vài ngày dữ liệu để phân tích 🔬<br/>
            <span style={{fontSize:10,marginTop:6,display:"block"}}>Tiếp tục ghi nhật ký, mood, và thời gian học nhé!</span>
          </div>
        :insights.map((ins,i)=>(
          <div key={i} style={{background:theme.surface,border:`1px solid ${ins.color}`,borderRadius:10,padding:"12px 14px",marginBottom:10,boxShadow:"0 6px 20px rgba(0,0,0,0.28)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:20}}>{ins.icon}</span>
              <div style={{fontSize:12,fontWeight:700,color:ins.color}}>{ins.title}</div>
            </div>
            <div style={{fontSize:12,color:theme.textDim,lineHeight:1.7}}>{ins.body}</div>
          </div>
        ))
      }
      <div style={{height:16}}/>
    </div>
  );
}


// ── GLOBAL ERROR BOUNDARY ────────────────────────────────────────────────
// Bọc toàn bộ App: nếu bất kỳ chỗ nào trong app throw lỗi lúc render,
// thay vì đơ trắng/im lặng, hiện màn hình báo lỗi + nút thử lại / tải lại.
// Dữ liệu vẫn nằm nguyên trong localStorage, không mất gì khi tải lại.
class GlobalErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, info) {
    try { console.error("[GiaBaoDashboard] crashed:", error, info); } catch {}
  }

  handleRetry = () => {
    this.setState({ hasError: false, error: null });
  };

  handleReload = () => {
    window.location.reload();
  };

  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          minHeight: "100vh",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          gap: 14,
          padding: 24,
          background: "#14110F",
          color: "#E8DFD0",
          fontFamily: "sans-serif",
          textAlign: "center",
        }}>
          <div style={{ fontSize: 32 }}>⚠️</div>
          <div style={{ fontSize: 15, fontWeight: 700 }}>App gặp lỗi và không thể tiếp tục hiển thị</div>
          <div style={{ fontSize: 12, color: "#8A7E6C", maxWidth: 320 }}>
            Dữ liệu của mày vẫn còn nguyên (lưu trong máy). Thử "Thử lại" trước, nếu không được thì "Tải lại trang".
          </div>
          {this.state.error && (
            <div style={{
              fontSize: 10, color: "#8A7E6C", maxWidth: 320, wordBreak: "break-word",
              background: "#1C1814", padding: 10, borderRadius: 8, textAlign: "left",
            }}>
              {String(this.state.error && this.state.error.message || this.state.error)}
            </div>
          )}
          <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
            <button
              onClick={this.handleRetry}
              style={{
                padding: "8px 16px", borderRadius: 999, border: "1px solid #C9A227",
                background: "transparent", color: "#C9A227", fontSize: 13, cursor: "pointer",
              }}
            >
              Thử lại
            </button>
            <button
              onClick={this.handleReload}
              style={{
                padding: "8px 16px", borderRadius: 999, border: "none",
                background: "#C9A227", color: "#14110F", fontSize: 13, fontWeight: 700, cursor: "pointer",
              }}
            >
              Tải lại trang
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<GlobalErrorBoundary><App /></GlobalErrorBoundary>);
</script>
</body>
