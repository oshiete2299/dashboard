// ── STORAGE ADAPTER ────────────────────────────────────────────────────────
const S = {
  async get(k) {
    try { if (window.storage) { const r = await window.storage.get(k); return r?.value ?? null; } } catch {}
    try { return localStorage.getItem(k); } catch { return null; }
  },
  async set(k, v) {
    // C-4: guard — callers must pass a JSON string, not a raw object
    if (typeof v !== "string") {
      console.error(`S.set("${k}"): value must be a string, got ${typeof v}. Skipping write.`);
      return;
    }
    try { if (window.storage) { await window.storage.set(k, v); return; } } catch {}
    try { localStorage.setItem(k, v); } catch {}
  },
  async list(prefix) {
    try { if (window.storage) { const r = await window.storage.list(prefix); return r?.keys ?? []; } } catch {}
    try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch { return []; }
  },
  async del(k) {
    // helper used by C-3 reset
    try { if (window.storage) { await window.storage.delete(k); return; } } catch {}
    try { localStorage.removeItem(k); } catch {}
  },
};

// P-03: reusable debounced-save hook for text inputs
// Returns [localVal, setLocalVal] — writes to storage only after `delay` ms idle
function useDebounceField(externalVal, onSave, delay=1500) {
  const [val, setVal] = useState(externalVal);
  const timerRef = useRef(null);
  const savedRef = useRef(externalVal);
  // sync when external value changes (e.g. day switch in CalTab)
  useEffect(() => {
    if (externalVal !== savedRef.current) {
      setVal(externalVal);
      savedRef.current = externalVal;
    }
  }, [externalVal]);
  const change = (newVal) => {
    setVal(newVal);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      savedRef.current = newVal;
      onSave(newVal);
    }, delay);
  };
  // flush on unmount so switching tabs doesn't lose pending text
  useEffect(() => () => {
    clearTimeout(timerRef.current);
  }, []);
  return [val, change];
}

  const cur=xp-LVL[l-1], need=l<LVL.length?LVL[l]-LVL[l-1]:9999;
  return {l,cur,need,pct:Math.min(100,(cur/need)*100)};
};

};

  const dbRef = useRef({});
  useEffect(() => { dbRef.current = db; }, [db]);

  // C-2: persist study timer start-time so a page reload doesn't lose elapsed seconds
  const studyStartRef = useRef(null);

  const td = toISO();

  useEffect(()=>{
    (async()=>{
      try {
        const keys = await S.list("d:");
        const entries={};
        for(const k of keys){
          try{
            const v=await S.get(k);
            // C-3 guard: skip keys whose value was set to "{}" or "null" by an old reset
            if(v && v !== "{}" && v !== "null"){
              const parsed = JSON.parse(v);
              // only store if it's a real day object (has at least one recognised key)
              if(parsed && typeof parsed === "object" && !Array.isArray(parsed)){
                entries[k.replace("d:","")] = parsed;
              }
            }
          }catch{}
        }
        setDb(entries);
      }catch{}
      try{ const sv=await S.get("settings"); if(sv && sv!=="null") setSetts(JSON.parse(sv)); }catch{}
      try{ const wr=await S.get("weeklyReviews"); if(wr && wr!=="null") setWeeklyReviews(JSON.parse(wr)); }catch{}
      try{ const th=await S.get("theme"); if(th && th!=="null" && THEMES[th]) setThemeKey(th); }catch{}
      // C-2: restore in-progress study timer
      try{
        const ts=await S.get("study:start");
        if(ts && ts!=="null"){
          const elapsed=Math.floor((Date.now()-parseInt(ts,10))/1000);
          if(elapsed>0 && elapsed<86400){ // sanity: ignore if >24h
            studyStartRef.current=parseInt(ts,10);
            setStudySecs(elapsed);
            setStudyRunning(true);
          } else {
            await S.set("study:start","null");
          }
        }
      }catch{}
    })();
  },[]);

  // ── AUTO BACKUP (daily) ──────────────────────────────────────────────────
  const [backupDoneToday,setBackupDoneToday]=useState(null); // null = chưa biết, true/false sau khi check
  const [backupList,setBackupList]=useState([]); // [{key,date}] mới nhất trước

  const refreshBackupList = useCallback(async ()=>{
    try{
      const keys = await S.list("backup:auto:");
      const items = keys
        .map(k=>({key:k, date:k.replace("backup:auto:","")}))
        .sort((a,b)=>b.date.localeCompare(a.date)); // mới nhất trước
      setBackupList(items);
      return items;
    }catch{ return []; }
  },[]);

  // Tạo 1 bản backup tự động ngay bây giờ (payload giống exportData) và dọn bớt bản cũ, giữ tối đa 7
  const runAutoBackup = useCallback(async (dateStr)=>{
    try{
      let kb=[], qaNotes=[], qaImported=[], bossHistory=[], bossCurrent=null, timeline=[], capsules=[], weeklyReviewsExp={};
      try { const r=await S.get("kb:items");      if(r&&r!=="null") kb=JSON.parse(r); } catch {}
      try { const r=await S.get("qa:notes");      if(r&&r!=="null") qaNotes=JSON.parse(r); } catch {}
      try { const r=await S.get("qa:imported");   if(r&&r!=="null") qaImported=JSON.parse(r); } catch {}
      try { const r=await S.get("boss:history");  if(r&&r!=="null") bossHistory=JSON.parse(r); } catch {}
      try { const r=await S.get("boss:current");  if(r&&r!=="null") bossCurrent=JSON.parse(r); } catch {}
      try { const r=await S.get("timeline");      if(r&&r!=="null") timeline=JSON.parse(r); } catch {}
      try { const r=await S.get("capsules");      if(r&&r!=="null") capsules=JSON.parse(r); } catch {}
      try { const r=await S.get("weeklyReviews");  if(r&&r!=="null") weeklyReviewsExp=JSON.parse(r); } catch {}

      const payload = {
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        db: dbRef.current,
        settings: setts,
        kb,
        qa: { notes: qaNotes, imported: qaImported },
        bossHistory,
        bossCurrent,
        timeline,
        capsules,
        weeklyReviews: weeklyReviewsExp,
      };

      await S.set("backup:auto:"+dateStr, JSON.stringify(payload));
      await S.set("backup:last_date", dateStr);

      // Giữ tối đa 7 bản — xoá bản cũ nhất nếu vượt
      const keys = await S.list("backup:auto:");
      if(keys.length>7){
        const sorted = keys.map(k=>k.replace("backup:auto:","")).sort(); // tăng dần — cũ nhất trước
        const toDelete = sorted.slice(0, keys.length-7);
        for(const d of toDelete) await S.del("backup:auto:"+d);
      }
      await refreshBackupList();
      setBackupDoneToday(true);
    }catch(e){
      console.error("Auto-backup lỗi:", e);
    }
  },[setts, refreshBackupList]);

  // Kiểm tra mỗi khi app mở: nếu chưa backup hôm nay → tự backup
  useEffect(()=>{
    (async()=>{
      try{
        const lastDate = await S.get("backup:last_date");
        await refreshBackupList();
        if(lastDate === td){
          setBackupDoneToday(true);
        } else {
          setBackupDoneToday(false);
          // chờ db load xong (effect init ở trên) rồi mới backup, tránh backup rỗng
          setTimeout(()=>runAutoBackup(td), 800);
        }
      }catch{}
    })();
    // chỉ chạy 1 lần khi app mở
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Khôi phục từ 1 bản backup tự động — logic giống importData nhưng đọc từ storage thay vì File
  const restoreFromBackup = useCallback(async (key)=>{
    try{
      const raw = await S.get(key);
      if(!raw || raw==="null"){ alert("❌ Không đọc được bản backup này."); return; }
      const parsed = JSON.parse(raw);
      if(!parsed || typeof parsed!=="object" || !parsed.db || typeof parsed.db!=="object"){
        alert("❌ Bản backup không đúng định dạng.");
        return;
      }
      const importedDb     = parsed.db;
      const importedSetts  = parsed.settings || null;
      const importedKB       = parsed.kb       || null;
      const importedQA       = parsed.qa       || null;
      const importedBossH    = parsed.bossHistory  || null;
      const importedBossCur  = parsed.bossCurrent  || null;
      const importedTimeline = parsed.timeline || null;
      const importedCapsules = parsed.capsules || null;
      const importedWeeklyReviews = parsed.weeklyReviews || null;

      const oldKeys = await S.list("d:");
      for (const k of oldKeys) await S.del(k);
      for (const [date, dayData] of Object.entries(importedDb)) {
        if (typeof dayData === "object" && dayData !== null) {
          await S.set("d:" + date, JSON.stringify(dayData));
        }
      }
      if (importedSetts && typeof importedSetts === "object") await S.set("settings", JSON.stringify(importedSetts));
      if (Array.isArray(importedKB))       await S.set("kb:items",      JSON.stringify(importedKB));
      if (importedQA) {
        if (Array.isArray(importedQA.notes))    await S.set("qa:notes",    JSON.stringify(importedQA.notes));
        if (Array.isArray(importedQA.imported)) await S.set("qa:imported", JSON.stringify(importedQA.imported));
      }
      if (Array.isArray(importedBossH))    await S.set("boss:history",   JSON.stringify(importedBossH));
      if (importedBossCur !== null)        await S.set("boss:current",   importedBossCur ? JSON.stringify(importedBossCur) : "null");
      if (Array.isArray(importedTimeline)) await S.set("timeline",       JSON.stringify(importedTimeline));
      if (Array.isArray(importedCapsules)) await S.set("capsules",       JSON.stringify(importedCapsules));
      if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") await S.set("weeklyReviews", JSON.stringify(importedWeeklyReviews));

      // reload state
      setDb(importedDb);
      if (importedSetts) setSetts(importedSetts);
      if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") setWeeklyReviews(importedWeeklyReviews);
      alert(`✅ Đã khôi phục từ backup: ${Object.keys(importedDb).length} ngày dữ liệu.`);
    }catch(e){
      alert("❌ Lỗi khi khôi phục: " + e.message);
    }
  },[]);

  useEffect(()=>{
    if(!studyRunning) return;
    // C-2: use wall-clock diff so accuracy survives background throttling
    if(!studyStartRef.current) studyStartRef.current = Date.now() - studySecs*1000;
    const iv=setInterval(()=>{
      setStudySecs(Math.floor((Date.now()-studyStartRef.current)/1000));
    },1000);
    return ()=>clearInterval(iv);
  },[studyRunning]);

  // C-1: deps array is empty — dbRef.current always has latest db, no stale closure
  const save = useCallback(async (date,patch)=>{
    const base=dbRef.current[date]||blank();
    const next={...base,...patch};
    if(patch.tasks) next.tasks={...base.tasks,...patch.tasks};
    if(!("custom" in patch)) next.custom=base.custom;
    await S.set("d:"+date,JSON.stringify(next));
    setDb(p=>({...p,[date]:next}));
  },[]);

  const saveSetts = useCallback(async patch=>{
    const next={...setts,...patch};
    await S.set("settings",JSON.stringify(next));
    setSetts(next);
  },[setts]);

  // ── THEME ────────────────────────────────────────────────────────────────
  const chooseTheme = useCallback(async (key)=>{
    if(!THEMES[key]) return;
    setThemeKey(key);
    setThemeMenuOpen(false);
    await S.set("theme", key);
  },[]);

  // Weekly Review: save/update one week's record (reflection + viewedAt) under weeklyReviews
  const saveWeeklyReview = useCallback(async (weekStart, patch)=>{
    setWeeklyReviews(prev=>{
      const base = prev[weekStart] || {weekStart, weekEnd: weekDates(weekStart)[6], viewedAt:null, reflection:{satisfied:"",improve:""}};
      const next = {...prev, [weekStart]: {...base, ...patch}};
      S.set("weeklyReviews", JSON.stringify(next));
      return next;
    });
  },[]);

  const dayExp = useCallback(date=>dayExpFull(db[date],date),[db]);
  const totXP  = useCallback(()=>Object.keys(db).reduce((s,k)=>s+dayExp(k),0),[db,dayExp]);
  // H-3: streak only increments when the day has real data; a gap of 0 days (today) is tolerated
  const streak = useCallback(()=>{
    let n=0; const today=new Date();
    for(let i=0;i<90;i++){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const iso=d.toISOString().split("T")[0];
      const day=dbRef.current[iso];
      if(!day){
        // allow today to have no data yet without breaking streak
        if(i===0) continue;
        break;
      }
      if(day.lo) break;
      n++;
    }
    return n;
  },[db]);

  const txp=totXP(), lv=calcLv(txp), rt=getRankTitle(lv.l), str=streak();
  const todayData=db[td]||blank();
  const todayE=dayExp(td);
  const todayRank=rank(todayE);
  const challenge=getDailyChallenge(td);
  const chalDone=challenge?.check(todayData);
  const quoteToday=getQuoteOfDay(setts.quotes||DEFAULT_QUOTES,td);

  // Weekly Review: show banner only on Monday, for the week that just ended (last week), if not yet viewed
  const todayDow = new Date(td+"T00:00:00").getDay(); // 0=Sun..6=Sat
  const isMonday = todayDow===1;
  const lastWeekStart = isMonday ? (()=>{ const d=new Date(td+"T00:00:00"); d.setDate(d.getDate()-7); return mkISO(d.getFullYear(),d.getMonth(),d.getDate()); })() : null;
  const lastWeekReview = lastWeekStart ? weeklyReviews[lastWeekStart] : null;
  const showWeeklyBanner = isMonday && !weeklyBannerSkip && !(lastWeekReview && lastWeekReview.viewedAt);

  const TABS=["✅ Hôm nay","📅 Lịch Sử","📊 Thống kê","🧠 Tâm lý","🪞 Bản thân","❓ Q&A","📚 Kho","📖 Hành Trình","⚔️ Boss","🔬 Khám Phá"];

  const switchTab = (i) => { setTab(i); setAccent(TAB_COLORS[i]); };

  // C-2: persist start timestamp so reload can restore elapsed time
  const startStudy = useCallback(async ()=>{
    const ts = Date.now();
    studyStartRef.current = ts;
    await S.set("study:start", String(ts));
    setStudySecs(0);
    setStudyRunning(true);
  },[]);

  const stopStudy = useCallback(async ()=>{
    // C-2: read elapsed directly from ref to avoid stale studySecs
    const elapsed = studyStartRef.current
      ? Math.floor((Date.now()-studyStartRef.current)/1000)
      : studySecs;
    studyStartRef.current = null;
    await S.set("study:start","null");
    const base = dbRef.current[td] || blank();
    save(td,{studyTime:(base.studyTime||0)+elapsed});
    setStudySecs(0); setStudyRunning(false);
  },[studySecs, save, td]);

  // H-5: revoke blob URL after browser has time to initiate download
  const exportData = useCallback(async () => {
    // P-07: read auxiliary stores so they can be restored on import
    let kb=[], qaNotes=[], qaImported=[], bossHistory=[], bossCurrent=null, timeline=[], capsules=[], weeklyReviewsExp={};
    try { const r=await S.get("kb:items");      if(r&&r!=="null") kb=JSON.parse(r); } catch {}
    try { const r=await S.get("qa:notes");      if(r&&r!=="null") qaNotes=JSON.parse(r); } catch {}
    try { const r=await S.get("qa:imported");   if(r&&r!=="null") qaImported=JSON.parse(r); } catch {}
    try { const r=await S.get("boss:history");  if(r&&r!=="null") bossHistory=JSON.parse(r); } catch {}
    try { const r=await S.get("boss:current");  if(r&&r!=="null") bossCurrent=JSON.parse(r); } catch {}
    try { const r=await S.get("timeline");      if(r&&r!=="null") timeline=JSON.parse(r); } catch {}
    try { const r=await S.get("capsules");      if(r&&r!=="null") capsules=JSON.parse(r); } catch {}
    try { const r=await S.get("weeklyReviews");  if(r&&r!=="null") weeklyReviewsExp=JSON.parse(r); } catch {}

    const payload = {
      schemaVersion: 1,
      exportedAt: new Date().toISOString(),
      db,
      settings: setts,
      kb,
      qa: { notes: qaNotes, imported: qaImported },
      bossHistory,
      bossCurrent,
      timeline,
      capsules,
      weeklyReviews: weeklyReviewsExp,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `giabao-${td}.json`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, [db, setts, td]);

  // P-07: Import JSON backup — validate → write storage → update state
  const importData = useCallback(async (file) => {
    if (!file) return;
    let parsed;
    try {
      const text = await file.text();
      parsed = JSON.parse(text);
    } catch {
      alert("❌ File JSON không hợp lệ — không thể parse.");
      return;
    }
    // Schema validation: must have a "db" key that is an object
    if (!parsed || typeof parsed !== "object" || !parsed.db || typeof parsed.db !== "object") {
      alert("❌ File không đúng định dạng — thiếu key \"db\".");
      return;
    }
    const importedDb     = parsed.db;
    const importedSetts  = parsed.settings || null;
    // Optional auxiliary keys
    const importedKB       = parsed.kb       || null;
    const importedQA       = parsed.qa       || null;
    const importedBossH    = parsed.bossHistory  || null;
    const importedBossCur  = parsed.bossCurrent  || null;
    const importedTimeline = parsed.timeline || null;
    const importedCapsules = parsed.capsules || null;
    const importedWeeklyReviews = parsed.weeklyReviews || null;

    try {
      // 1. Day records — delete old keys first, then write imported ones
      const oldKeys = await S.list("d:");
      for (const k of oldKeys) await S.del(k);
      for (const [date, dayData] of Object.entries(importedDb)) {
        if (typeof dayData === "object" && dayData !== null) {
          await S.set("d:" + date, JSON.stringify(dayData));
        }
      }
      // 2. Settings
      if (importedSetts && typeof importedSetts === "object") {
        await S.set("settings", JSON.stringify(importedSetts));
      }
      // 3. Auxiliary stores — only write if present in backup
      if (Array.isArray(importedKB))       await S.set("kb:items",      JSON.stringify(importedKB));
      if (importedQA) {
        if (Array.isArray(importedQA.notes))    await S.set("qa:notes",    JSON.stringify(importedQA.notes));
        if (Array.isArray(importedQA.imported)) await S.set("qa:imported", JSON.stringify(importedQA.imported));
      }
      if (Array.isArray(importedBossH))    await S.set("boss:history",   JSON.stringify(importedBossH));
      if (importedBossCur !== null)        await S.set("boss:current",   importedBossCur ? JSON.stringify(importedBossCur) : "null");
      if (Array.isArray(importedTimeline)) await S.set("timeline",       JSON.stringify(importedTimeline));
      if (Array.isArray(importedCapsules)) await S.set("capsules",       JSON.stringify(importedCapsules));
      if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") await S.set("weeklyReviews", JSON.stringify(importedWeeklyReviews));
    } catch (e) {
      alert("❌ Lỗi khi ghi dữ liệu vào storage: " + e.message);
      return;
    }

    // 4. Update React state — single batch
    setDb(importedDb);
    if (importedSetts) setSetts(importedSetts);
    if (importedWeeklyReviews && typeof importedWeeklyReviews === "object") setWeeklyReviews(importedWeeklyReviews);
    alert(`✅ Import thành công: ${Object.keys(importedDb).length} ngày dữ liệu.`);
  }, []);

  return (
    <ThemeContext.Provider value={theme}>
    <AccentContext.Provider value={accent}>
    <div style={{background:theme.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",color:theme.text,maxWidth:480,margin:"0 auto",paddingBottom:80,transition:"background 0.3s ease,color 0.3s ease"}}>
      <Hdr lv={lv} rt={rt} todayE={todayE} todayRank={todayRank} str={str} txp={txp}
           quoteToday={quoteToday} setts={setts} saveSetts={saveSetts} challenge={challenge} chalDone={chalDone}
           backupDoneToday={backupDoneToday}
           themeKey={themeKey} themeMenuOpen={themeMenuOpen} setThemeMenuOpen={setThemeMenuOpen} chooseTheme={chooseTheme}/>
      {/* Pill Tab Bar */}
      <div style={{position:"sticky",top:0,zIndex:10,background:theme.surfaceAlt,borderBottom:`1px solid ${theme.border}`,display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",padding:"8px 10px",gap:6}}>
        {TABS.map((t,i)=>{
          const isActive = tab===i;
          const tabAccent = TAB_COLORS[i];
          return (
            <button key={i} onClick={()=>switchTab(i)} style={{
              flex:"0 0 auto",
              padding: isActive ? "6px 16px" : "6px 12px",
              border:"none",
              background: isActive ? tabAccent : "transparent",
              cursor:"pointer",
              color: isActive ? "#FFFFFF" : theme.textDim,
              borderRadius:999,
              fontSize:11,
              fontWeight: isActive ? 700 : 400,
              boxShadow: isActive ? `0 4px 16px ${tabAccent}44` : "none",
              whiteSpace:"nowrap",
              transition:"all 0.35s cubic-bezier(0.4,0,0.2,1)",
            }}>
              {t}
            </button>
          );
        })}
      </div>

      {/* Floating: Study Timer */}
      <button onClick={()=>studyRunning?stopStudy():startStudy()}
        title={studyRunning?"Dừng học":"Bắt đầu học"}
        style={{position:"fixed",bottom:90,right:16,zIndex:50,width:52,height:52,borderRadius:"50%",
          background:studyRunning?"linear-gradient(135deg,#f59e0b,#fb923c)":"linear-gradient(135deg,#34d399,#10b981)",
          border:"none",cursor:"pointer",
          boxShadow:studyRunning?"0 8px 24px rgba(245,158,11,.6)":`0 8px 24px ${accent}66`,
          fontSize:studyRunning?12:20,fontWeight:700,color:studyRunning?"#000":"#000",
          display:"flex",alignItems:"center",justifyContent:"center",
          transition:"box-shadow 0.35s ease"}}>
        {studyRunning?fmtHM(studySecs):"📚"}
      </button>

      {/* Floating: Pomodoro */}
      <button onClick={()=>setPomOpen(true)} title="Pomodoro"
        style={{position:"fixed",bottom:154,right:16,zIndex:50,width:48,height:48,borderRadius:"50%",
          background:`linear-gradient(135deg,${theme.primary},${theme.secondary})`,border:"none",cursor:"pointer",
          boxShadow:`0 8px 24px ${accent}66`,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",
          transition:"box-shadow 0.35s ease"}}>
        🍅
      </button>

      {/* Floating: Distraction */}
      <button onClick={()=>setDistrOpen(true)} title="Tao bị kéo đi"
        style={{position:"fixed",bottom:214,right:16,zIndex:50,width:48,height:48,borderRadius:"50%",
          background:"linear-gradient(135deg,#ef4444,#fb923c)",border:"none",cursor:"pointer",
          boxShadow:`0 8px 24px ${accent}66`,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",
          transition:"box-shadow 0.35s ease"}}>
        📱
      </button>

      {pomOpen && <PomodoroModal onClose={()=>setPomOpen(false)} pomSetts={setts.playlists||{}} savePomSetts={pl=>saveSetts({playlists:pl})} onDone={taskId=>{if(taskId)save(td,{tasks:{[taskId]:true}});}}/>}
      {resetModal && <ResetModal onClose={()=>setResetModal(false)} onConfirm={async()=>{
        try{
          // C-3: delete day keys entirely instead of setting to "{}"
          const keys=await S.list("d:");
          for(const k of keys) await S.del(k);
          await S.set("settings",JSON.stringify({targetXP:150,recurring:[],quotes:[...DEFAULT_QUOTES]}));
          await S.set("qa:notes","[]"); await S.set("qa:imported","[]");
          await S.set("kb:items","[]"); await S.set("reflections","{}");
          await S.set("capsules","[]"); await S.set("timeline","[]");
          await S.set("boss:current","null"); await S.set("boss:history","[]");
          await S.set("study:start","null");
          await S.set("weeklyReviews","{}");
        }catch{}
        setDb({}); setSetts({targetXP:150,recurring:[],quotes:[...DEFAULT_QUOTES]});
        setWeeklyReviews({});
        setResetModal(false);
      }}/>}
      {distrOpen && <DistrModal onClose={()=>setDistrOpen(false)} onSave={d=>{
        save(td,{distractions:[...(todayData.distractions||[]),d]});
        setDistrOpen(false);
      }}/>}
      {weeklyReviewOpen && lastWeekStart && (
        <WeeklyReviewModal
          weekStart={lastWeekStart}
          db={db}
          dayExp={dayExp}
          targetXP={setts.targetXP||150}
          review={weeklyReviews[lastWeekStart]}
          onSave={patch=>saveWeeklyReview(lastWeekStart, patch)}
          onClose={()=>setWeeklyReviewOpen(false)}
        />
      )}
      {reviewHistoryWeek && (
        <WeeklyReviewModal
          weekStart={reviewHistoryWeek}
          db={db}
          dayExp={dayExp}
          targetXP={setts.targetXP||150}
          review={weeklyReviews[reviewHistoryWeek]}
          onSave={patch=>saveWeeklyReview(reviewHistoryWeek, patch)}
          onClose={()=>setReviewHistoryWeek(null)}
        />
      )}

      <div style={{padding:"16px 12px"}}>
        {tab===0 && <Today td={td} data={todayData} dayE={todayE} save={save} setts={setts} saveSetts={saveSetts}
          studyRunning={studyRunning} studySecs={studySecs} stopStudy={stopStudy} startStudy={startStudy}
          challenge={challenge} chalDone={chalDone}
          showWeeklyBanner={showWeeklyBanner}
          onOpenWeeklyReview={()=>setWeeklyReviewOpen(true)}
          onSkipWeeklyReview={()=>setWeeklyBannerSkip(true)}/>}
        {tab===1 && <CalTab db={db} save={save} dayExp={dayExp} td={td} weeklyReviews={weeklyReviews} targetXP={setts.targetXP||150} onOpenWeeklyReviewWeek={ws=>setReviewHistoryWeek(ws)}/>}
        {tab===2 && <Stats db={db} dayExp={dayExp} lv={lv} rt={rt} txp={txp} str={str} exportData={exportData} importData={importData} setts={setts} saveSetts={saveSetts} onReset={()=>setResetModal(true)}
          backupList={backupList} restoreFromBackup={restoreFromBackup}/>}
        {tab===3 && <Psych/>}
        {tab===4 && <Profile/>}
        {tab===5 && <QandA setts={setts} saveSetts={saveSetts}/>}
        {tab===6 && <KnowledgeBank/>}
        {tab===7 && <HanhTrinh capsuleNotif={capsuleNotif} setCapsuleNotif={setCapsuleNotif}/>}
        {tab===8 && <BossFight db={db} save={save} td={td}/>}
        {tab===9 && <KhamPha db={db} dayExp={dayExp} str={str} txp={txp}/>}
      </div>
    </div>
    </AccentContext.Provider>
    </ThemeContext.Provider>
  );
}

// ── TODAY ──────────────────────────────────────────────────────────────────
function Today({td,data,dayE,save,setts,saveSetts,studyRunning,studySecs,stopStudy,startStudy,challenge,chalDone,showWeeklyBanner,onOpenWeeklyReview,onSkipWeeklyReview}) {
  const theme = useContext(ThemeContext);
  const accent = useContext(AccentContext);
  const [newTask,setNewTask]=useState("");
  const [moodOpen,setMoodOpen]=useState(false);
  const [showSetts,setShowSetts]=useState(false);
  const [newRec,setNewRec]=useState("");
  const custom=Array.isArray(data.custom)?data.custom:[];
  // P-03: debounced journal — prevents save flood on every keystroke
  const [journalVal, setJournalVal] = useDebounceField(
    data.journal||"",
    (v) => save(td, {journal: v}),
    1500
  );

  const moodA=()=>{
    const m=data.mood||{morning:0,noon:0,afternoon:0,night:0};
    const v=[m.morning,m.noon,m.afternoon,m.night].filter(x=>x>0);
    return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—";
  };

  useEffect(()=>{
    const rec=setts.recurring||[];
    if(!rec.length) return;
    // H-1: data.custom comes from parent (latest db snapshot), save reads dbRef internally
    const cur=Array.isArray(data.custom)?data.custom:[];
    const miss=rec.filter(r=>!cur.find(c=>c.id===r.id));
    if(miss.length) save(td,{custom:[...cur,...miss.map(r=>({...r,done:false}))]});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[setts.recurring, save, td]);

  const add=()=>{if(!newTask.trim())return;save(td,{custom:[...custom,{id:"ct_"+Date.now(),label:newTask.trim(),done:false}]});setNewTask("");};
  const tog=id=>save(td,{custom:custom.map(c=>c.id===id?{...c,done:!c.done}:c)});
  const del=id=>save(td,{custom:custom.filter(c=>c.id!==id)});
  const mv=(id,dir)=>{const i=custom.findIndex(c=>c.id===id);if(i<0)return;const a=[...custom];const ni=i+dir;if(ni<0||ni>=a.length)return;[a[i],a[ni]]=[a[ni],a[i]];save(td,{custom:a});};
  const addRec=()=>{if(!newRec.trim())return;const r={id:"rec_"+Date.now(),label:newRec.trim()};saveSetts({recurring:[...(setts.recurring||[]),r]});save(td,{custom:[...custom,{...r,done:false}]});setNewRec("");};

  return (
    <div>
      {/* Weekly Review Banner */}
      {showWeeklyBanner&&(
        <div style={{background:`${theme.accent}14`,borderRadius:12,padding:"12px 16px",marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
          <div style={{fontSize:12,color:theme.text,marginBottom:10}}>📅 Weekly Review tuần trước đã sẵn sàng</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onOpenWeeklyReview} style={{flex:1,padding:"8px 0",borderRadius:999,border:"none",background:theme.accent,color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>Xem ngay</button>
            <button onClick={onSkipWeeklyReview} style={{padding:"8px 16px",borderRadius:999,border:`1px solid ${theme.border}`,background:"transparent",color:theme.textDim,fontSize:12,cursor:"pointer"}}>Bỏ qua</button>
          </div>
        </div>
      )}

      {/* Study Timer Card */}
      <div style={{background:studyRunning?"rgba(245,158,11,.1)":"rgba(52,211,153,.06)",borderRadius:12,padding:"12px 16px",marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)",transition:"box-shadow 0.35s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:studyRunning?theme.warning:theme.success,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>
              {studyRunning?"⏱ Đang học":"📚 Time Tracker"}
            </div>
            <div style={{fontSize:12,color:theme.text}}>
              Hôm nay: <b>{Math.floor((data.studyTime||0)/60)}h {(data.studyTime||0)%60}m</b>
              {studyRunning&&<span style={{color:theme.warning}}> (+{fmtHM(studySecs)})</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {!studyRunning
              ?<button onClick={startStudy} style={{padding:"6px 16px",borderRadius:999,border:"none",background:theme.success,color:"#000",fontWeight:700,fontSize:12,cursor:"pointer"}}>▶ Bắt đầu</button>
              :<button onClick={stopStudy} style={{padding:"6px 14px",borderRadius:999,border:"none",background:theme.danger,color:"white",fontWeight:700,fontSize:11,cursor:"pointer"}}>⏹ Dừng</button>
            }
          </div>
        </div>
      </div>

      {/* Distraction history hôm nay */}
      {(data.distractions||[]).length>0&&<DistrHistory distractions={data.distractions||[]} onUpdate={arr=>save(td,{distractions:arr})}/>}
      {/* Reminder Banner */}
      {(setts.reminders||[]).filter(r=>!r.done).length>0&&(
        <div style={{background:"rgba(251,191,36,.08)",borderRadius:12,padding:"10px 16px",marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
          <div style={{fontSize:11,fontWeight:700,color:theme.warning,marginBottom:6,display:"flex",justifyContent:"space-between"}}>
            <span>🔔 Nhắc nhở hôm nay</span>
            <button onClick={()=>{}} style={{background:"none",border:"none",color:theme.textDim,fontSize:9,cursor:"pointer"}}>Quản lý trong ⚙️</button>
          </div>
          {(setts.reminders||[]).filter(r=>!r.done).map(r=>(
            <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:`1px solid ${theme.warning}22`}}>
              <div onClick={()=>saveSetts({reminders:(setts.reminders||[]).map(x=>x.id===r.id?{...x,done:true}:x)})}
                style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${theme.warning}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              </div>
              <span style={{flex:1,fontSize:11,color:theme.text}}>{r.text}</span>
              <button onClick={()=>saveSetts({reminders:(setts.reminders||[]).filter(x=>x.id!==r.id)})}
                style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:13}}>×</button>
            </div>
          ))}
        </div>
      )}
      {/* Mood Card */}
      <div style={{background:`${theme.accent}14`,borderRadius:12,padding:"12px 16px",marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,fontWeight:700,color:theme.accent,textTransform:"uppercase",letterSpacing:1}}>🌈 Tâm trạng hôm nay</div>
          <span style={{fontSize:13,color:theme.warning,fontWeight:700}}>{moodA()}/5</span>
        </div>
        {!moodOpen?(
          <button onClick={()=>setMoodOpen(true)} style={{width:"100%",padding:"7px 0",marginTop:6,borderRadius:999,border:`1px solid ${accent}44`,background:"transparent",color:accent,fontSize:11,cursor:"pointer",fontWeight:600,transition:"all 0.35s ease"}}>

          <MoodPicker data={data} onSave={m=>{save(td,{mood:m});setMoodOpen(false);}}/>

          <div style={{textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:14,fontWeight:700,color:chalDone?theme.success:theme.warning}}>+{challenge.bonus}</div>

        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:theme.textDim,marginBottom:5}}>
          <span>Tiến độ hôm nay</span>
          <span style={{color:dayE>=setts.targetXP?theme.success:accent,transition:"color 0.35s ease"}}>{dayE}/{setts.targetXP} XP</span>
        </div>
        <div style={{height:8,background:theme.border,borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(100,(dayE/Math.max(setts.targetXP,1))*100)}%`,
            background:dayE>=setts.targetXP?"linear-gradient(90deg,#34d399,#10b981)":`linear-gradient(90deg,${accent},${accent}cc)`,
            borderRadius:4,transition:"width .3s ease",
            boxShadow:`0 0 8px ${accent}66`}}/>
        </div>
      </div>

      {/* Settings row */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={()=>save(td,{x2:!data.x2})} style={{flex:1,padding:"8px 0",borderRadius:12,border:`1px solid ${data.x2?theme.warning+"66":theme.border}`,background:data.x2?"rgba(251,191,36,.12)":theme.surface,color:data.x2?theme.warning:theme.textDim,fontSize:11,cursor:"pointer",fontWeight:data.x2?700:400,transition:"all 0.35s ease"}}>
          ⚡ XP×2 {data.x2?"BẬT":"tắt"}

              <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${theme.border}22`}}>

// ── WEEKLY REVIEW MODAL ─────────────────────────────────────────────────────
function WeeklyReviewModal({weekStart,db,dayExp,targetXP,review,onSave,onClose}) {
  const theme = useContext(ThemeContext);
  const dates = weekDates(weekStart);
  const weekEnd = dates[6];
  const days = dates.map(iso=>({iso, d: db[iso]||null}));
  const presentDays = days.filter(x=>x.d);

  // 📊 Tổng quan
  const totalXP = days.reduce((s,x)=>s+dayExp(x.iso),0);
  const moods = presentDays.map(x=>avgMood(x.d)).filter(m=>m>0);
  const avgMoodWeek = moods.length ? moods.reduce((a,b)=>a+b,0)/moods.length : 0;
  const totalStudyMin = presentDays.reduce((s,x)=>s+(x.d.studyTime||0),0);
  // streak hiện tại: consecutive clean days counting back from weekEnd
  let curStreak=0;
  for(let i=dates.length-1;i>=0;i--){
    const dd=db[dates[i]];
    if(!dd) break;
    if(dd.lo) break;
    curStreak++;
  }

  // 🏆 Thành tựu
  let bestXPDay=null, bestXP=-1;
  days.forEach(x=>{ const e=dayExp(x.iso); if(e>bestXP){bestXP=e; bestXPDay=x.iso;} });
  const targetXPVal = targetXP || 150;
  const daysHitTarget = days.filter(x=>dayExp(x.iso)>=targetXPVal).length;
  let leastPhoneDay=null, leastPhone=Infinity;
  presentDays.forEach(x=>{ const p=x.d.phone||0; if(p>0 && p<leastPhone){leastPhone=p; leastPhoneDay=x.iso;} });

  // ⚠️ Cần cải thiện
  const allDistrs = presentDays.flatMap(x=>x.d.distractions||[]);
  let topDistrSource=null;
  if(allDistrs.length){
    const bySrc={};
    allDistrs.forEach(d=>{bySrc[d.source]=(bySrc[d.source]||0)+1;});
    topDistrSource=Object.entries(bySrc).sort((a,b)=>b[1]-a[1])[0];
  }
  const subjectIds=["math","physics","chem","lit"];
  const subjectLabels={math:"Toán",physics:"Lý",chem:"Hóa",lit:"Văn"};
  const subjCounts=subjectIds.map(id=>({id,cnt:presentDays.filter(x=>x.d.tasks?.[id]).length}));
  const leastSubject=subjCounts.sort((a,b)=>a.cnt-b.cnt)[0];
  const totalPhoneMin=presentDays.reduce((s,x)=>s+(x.d.phone||0),0);

  // ✍ Reflection
  const initialReflection = review?.reflection || {satisfied:"",improve:""};
  const [satisfied,setSatisfied]=useState(initialReflection.satisfied||"");
  const [improve,setImprove]=useState(initialReflection.improve||"");

  const handleSave = () => {
    onSave({
      weekStart, weekEnd,
      viewedAt: review?.viewedAt || new Date().toISOString(),
      reflection: { satisfied, improve },
    });
    onClose();
  };

  // mark as viewed as soon as opened (even if user closes without typing reflection)
  useEffect(()=>{
    if(!review?.viewedAt){
      onSave({ weekStart, weekEnd, viewedAt: new Date().toISOString(), reflection: initialReflection });
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  const fmtShort = iso => { const [y,m,d]=iso.split("-"); return `${d}/${m}`; };

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:theme.surface,border:`2px solid ${theme.accent}`,borderRadius:12,padding:20,width:"100%",maxWidth:420,maxHeight:"88vh",overflowY:"auto",boxSizing:"border-box"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{fontSize:14,fontWeight:800,color:theme.accent}}>📅 Weekly Review</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:theme.textDim,cursor:"pointer",fontSize:18}}>×</button>
        </div>
        <div style={{fontSize:10,color:theme.textDim,marginBottom:16}}>{fmtShort(weekStart)} – {fmtShort(weekEnd)}</div>

// Thay Calendar grid = list ngày có data, nhóm theo tháng, không navigation tháng
function CalTab({db,save,dayExp,td,weeklyReviews,targetXP,onOpenWeeklyReviewWeek}) {
  const theme = useContext(ThemeContext);
  const [sel,setSel]=useState(null);
  const [filter,setFilter]=useState(""); // "2026-06" hoặc ""

  // Build danh sách ngày: tất cả ngày có data + 30 ngày gần nhất
  const allKeys=new Set(Object.keys(db));
  for(let i=0;i<30;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    allKeys.add(d.toISOString().split("T")[0]);
  }
  const sorted=[...allKeys]
    .filter(iso=>/^\d{4}-\d{2}-\d{2}$/.test(iso)) // chỉ valid ISO dates
    .sort((a,b)=>b.localeCompare(a));
  const filtered=filter?sorted.filter(iso=>iso.startsWith(filter)):sorted;

  // Nhóm theo tháng
  const groups={};
  filtered.forEach(iso=>{
    const m=iso.slice(0,7);
    if(!groups[m]) groups[m]=[];
    groups[m].push(iso);
  });
  const monthKeys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  // Tháng nào đang có dữ liệu thực sự
  const months=[...new Set(Object.keys(db).map(k=>k.slice(0,7)))].sort((a,b)=>b.localeCompare(a));

  const fmtMonthLabel = m => {
    const d = new Date(m+"-01T00:00:00");
    return d.toLocaleDateString("vi-VN",{month:"long",year:"numeric"});
  };

  return (
    <div>
      {/* Filter bar */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,color:theme.textDim,marginBottom:6,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>
          📋 Lịch Sử — {Object.keys(db).length} ngày đã ghi
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>setFilter("")} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===""?theme.primary:theme.neutral}`,background:filter===""?theme.tertiary:"transparent",color:filter===""?theme.primary:theme.textDim,fontSize:10,cursor:"pointer"}}>
            Tất cả
          </button>
          {months.slice(0,8).map(m=>(
            <button key={m} onClick={()=>setFilter(filter===m?"":m)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===m?theme.primary:theme.neutral}`,background:filter===m?theme.tertiary:"transparent",color:filter===m?theme.primary:theme.textDim,fontSize:10,cursor:"pointer"}}>
              {m.slice(5)}
            </button>
          ))}
        </div>
      </div>

      {/* Grouped list */}
      {monthKeys.length===0&&(
        <div style={{textAlign:"center",color:theme.textDim,fontSize:12,padding:"30px 0"}}>
          Chưa có dữ liệu nào 📭
        </div>
      )}
      {monthKeys.map(month=>(
        <div key={month} style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:theme.textDim,marginBottom:8,
            textTransform:"uppercase",letterSpacing:1}}>
            {fmtMonthLabel(month)}
          </div>
          {groups[month].map(iso=>{
            let e=0, rl="—", rc="#374151", mA=0, hasData=false;
            try {
              e=dayExp(iso);
              [rl,rc]=rank(e);
              const day=db[iso];
              if(day) {
                hasData=true;
                if(day.mood&&typeof day.mood==="object"){
                  const vals=[day.mood.morning,day.mood.noon,day.mood.afternoon,day.mood.night].filter(v=>typeof v==="number"&&v>0);
                  mA=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
                }
              }
            } catch(_) {}

            const isToday=iso===td;
            const isSel=iso===sel;
            const day=db[iso];

            return (
              <div key={iso}>
                <div onClick={()=>setSel(isSel?null:iso)} style={{
                  display:"flex",alignItems:"center",gap:10,
                  padding:"12px 14px",marginBottom:isSel?0:6,
                  background:isSel?"#1C2636":isToday?"#161E2C":hasData?theme.surface:"transparent",
                  border:`1px solid ${isSel?theme.accent:isToday?"#334155":hasData?theme.border:"transparent"}`,
                  borderRadius:8,cursor:"pointer",
                  boxShadow:hasData?"0 4px 16px rgba(0,0,0,0.25)":"none",
                  transition:"background 0.2s ease",
                }}>
                  {/* Date */}
                  <div style={{flexShrink:0,textAlign:"center",width:36}}>
                    <div style={{fontSize:18,fontWeight:700,color:isToday?theme.accent:hasData?theme.text:"#374151",lineHeight:1}}>
                      {iso.slice(8)}
                    </div>
                    <div style={{fontSize:8,color:theme.textDim,marginTop:1}}>
                      {["CN","T2","T3","T4","T5","T6","T7"][new Date(iso+"T00:00:00").getDay()]}
                    </div>
                  </div>

                  {/* Rank badge */}
                  <div style={{width:28,height:28,borderRadius:7,flexShrink:0,
                    background:hasData?`${rc}22`:theme.border,border:`1px solid ${hasData?rc+"44":theme.border}`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:13,fontWeight:800,color:hasData?rc:"#374151"}}>
                    {hasData?rl:"—"}
                  </div>

                  {/* Info */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      {hasData&&e>0&&<span style={{fontSize:10,color:theme.accent,fontWeight:600}}>{e} XP</span>}
                      {mA>0&&<span style={{fontSize:12}}>{moodEmoji(Math.round(mA))}</span>}
                      {day?.lo&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:8,background:"rgba(239,68,68,.15)",color:theme.danger}}>lọ</span>}
                      {day?.studyTime>0&&<span style={{fontSize:9,color:theme.success}}>📚{Math.floor(day.studyTime/60)}h</span>}
                      {day?.phone>0&&<span style={{fontSize:9,color:pColor(day.phone)}}>📱{Math.floor(day.phone/60)}h</span>}
                    </div>
                    {day?.journal&&<div style={{fontSize:10,color:theme.textDim,marginTop:3,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{day.journal.slice(0,50)}</div>}
                  </div>

                  {/* Arrow */}
                  <span style={{color:theme.textDim,fontSize:11,transform:isSel?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0}}>▾</span>
                </div>

                {/* DayDetail inline */}
                {isSel&&(
                  <div style={{borderTop:"none"}}>
                    <DayDetail
                      key={iso}
                      date={iso}
                      data={db[iso]||blank()}
                      save={save}
                      dayE={e}
                      isToday={isToday}
                    />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}

      {/* 📅 Weekly Review đã lưu */}
      <WeeklyReviewHistorySection weeklyReviews={weeklyReviews} onOpen={onOpenWeeklyReviewWeek}/>

      <div style={{height:16}}/>
    </div>
  );
}

// ── STATS ──────────────────────────────────────────────────────────────────
function Stats({db,dayExp,lv,rt,txp,str,exportData,importData,setts,onReset,backupList=[],restoreFromBackup}) {
  const theme = useContext(ThemeContext);
  const [chartDays,setChartDays]=useState(7);
  // P-07: hidden file input ref for Import
  const importRef = useRef(null);
  // Auto-backup restore UI
  const [showBackupList,setShowBackupList]=useState(false);
  const [confirmRestoreKey,setConfirmRestoreKey]=useState(null);
  const allDays=Object.keys(db).filter(k=>dayExp(k)>0);
  const avgXP=allDays.length?Math.round(txp/allDays.length):0;

  const lastN=Array.from({length:chartDays},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(chartDays-1)+i);
    const iso=d.toISOString().split("T")[0];
    const e=dayExp(iso),day=db[iso];
    const mA=avgMood(day);
    return {iso,e,lo:day?.lo||false,phone:day?.phone||0,unlocks:day?.unlocks||0,
      studyTime:day?.studyTime||0,distractions:day?.distractions||[],moodAvg:mA,
      label:d.toLocaleDateString("vi-VN",{weekday:"short"}).slice(0,3)};
  });
  const maxE=Math.max(...lastN.map(d=>d.e),1);

  // ── 30-day data for line charts ───────────────────────────────────
  const last30=Array.from({length:30},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-29+i);
    const iso=d.toISOString().split("T")[0];
    const day=db[iso];
    return {
      iso,
      e:dayExp(iso),
      moodAvg:avgMood(day),
      studyTime:day?.studyTime||0,
      label:d.toLocaleDateString("vi-VN",{day:"numeric",month:"numeric"}),
      short:d.getDate(),
    };
  });

  // ── Rank Prediction ───────────────────────────────────────────────
  const xpAvg7  = allDays.length>=1 ? Math.round(lastN.slice(-7).reduce((s,d)=>s+d.e,0)/7) : 0;
  const xpAvg30 = allDays.length>=1 ? Math.round(last30.reduce((s,d)=>s+d.e,0)/30) : 0;
  const predictXP30 = txp + xpAvg7*30;
  const predictLv30 = calcLv(predictXP30);
  const predictRt30 = getRankTitle(predictLv30.l);
  const predictXP90 = txp + xpAvg7*90;
  const predictLv90 = calcLv(predictXP90);
  const predictRt90 = getRankTitle(predictLv90.l);
  // Streak prediction: if maintaining, streak grows linearly
  const predictStr30 = str + 30;

  // Subjects
  const subjects=["math","physics","chem","lit","recall"].map(id=>{
    const task=TASKS.find(t=>t.id===id);
    const cnt=Object.keys(db).filter(k=>{
      const d=new Date(k+"T00:00:00"),now=new Date();
      d.setHours(0,0,0,0); now.setHours(0,0,0,0);
      return (now-d)<=30*86400000&&db[k]?.tasks?.[id];
    }).length;
    return {id,label:(task?.i||"")+" "+(task?.l||"").replace("Học ","").replace(" (≥1 Pomodoro – 25 phút)","").replace(" (≥1 Pomodoro)",""),cnt};
  });

  // Distraction stats
  const allDistrs=Object.values(db).flatMap(d=>d.distractions||[]);
  const distrBySource=DISTR_SOURCES.map(s=>({source:s,cnt:allDistrs.filter(d=>d.source===s).length})).sort((a,b)=>b.cnt-a.cnt);
  const totalDistrMins=allDistrs.reduce((s,d)=>s+d.duration,0);
  const todayDistrs=lastN[lastN.length-1]?.distractions||[];

  // Mood stats
  const moodLast7=lastN.slice(-7).map(d=>d.moodAvg).filter(v=>v>0);
  const avgMood7=moodLast7.length?(moodLast7.reduce((a,b)=>a+b,0)/moodLast7.length).toFixed(1):"—";

  // Study stats
  const totalStudyMins=Object.values(db).reduce((s,d)=>s+(d.studyTime||0),0);
  const studyLast7=lastN.slice(-7).reduce((s,d)=>s+d.studyTime,0);

  // Weekly
  const thisWeek=lastN.slice(-7).reduce((s,d)=>s+d.e,0);
  const prevWeekData=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-14+i);return dayExp(d.toISOString().split("T")[0]);});
  const prevWeek=prevWeekData.reduce((s,e)=>s+e,0);
  const weekDiff=prevWeek>0?Math.round((thisWeek-prevWeek)/prevWeek*100):0;

  // Heatmap

// ── LINE CHART 30 DAYS ─────────────────────────────────────────────────────
function LineChart30({title, data, color, maxVal, unit, emptyLabel=""}) {
  const theme = useContext(ThemeContext);
  const W=300, H=80, PAD=8;
  const validData = data.filter(d=>d.v>0);
  if(validData.length<2) return (
    <div style={{background:theme.surface,borderRadius:10,padding:16,marginBottom:10,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>{title}</div>
      <div style={{textAlign:"center",color:theme.textDim,fontSize:11,padding:"20px 0"}}>Chưa đủ dữ liệu</div>
    </div>
  );
  const pts = data.map((d,i)=>{
    const x = PAD + (i/(data.length-1))*(W-PAD*2);
    const y = d.v>0 ? H-PAD-(d.v/maxVal)*(H-PAD*2) : null;
    return {x,y,v:d.v,label:d.label};
  });
  // Build path skipping nulls
  let path="";
  pts.forEach((p,i)=>{
    if(p.y===null) return;
    const cmd = path==="" || pts.slice(0,i).every(x=>x.y===null) ? "M" : "L";
    path+=`${cmd}${p.x.toFixed(1)},${p.y.toFixed(1)} `;
  });
  // Area fill path
  const validPts=pts.filter(p=>p.y!==null);
  let area="";
  if(validPts.length>=2){
    area=`M${validPts[0].x.toFixed(1)},${H-PAD} `;
    validPts.forEach(p=>{ area+=`L${p.x.toFixed(1)},${p.y.toFixed(1)} `; });
    area+=`L${validPts[validPts.length-1].x.toFixed(1)},${H-PAD} Z`;
  }
  const avg=validData.length?Math.round(validData.reduce((s,d)=>s+d.v,0)/validData.length*10)/10:0;
  const maxV=Math.max(...validData.map(d=>d.v));
  const minV=Math.min(...validData.map(d=>d.v));
  return (
    <div style={{background:theme.surface,borderRadius:10,padding:16,marginBottom:10,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:600}}>{title}</div>
        <div style={{display:"flex",gap:10,fontSize:9,color:theme.textDim}}>
          <span>TB <b style={{color}}>{avg}{unit}</b></span>
          <span>Max <b style={{color:theme.warning}}>{maxV}{unit}</b></span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
        {/* Grid lines */}
        {[0.25,0.5,0.75,1].map(f=>(
          <line key={f} x1={PAD} x2={W-PAD} y1={H-PAD-(f*(H-PAD*2))} y2={H-PAD-(f*(H-PAD*2))} stroke={theme.border} strokeWidth={0.5}/>
        ))}
        {/* Area */}
        {area&&<path d={area} fill={color} fillOpacity={0.08}/>}
        {/* Line */}
        <path d={path} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round" strokeLinecap="round"/>
        {/* Dots on valid points — only show every ~5th to avoid clutter */}
        {validPts.filter((_,i)=>i===0||i===validPts.length-1||i%5===0).map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={2.5} fill={color} opacity={0.9}/>
        ))}
      </svg>
      {/* X axis labels: show every 5th day */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        {data.filter((_,i)=>i===0||i===14||i===29).map((d,i)=>(
          <span key={i} style={{fontSize:8,color:theme.textDim}}>{d.label}</span>
        ))}
      </div>
    </div>
  );
}

// ── POMODORO ───────────────────────────────────────────────────────────────
function PomodoroModal({onClose,onDone,pomSetts={},savePomSetts}) {
  const theme = useContext(ThemeContext);
  const [showPlaylistEdit,setShowPlaylistEdit]=useState(false);
  const DURS=[{l:"25 phút",s:1500},{l:"50 phút",s:3000},{l:"10 phút",s:600}];
  const [di,setDi]=useState(0); const [secs,setSecs]=useState(1500);
  const [running,setRunning]=useState(false); const [done,setDone]=useState(false);
  const [taskId,setTaskId]=useState(""); const ref=useRef(null);

  // H-2: interval is created only when running flips to true, NOT on every secs change.
  // setSecs uses functional updater so the callback never captures stale secs.
  useEffect(()=>{
    if(!running) return;
    ref.current=setInterval(()=>{
      setSecs(s=>{
        if(s<=1){
          clearInterval(ref.current);
          // schedule state updates outside the updater to avoid batching issues
          setTimeout(()=>{ setRunning(false); setDone(true); }, 0);
          return 0;
        }
        return s-1;
      });
    },1000);
    return()=>{ clearInterval(ref.current); ref.current=null; };
  },[running]);
  const sel=i=>{setDi(i);setSecs(DURS[i].s);setRunning(false);setDone(false);};
  const reset=()=>{clearInterval(ref.current);setSecs(DURS[di].s);setRunning(false);setDone(false);};
  const pct=1-(secs/DURS[di].s); const r=60,circ=2*Math.PI*r;
  return(
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:26,width:"100%",maxWidth:340}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700}}>🍅 Pomodoro</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:theme.textDim,fontSize:20,cursor:"pointer"}}>×</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {DURS.map((d,i)=><button key={i} onClick={()=>sel(i)} style={{flex:1,padding:"6px 0",borderRadius:7,border:`1px solid ${di===i?theme.primary:theme.neutral}`,background:di===i?theme.tertiary:theme.neutral+"22",color:di===i?theme.primary:theme.textDim,fontSize:11,cursor:"pointer"}}>{d.l}</button>)}
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          <svg width={150} height={150}>
            <circle cx={75} cy={75} r={r} fill="none" stroke={theme.border} strokeWidth={8}/>
            <circle cx={75} cy={75} r={r} fill="none" stroke={done?theme.success:theme.accent} strokeWidth={8}
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform="rotate(-90 75 75)" style={{transition:"stroke-dashoffset .5s"}}/>
            <text x={75} y={80} textAnchor="middle" fill={done?theme.success:theme.text} fontSize={24} fontWeight={700}>{done?"✓":fmtHM(secs)}</text>
          </svg>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button onClick={()=>setRunning(r=>!r)} style={{flex:1,padding:"11px 0",borderRadius:999,border:"none",background:theme.accent,color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>{running?"⏸":"▶"}</button>
          <button onClick={reset} style={{padding:"11px 16px",borderRadius:999,border:`1px solid ${theme.border}`,background:theme.border,color:theme.textDim,cursor:"pointer"}}>↺</button>
        </div>
        {/* Playlist links */}
        <div style={{marginBottom:12,borderTop:`1px solid ${theme.border}`,paddingTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:700,color:theme.textDim,textTransform:"uppercase",letterSpacing:1}}>🎵 Playlist học</div>
            <button onClick={()=>setShowPlaylistEdit(p=>!p)} style={{background:"none",border:"none",color:theme.textDim,fontSize:10,cursor:"pointer"}}>{showPlaylistEdit?"Đóng":"Chỉnh sửa"}</button>
          </div>
          {showPlaylistEdit?(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {Object.entries({math:"📐 Toán",physics:"⚡ Lý",chem:"🧪 Hóa",lit:"📝 Văn"}).map(([k,l])=>(
                <div key={k} style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:10,color:theme.textDim,width:50,flexShrink:0}}>{l}</span>
                  <input defaultValue={pomSetts[k]||""} onBlur={e=>savePomSetts&&savePomSetts({...pomSetts,[k]:e.target.value.trim()})} placeholder="Link YouTube/Spotify..." style={{flex:1,background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:5,padding:"5px 7px",color:theme.text,fontSize:10,outline:"none"}}/>
                </div>
              ))}
            </div>
          ):(
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {Object.entries({math:"📐 Toán",physics:"⚡ Lý",chem:"🧪 Hóa",lit:"📝 Văn"}).map(([k,l])=>{
                const link=pomSetts[k]||"";
                return link?(
                  <a key={k} href={link} target="_blank" rel="noreferrer" style={{padding:"4px 10px",borderRadius:6,background:`${theme.accent}26`,border:`1px solid ${theme.accent}33`,color:theme.accent,fontSize:10,textDecoration:"none"}}>{l}</a>
                ):null;
              })}
              {!Object.values(pomSetts).some(Boolean)&&<span style={{fontSize:10,color:theme.textDim}}>Chưa có link — bấm Chỉnh sửa</span>}
            </div>
          )}
        </div>
        {done&&(
          <div>
            <div style={{fontSize:11,color:theme.textDim,marginBottom:8}}>Tick task nào?</div>
            <select value={taskId} onChange={e=>setTaskId(e.target.value)} style={{width:"100%",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:14,padding:"8px 10px",color:theme.text,fontSize:12,marginBottom:10,outline:"none"}}>
              <option value="">— Không —</option>
              {TASKS.filter(t=>t.c==="Học").map(t=><option key={t.id} value={t.id}>{t.i} {t.l}</option>)}
            </select>
            <button onClick={()=>{onDone(taskId);onClose();}} style={{width:"100%",padding:"9px 0",borderRadius:8,border:"none",background:theme.success,color:"#000",fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ Xong phiên học!</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Q&A ────────────────────────────────────────────────────────────────────
function QandA({setts,saveSetts}) {
  const theme = useContext(ThemeContext);
  const [open,setOpen]=useState(null);
  const [imported,setImported]=useState([]);
  const [importTxt,setImportTxt]=useState(""); const [importOpen,setImportOpen]=useState(false); const [importErr,setImportErr]=useState("");
  const [notes,setNotes]=useState([]); const [newQ,setNewQ]=useState(""); const [newA,setNewA]=useState("");
  const [adding,setAdding]=useState(false); const [editId,setEditId]=useState(null); const [openN,setOpenN]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("qa:notes");if(r)setNotes(JSON.parse(r));}catch{}
      try{const r=await S.get("qa:imported");if(r)setImported(JSON.parse(r));}catch{}
    })();
  },[]);

  const saveN=async arr=>{try{await S.set("qa:notes",JSON.stringify(arr));}catch{} setNotes(arr);};
  const saveI=async arr=>{try{await S.set("qa:imported",JSON.stringify(arr));}catch{} setImported(arr);};

  const doImport=()=>{
    setImportErr("");
    try{
      const obj=JSON.parse(importTxt.trim());
      if(!obj.q||!obj.a){setImportErr("Thiếu q hoặc a");return;}
      saveI([...imported,{id:"imp_"+Date.now(),icon:obj.icon||"💬",color:obj.color||theme.accent,q:obj.q,a:obj.a}]);
      setImportTxt("");setImportOpen(false);
    }catch{setImportErr("JSON không hợp lệ");}
  };

  const renderCard=(card,key,onDel)=>{
    const isO=open===key;
    return(
      <div key={key} style={{background:theme.surface,border:`1px solid ${isO?card.color:card.color+"66"}`,borderRadius:10,marginBottom:10,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div onClick={()=>setOpen(isO?null:key)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",cursor:"pointer"}}>
          <div style={{width:32,height:32,borderRadius:8,flexShrink:0,marginTop:1,background:`${card.color}18`,border:`1px solid ${card.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{card.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:theme.text,lineHeight:1.5}}>{card.q}</div>
            {!isO&&<div style={{fontSize:10,color:theme.textDim,marginTop:3}}>Bấm để đọc</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            {onDel&&<button onClick={e=>{e.stopPropagation();onDel();}} style={{background:"none",border:"none",color:theme.danger,cursor:"pointer",fontSize:15}}>×</button>}
            <span style={{color:theme.textDim,fontSize:13,marginTop:3,transform:isO?"rotate(180deg)":"none",transition:"transform .25s"}}>▾</span>
          </div>
        </div>
        {isO&&(
          <div style={{borderTop:`1px solid ${theme.border}`,padding:"12px 14px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
              <div style={{width:3,height:16,background:card.color,borderRadius:2}}/>

            </div>
            <div style={{fontSize:12,color:theme.textDim,lineHeight:1.8,whiteSpace:"pre-line"}}>{card.a}</div>
          </div>
        )}

        <div style={{fontSize:13,fontWeight:700,color:theme.warning,marginBottom:4}}>❓ Hỏi & Ghi chú</div>

      </div>

                  <span style={{color:theme.textDim,fontSize:12,transform:isO?"rotate(180deg)":"none"}}>▾</span>

    </div>

}

// ── HALL OF FAME ───────────────────────────────────────────────────────────
function HallOfFame({db,dayExp,str}) {
  const theme = useContext(ThemeContext);
  const records = [];
  let maxXP=0,maxXPDate="",maxStudy=0,maxStudyDate="",minPhone=Infinity,minPhoneDate="";
  Object.keys(db).forEach(iso=>{
    const d=db[iso]; const e=dayExp(iso);
    if(e>maxXP){maxXP=e;maxXPDate=iso;}
    if((d.studyTime||0)>maxStudy){maxStudy=d.studyTime;maxStudyDate=iso;}
    if(d.phone>0&&d.phone<minPhone){minPhone=d.phone;minPhoneDate=iso;}
  });
  if(maxXPDate) records.push({icon:"⭐",label:"XP cao nhất",val:`${maxXP} XP`,date:maxXPDate,c:theme.warning});
  if(maxStudyDate) records.push({icon:"📚",label:"Học nhiều nhất",val:`${Math.floor(maxStudy/60)}h${maxStudy%60>0?` ${maxStudy%60}m`:""}`,date:maxStudyDate,c:theme.success});
  if(minPhoneDate&&minPhone<Infinity) records.push({icon:"📵",label:"Phone ít nhất",val:`${Math.floor(minPhone/60)}h${minPhone%60>0?` ${minPhone%60}m`:""}`,date:minPhoneDate,c:theme.accent});
  if(str>0) records.push({icon:"🔥",label:"Chuỗi hiện tại",val:`${str} ngày`,date:"",c:"#fb923c"});
  if(!records.length) return null;
  return (
    <div style={{background:`linear-gradient(135deg,${theme.warning}14,${theme.secondary}14)`,border:`1px solid ${theme.warning}33`,borderRadius:16,padding:14,marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:600,color:theme.warning,marginBottom:12}}>🏆 Hall of Fame</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {records.map((r,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,.2)",borderRadius:14,padding:"10px 12px"}}>
            <div style={{fontSize:20,marginBottom:4}}>{r.icon}</div>
            <div style={{fontSize:10,color:theme.textDim,marginBottom:2}}>{r.label}</div>
            <div style={{fontSize:16,fontWeight:700,color:r.c}}>{r.val}</div>
            {r.date&&<div style={{fontSize:8,color:theme.textDim,marginTop:2}}>{new Date(r.date+"T00:00:00").toLocaleDateString("vi-VN",{day:"numeric",month:"numeric",year:"numeric"})}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function KnowledgeBank() {
  const theme = useContext(ThemeContext);
  const [items,setItems]=useState([]);
  const [form,setForm]=useState(null); // null=closed, {}=new, {id}=edit
  const [search,setSearch]=useState("");
  const [tagFilter,setTagFilter]=useState("Tất cả");
  const [viewId,setViewId]=useState(null);
  // P-06: inline confirm for KB delete
  const [kbConfirm,setKbConfirm]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("kb:items");if(r)setItems(JSON.parse(r));}catch{}
    })();
  },[]);

  const saveItems=async arr=>{try{await S.set("kb:items",JSON.stringify(arr));}catch{} setItems(arr);};

  const filtered=items.filter(it=>{
    const q=search.toLowerCase();
    const matchSearch=!q||(it.title+it.content+it.tag).toLowerCase().includes(q);

    return matchSearch&&matchTag;
  }).sort((a,b)=>b.createdAt-a.createdAt);

  const saveForm=()=>{
    if(!form||!form.title?.trim()) return;
    const item={id:form.id||"kb_"+Date.now(),title:form.title.trim(),content:form.content||"",tag:form.tag||"Khác",link:form.link||"",createdAt:form.createdAt||Date.now()};
    const arr=form.id?items.map(x=>x.id===form.id?item:x):[item,...items];

  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${theme.success}14,${theme.secondary}14)`,borderRadius:12,padding:"14px 16px",marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.success,marginBottom:4}}>📚 Kho Ghi Chú</div>
        <div style={{fontSize:11,color:theme.textDim}}>Lưu công thức, mẹo học, bài học, video hữu ích.</div>
      </div>

      {/* Search + Add */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Tìm kiếm..." style={{flex:1,background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:12,padding:"10px 14px",color:theme.text,fontSize:12,outline:"none"}}/>
        <button onClick={()=>setForm({title:"",content:"",tag:"Khác",link:""})} style={{background:`linear-gradient(135deg,${theme.success},${theme.accent})`,border:"none",borderRadius:12,padding:"0 16px",color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Thêm</button>
      </div>

      {/* Tag filter */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
        {["Tất cả",...KB_TAGS].map(t=>(
          <button key={t} onClick={()=>setTagFilter(t)} style={{padding:"4px 12px",borderRadius:999,border:`1px solid ${tagFilter===t?(KB_TAG_C[t]||theme.accent):theme.border}`,background:tagFilter===t?`${KB_TAG_C[t]||theme.accent}22`:"transparent",color:tagFilter===t?(KB_TAG_C[t]||theme.accent):theme.textDim,fontSize:10,cursor:"pointer",transition:"all 0.25s ease"}}>{t}</button>
        ))}
      </div>

      {/* Add/Edit form */}
      {form&&(
        <div style={{background:"rgba(16,185,129,.06)",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
          <div style={{fontSize:11,fontWeight:700,color:theme.success,marginBottom:10}}>{form.id?"✏️ Chỉnh sửa":"📝 Ghi chú mới"}</div>
          <input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Tiêu đề *" style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",marginBottom:8}}/>
          <textarea value={form.content||""} onChange={e=>setForm({...form,content:e.target.value})} placeholder="Nội dung..." rows={4} style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",resize:"vertical",marginBottom:8,lineHeight:1.6}}/>
          <input value={form.link||""} onChange={e=>setForm({...form,link:e.target.value})} placeholder="🔗 Link video (tuỳ chọn)..." style={{width:"100%",boxSizing:"border-box",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:12,padding:"9px 12px",color:theme.text,fontSize:12,outline:"none",marginBottom:8}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {KB_TAGS.map(t=>(
              <button key={t} onClick={()=>setForm({...form,tag:t})} style={{padding:"4px 12px",borderRadius:999,border:`1px solid ${form.tag===t?(KB_TAG_C[t]||theme.accent):theme.border}`,background:form.tag===t?`${KB_TAG_C[t]||theme.accent}22`:"transparent",color:form.tag===t?(KB_TAG_C[t]||theme.accent):theme.textDim,fontSize:10,cursor:"pointer"}}>{t}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>

            <button onClick={()=>setForm(null)} style={{padding:"10px 16px",background:theme.surfaceAlt,border:`1px solid ${theme.border}`,borderRadius:999,color:theme.textDim,fontSize:12,cursor:"pointer"}}>Huỷ</button>
          </div>
        </div>
      )}

      {/* View item modal */}
      {viewing&&(
        <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>{setViewId(null);setKbConfirm(false);}}>

                <div style={{display:"inline-block",padding:"2px 10px",borderRadius:999,background:`${KB_TAG_C[viewing.tag]||theme.textDim}22`,color:KB_TAG_C[viewing.tag]||theme.textDim,fontSize:9,fontWeight:700,marginBottom:6}}>{viewing.tag}</div>
                <div style={{fontSize:14,fontWeight:700,color:theme.text}}>{viewing.title}</div>
                <div style={{fontSize:9,color:theme.textDim,marginTop:4}}>{fmtDate(viewing.createdAt)}</div>
              </div>
              <button onClick={()=>{setViewId(null);setKbConfirm(false);}} style={{background:"none",border:"none",color:theme.textDim,fontSize:22,cursor:"pointer"}}>×</button>
            </div>
            {viewing.content&&<div style={{fontSize:12,color:theme.textDim,lineHeight:1.8,whiteSpace:"pre-wrap",marginBottom:12}}>{viewing.content}</div>}
            {viewing.link&&<a href={viewing.link} target="_blank" rel="noreferrer" style={{display:"block",padding:"10px 14px",background:`${theme.accent}1F`,border:`1px solid ${theme.accent}33`,borderRadius:14,color:theme.accent,fontSize:11,textDecoration:"none",marginBottom:12}}>🔗 Mở link</a>}
            <div style={{display:"flex",gap:8}}>

              {kbConfirm?(

                  message="Xoá ghi chú này?"
                  onConfirm={()=>{saveItems(items.filter(x=>x.id!==viewing.id));setViewId(null);setKbConfirm(false);}}

                <button onClick={()=>setKbConfirm(true)} style={{padding:"8px 14px",background:"rgba(239,68,68,.15)",border:`1px solid ${theme.danger}44`,borderRadius:7,color:theme.danger,fontSize:12,cursor:"pointer"}}>🗑</button>

            {items.length===0?"Chưa có ghi chú nào — bấm + Thêm 📝":"Không tìm thấy kết quả"}

          <div key={it.id} onClick={()=>setViewId(it.id)} style={{background:theme.surface,border:`1px solid ${KB_TAG_C[it.tag]||theme.textDim}`,borderRadius:10,padding:"13px 16px",marginBottom:10,cursor:"pointer",boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>

              {it.link&&<span style={{fontSize:9,color:theme.accent}}>🔗 link</span>}
            </div>
          </div>
        ))
      }
      <div style={{height:16}}/>
    </div>
  );
}

// ── HANH TRINH: Monthly Reflection + Time Capsule ─────────────────────────
function HanhTrinh({capsuleNotif,setCapsuleNotif}) {
  const theme = useContext(ThemeContext);
  const [activeTab,setActiveTab]=useState("reflect");
  const [reflections,setReflections]=useState({});
  const [capsules,setCapsules]=useState([]);
  const [editMonth,setEditMonth]=useState(null);
  const [editCap,setEditCap]=useState(null);
  const today=toISO();
  const thisMonth=today.slice(0,7);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("reflections");if(r)setReflections(JSON.parse(r));}catch{}
      try{const r=await S.get("capsules");if(r){
        const caps=JSON.parse(r); setCapsules(caps);
        const due=caps.find(c=>!c.opened&&c.openDate<=today);
        if(due) setCapsuleNotif(due);
      }}catch{}
    })();
  },[]);

  const saveRef=async data=>{const next={...reflections,...data};try{await S.set("reflections",JSON.stringify(next));}catch{} setReflections(next);};
  const saveCaps=async arr=>{try{await S.set("capsules",JSON.stringify(arr));}catch{} setCapsules(arr);};

  const months=[];
  for(let i=0;i<6;i++){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);

  const FIELDS=[
    {k:"what",l:"Những gì đã xảy ra",ph:"Tháng này có gì đáng nhớ?"},

    {k:"problems",l:"Vấn đề gặp phải",ph:"Khó khăn gặp phải là gì?"},
    {k:"lessons",l:"Bài học rút ra",ph:"Học được gì từ tháng này?"},
    {k:"grateful",l:"Điều biết ơn",ph:"Biết ơn điều gì?"},

        ))}
      </div>

        <div>

              <div style={{fontSize:11,color:theme.textDim,lineHeight:1.6,marginBottom:8,whiteSpace:"pre-wrap"}}>{capsuleNotif.content}</div>

const BOSS_PRESETS=[
  {name:"TikTok Demon",icon:"📱",maxHp:100,c:"#ef4444"},
  {name:"Ngủ Muộn",icon:"😴",maxHp:100,c:"#6366f1"},
  {name:"Trì Hoãn",icon:"🧠",maxHp:100,c:"#fbbf24"},

];

function BossFight({db,save,td}) {
  const theme = useContext(ThemeContext);
  const [boss,setBoss]=useState(null);
  const [history,setHistory]=useState([]);
  const [showNew,setShowNew]=useState(false);
  const [customName,setCustomName]=useState("");
  const [customIcon,setCustomIcon]=useState("👹");
  const [customHp,setCustomHp]=useState(100);
  // P-06: inline confirm for abandon
  const [abandonConfirm,setAbandonConfirm]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const r=await S.get("boss:current");if(r)setBoss(JSON.parse(r));}catch{}
      try{const r=await S.get("boss:history");if(r)setHistory(JSON.parse(r));}catch{}
    })();
  },[]);

  const saveBoss=async b=>{try{await S.set("boss:current",b?JSON.stringify(b):"null");}catch{} setBoss(b);};
  const saveHist=async arr=>{try{await S.set("boss:history",JSON.stringify(arr));}catch{} setHistory(arr);};

  const attack=(dmg)=>{
    if(!boss)return;
    const newHp=Math.max(0,boss.hp-dmg);
    if(newHp===0){
      const defeated={...boss,hp:0,defeatedAt:Date.now()};
      saveHist([defeated,...history]);
      saveBoss(null);
      setAbandonConfirm(false);
    } else { saveBoss({...boss,hp:newHp}); }
  };

  const startBoss=(preset)=>{
    const b={...preset,hp:preset.maxHp,startDate:td,id:"boss_"+Date.now()};
    saveBoss(b); setShowNew(false);
  };

  const startCustom=()=>{
    if(!customName.trim())return;
    startBoss({name:customName.trim(),icon:customIcon,maxHp:customHp,c:theme.accent});
    setCustomName(""); setCustomIcon("👹"); setCustomHp(100);
  };

  const pct=boss?(boss.hp/boss.maxHp)*100:0;

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,rgba(239,68,68,.1),rgba(251,146,60,.08))",borderRadius:12,padding:"14px 16px",marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
        <div style={{fontSize:13,fontWeight:700,color:theme.danger,marginBottom:4}}>⚔️ Boss Fight Tháng</div>
        <div style={{fontSize:11,color:theme.textDim}}>Chọn thứ muốn chinh phục. Mỗi ngày hoàn thành mục tiêu = đánh boss.</div>
      </div>

      {boss?(
        <div>
          {/* Boss card */}
          <div style={{background:"rgba(239,68,68,.08)",border:`1px solid ${boss.c||theme.danger}`,borderRadius:12,padding:18,marginBottom:14,textAlign:"center",boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
            <div style={{fontSize:48,marginBottom:8}}>{boss.icon}</div>
            <div style={{fontSize:16,fontWeight:800,color:boss.c||theme.danger,marginBottom:4}}>{boss.name}</div>
            <div style={{fontSize:12,color:theme.textDim,marginBottom:12}}>HP: {boss.hp}/{boss.maxHp}</div>
            {/* HP bar */}
            <div style={{height:16,background:theme.border,borderRadius:999,overflow:"hidden",marginBottom:14}}>
              <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${boss.c||theme.danger},#fb923c)`,borderRadius:999,transition:"width .4s",boxShadow:`0 0 8px ${boss.c||theme.danger}88`}}/>
            </div>
            {/* Attack buttons */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <button onClick={()=>attack(5)} style={{padding:"11px 0",borderRadius:14,border:"none",background:"rgba(52,211,153,.2)",color:theme.success,fontWeight:700,fontSize:12,cursor:"pointer"}}>⚔️ -5 HP<div style={{fontSize:9,fontWeight:400}}>Hoàn thành ≥10 task</div></button>
              <button onClick={()=>attack(10)} style={{padding:"11px 0",borderRadius:14,border:"none",background:"rgba(251,191,36,.2)",color:theme.warning,fontWeight:700,fontSize:12,cursor:"pointer"}}>💥 -10 HP<div style={{fontSize:9,fontWeight:400}}>Ngày xuất sắc</div></button>
            </div>
            <button onClick={()=>attack(3)} style={{width:"100%",padding:"9px 0",borderRadius:999,border:`1px solid ${theme.border}`,background:theme.border,color:theme.textDim,fontSize:11,cursor:"pointer"}}>🛡 -3 HP (hoàn thành việc nhỏ)</button>
            {abandonConfirm ? (
              <InlineConfirm
                message="Từ bỏ boss này?"
                confirmLabel="Từ bỏ"
                cancelLabel="Tiếp tục"
                onConfirm={()=>{saveBoss(null);setAbandonConfirm(false);}}
                onCancel={()=>setAbandonConfirm(false)}
              />
            ) : (
              <button onClick={()=>setAbandonConfirm(true)} style={{marginTop:8,width:"100%",padding:"7px 0",borderRadius:999,border:"none",background:"transparent",color:theme.textDim,fontSize:10,cursor:"pointer"}}>Từ bỏ boss</button>
            )}
          </div>
        </div>
      ):(
        <div>
          <button onClick={()=>setShowNew(!showNew)} style={{width:"100%",padding:"12px 0",borderRadius:10,border:`1px solid ${theme.danger}44`,background:"rgba(239,68,68,.06)",color:theme.danger,fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:14}}>
            ⚔️ Chọn Boss mới
          </button>
          {showNew&&(
            <div style={{background:"rgba(239,68,68,.06)",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
              <div style={{fontSize:11,fontWeight:700,color:theme.danger,marginBottom:10}}>Chọn Boss có sẵn:</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                {BOSS_PRESETS.map(p=>(
                  <button key={p.name} onClick={()=>startBoss(p)} style={{padding:"14px 8px",borderRadius:8,border:`1px solid ${p.c}44`,background:`${p.c}12`,cursor:"pointer",textAlign:"center",transition:"box-shadow 0.25s ease"}}>
