// ── STORAGE ADAPTER ────────────────────────────────────────────────────────
const S = {
  async get(k) {
    // window.storage.get() THROWS (not returns null) when the key has
    // never been set — this is expected/documented behavior, not a
    // failure. Treat that throw as "key not found" and return null
    // directly, instead of falling through to localStorage: in the
    // artifact sandbox localStorage does not exist at all, so the old
    // fallback silently swallowed every "not found" as well as every
    // real error, meaning stored data (AI Planner's v25:aiPlanner:today,
    // dashboard day records, settings, etc.) could never actually be
    // read back — everything looked permanently empty even right after
    // a successful save().
    if (typeof window !== "undefined" && window.storage) {
      try {
        const r = await window.storage.get(k);
        return r?.value ?? null;
      } catch {
        return null; // key genuinely doesn't exist yet — not an error to recover from
      }
    }
    try { return localStorage.getItem(k); } catch { return null; }
  },
  async set(k, v) {
    // C-4: guard — callers must pass a JSON string, not a raw object
    if (typeof v !== "string") {
      console.error(`S.set("${k}"): value must be a string, got ${typeof v}. Skipping write.`);
      return;
    }
    try { if (window.storage) { await window.storage.set(k, v); return; } } catch {}
    try { localStorage.setItem(k, v); } catch {}
  },
  async list(prefix) {
    try { if (window.storage) { const r = await window.storage.list(prefix); return r?.keys ?? []; } } catch {}
    try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch { return []; }
  },
  async del(k) {
    // helper used by C-3 reset
    try { if (window.storage) { await window.storage.delete(k); return; } } catch {}
    try { localStorage.removeItem(k); } catch {}
  },
};

function createAIPlannerCore() {

const TASK_LENGTH_GUESS_MIN = 25;
const MAX_TASKS_HARD_CAP = 7;

function parseTimeToMinutes(hhmm){ const [h,m]=hhmm.split(":").map(Number); return h*60+m; }
function computeRemainingMinutes(nowTime, day, extraEvents){
  const now = parseTimeToMinutes(nowTime);
  const sleepAt = parseTimeToMinutes("22:30");
  let busyBlocks = [];
  if(day === "Thứ 5") busyBlocks = [[parseTimeToMinutes("17:15"),parseTimeToMinutes("19:15")],[parseTimeToMinutes("19:30"),parseTimeToMinutes("21:00")]];
  if(day === "Thứ 2") busyBlocks = [[parseTimeToMinutes("19:30"),parseTimeToMinutes("21:00")]];
  if(day === "Thứ 7") busyBlocks = [[parseTimeToMinutes("19:00"),parseTimeToMinutes("21:00")]];
  if(["Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6"].includes(day)) busyBlocks.push([parseTimeToMinutes("07:00"),parseTimeToMinutes("11:20")]);
  if(Array.isArray(extraEvents)){
    extraEvents.forEach(e=>{
      if(e && e.start && e.end) busyBlocks.push([parseTimeToMinutes(e.start), parseTimeToMinutes(e.end)]);
    });
  }
  let free = Math.max(0, sleepAt-now);
  busyBlocks.forEach(([s,e])=>{ const os=Math.max(s,now), oe=Math.min(e,sleepAt); if(oe>os) free -= (oe-os); });
  return Math.max(0, Math.round(free));
}

/* ── CONTEXT BUILDER ────────────────────────────────────────────────── */
function computeFixedEvents(day){
  const events = [];
  if(day === "Thứ 5") events.push({name:"Học thêm Toán", start:"17:15", end:"19:15"}, {name:"Học thêm Lý", start:"19:30", end:"21:00"});
  if(day === "Thứ 2") events.push({name:"Học thêm", start:"19:30", end:"21:00"});
  if(day === "Thứ 7") events.push({name:"Học thêm", start:"19:00", end:"21:00"});
  if(["Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6"].includes(day)) events.push({name:"Học ở trường", start:"07:00", end:"11:20"});
  return events;
}

function deriveMentalState(rawState){
  if(rawState.event === "wantsRest") return "muốn nghỉ";
  if(rawState.event === "slipped") return "vừa lỡ thất bại";
  if(rawState.energy<=2) return "mệt/thiếu năng lượng";
  if(rawState.energy>=4) return "tốt";
  return "bình thường";
}

function deriveTiktokRisk(tiktokMin){
  if(tiktokMin>=180) return "cao";
  if(tiktokMin>=90) return "vừa";
  if(tiktokMin>=30) return "thấp";
  return "không đáng kể";
}

function deriveRecoveryNeeded(rawState){
  return rawState.event === "slipped" || parseTimeToMinutes(rawState.nowTime) > parseTimeToMinutes("09:30");
}

function buildContext(rawState){
  const extraEvents = Array.isArray(rawState.extraEvents) ? rawState.extraEvents.filter(e=>e && e.start && e.end) : [];
  const fixedEvents = [...computeFixedEvents(rawState.day), ...extraEvents];
  const availableMinutes = computeRemainingMinutes(rawState.nowTime, rawState.day, extraEvents);

  return {
    nowTime: rawState.nowTime,
    day: rawState.day,
    energy: rawState.energy,
    homework: rawState.homework,
    tiktok: rawState.tiktok,
    recent: rawState.recent,
    completionRate: rawState.completionRate,
    event: rawState.event,
    daysToExam: rawState.daysToExam,
    freeNote: rawState.freeNote,

    availableMinutes,
    studyPressure: rawState.daysToExam<14 ? "cao" : rawState.daysToExam<30 ? "vừa" : "thấp",
    mentalState: deriveMentalState(rawState),
    todayType: rawState.day==="Thứ 5" ? "nặng" : rawState.day==="Chủ nhật" ? "không cấu trúc" : "thường",
    examDistance: rawState.daysToExam,
    homeworkStatus: rawState.homework===true ? "đã xong" : rawState.homework===false ? "chưa xong" : "không rõ",
    gameMode: rawState.event==="wantsOverride" ? "muốn vượt mức khuyến nghị" : "bình thường",
    freeTimeBlocks: availableMinutes,
    fixedEvents,
    energyLevel: rawState.energy,
    tiktokRisk: deriveTiktokRisk(rawState.tiktok),
    recoveryNeeded: deriveRecoveryNeeded(rawState),
    oneBigWinCandidate: null
  };
}

/* ── DECISION GRAPH BUILDER ──────────────────────────────────────────── */
const DIRECTION = {
  LOW_ENERGY:"reduce", HIGH_PRESSURE:"reduce", REDUCE_TASK:"reduce", RECOVERY_MODE:"reduce",
  HIGH_ENERGY:"expand", EXAM_PRIORITY:"expand",
};

function buildDecisionGraph(nodes){
  const edges = [];
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i], b=nodes[j];
      const da=DIRECTION[a.kind], db=DIRECTION[b.kind];
      if(!da || !db) continue;
      if(da===db) edges.push({from:a.kind, to:b.kind, relation:"reinforces"});
      else edges.push({from:a.kind, to:b.kind, relation:"conflicts_with"});
    }
  }
  const hasReduce = nodes.find(n=>n.kind==="REDUCE_TASK");
  const hasRecovery = nodes.find(n=>n.kind==="RECOVERY_MODE");
  if(hasReduce && hasRecovery) edges.push({from:"REDUCE_TASK", to:"RECOVERY_MODE", relation:"causes"});

  return { nodes, edges };
}

function graphEdgesOf(graph, kind){
  return graph.edges.filter(e=>e.from===kind || e.to===kind);
}
function graphOtherNode(graph, kind, edge){
  const otherKind = edge.from===kind ? edge.to : edge.from;
  return graph.nodes.find(n=>n.kind===otherKind);
}

/* ── REASON GENERATOR v2.0 ─────────────────────────────────────────── */

  return words[Math.max(0, Math.min(3, sev))];
}

    if(reinfEdge){
      const other = graphOtherNode(graph, "HIGH_PRESSURE", reinfEdge);
      if(other && other.kind==="LOW_ENERGY")
        combo = ` Cộng thêm năng lượng đang thấp (${other.data.energy}/5), hai yếu tố này cùng chiều nên mình rút task xuống mạnh tay hơn bình thường.`;
    } else if(conflEdge){
      const other = graphOtherNode(graph, "HIGH_PRESSURE", conflEdge);
      if(other && other.kind==="HIGH_ENERGY")
        combo = ` Dù năng lượng vẫn đang cao (${other.data.energy}/5) — nghĩa là không hẳn do mệt, mà nhiều khả năng là né tránh trong khoảnh khắc — nên mình vẫn rút ngắn task đầu để dễ bắt đầu, chứ không bỏ qua tín hiệu này.`;
    }
    return `Em đã dùng khoảng ${node.data.tiktok} phút cho TikTok/nội dung ngắn hôm nay — ${sevWord}. Nếu mình vẫn giao task dài như bình thường, khả năng bỏ giữa chừng sẽ cao hơn hẳn, nên task đầu tiên hôm nay mình rút ngắn lại để em dễ thắng nhỏ trước, lấy lại nhịp.${combo}`;
  },

  REDUCE_TASK: (node, graph) => {
    const {completionRate} = node.data;
    const causeEdge = graphEdgesOf(graph, "REDUCE_TASK").find(e=>e.relation==="causes");
    return `3 ngày gần nhất đều không hoàn thành được kế hoạch${node.severity>=3 ? ` (lần gần nhất chỉ đạt ${completionRate}%)` : ``}. Đây là rule duy nhất mình được phép tự quyết định giảm ngay mà không cần hỏi trước (vì đã có pattern rõ ràng lặp lại) — hôm nay mình chủ động hạ độ khó và số lượng xuống mức tối thiểu để dễ có 1 ngày thắng, phá vòng lặp thất bại.`;
  },

  LOW_COMPLETION_ASK: (node) =>
    `Lần trước em chỉ hoàn thành ${node.data.completionRate}% kế hoạch. Vì đây chưa phải pattern 3 ngày liên tiếp (chỉ 1 lần), mình chưa vội giảm độ khó — có thể là do task khó quá, cũng có thể chỉ vì hôm đó bận việc khác. Nên hỏi trước để biết chính xác nguyên nhân, tránh đoán sai rồi sửa nhầm chỗ.`,

  MATH_FIRST: (node) => {
    const energyPart = node.data.energy>=4 ? `năng lượng ${node.data.energy}/5 khá tốt` : `năng lượng ${node.data.energy}/5 đủ ổn`;
    return `Hôm nay ${node.data.day}, không phải ngày học thêm nặng, bài tập chưa xong, ${energyPart}. Mình chọn Toán làm việc đầu tiên vì đây là môn em vào guồng nhanh — bắt đầu bằng việc dễ tạo đà sẽ tăng khả năng không bỏ cuộc giữa chừng hôm nay.`;
  },

  PHYSICS_MICRO: (node) =>
    `Bài tập Toán hôm nay đã xong, năng lượng ${node.data.energy}/5 vẫn còn đủ để thử thêm. Với Lý, mình không giao đọc sách hay làm đề dài — vì Lý mất gốc là mất "cảm giác hiểu nguyên lý", không phải quên công thức, nên task sẽ là hỏi giải thích đúng 1 điểm đang tắc, giống cách 1 người dạy kèm giải thích trực tiếp thay vì bắt tự đọc.`,

  TIME_BUDGET: (node) => {
    const {nowTime, day, remainingMin} = node.data;
    const tail = remainingMin < 60 ? ` Khá eo hẹp, nên hôm nay ưu tiên số lượng task ít nhưng chắc, hơn là dàn trải.` : ``;
    return `Tính từ ${nowTime} tới giờ ngủ dự kiến (22h30), trừ đi các khối thời gian cố định (giờ học ở trường, học thêm) của ${day}, còn khoảng ${remainingMin} phút thực sự rảnh trong ngày.${tail}`;
  },

  RECOVERY_FROM_NOW: (node) =>
    `Bây giờ đã là ${node.data.nowTime}. Mình không lập kế hoạch tính từ sáng sớm nữa (những mốc đã trôi qua không cứu được), mà tính hoàn toàn từ thời điểm hiện tại — mục tiêu là cứu phần còn lại của ngày, không phải làm cho "đủ" so với 1 kế hoạch lý tưởng đã lỡ.`,

  ONE_BIG_WIN: (node) =>
    `Dù hôm nay giao bao nhiêu task, luôn có đúng 1 việc được đánh dấu là quan trọng nhất — chỉ cần xong việc đó, em có quyền coi cả ngày là thành công, bất kể các việc khác dở dang.`,

  MAX_TASKS_CAP: (node) =>
    `Dù năng lượng cao cỡ nào, mình cũng không giao quá ${node.data.cap} task trong 1 ngày — vì với em, hỏng ngay bước đầu (do task quá nhiều) thường dẫn tới bỏ luôn cả ngày, nên giới hạn cứng này ưu tiên an toàn hơn là tối đa hoá số lượng.`
};

function explain(node, graph){
  const fn = REASON[node.kind];
  return fn ? fn(node, graph) : "";
}

/* ── COMPOSE LAYER ───────────────────────────────────────────────────── */
const COMBINABLE_KINDS = new Set(["LOW_ENERGY","HIGH_ENERGY","HIGH_PRESSURE","EXAM_PRIORITY","MATH_FIRST","PHYSICS_MICRO","TIME_BUDGET"]);

function composeWarnings(warningNodes, graph){
  const combinable = warningNodes.filter(w=>COMBINABLE_KINDS.has(w.node.kind));
  const standalone = warningNodes.filter(w=>!COMBINABLE_KINDS.has(w.node.kind));

  if(combinable.length <= 1) return warningNodes.map(w=>w.text);

  const kinds = combinable.map(w=>w.node.kind);
  const hasConflict = graph.edges.some(e=>e.relation==="conflicts_with" && kinds.includes(e.from) && kinds.includes(e.to));
  const hasReinforcing = graph.edges.some(e=>e.relation==="reinforces" && kinds.includes(e.from) && kinds.includes(e.to));

  let intro = "";
  if(hasConflict) intro = `Hôm nay có 2 tín hiệu hơi ngược chiều nhau cần cân nhắc cùng lúc: `;
  else if(hasReinforcing) intro = `Hôm nay có ${combinable.length} yếu tố đều chỉ về cùng một hướng — cần giảm tải: `;
  else if(combinable.length >= 3) intro = `Tổng hợp các yếu tố của hôm nay: `;

  const body = combinable.map(w=>w.text).join(" ");
  const composed = intro ? intro + body : body;
  return [composed, ...standalone.map(w=>w.text)];
}

/* ── TASK GENERATOR v2.0 ────────────────────────────────────────────── */

/* ── DECISION ENGINE: Rule Engine → Decision Graph → Reason/Task Generator ── */
function generatePlan(ctx){
  const trace = [];
  let nodes = [];
  let stopped = false;

  for(const rule of RULES){
    const fired = rule.condition(ctx);
    if(!fired){ trace.push({id:rule.id, tier:rule.tier, fired:false, desc:rule.description}); continue; }
    const node = rule.decide(ctx);
    trace.push({id:rule.id, tier:rule.tier, fired:true, desc:rule.description, decision:node});
    nodes.push(node);
    if(node.stop){ stopped = true; break; }
  }

  const graph = buildDecisionGraph(nodes);

  let result = { verdict:null, message:null, bigWin:null, tasks:[], warnings:[], timeBudgetMin:null, stopped, graph };
  let capDur=null, capTasks=null, lockTasks=false, hardCap=null;
  const warningNodes = [];

  for(const node of nodes){
    const reasonText = explain(node, graph);

    switch(node.kind){
      case "FULL_REST":
        result.verdict = "NGHỈ HOÀN TOÀN"; result.message = reasonText; result.tasks = [];
        break;
      case "RECOVERY_MODE":
        result.verdict = "VẪN CỨU NGÀY"; result.message = reasonText;
        result.tasks.push({...generateTask("RESCUE_MICRO_TASK", graph)});
        break;
      case "ASK_STATUS":
        result.verdict = "CẦN HỎI THÊM"; result.message = reasonText; result.tasks = [];
        break;
      case "HOLD_RECOMMENDATION":
        result.verdict = "GIỮ NGUYÊN KHUYẾN NGHỊ"; result.message = reasonText;
        break;
      case "THURSDAY_REVIEW_ONLY":
        result.tasks.push(generateTask("THURSDAY_REVIEW", graph));
        warningNodes.push({node, text:reasonText});
        break;
      case "THURSDAY_HOMEWORK_ONLY":
        result.tasks.push(generateTask("THURSDAY_HOMEWORK", graph));
        warningNodes.push({node, text:reasonText});
        break;
      case "SUNDAY_ASK":
        warningNodes.push({node, text:reasonText});
        break;
      case "EXAM_PRIORITY":
        warningNodes.push({node, text:reasonText});
        break;
      case "LOW_ENERGY":
        result.tasks.push(generateTask("LOW_ENERGY_TASK", graph));
        warningNodes.push({node, text:reasonText});
        if(node.caps) capTasks = node.caps.capTasks;
        break;
      case "HIGH_ENERGY":
        warningNodes.push({node, text:reasonText});
        break;
      case "HIGH_PRESSURE":
        warningNodes.push({node, text:reasonText});
        if(node.caps) capDur = node.caps.capDur;
        break;
      case "REDUCE_TASK":
        result.tasks = [generateTask("THREE_DAY_FAIL_TASK", graph)];
        result.message = reasonText;
        result.verdict = "GIẢM TẢI — PHÁ VÒNG LẶP FAIL";
        if(node.caps){ capTasks = node.caps.capTasks; lockTasks = node.caps.lockTasks; }
        break;
      case "LOW_COMPLETION_ASK":
        warningNodes.push({node, text:reasonText});
        break;
      case "MATH_FIRST":
        if(!lockTasks) result.tasks.push(generateTask("MATH_TASK", graph));
        warningNodes.push({node, text:reasonText});
        break;
      case "PHYSICS_MICRO":
        if(!lockTasks) result.tasks.push(generateTask("PHYSICS_TASK", graph));
        warningNodes.push({node, text:reasonText});
        break;
      case "TIME_BUDGET":
        result.timeBudgetMin = node.data.remainingMin;
        warningNodes.push({node, text:reasonText});
        break;
      case "RECOVERY_FROM_NOW":
        warningNodes.push({node, text:reasonText});
        break;
      case "ONE_BIG_WIN":
        if(result.tasks.length){
          const sorted = [...result.tasks].sort((a,b)=> (b.priority==="high")-(a.priority==="high"));
          result.bigWin = { label: sorted[0].name, why: reasonText };
        }
        break;
      case "MAX_TASKS_CAP":
        if(node.caps) hardCap = node.caps.hardCap;
        break;
    }
  }

  result.caps = {capDur, capTasks, lockTasks, hardCap, stopped};
  result.warningNodes = warningNodes;

  if(!result.verdict) result.verdict = result.tasks.length ? "KẾ HOẠCH HÔM NAY" : "KHÔNG CÓ TASK ĐẶC BIỆT";
  if(!result.message) result.message = result.tasks.length
    ? `Đây là ${result.tasks.length} việc cho hôm nay — không cần làm hết, cứ bắt đầu việc đầu tiên đã.`
    : "Không có gì cần ép hôm nay.";

  return {result, trace};
}

/* ── PLANNER ENGINE ──────────────────────────────────────────────────── */
const BUFFER_MIN = 10;

function applyCapsAndBudget(rawResult, ctx){
  const planningTrace = [];
  let tasks = [...rawResult.tasks];
  const {capDur, capTasks, hardCap} = rawResult.caps;
  const skippedTasks = [];

  if(capDur){
    tasks = tasks.map(t=>{
      if(t.dur>capDur){
        planningTrace.push({step:"CAP_DUR", detail:`"${t.name}" bị rút từ ${t.dur}' xuống ${capDur}' (TikTok cao hôm nay)`});
        return {...t, dur:capDur, why: t.why+" (đã rút ngắn do TikTok nhiều hôm nay)"};
      }
      return t;
    });
  }
  if(capTasks && tasks.length>capTasks){
    skippedTasks.push(...tasks.slice(capTasks).map(t=>({name:t.name, reason:`bị cắt vì giới hạn ${capTasks} task hôm nay (LOW_ENERGY/REDUCE_TASK)`})));
    planningTrace.push({step:"CAP_TASKS", detail:`Giữ lại ${capTasks}/${tasks.length} task theo cap của Rule Engine`});
    tasks = tasks.slice(0,capTasks);
  }
  if(hardCap && tasks.length>hardCap){
    skippedTasks.push(...tasks.slice(hardCap).map(t=>({name:t.name, reason:`bị cắt vì hard cap ${hardCap} task/ngày`})));
    planningTrace.push({step:"HARD_CAP", detail:`Giữ lại tối đa ${hardCap} task/ngày`});
    tasks = tasks.slice(0,hardCap);
  }

  const warningNodes = [...rawResult.warningNodes];
  if(ctx.availableMinutes !== null && ctx.availableMinutes !== undefined){
    let total=0; const kept=[];
    for(const t of tasks){
      if(total+t.dur<=ctx.availableMinutes){ kept.push(t); total+=t.dur; }
      else skippedTasks.push({name:t.name, reason:`không đủ thời gian rảnh còn lại (${ctx.availableMinutes}') để thêm task này`});
    }
    if(kept.length < tasks.length){
      const cutMsg = `Time Budget: cắt bớt ${tasks.length-kept.length} task vì tổng thời gian giao vượt quá ${ctx.availableMinutes} phút rảnh còn lại hôm nay.`;
      warningNodes.push({node:{kind:"TIME_BUDGET_CUT"}, text:cutMsg});
      planningTrace.push({step:"TIME_BUDGET_CUT", detail:cutMsg});
    }
    tasks = kept;
  }

  return {tasks, skippedTasks, warningNodes, planningTrace};
}

function buildSchedule(tasks, ctx){
  const order = {high:0, med:1, low:2};
  const ordered = [...tasks].sort((a,b)=> (order[a.priority]??2) - (order[b.priority]??2));

  const fixedEvents = ctx.fixedEvents || [];
  let cursor = parseTimeToMinutes(ctx.nowTime);
  const sleepAt = parseTimeToMinutes("22:30");
  const schedule = [];

  function minutesToHHMM(min){
    const h = Math.floor(min/60)%24, m = min%60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }
  function nextFixedEventAfter(t){
    return fixedEvents
      .map(e=>({...e, startMin:parseTimeToMinutes(e.start), endMin:parseTimeToMinutes(e.end)}))
      .filter(e=>e.endMin>t)
      .sort((a,b)=>a.startMin-b.startMin)[0] || null;
  }

  for(let i=0;i<ordered.length;i++){
    const task = ordered[i];
    let fe = nextFixedEventAfter(cursor);
    while(fe && cursor < fe.endMin && cursor + task.dur > fe.startMin){
      schedule.push({type:"fixed", name:fe.name, start:minutesToHHMM(Math.max(cursor,fe.startMin)), end:minutesToHHMM(fe.endMin)});
      cursor = fe.endMin;
      fe = nextFixedEventAfter(cursor);
    }
    if(cursor + task.dur > sleepAt) break;
    const start = cursor, end = cursor+task.dur;
    schedule.push({type:"task", name:task.name, priority:task.priority, start:minutesToHHMM(start), end:minutesToHHMM(end), dur:task.dur});
    cursor = end;
    if(i < ordered.length-1){
      const bufEnd = cursor+BUFFER_MIN;
      schedule.push({type:"buffer", name:"Buffer", start:minutesToHHMM(cursor), end:minutesToHHMM(bufEnd)});
      cursor = bufEnd;
    }
  }
  return schedule;
}

function computeConfidence(ctx, rawResult, regenCount){
  let score = 100;
  const reasons = [];
  if(ctx.homework === null || ctx.homework === undefined){ score -= 20; reasons.push("thiếu dữ liệu bài tập về nhà"); }
  if(ctx.event === "noData"){ score -= 30; reasons.push("không có check-in hôm nay"); }
  if(regenCount > 0){ score -= regenCount*10; reasons.push(`plan đã bị regenerate ${regenCount} lần trong ngày`); }
  const hasConflict = rawResult.graph.edges.some(e=>e.relation==="conflicts_with");
  if(hasConflict){ score -= 15; reasons.push("context có tín hiệu mâu thuẫn (vd năng lượng cao nhưng TikTok cũng cao)"); }
  if(ctx.availableMinutes !== null && ctx.availableMinutes < 30){ score -= 10; reasons.push("thời gian rảnh còn lại rất ít"); }
  score = Math.max(5, Math.min(100, score));
  return {score, reasons};
}

function buildRecoveryPlan(ctx, dayLog){
  if(!dayLog.length) return null;
  const version = dayLog.filter(e=>e.plannerOutput && e.plannerOutput.recoveryPlan).length + 1;
  return {
    version,
    label: version===1 ? "Recovery Plan" : `Recovery Plan v${version}`,
    reason: `Không dùng kế hoạch cũ — tính lại toàn bộ từ ${ctx.nowTime} vì đây là lần regenerate thứ ${dayLog.length} trong ngày.`
  };
}

function runPlannerEngine(ctx, rawResult, dayLog){
  const planningTrace = [];
  planningTrace.push({step:"CONTEXT_BUILDER", detail:`availableMinutes=${ctx.availableMinutes}, mentalState="${ctx.mentalState}", tiktokRisk="${ctx.tiktokRisk}", studyPressure="${ctx.studyPressure}"`});

  const {tasks, skippedTasks, warningNodes, planningTrace: capsTrace} = applyCapsAndBudget(rawResult, ctx);
  planningTrace.push(...capsTrace);

  const schedule = (!rawResult.caps.stopped && tasks.length) ? buildSchedule(tasks, ctx) : [];
  if(schedule.length) planningTrace.push({step:"SCHEDULE", detail:`Xếp ${tasks.length} task + ${ctx.fixedEvents.length} fixed event + buffer ${BUFFER_MIN}' giữa các task`});

  let oneBigWin = null;
  if(tasks.length){
    const sorted = [...tasks].sort((a,b)=> (b.priority==="high")-(a.priority==="high"));
    const bigWinReasonNode = rawResult.tasks.length ? rawResult.bigWin : null;
    oneBigWin = {
      label: sorted[0].name,
      why: (bigWinReasonNode && bigWinReasonNode.why) || `Đây là việc ưu tiên cao nhất trong ${tasks.length} task hôm nay — chỉ cần xong việc này, hôm nay vẫn tính là thành công tối thiểu.`
    };
    planningTrace.push({step:"ONE_BIG_WIN", detail:`Chọn "${oneBigWin.label}" làm One Big Win`});
  }

  const backupPlan = oneBigWin ? {
    label:"1 việc cực nhỏ thay thế (2-5 phút)",
    why:"Nếu không kịp làm One Big Win, chỉ cần làm 1 việc rất nhỏ để giữ chuỗi ngày không đứt — không thay thế One Big Win, chỉ là lưới an toàn."
  } : null;

  const reserveTime = ctx.availableMinutes !== null && ctx.availableMinutes !== undefined
    ? Math.max(0, ctx.availableMinutes - tasks.reduce((s,t)=>s+t.dur,0) - Math.max(0,tasks.length-1)*BUFFER_MIN)
    : null;

  const regenCount = dayLog.length;
  const recoveryPlan = ctx.recoveryNeeded ? buildRecoveryPlan(ctx, dayLog) : null;
  if(recoveryPlan) planningTrace.push({step:"RECOVERY_PLAN", detail:recoveryPlan.reason});

  const confidence = computeConfidence(ctx, rawResult, regenCount);
  planningTrace.push({step:"CONFIDENCE", detail:`${confidence.score}% — ${confidence.reasons.length ? confidence.reasons.join("; ") : "dữ liệu đầy đủ, không có mâu thuẫn"}`});

  const warnings = composeWarnings(warningNodes, rawResult.graph);

  return {
    schedule,
    oneBigWin,
    backupPlan,
    reserveTime,
    skippedTasks,
    regenerated: regenCount > 0,
    recoveryPlan,
    confidence,
    planningTrace,
    tasks,
    warnings
  };
}

/* ── PLAN REGENERATION (detection only — dayLog storage itself now lives
   in PlannerStorage, not here; this function is pure and just compares
   two entries, matching the sandbox's original detectRegenReason) ──── */
function detectRegenReason(prevEntry, ctx){
  if(!prevEntry) return null;
  const reasons = [];
  if(ctx.event === "slipped") reasons.push("em vừa báo lỡ thất bại giữa ngày kể từ plan trước");
  const timeDiff = parseTimeToMinutes(ctx.nowTime) - parseTimeToMinutes(prevEntry.ctx.nowTime);
  if(timeDiff > 120) reasons.push(`đã trôi qua khoảng ${Math.round(timeDiff/60)} giờ kể từ Plan trước (lúc ${prevEntry.ctx.nowTime}) — các mốc thời gian trong plan cũ không còn khớp thực tế nữa`);
  if(ctx.energy !== prevEntry.ctx.energy) reasons.push(`năng lượng thay đổi từ ${prevEntry.ctx.energy}/5 sang ${ctx.energy}/5`);
  if(ctx.tiktok !== prevEntry.ctx.tiktok) reasons.push(`TikTok tăng từ ${prevEntry.ctx.tiktok} lên ${ctx.tiktok} phút`);
  if(reasons.length === 0) reasons.push("check-in lại để cập nhật tình hình hiện tại");
  return `Đây là Plan mới, thay cho Plan lúc ${prevEntry.ctx.nowTime}, vì ${reasons.join("; ")}. Mục tiêu bây giờ không phải bám plan cũ cho "đúng", mà là kế hoạch khớp với thực tế ngay lúc này.`;
}

// ── Exposed surface — only orchestrator-level entry points ──
return {
  buildContext,
  generatePlan,
  runPlannerEngine,
  detectRegenReason,
  parseTimeToMinutes,
};

}

// ════════════════════════════════════════════════════════════════════════
// DATA BRIDGE — thin mapping layer between GiaBaoDashboard state and the
// AI Planner Core's `rawState` shape.
//
// SCOPE (per Gia Bảo's directive): this module does ONLY field-to-field
// mapping. It does NOT compute behavioral metrics (e.g. "recent",
// "completionRate"). Any field the Dashboard has no direct, unambiguous
// source for is left `null` so the check-in form asks the user directly
// instead of guessing.
//
// The only "computation" done here is a raw SUM (shortContent minutes),
// which is arithmetic aggregation of an already-explicit field, not
// behavioral inference — it does not decide what the number *means*.
//
// This module has ZERO knowledge of the AI Planner Core's rules, Context
// Builder, or anything past `rawState`. It never imports aiPlannerCore.js.
// ════════════════════════════════════════════════════════════════════════

const DAY_NAME_BY_JS_DOW = ["Chủ nhật","Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7"];

/**
 * Maps live Dashboard data to the raw, unprocessed fields the AI Planner
 * Core's `buildContext()` expects. Fields with no unambiguous Dashboard
 * source are left `null` — the Beta check-in form must ask the user for
 * these directly, never guess.
 *
 * @param {Object} params
 * @param {Object} params.todayData   - db[td] (today's `blank()`-shaped day record)
 * @param {string} params.td          - today's ISO date string, e.g. "2026-07-07"
 * @param {Date}   [params.now]       - injectable for testability; defaults to `new Date()`
 * @returns {Object} rawState-shaped object (some fields possibly null)
 */
function bridgeDashboardToRawState({ todayData, td, now }) {
  const nowDate = now || new Date();

  const hh = String(nowDate.getHours()).padStart(2, "0");
  const mm = String(nowDate.getMinutes()).padStart(2, "0");
  const nowTime = `${hh}:${mm}`;

  const day = DAY_NAME_BY_JS_DOW[nowDate.getDay()];

  // Raw SUM of an already-explicit field — arithmetic aggregation, not
  // behavioral inference. shortContent entries are {id, source, minutes, at}.
  const tiktok = Array.isArray(todayData?.shortContent)
    ? todayData.shortContent.reduce((sum, x) => sum + (x.minutes || 0), 0)
    : 0;

  return {
    nowTime,
    day,
    // No unambiguous Dashboard source for self-reported energy today —
    // left null, the check-in form asks the user directly.
    energy: null,
    // No unambiguous Dashboard source for "homework done" — left null.
    homework: null,
    tiktok,
    // "recent" (good/mixed/bad) and "completionRate" are BEHAVIORAL
    // METRICS, computed by a separate layer (see behaviorMetrics.js),
    // not here. Left null as a thin-bridge placeholder; the layer above
    // this one is responsible for filling them in before buildContext() runs.
    recent: null,
    completionRate: null,
    // "event" (wantsRest/slipped/noData/wantsOverride) is an explicit
    // user check-in signal for THIS run — always comes from the form,
    // never inferred from Dashboard data.
    event: "none",
    // No calendar/exam-date field currently exists in the Dashboard —
    // left null, the check-in form asks the user directly.
    daysToExam: null,
    // Free note is always user-typed per-run, never pulled from Dashboard.
    freeNote: "",
  };
}

// Exposed surface — nothing else from this module should be imported.
// (Kept as a plain function, not wrapped in an object, since it has no
// internal state to hide — unlike the Core and PlannerStorage, this
// layer has nothing that needs a private scope.)

// ════════════════════════════════════════════════════════════════════════
// BEHAVIOR METRICS LAYER — computes the two behavioral fields the Data
// Bridge deliberately leaves null: `recent` (good/mixed/bad) and
// `completionRate` (0-100).
//
// This is intentionally a SEPARATE module from the Data Bridge (per Gia
// Bảo's directive): the Bridge only does raw field mapping, this layer is
// where actual behavioral interpretation of history happens. It is also
// NOT part of the AI Planner Core's Context Builder — `buildContext()`
// in aiPlannerCore.js is untouched and still just receives a flat
// rawState object; it has no idea this layer exists.
//
// Definitions used here (explicit, so they're easy to review/adjust later
// without touching the Core or the Bridge):
//
//   completionRate(date) = round(min(100, dayExp(date) / targetXP * 100))
//     - Uses the Dashboard's own existing `dayExp(date)` (total XP earned
//       that day, already computed by dayExpFull()) and `setts.targetXP`
//       (default 150) as the 100% baseline. This reuses Dashboard's own
//       notion of a "good day" rather than inventing a new one.
//     - If a day has no record at all (never opened / no data), it's
//       treated as 0% for that day, not skipped — matches "not checking
//       in" being informative, not neutral.
//
//   recent(today) = classification of the last 3 FULL days before today
//     (i.e. yesterday, day-2, day-3 — not including today, since today
//     is still in progress and shouldn't count against itself):
//       "bad"   → all 3 days have completionRate < 30
//       "good"  → all 3 days have completionRate >= 70
//       "mixed" → anything else (the default / most common case)
//     These thresholds (30/70) are a first-pass judgment call, explicitly
//     called out here so Gia Bảo can tune them after seeing real data —
//     not hidden inside the Core or Bridge where they'd be harder to find.
// ════════════════════════════════════════════════════════════════════════

function isoDateMinusDays(isoDate, n) {
  const d = new Date(isoDate + "T00:00:00");
  d.setDate(d.getDate() - n);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

/**
 * @param {string} date       - ISO date, e.g. "2026-07-06"
 * @param {Object} db         - full Dashboard db object ({ [isoDate]: dayRecord })
 * @param {Function} dayExp   - Dashboard's own dayExp(date) => number
 * @param {number} targetXP   - Dashboard's own setts.targetXP (default 150)
 * @returns {number} 0-100, rounded
 */
function computeCompletionRateForDate(date, db, dayExp, targetXP) {
  const dayRecord = db?.[date];
  if (!dayRecord) return 0;
  const xp = dayExp(date) || 0;
  const target = targetXP || 150;
  const pct = Math.round(Math.min(100, (xp / target) * 100));
  return Math.max(0, pct);
}

/**
 * @param {string} td         - today's ISO date
 * @param {Object} db         - full Dashboard db object
 * @param {Function} dayExp   - Dashboard's own dayExp(date) => number
 * @param {number} targetXP   - Dashboard's own setts.targetXP
 * @returns {{ recent: "good"|"mixed"|"bad", completionRate: number, _debug: Object }}
 */
function computeBehaviorMetrics({ td, db, dayExp, targetXP }) {
  const y1 = isoDateMinusDays(td, 1); // yesterday
  const y2 = isoDateMinusDays(td, 2);
  const y3 = isoDateMinusDays(td, 3);

  const rates = [y1, y2, y3].map(date => computeCompletionRateForDate(date, db, dayExp, targetXP));
  const [r1, r2, r3] = rates;

  let recent = "mixed";
  if (rates.every(r => r < 30)) recent = "bad";
  else if (rates.every(r => r >= 70)) recent = "good";

  // "completionRate" fed to the Core is defined as *yesterday's* rate —
  // matches the sandbox's own field meaning ("% hoàn thành kế hoạch gần
  // nhất" = most recent completed day, i.e. yesterday, not today which
  // isn't finished yet).
  const completionRate = r1;

  return {
    recent,
    completionRate,
    _debug: { y1, y2, y3, rates }, // kept for the Beta UI's optional debug view; not consumed by the Core
  };
}

// ════════════════════════════════════════════════════════════════════════
// PLANNER STORAGE — the single I/O gateway for all AI Planner persisted
// data. Per Gia Bảo's directive: nowhere else in the AI Planner Beta code
// should call `S.get`/`S.set` directly for planner data. If storage ever
// moves off `S` (IndexedDB, cloud sync, etc.), only this file changes.
//
// Storage keys (namespaced under v25: to mark this as new-in-v25 data,
// consistent with the Dashboard's existing key naming like "boss:history"):
//
//   v25:aiPlanner:today
//     { schemaVersion: 1, date: "YYYY-MM-DD", entries: [entry, ...] }
//
//   v25:aiPlanner:history
//     { schemaVersion: 1, days: [ { date: "YYYY-MM-DD", entries: [...] }, ... ] }
//     Rolling window: only the last 30 calendar days are kept. Enforced by
//     cleanup(), always called right after rotateDay() pushes a day in.
//
//   v25:aiPlanner:settings
//     { schemaVersion: 1 }   — placeholder for future AI Planner config.
//
// entry shape (unchanged from the sandbox's dayLog entries, PLUS two new
// bookkeeping fields added only by appendEntry — the Core never sees or
// needs `id`/`createdAt`, it only consumes the array as `dayLog`):
//   { id, createdAt, ctx, result, trace, regenReason, plannerOutput }
//
// This module has ZERO knowledge of the AI Planner Core's logic — it only
// moves opaque `entry` objects in and out of storage. It never imports
// aiPlannerCore.js.
// ════════════════════════════════════════════════════════════════════════

const AIPLANNER_SCHEMA_VERSION = 1;
const AIPLANNER_HISTORY_MAX_DAYS = 30;

const KEY_TODAY = "v25:aiPlanner:today";
const KEY_HISTORY = "v25:aiPlanner:history";
const KEY_SETTINGS = "v25:aiPlanner:settings";

function blankToday(dateISO) {
  return { schemaVersion: AIPLANNER_SCHEMA_VERSION, date: dateISO, entries: [] };
}
function blankHistory() {
  return { schemaVersion: AIPLANNER_SCHEMA_VERSION, days: [] };
}
function blankSettings() {
  return { schemaVersion: AIPLANNER_SCHEMA_VERSION };
}

function daysBetween(isoA, isoB) {
  const a = new Date(isoA + "T00:00:00");
  const b = new Date(isoB + "T00:00:00");
  return Math.round((a - b) / 86400000);
}

/**
 * @param {Object} S - the Dashboard's existing storage adapter ({get,set,list,del})
 */
function createPlannerStorage(S) {

  async function loadToday(dateISO) {
    try {
      const raw = await S.get(KEY_TODAY);
      if (!raw || raw === "null") return blankToday(dateISO);
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.schemaVersion !== AIPLANNER_SCHEMA_VERSION) return blankToday(dateISO);
      return parsed;
    } catch {
      return blankToday(dateISO);
    }
  }

  async function saveToday(today) {
    await S.set(KEY_TODAY, JSON.stringify(today));
  }

  async function loadHistory() {
    try {
      const raw = await S.get(KEY_HISTORY);
      if (!raw || raw === "null") return blankHistory();
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.schemaVersion !== AIPLANNER_SCHEMA_VERSION || !Array.isArray(parsed.days)) return blankHistory();
      return parsed;
    } catch {
      return blankHistory();
    }
  }

  async function saveHistory(history) {
    await S.set(KEY_HISTORY, JSON.stringify(history));
  }

  async function loadSettings() {
    try {
      const raw = await S.get(KEY_SETTINGS);
      if (!raw || raw === "null") return blankSettings();
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.schemaVersion !== AIPLANNER_SCHEMA_VERSION) return blankSettings();
      return parsed;
    } catch {
      return blankSettings();
    }
  }

  async function saveSettings(settings) {
    await S.set(KEY_SETTINGS, JSON.stringify({ ...settings, schemaVersion: AIPLANNER_SCHEMA_VERSION }));
  }

  /** Keeps only the last AIPLANNER_HISTORY_MAX_DAYS calendar days, relative to todayISO. */
  async function cleanup(todayISO) {
    const history = await loadHistory();
    const kept = history.days.filter(d => {
      const age = daysBetween(todayISO, d.date);
      return age >= 0 && age <= AIPLANNER_HISTORY_MAX_DAYS;
    });
    if (kept.length !== history.days.length) {
      await saveHistory({ ...history, days: kept });
    }
  }

  /**
   * Call on mount / whenever the tab is opened. If the stored "today"
   * bucket is for a previous calendar day, archives it into history and
   * starts a fresh "today" bucket for todayISO. No-ops if already current.
   * Always followed by cleanup() so history never exceeds the 30-day window.
   *
   * @returns {Object} the current (possibly freshly-rotated) `today` bucket
   */
  async function rotateDay(todayISO) {
    const today = await loadToday(todayISO);
    if (today.date === todayISO) {
      return today; // already current, nothing to rotate
    }

    // Archive the stale bucket into history (only if it actually has entries —
    // no point archiving empty days).
    if (today.entries.length > 0) {
      const history = await loadHistory();
      const days = [...history.days, { date: today.date, entries: today.entries }];
      await saveHistory({ ...history, days });
    }

    await cleanup(todayISO);

    const fresh = blankToday(todayISO);
    await saveToday(fresh);
    return fresh;
  }

  /**
   * Appends a new planner run to today's entries, assigning `id` and
   * `createdAt`. Returns the updated `today` bucket.
   */
  async function appendEntry(todayISO, entry) {
    const today = await loadToday(todayISO);
    const withMeta = {
      id: (typeof crypto !== "undefined" && crypto.randomUUID) ? crypto.randomUUID() : `plan_${Date.now()}_${Math.random().toString(36).slice(2)}`,
      createdAt: Date.now(),
      ...entry,
    };
    const updated = { ...today, date: todayISO, entries: [...today.entries, withMeta] };
    await saveToday(updated);
    return updated;
  }

  /** Manual reset — mirrors the sandbox's "Bắt đầu ngày mới" button, but
   *  also archives into history first instead of just discarding, since
   *  Beta persists (unlike the sandbox's in-memory dayLog). */
  async function startNewDayManually(todayISO) {
    const today = await loadToday(todayISO);
    if (today.entries.length > 0) {
      const history = await loadHistory();
      const days = [...history.days, { date: today.date, entries: today.entries }];
      await saveHistory({ ...history, days });
    }
    await cleanup(todayISO);
    const fresh = blankToday(todayISO);
    await saveToday(fresh);
    return fresh;
  }

  return {
    loadToday,
    saveToday,
    loadHistory,
    saveHistory,
    loadSettings,
    saveSettings,
    cleanup,
    rotateDay,
    appendEntry,
    startNewDayManually,
  };
}

// ════════════════════════════════════════════════════════════════════════
// [PATCH v30] enrichTasksWithContext — hậu xử lý result.tasks SAU KHI
// core.generatePlan() đã chạy xong. KHÔNG sửa aiPlannerCore.js, KHÔNG sửa
// ctx/trace — chỉ nhận result (đã đóng băng) làm input và trả về 1 bản
// result MỚI với tasks đã được làm giàu. Mọi logic ở đây thuần là lớp phủ
// bên ngoài Core, dùng lại field/shape mà Core đã định nghĩa
// (name/dur/priority/why/doneWhen) — không phát minh field mới cho Core.
//
//   a) deadlinePlan (nếu có, đọc từ v25:deadlinePlan qua caller truyền
//      vào — hàm này KHÔNG tự gọi S.get) → chèn 1 task "Làm sự kiện" với
//      dur tính từ remainingHours/daysLeft, cộng dồn phần dư ngày hôm
//      trước nếu có (deadlinePlan.carryOverMinutes).
//   b) homework === false → đẩy 1 task "Học bài" lên đầu danh sách,
//      priority "high" (chỉ đẩy nếu Core chưa tự có sẵn task học tương tự
//      ở đầu, tránh trùng lặp — Core vốn đã ưu tiên MATH_TASK/PHYSICS_TASK
//      khi homework chưa xong, nên trường hợp thường gặp là no-op).
//   c) task "Ngủ đủ giấc hôm nay" (dur:0, tín hiệu rest-first của Core) →
//      thay bằng 1 việc nhẹ 5-10 phút từ RECOVERY_TASKS, chọn theo ngày
//      (deterministic) — vẫn giữ tinh thần "nhẹ, không ép", chỉ để không
//      hiển thị dur:0 trống trong SmartSchedule.
//   d) nếu tasks.length < 3 và có taskPool → bổ sung thêm task từ
//      diversifyTasksWithPool() (hàm đã có sẵn, không viết lại) cho đủ đa
//      dạng, ưu tiên task lâu chưa xuất hiện.
function enrichTasksWithContext(result, ctx, db, td, setts, taskPool, deadlinePlan, formGoalMode) {
  if (!result || !Array.isArray(result.tasks)) return result;
  let tasks = [...result.tasks];

  // (a) Sự kiện có deadline — chia nhỏ đều theo số ngày còn lại.
  if (deadlinePlan && deadlinePlan.remainingHours > 0) {
    const today = new Date(td + "T00:00:00");
    const target = new Date(deadlinePlan.targetDate);
    const daysLeft = Math.max(1, daysBetween(today, target));
    const carryMin = Math.max(0, deadlinePlan.carryOverMinutes || 0);
    const baseMin = Math.round((deadlinePlan.remainingHours * 60) / daysLeft);
    const dur = Math.max(10, baseMin + carryMin);
    tasks.push({
      name: `Làm sự kiện: ${deadlinePlan.label}`, dur, priority: "high",
      why: `Còn ${daysLeft} ngày đến "${deadlinePlan.label}", cần ${deadlinePlan.remainingHours}h nữa → chia đều mỗi ngày ~${Math.round(baseMin/60*10)/10}h.`
        + (carryMin > 0 ? ` Hôm qua chưa làm đủ, cộng dồn thêm ${carryMin} phút vào hôm nay.` : ""),
      doneWhen: `Làm đủ ${Math.round(dur)} phút cho sự kiện này hôm nay.`,
    });
  }

  // (b) Bài tập chưa xong — đảm bảo có 1 task "Học bài" ở đầu, không trùng
  // với task học Core đã tự sinh (khớp gần đúng theo từ khoá "bài tập"/"Toán"/"Lý").
  if (ctx?.homeworkStatus === "chưa xong") {
    const hasHomeworkTask = tasks.some(t => /bài tập|toán|lý/i.test(t.name || ""));
    if (!hasHomeworkTask) {
      tasks.unshift({
        name: "Học bài (bài tập chưa xong)", dur: 30, priority: "high",
        why: "Bài tập hôm nay chưa xong — ưu tiên làm trước khi chuyển sang việc khác.",
        doneWhen: "Làm xong phần bài tập còn thiếu, hoặc ít nhất các câu tự tin làm được.",
      });
    }
  }

  // (c) Thay task rest-signal (dur:0, "Ngủ đủ giấc hôm nay") bằng 1 việc
  // nhẹ có ý nghĩa — KHÔNG đổi tinh thần "ưu tiên nghỉ", chỉ đổi hiển thị.
  const RECOVERY_TASKS = [
    "Uống 1 cốc nước đầy", "Đi bộ nhẹ 5 phút quanh nhà", "Vươn vai + hít thở sâu 5 phút",
    "Dọn gọn 1 góc bàn học", "Nghe 1 bài nhạc yêu thích, không làm gì khác",
  ];
  tasks = tasks.map(t => {
    if (t.name === "Ngủ đủ giấc hôm nay" && (t.dur || 0) === 0) {
      const idx = Math.abs(hashStr(td)) % RECOVERY_TASKS.length;
      return { ...t, name: RECOVERY_TASKS[idx], dur: 5 + (idx % 2) * 5,
        doneWhen: "Làm xong việc nhẹ này — không cần gì thêm, hôm nay ưu tiên phục hồi." };
    }
    return t;
  });

  // (d) Bổ sung task từ taskPool nếu danh sách còn ít hơn 3.
  // [PATCH v30 fix] goalMode KHÔNG có trong ctx (buildContext không giữ
  // field này — nó chỉ tồn tại trên rawState/form ở lớp UI, xem
  // MOOD_CHIPS). Nhận trực tiếp qua tham số formGoalMode thay vì đọc
  // ctx.goalMode (luôn undefined, sẽ luôn fallback "study" một cách âm
  // thầm và sai) — caller (runAiPlannerPipeline) truyền form.goalMode vào.
  if (tasks.length < 3 && Array.isArray(taskPool) && taskPool.length) {
    const extra = diversifyTasksWithPool({
      taskPool, goalMode: formGoalMode || "study", energy: ctx?.energy,
      tiktokMin: ctx?.tiktok || 0, historyByPoolId: {}, date: td,
      count: 3 - tasks.length, skipCountByTaskId: {},
    });
    extra.forEach(t => {
      tasks.push({ name: t.l, dur: Math.max(10, Math.round((t.e || TP_XP) * 2)), priority: t.priority || "med",
        why: t.why || "Bổ sung từ Kho việc nhỏ cho đa dạng hôm nay.", doneWhen: `Hoàn thành "${t.l}".` });
    });
  }

  return { ...result, tasks };
}

// [PATCH v30] hashStr — hash chuỗi nhỏ, deterministic, dùng để chọn
// RECOVERY_TASKS theo ngày (không random thật, cùng 1 ngày luôn ra cùng 1
// task nếu "Làm lại" được bấm nhiều lần).
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i); h |= 0; }
  return h;
}

// ════════════════════════════════════════════════════════════════════════
// AI PLANNER PIPELINE (shared orchestrator) — MECHANICAL EXTRACTION ONLY.
//
// This is the exact sequence that previously lived inline inside
// AIPlannerBeta's handleRun(): rawState → core.buildContext →
// core.generatePlan → core.runPlannerEngine → core.detectRegenReason →
// storage.appendEntry. Not one line of that sequence, its order, its
// argument shapes, or its return shape has changed — this function only
// gives that existing sequence a name and a single home, so any future
// caller (e.g. a Morning Widget "Quick Mode") reuses it instead of
// duplicating orchestration.
//
// RULE FOR THIS FUNCTION: orchestration only. It must never itself contain
// Rule Engine / Decision Graph / Context Builder / Reason Generator /
// Planner Engine logic — those stay exclusively inside aiPlannerCore.js,
// untouched. It must never read/write storage directly except through the
// same `storage.appendEntry` call AIPlannerBeta already made.
//
// [PATCH v30] Added optional {db, setts, taskPool, deadlinePlan} params,
// all default-undefined/no-op when omitted (so existing call sites that
// don't pass them keep working unchanged). When provided, result.tasks is
// passed through enrichTasksWithContext() AFTER core.generatePlan()
// returns — enrichment never touches ctx/trace, never re-enters the Core,
// and is skippable by construction.
//
// Inputs/outputs (unchanged contract vs. the old inline code):
//   @param {Object} core     - result of createAIPlannerCore()
//   @param {Object} storage  - result of createPlannerStorage(S)
//   @param {string} td       - today's ISO date
//   @param {Object} form     - the rawState-shaped check-in form values
//   @param {Array}  dayLog   - today.entries array (possibly empty)
//   @returns {Promise<Object>} the updated `today` bucket (same shape
//            storage.appendEntry always returned)
// Throws on failure exactly like the old inline try-block's contents would
// have (before being caught by the caller's own try/catch) — this function
// does not add or remove any error handling; that stays the caller's job,
// exactly as it was.
// ════════════════════════════════════════════════════════════════════════
async function runAiPlannerPipeline({ core, storage, td, form, dayLog, db, setts, taskPool, deadlinePlan }) {
  const rawState = { ...form };
  const ctx = core.buildContext(rawState);
  let { result, trace } = core.generatePlan(ctx);
  // [PATCH v30] enrichment layer — no-op unless db/taskPool/deadlinePlan given.
  if (db || taskPool || deadlinePlan) {
    result = enrichTasksWithContext(result, ctx, db, td, setts, taskPool, deadlinePlan, form.goalMode);
  }
  const plannerOutput = core.runPlannerEngine(ctx, result, dayLog);
  const prevEntry = dayLog.length ? dayLog[dayLog.length - 1] : null;
  const regenReason = core.detectRegenReason(prevEntry, ctx);

  const updatedToday = await storage.appendEntry(td, { ctx, result, trace, regenReason, plannerOutput });
  return updatedToday;
}

// ════════════════════════════════════════════════════════════════════════
// AI PLANNER ERROR BOUNDARY — new, standalone. The Dashboard currently has
// NO error boundary anywhere (verified by scanning the whole v25 file), so
// this is the first one. It wraps ONLY the AI Planner Beta tab content —
// nothing else in the Dashboard is touched or affected by this file.
//
// If AIPlannerBeta throws for any reason (bad data shape, a core function
// throwing, a storage read failing in an unexpected way, etc.), this
// boundary catches it and shows a small inline fallback instead of taking
// down the whole app. The rest of the Dashboard (other 11 tabs) keeps
// working normally regardless of what happens inside this boundary.
// ════════════════════════════════════════════════════════════════════════

class AIPlannerErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, info) {
    // Log only — never let this throw further.
    try { console.error("[AI Planner Beta] crashed:", error, info); } catch {}
  }

  handleRetry = () => {
    this.setState({ hasError: false, error: null });
  };

  render() {
    if (this.state.hasError) {
      const theme = this.props.theme || {};
      return (
        <div style={{
          padding: 20,
          borderRadius: 12,
          background: theme.surface || "#1a1a1a",
          border: `1px solid ${theme.danger || "#EF4444"}`,
          color: theme.text || "#fff",
          textAlign: "center",
        }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>🤖⚠️</div>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>AI Planner đang gặp lỗi</div>
          <div style={{ fontSize: 13, color: theme.textDim || "#999", marginBottom: 14 }}>
            Đây là tính năng Beta, có thể chưa ổn định. Các tab khác của Dashboard vẫn hoạt động bình thường.
          </div>
          <button
            onClick={this.handleRetry}
            style={{
              padding: "8px 18px",
              borderRadius: 999,
              border: "none",
              background: theme.primary || "#4F8CF7",
              color: "#fff",
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            Thử lại
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

              <span>{b.start}–{b.end}</span>
              <span>{b.name}{b.type === "buffer" ? " (nghỉ)" : ""}</span>

        <div style={{ fontSize: 11, color: theme.textDim, marginBottom: 8, lineHeight: 1.5 }}>
          {plannerOutput.warnings.map((w, i) => <div key={i} style={{ marginBottom: 4 }}>{w}</div>)}

          {plannerOutput.skippedTasks.map((s, i) => <div key={i}>✂️ {s.name} — {s.reason}</div>)}

      <div style={{ fontSize: 11, color: theme.textDim, display: "flex", justifyContent: "space-between", marginTop: 6 }}>
        <span>Độ tin cậy: {plannerOutput.confidence.score}%</span>

// ── V24: thuật toán chọn 5 việc nhỏ mỗi ngày ──
// Ưu tiên: task lâu chưa xuất hiện (lastPickedAt càng cũ càng ưu tiên) + tránh lặp liên tục hôm qua.
// Deterministic theo ngày (seed = date) để cùng ngày reload vẫn ra kết quả giống nhau,
// nhưng vẫn "ngẫu nhiên" theo nghĩa người dùng không đoán trước được, và đổi khác mỗi ngày.
function seededRandom(seedStr) {
  let h = 0;
  for (let i=0;i<seedStr.length;i++){ h = (h*31 + seedStr.charCodeAt(i)) >>> 0; }
  return function next(){ h = (h*1103515245 + 12345) >>> 0; return (h % 100000) / 100000; };
}
function pickDailyTasks(pool, date, historyByPoolId, yesterdayPicks=[], count=5) {
  const active = (pool||[]).filter(t=>!t.hidden);
  if(active.length<=count) return active.map(t=>t.id);
  const rnd = seededRandom(date);
  // điểm ưu tiên: càng lâu chưa xuất hiện càng cao; vừa xuất hiện hôm qua thì bị giảm điểm (tránh lặp liên tục)
  const scored = active.map(t=>{
    const hist = historyByPoolId?.[t.id];
    const daysSince = hist ? Math.max(0, Math.round((new Date(date)-new Date(hist))/86400000)) : 9999;
    const wasYesterday = yesterdayPicks.includes(t.id) ? -50 : 0;
    const score = Math.min(daysSince, 60) + wasYesterday + rnd()*15; // nhiễu ngẫu nhiên nhẹ để không cứng nhắc
    return { id:t.id, score };
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,count).map(s=>s.id);
}

// Ưu tiên: lastPickedAt càng cũ (hoặc null = chưa từng chọn) càng ưu tiên,

// có nhiễu ngẫu nhiên nhẹ để không cứng nhắc lặp đúng 1 thứ tự mỗi lần.
function pickBigGoalForToday(goalPool, td) {
  const pool = (goalPool||[]).filter(g=>g && g.text);
  if(!pool.length) return null;
  const rnd = seededRandom("biggoal:"+td);
  const scored = pool.map(g=>{
    const daysSince = g.lastPickedAt
      ? Math.max(0, Math.round((new Date(td)-new Date(g.lastPickedAt))/86400000))
      : 9999; // chưa từng chọn → ưu tiên cao nhất
    const neverPickedBonus = g.lastPickedAt ? 0 : 40;
    const lowDoneBonus = (g.doneCount||0) < 3 ? 15 : 0;
    const score = Math.min(daysSince, 90) + neverPickedBonus + lowDoneBonus + rnd()*10;
    return { g, score };
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored[0].g;
}

// [PATCH] ── SKIP HISTORY — AI học từ việc bỏ qua task ─────────────────────
// storage key: v25:skipHistory → JSON array tối đa 500 record gần nhất:
//   { taskId, taskName, date, reason: "manual_skip"|"timeout", timestamp }
// Đây là module I/O độc lập, không đụng vào aiPlannerCore.js — chỉ đọc/ghi
// qua S.get/S.set giống PlannerStorage, dùng riêng cho lớp UI DailySchedule.
const SKIP_HISTORY_KEY = "v25:skipHistory";
const SKIP_HISTORY_MAX = 500;

async function loadSkipHistory() {
  try {
    const raw = await S.get(SKIP_HISTORY_KEY);
    if(!raw || raw==="null") return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

async function recordSkip(taskId, taskName, reason="manual_skip", date) {
  const list = await loadSkipHistory();
  const entry = {
    taskId, taskName,
    date: date || new Date().toISOString().split("T")[0],
    reason,
    timestamp: new Date().toISOString(),
  };
  const next = [...list, entry].slice(-SKIP_HISTORY_MAX); // giữ tối đa 500 record gần nhất
  try { await S.set(SKIP_HISTORY_KEY, JSON.stringify(next)); } catch {}
  return next;
}

// analyzeSkipHistory(taskId, days=7) — phân tích lịch sử bỏ qua của 1 task
// trong X ngày gần nhất, trả về { shouldReduce, shouldIncrease, reason, skipCount }
//   - skip >= 3 lần trong `days` ngày → shouldReduce:true (hạ ưu tiên, chuyển
//     xuống cuối lịch trình)
//   - skip 1-2 lần → shouldIncrease:true (nhắc lại sớm hơn — dành cho task
//     priority:"high" bị bỏ qua ít lần vẫn cần nhắc gấp)
function analyzeSkipHistoryFromList(skipList, taskId, days=7) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate()-days);
  const recent = (skipList||[]).filter(s=>s.taskId===taskId && new Date(s.date) >= cutoff);
  const skipCount = recent.length;
  if(skipCount>=3){
    return { shouldReduce:true, shouldIncrease:false, skipCount,
      reason:`Task này đã bị bỏ qua ${skipCount} lần trong ${days} ngày → mình chuyển xuống cuối danh sách.` };
  }
  if(skipCount>=1){
    return { shouldReduce:false, shouldIncrease:true, skipCount,
      reason:`Task này bị bỏ qua ${skipCount} lần gần đây → mình sẽ nhắc lại sớm hơn.` };
  }
  return { shouldReduce:false, shouldIncrease:false, skipCount:0, reason:null };
}

// Convenience wrapper matching the spec's async signature — loads history
// from storage itself. Prefer analyzeSkipHistoryFromList() when a list is
// already in hand (e.g. inside a component that loaded it once) to avoid
// redundant S.get() calls per task.
async function analyzeSkipHistory(taskId, days=7) {
  const list = await loadSkipHistory();
  return analyzeSkipHistoryFromList(list, taskId, days);
}

// [PATCH] computeSkipCountByTaskId — gộp skipHistory thành {[taskId]:count}
// trong X ngày gần nhất, dùng làm input skipCountByTaskId cho
// diversifyTasksWithPool() (MỤC 5 — task skip nhiều thì giảm tần suất).
function computeSkipCountByTaskId(skipList, days=7) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate()-days);
  const out = {};
  (skipList||[]).forEach(s=>{
    if(new Date(s.date) >= cutoff){
      out[s.taskId] = (out[s.taskId]||0) + 1;
    }
  });
  return out;
}

// V24: Legacy achievement freeze — các achievement dựa trên id TASKS cố định (math/swim/sleep/recall...)
// KHÔNG còn ý nghĩa sau khi Kho việc nhỏ thay thế TASKS cố định trên giao diện Today.
// Ta KHÔNG xoá achievement hay lịch sử đã mở — chỉ "đóng băng" kết quả tại đúng thời điểm migration:
// nếu đã true trước migration → mãi mãi true (giữ huy hiệu). Nếu chưa true → mãi mãi false (không mở mới).
// _legacyFrozenSnapshot được set 1 lần bởi App khi chạy migration (xem hàm runV24Migration).
let _legacyFrozenSnapshot = null; // {[achId]: boolean} | null (null = chưa migrate, chạy check() sống bình thường)
const setLegacyFrozenSnapshot = snap => { _legacyFrozenSnapshot = snap; };
const legacyCheck = (id, liveCheckFn) => (db,str,txp) => {
  if(_legacyFrozenSnapshot && typeof _legacyFrozenSnapshot[id]==="boolean") return _legacyFrozenSnapshot[id];
  return liveCheckFn(db,str,txp);
};
const LEGACY_ACHIEVEMENT_IDS = ["srank","4sub","swimmer","swimmer100","allTasks","reader27","reader100","nightowl","comeback","perfectionist"];

// ── V24: MIGRATION ──
// Chạy đúng 1 lần, lần đầu app mở sau khi cập nhật lên V24. KHÔNG đụng vào db/streak/xp/timeline/
// finance/knowledge graph/knowledge bank/AI Insight/achievement đã mở — chỉ:
//  1) tạo Kho việc nhỏ mặc định (TASK_POOL_SEED) nếu chưa có,
//  2) tạo Kho mục tiêu lớn rỗng nếu chưa có,
//  3) đóng băng (freeze) các achievement "legacy" tại đúng trạng thái hiện tại,
//  4) đánh dấu đã migrate để không chạy lại lần sau.
async function runV24Migration(db, str, txp) {
  try {
    const already = await S.get(V24_MIGRATION_KEY);
    if (already && already !== "null") {
      // đã migrate trước đó — vẫn phải nạp lại frozen snapshot vào bộ nhớ (vì nó là biến module, mất khi reload)
      try {
        const snap = await S.get("v24:legacyFrozenSnapshot");
        if (snap && snap !== "null") setLegacyFrozenSnapshot(JSON.parse(snap));
      } catch {}
      return { migrated:false };
    }

    // 1) Kho việc nhỏ — seed mặc định, chỉ nếu chưa tồn tại
    const existingPool = await S.get(TASK_POOL_KEY);
    if (!existingPool || existingPool === "null") {
      await S.set(TASK_POOL_KEY, JSON.stringify(TASK_POOL_SEED));
    }
    // 2) Kho mục tiêu lớn — rỗng nếu chưa có
    const existingGoals = await S.get(GOAL_POOL_KEY);
    if (!existingGoals || existingGoals === "null") {
      await S.set(GOAL_POOL_KEY, JSON.stringify([]));
    }
    // 3) Đóng băng achievement legacy tại đúng thời điểm này
    const snapshot = {};
    for (const id of LEGACY_ACHIEVEMENT_IDS) {
      const ach = ACHIEVEMENTS.find(a=>a.id===id);
      if (!ach) continue;
      // gọi check() khi _legacyFrozenSnapshot còn null → chạy logic "sống" gốc để lấy đúng trạng thái hiện tại
      try { snapshot[id] = !!ach.check(db, str, txp); } catch { snapshot[id] = false; }
    }
    setLegacyFrozenSnapshot(snapshot);
    await S.set("v24:legacyFrozenSnapshot", JSON.stringify(snapshot));

    // 4) Đánh dấu đã migrate
    await S.set(V24_MIGRATION_KEY, new Date().toISOString());
    return { migrated:true };
  } catch (e) {
    console.error("V24 migration lỗi:", e);
    return { migrated:false, error:true };
  }
}

// 5 âm cơ bản: tick task, gain XP, level up, chuyển tab, backup thành công.
// Âm lượng nhỏ, có thể tắt qua setts.soundOn (mặc định true).
let _gbAudioCtx = null;
const _getAudioCtx = () => {
  if (typeof window === "undefined") return null;
  if (!_gbAudioCtx) {
    try { _gbAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
  }
  return _gbAudioCtx;
};
const _playTone = (freqs, {dur=0.09, gain=0.05, type="sine", gap=0.05} = {}) => {
  const ctx = _getAudioCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") ctx.resume().catch(()=>{});
  freqs.forEach((f, idx) => {
    const t0 = ctx.currentTime + idx*gap;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
  });
};

// MEDIA SYSTEM — module-level ref so the global playSound() (called from many
// components deep in the tree) can reach current Media Settings SFX without
// every caller needing to be rewired through props/context. useMediaSettings
// keeps this ref in sync with the latest saved settings.
let _gbMediaSettingsRef = null;
const setMediaSettingsRef = s => { _gbMediaSettingsRef = s; };
let _gbEventAudioRef = null;
// playEventMusic: phát nhạc theo sự kiện (level up / boss win / capsule) —
// module-level như playSound() để các component sâu trong cây (Hdr,
// BossFight, HanhTrinh) gọi được mà không cần prop drilling MediaContext.
const playEventMusic = async (eventName) => {
  const data = _gbMediaSettingsRef?.eventMusic?.[eventName];
  if (!data) return;
  const url = resolveMediaUrl(data);
  try {
    if (_gbEventAudioRef) _gbEventAudioRef.pause();
    // Fetch-as-blob trước để né CORS, giống BGM/SFX; fallback về URL gốc nếu
    // fetch lỗi (fetchAsBlobUrl trả data: nguyên vẹn ngay cho Base64).
    const { blobUrl } = await fetchAsBlobUrl(url);
    const audio = new Audio(blobUrl || url);
    audio.loop = false;
    audio.volume = (_gbMediaSettingsRef?.muted ? 0 : (_gbMediaSettingsRef?.volume?.bgm ?? 30)) / 100;
    audio.play().catch(()=>{});

// P-03: reusable debounced-save hook for text inputs
// Returns [localVal, setLocalVal] — writes to storage only after `delay` ms idle
function useDebounceField(externalVal, onSave, delay=1500) {
  const [val, setVal] = useState(externalVal);
  const timerRef = useRef(null);
  const savedRef = useRef(externalVal);
  // sync when external value changes (e.g. day switch in CalTab)
  useEffect(() => {
    if (externalVal !== savedRef.current) {
      setVal(externalVal);
      savedRef.current = externalVal;
    }
  }, [externalVal]);
  // BUGFIX (MỤC 9): pendingRef theo dõi giá trị mới nhất CHƯA kịp lưu (còn
  // trong debounce). Trước đây cleanup lúc unmount chỉ clearTimeout mà
  // không thực sự gọi onSave — nghĩa là nếu người dùng gõ journal rồi
  // chuyển tab trong vòng `delay` ms, nội dung gõ dở bị MẤT hoàn toàn dù
  // comment ghi "flush on unmount". Giờ cleanup gọi onSave thật sự với giá
  // trị pending gần nhất nếu có. onSaveRef giữ closure MỚI NHẤT của onSave
  // (props có thể đổi identity mỗi render, vd trường hợp đổi ngày lúc nửa
  // đêm) để tránh gọi nhầm closure cũ tại thời điểm cleanup.
  const pendingRef = useRef(null);
  const onSaveRef = useRef(onSave);
  onSaveRef.current = onSave;
  const change = (newVal) => {
    setVal(newVal);
    pendingRef.current = newVal;
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      savedRef.current = newVal;
      pendingRef.current = null;
      onSaveRef.current(newVal);
    }, delay);
  };
  // flush on unmount so switching tabs doesn't lose pending text
  useEffect(() => () => {
    clearTimeout(timerRef.current);
    if (pendingRef.current !== null && pendingRef.current !== savedRef.current) {
      onSaveRef.current(pendingRef.current);
    }
  }, []);
  return [val, change];
}

// V25 MỤC 2: ctx (optional) = {str, finTxs} — cho phép challenge mới (tài chính/streak) truy cập
// dữ liệu ngoài object ngày. Khi gọi dayExpFull mà không truyền ctx (code cũ), các challenge cần
// ctx tự trả về false một cách an toàn (xem check() của từng challenge — không throw, không crash).
const dayExpFull = (d, date, ctx) => {

  // V24: XP từ chuẩn bị ngày mai — tạo (+5, tính vào NGÀY TẠO qua tomorrowDraft) và hoàn thành (+5, tính vào NGÀY TICK qua tomorrowPrep.doneAt)
  const prepCreateXp = d.tomorrowDraft?.text ? 5 : 0;
  const prepDoneXp = d.tomorrowPrep?.doneAt ? 5 : 0;
  const prepXp = prepCreateXp + prepDoneXp;
  // V24: XP từ mục tiêu lớn hôm nay hoàn thành (+15 mỗi mục tiêu)
  const bigGoalXp = (d.bigGoalsToday||[]).filter(g=>g.done).length*15;
  // V24: XP từ mục "Học theo kết quả" hoàn thành (+10 mỗi mục)
  const studyResultXp = (d.studyResults||[]).filter(r=>r.done).length*10;
  // V25 MỤC 4: XP từ Lịch trình chi tiết theo giờ (DailySchedule) đã tick hôm nay —
  // giá trị mỗi item được lưu sẵn trong d.scheduleXp lúc tick (xem DailySchedule.toggleItem),
  // ở đây chỉ cộng tổng những item đang được đánh dấu scheduleDone.
  const scheduleXpTotal = Object.entries(d.scheduleDone||{}).filter(([,done])=>done).reduce((s,[key])=>s+(d.scheduleXp?.[key]||0),0);
  // V25 MỤC 2: Daily Challenge mới (xem CHALLENGES) — check(d, ctx) nhận thêm ctx={str,finTxs,td}
  const ch = getDailyChallenge(date);
  const bonus = ch?.check(d, {str:ctx?.str, finTxs:ctx?.finTxs, td:date})?(ch.bonus||0):0;
  return (preset+custom+poolXp+prepXp+bigGoalXp+studyResultXp+scheduleXpTotal+bonus)*(d.x2?2:1);
  } catch(e) { return 0; }
};

// [PATCH v30] analyzeLast30Days — phân tích 30 ngày gần nhất từ db, THUẦN
// đọc dữ liệu đã có sẵn (d.tasks, d.poolDone, d.lo, v25:skipHistory qua
// skipList truyền vào), không tự đoán/bịa số. LƯU Ý: hệ thống hiện KHÔNG
// lưu timestamp lúc tick từng task (chỉ có boolean done/not-done), nên
// "giờ vàng trong ngày" KHÔNG tính được thật — cố tình bỏ field này thay
// vì trả về số giả. 6 field trả về đều tính được 100% từ dữ liệu thật:
//   mostDoneTask      — {name, count} tên (TASKS.l hoặc taskPool.l) xuất
//                        hiện done=true nhiều nhất trong 30 ngày
//   mostSkippedTask   — {name, count} từ skipList (v25:skipHistory), lọc
//                        30 ngày gần nhất, gộp theo taskName
//   bestDay           — {label, avgXp} thứ trong tuần có XP trung bình
//                        cao nhất (Thứ 2..Chủ nhật)
//   avgXp             — XP trung bình mỗi ngày trong 30 ngày (chỉ tính
//                        ngày có dữ liệu, không tính ngày trống là 0 để
//                        không làm sai lệch bởi ngày chưa dùng app)
//   bestStreak        — streak dài nhất trong 30 ngày (dựa trên d.lo,
//                        cùng định nghĩa "ngày tốt" App đã dùng cho `str`)
//   daysWithData      — số ngày thực sự có dữ liệu trong 30 ngày (để hiển
//                        thị mức độ tin cậy của các số phía trên)
function analyzeLast30Days(db, dayExp, skipList) {
  const today = new Date();
  const dates = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split("T")[0]);
  }
  const daysWithData = dates.filter(iso => db[iso]).length;

  // ── Task làm nhiều nhất (preset TASKS + custom text — bỏ qua pool vì
  // pool đổi id theo thời gian, không đáng tin cậy để đếm xuyên 30 ngày). ──
  const doneCounts = {};
  dates.forEach(iso => {
    const d = db[iso];
    if (!d) return;
    TASKS.forEach(t => { if (d.tasks?.[t.id]) doneCounts[t.l] = (doneCounts[t.l] || 0) + 1; });
  });
  let mostDoneTask = null;
  Object.entries(doneCounts).forEach(([name, count]) => {
    if (!mostDoneTask || count > mostDoneTask.count) mostDoneTask = { name, count };
  });

  // ── Task bị bỏ qua nhiều nhất, từ skipHistory 30 ngày gần nhất. ──
  const cutoff = dates[dates.length - 1];
  const skipCounts = {};
  (skipList || []).forEach(s => {
    if (!s.date || s.date < cutoff) return;
    skipCounts[s.taskName] = (skipCounts[s.taskName] || 0) + 1;
  });
  let mostSkippedTask = null;
  Object.entries(skipCounts).forEach(([name, count]) => {
    if (!mostSkippedTask || count > mostSkippedTask.count) mostSkippedTask = { name, count };
  });

  // ── Ngày trong tuần hiệu quả nhất (XP trung bình theo thứ). ──
  const DOW_LABELS = ["Chủ nhật","Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7"];
  const dowSum = Array(7).fill(0), dowCount = Array(7).fill(0);
  let xpSum = 0, xpDays = 0;
  dates.forEach(iso => {
    const d = db[iso];
    if (!d) return;
    const xp = dayExp(iso);
    const dow = new Date(iso + "T00:00:00").getDay();
    dowSum[dow] += xp; dowCount[dow]++;
    xpSum += xp; xpDays++;
  });
  let bestDay = null;
  dowSum.forEach((sum, i) => {
    if (dowCount[i] === 0) return;
    const avg = sum / dowCount[i];
    if (!bestDay || avg > bestDay.avgXp) bestDay = { label: DOW_LABELS[i], avgXp: Math.round(avg) };
  });
  const avgXp = xpDays > 0 ? Math.round(xpSum / xpDays) : 0;

  // ── Best streak trong 30 ngày (cùng định nghĩa d.lo App đã dùng). ──
  let bestStreak = 0, curStreak = 0;
  [...dates].reverse().forEach(iso => { // đi từ cũ → mới để streak liên tục đúng nghĩa
    const d = db[iso];
    if (d && !d.lo) { curStreak++; bestStreak = Math.max(bestStreak, curStreak); }
    else curStreak = 0;
  });

  return { mostDoneTask, mostSkippedTask, bestDay, avgXp, bestStreak, daysWithData };
}

// ── MEDIA SYSTEM (ảnh + nhạc) ────────────────────────────────────────────
const MEDIA_KEY = "v30:mediaSettings";
const SFX_NAMES = ["tick","xp","levelup","bosshit","bosswin","coin"];

// Nhận vào Base64 (data:...) hoặc URL thường (http/https), tự nhận diện link
// Google Drive dạng chia sẻ (…/file/d/FILE_ID/view hoặc ?id=FILE_ID) và đổi
// sang direct-download link để trình duyệt phát trực tiếp được. Base64 và
// các URL khác được trả về nguyên vẹn.
function resolveMediaUrl(input) {
  if (!input) return input;
  const s = input.trim();
  if (s.startsWith("data:")) return s; // Base64 — không đụng vào
  if (!/^https?:\/\//i.test(s)) return s; // không phải URL hợp lệ, để nguyên (sẽ báo lỗi khi phát)

  // Các dạng link Google Drive hay gặp:
  //   https://drive.google.com/file/d/FILE_ID/view?usp=sharing
  //   https://drive.google.com/open?id=FILE_ID
  //   https://drive.google.com/uc?id=FILE_ID&export=download
  const driveMatch = s.match(/drive\.google\.com\/file\/d\/([^/]+)/) || s.match(/[?&]id=([^&]+)/);
  if (s.includes("drive.google.com") && driveMatch) {
    const fileId = driveMatch[1];
    return `https://drive.google.com/uc?export=download&id=${fileId}`;
  }
  return s;
}

// Kiểm tra nhanh 1 URL/Base64 có "trông giống" hợp lệ để phát không — dùng
// để hiện cảnh báo sớm trong UI trước khi người dùng bấm Test.
function isLikelyPlayableMedia(input) {
  if (!input) return true; // rỗng thì không cảnh báo gì cả
  const s = input.trim();
  return s.startsWith("data:") || /^https?:\/\//i.test(s);
}

// ── FETCH-AS-BLOB HELPER (chống CORS cho link nhạc/SFX ngoài) ───────────────
// Base64 (data:...) không cần fetch — trả về nguyên vẹn ngay.
// Với URL http/https, thử lần lượt theo thứ tự:
//   1. fetch() trực tiếp tới URL gốc
//   2. fetch() qua proxy corsproxy.io (nếu bước 1 bị CORS/network chặn)
//   3. fetch() qua proxy api.allorigins.win/raw (nếu bước 2 cũng fail)
// Dừng ngay khi 1 bước thành công. Nếu cả 3 đều fail — trả về
// { blobUrl: null, error } để caller fallback sang new Audio(url) thẳng (vẫn
// có thể ăn với link localhost/same-origin hoặc host cho audio-tag trực tiếp
// dù chặn fetch).
//
// LƯU Ý QUAN TRỌNG VỀ PROXY: corsproxy.io và allorigins.win là dịch vụ công
// khai miễn phí của bên thứ ba — không do Anthropic hay em kiểm soát. File
// nhạc sẽ đi qua server của họ trước khi tới trình duyệt. Rủi ro thực tế:
// có thể sập/đổi API/giới hạn băng thông bất kỳ lúc nào không báo trước,
// không có SLA. Đây là fallback "chữa cháy" cho trường hợp host gốc chặn
// CORS hẳn (như Catbox/Pomf2 nhiều lúc chặn cả fetch), không phải giải pháp
// nên phụ thuộc lâu dài. Cân nhắc: nếu có server riêng, tự làm 1 proxy nhỏ
// (Cloudflare Worker chẳng hạn) sẽ ổn định hơn nhiều.
//
// KHÔNG set header "User-Agent" — trình duyệt luôn tự chặn ghi đè header
// này vì lý do bảo mật (forbidden header); gửi lên sẽ bị bỏ qua hoặc gây lỗi
// CORS preflight. Header "Accept" vẫn set được và vô hại.
const FETCH_TIMEOUT_MS = 12000;

const CORS_PROXIES = [
  (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

// 1 lần thử fetch (dùng chung cho cả URL gốc lẫn URL đã bọc proxy).
async function tryFetchBlob(fetchUrl, onProgress) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
  try {
    const res = await fetch(fetchUrl, {
      signal: controller.signal,
      headers: { "Accept": "audio/*,*/*;q=0.8" },
      mode: "cors",
    });
    clearTimeout(timer);
    if (!res.ok) return { blobUrl: null, error: `http-${res.status}` };

    // Đọc theo stream để báo % tiến độ (nếu server trả Content-Length).
    const total = Number(res.headers.get("content-length")) || 0;
    if (!res.body || !total) {
      const blob = await res.blob();
      onProgress && onProgress(100);
      return { blobUrl: URL.createObjectURL(blob), error: null };
    }
    const reader = res.body.getReader();
    let received = 0;
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      onProgress && onProgress(Math.min(99, Math.round((received / total) * 100)));
    }
    onProgress && onProgress(100);
    const blob = new Blob(chunks);
    return { blobUrl: URL.createObjectURL(blob), error: null };
  } catch (err) {
    clearTimeout(timer);
    if (err && err.name === "AbortError") return { blobUrl: null, error: "timeout" };
    return { blobUrl: null, error: "cors-or-network" };
  }
}

// onStageChange(stageLabel) — optional callback để UI hiện "Đang thử qua
// proxy..." khác với "Đang tải nhạc..." lúc thử URL gốc.
async function fetchAsBlobUrl(url, onProgress, onStageChange) {
  if (!url) return { blobUrl: null, error: "empty" };
  const trimmed = url.trim();
  if (trimmed.startsWith("data:")) return { blobUrl: trimmed, error: null, isBase64: true };
  if (!/^https?:\/\//i.test(trimmed)) return { blobUrl: null, error: "invalid-url" };

  // Bước 1: thử URL gốc trực tiếp.
  onStageChange && onStageChange("direct");
  let result = await tryFetchBlob(trimmed, onProgress);
  if (result.blobUrl) return { ...result, viaProxy: false };

  // Bước 2/3: lần lượt thử qua từng proxy nếu bước trước fail vì CORS/network
  // (không thử proxy nếu lỗi là 404/403 — link chắc chắn sai, proxy không
  // giúp được).
  if (result.error === "cors-or-network" || result.error === "timeout") {
    for (let i = 0; i < CORS_PROXIES.length; i++) {
      onStageChange && onStageChange(`proxy-${i + 1}`);
      const proxyUrl = CORS_PROXIES[i](trimmed);
      const proxyResult = await tryFetchBlob(proxyUrl, onProgress);
      if (proxyResult.blobUrl) return { ...proxyResult, viaProxy: true, proxyIndex: i };
      result = proxyResult; // giữ lỗi gần nhất để báo cho người dùng
    }
  }

  return { ...result, viaProxy: false };
}

// Dịch mã lỗi kỹ thuật ở trên sang câu tiếng Việt dễ hiểu cho người dùng.
function describeMediaFetchError(code, url) {
  const isDrive = /drive\.google\.com/i.test(url || "");
  switch (code) {
    case "timeout":
      return "Tải nhạc quá lâu (timeout), kể cả qua proxy dự phòng. Link có thể sai, server chậm, hoặc file quá nặng.";
    case "http-404":
      return "Không tìm thấy file (404). Link có thể đã bị xoá hoặc gõ sai.";
    case "http-403":
      return "Server từ chối truy cập (403). File có thể đã bị đặt riêng tư hoặc bị khoá.";
    case "invalid-url":
      return "Link không hợp lệ. Cần bắt đầu bằng http:// hoặc https://, hoặc dán Base64 (data:...).";
    case "cors-or-network":
      return isDrive
        ? "Không tải được nhạc từ Google Drive (kể cả qua proxy dự phòng). Kiểm tra: file phải để chế độ chia sẻ \"Bất kỳ ai có đường liên kết\" (Anyone with the link)."
        : "Không tải được link này — server chặn CORS, và cả 2 proxy dự phòng cũng không tải được (có thể proxy đang quá tải/sập tạm thời) hoặc mất mạng.";
    default:
      if (code && code.startsWith("http-")) return `Server trả lỗi ${code.replace("http-", "")}.`;
      return "Không phát được link nhạc này. Có thể do link sai, file đã bị xoá, hoặc server chặn CORS.";
  }
}

async function fetchCoverArt(data) {
